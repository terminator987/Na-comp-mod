 power_projection_advance_6: "Global Ambitions"
 power_projection_advance_6_desc: "Consolidation of countries into bigger nations has resulted in the formation of major powers that dominate huge portions of their homelands, and have every intention of extending their power even further."
 enlightened_court: "Enlightened Court"
 enlightened_court_desc: "The values of the Enlightenment are ever-present in any modern court, and with them comes the presence of the most intellectual and learned people. Thanks to these illustrious and enlightened courtiers, much more can now be achieved with far less effort."
 government_size_revolutions: "Modern Representation"
 government_size_revolutions_desc: "With the establishment of official forms of popular representation, the government is better able to address important issues than ever before."
 global_supply_limit_modifier_advance_6: "Campaign Logistics Planning"
 global_supply_limit_modifier_advance_6_desc: "Planning the logistics of warfare has become increasingly complex, as the growth in average army size has made it possible to field several armies at once for long-term campaigns, involving hundreds of thousands of soldiers for multiple years."
 rgo_size_advance_revolutions: "Steam Engine"
 rgo_size_advance_revolutions_desc: "Steam as a means to power a machine has been understood since antiquity. However, its potential had never been fully realized until recently, when the latest advances in physics and mathematics allowed the creation of more sophisticated steam engines, which in turn can power more complex machines. This allows for increased productivity in all fields."
 military_tactics_advance_6: "Field Artillery"
 military_tactics_advance_6_desc: "With artillery being mobile enough to accompany the rest of the army on the battlefield, its influence is no longer limited to whatever is in firing range. Semi-autonomous artillery formations led by artillery officers can instead be deployed where they are most needed."
 road_advance_2: "Basic Roads"
 road_advance_2_desc: "We have constructed rudimentary road networks, but those are quickly showing us why we need to advance our transportation systems. By expanding our road network, we will be able to circulate goods within our territory more easily."
 written_alphabet: "Written Alphabet"
 written_alphabet_desc: "What is a society but the sum of its legacy? A written alphabet, therefore, is but the first step towards immortalizing our culture, as well as the foundation of building an educated, well-functioning society."
 codified_laws: "Codified Laws"
 codified_laws_desc: "Statutes and regulations are the backbone of any well-functioning society. If we are to hone our efficiency and internal capabilities, a set of robust codified laws is of vital importance."
 taxation_advance: "Taxation"
 taxation_advance_desc: "Operating a civilized society implies the maintenance of a central authority, and that authority must be supported through some form of currency. By extracting taxes from our subjects and citizens, we will be more productive and better able to achieve great things for our people."
 state_administration_advance: "State Administration"
 state_administration_advance_desc: "Taxing our population is only feasible as long as we know who lives where and what local customs and laws apply to each person. We must establish a comprehensive administration to properly manage our realm."
 agriculture_advance: "Agriculture"
 agriculture_advance_desc: "The land is generous, and provides us with abundant crops and resources. But in order to advance our society and become a prosperous nation, we must learn how to shape and tame the land, and to extract the best possible treasures from it."
 city_building_advance: "City Building"
 city_building_advance_desc: "Developing our urban centers has become central to national prosperity, and is a cornerstone of the urbanization movement. By systematically constructing infrastructure and specialized buildings within our cities, we will fuel our economic growth."
 road_building: "Road Building"
 road_building_desc: "The transportation of goods, troops, and people is vital to our nation's survival. By developing a basic road network, we will be able to at least connect our people and assist them in their daily endeavors."
 ship_building_advance: "Shipbuilding"
 ship_building_advance_desc: "The seas hold many adventures, much wealth, and commercial — as well as expansionist — opportunities."
 mapmaking: "Mapmaking"
 mapmaking_desc: "Accurately drawing the borders and landmarks of a country is much more than art — it helps us collect information about other nations for strategic purposes. By knowing where important places are exactly, we can not only better coordinate attacks, but also gain more knowledge about our own territory. As the elders often say, knowledge is power."
 standardized_coins: "Standardized Coins"
 standardized_coins_desc: "As wealth is created, more and more mints appear. While we have lived with many different currencies for years, official standards have to be set in order to avoid fraud caused by using lesser quantities of precious metals, or by rasping the edges of those coins."
 humanism_ideas: "Humanism"
 humanism_ideas_desc: "By considering humanity to be the center of everything, we accept our obligation to chase the unknown and to use the intelligence given to us to unveil the secrets of our world. By educating our people, we ensure their freedoms, their free will, and ownership of their own acts. We will use ancient knowledge to further human advancement, and learn equally from the successes and failures of our ancestors."
 legalism_advance: "Legalism"
 legalism_advance_desc: "Laws and rules mean nothing if they are not compiled, standardized, and made understandable to every member of our society. By codifying clear legal standards and enforcing them uniformly, we will ensure that the principles of order and justice reach the furthest corners of our realm."
 meritocracy_advance: "Meritocracy"
 meritocracy_advance_desc: "Merit is not exclusive to the upper echelons of our society. It can be found everywhere, even among the humblest individuals. By creating standardized exams that measure this merit, effort, and overall competency, we can find intellectual jewels hidden in plain sight, and properly appoint them for the betterment of our nation."
 cathedral_advance: "Cathedral"
 cathedral_advance_desc: "A cathedral is one of the largest and most important types of $christian_ADJ$ temple, where the Bishop has a #italic cathedra#!, or seat. While a church can be beautiful and detailed, a cathedral is majestic, of enormous dimensions, and adorned with the finest and most intricate details."

 infiltrate_administration: "[infiltrate_administration|e]"
 supportrebels: "[support_rebels|e]"

 infiltrate_administration_advance: "Infiltrate Administration"
 infiltrate_administration_advance_desc: "Conflicts with other states are not only fought on the battlefield, but in the shadows as well. Knowing the enemy's next move is an invaluable asset when trying to win wars. Our spies shall specialize in infiltrating state administrations, and forward any relevant information they gather to us."
 newspapers_advance: "Newspapers"
 newspapers_advance_desc: "The concept of announcements being announced or posted where the public may read them is certainly not a new one. However, as the $printing_press$ becomes more popular around the world, so does the demand for accessible information about politics, war, and the economy. The newspaper - a periodical publication describing current events - shall satisfy this demand."
 feudal_de_jure_law_advance: "$feudal_de_jure_law$"
 feudal_de_jure_law_advance_desc: "#italic De jure#! - 'by law' - is a description of legally acknowledged practices regardless of the reality of its practice. The systems of a feudal society are built on this very concept."
 semi_salic_law_advance: "$semi_salic_law$"
 semi_salic_law_advance_desc: "By the right of the $salic_law$, only men are allowed to inherit the throne. This practice leads to a succession crisis in cases where the male bloodline dies out, and the monarchy gets thrown into chaos. In order to avoid such disturbances, the rights of women shall be expanded to include eligibility to rule the nation, should no suitable male heir exist."
 republican_foundation_law_advance: "$republican_foundation_law$"
 republican_foundation_law_advance_desc: "$republican_foundation_law_desc$"
 republican_election_law_advance: "$republican_election_law$"
 republican_election_law_advance_desc: "$republican_election_law_desc$"
 republican_electorate_law_advance: "$republican_electorate_law$"
 republican_electorate_law_advance_desc: "$republican_electorate_law_desc$"
 republican_power_law_advance: "$republican_power_law$"
 republican_power_law_advance_desc: "$republican_power_law_desc$"

 principle_of_administration_law_advance: "Principle of Administration Law"
 principle_of_administration_law_advance_desc: "The natural evolution of our complex government dictates the adoption of new laws pertaining to our administration."
 monarchy_reform_traditions_advance: "Monarchy Reform Traditions"
 monarchy_reform_traditions_advance_desc: "Authority cannot be entrusted to just any individual. Concentrating power and influence in the hands of the ruler will help them create order and stability throughout the realm."
 republic_reform_traditions_advance: "Republic Reform Traditions"
 republic_reform_traditions_advance_desc: "Dissemination of power is a cornerstone belief of any healthy republic. Robust laws enforcing elections by lottery will ensure stability and reduce corruption."
 blockade_tactics: "Blockade Tactics"
 blockade_tactics_desc: "Employing effective formations and patrols near enemy ports will make it easier for us to cut off their supply lines, shortening sieges."
 recovery_efforts: "Recovery Efforts"
 recovery_efforts_desc: "War is a cruel mistress that leaves behind naught but wreckage and devastation. By concentrating our efforts on assisting our people as they return to ordinary life after so much horror, we can hasten recovery across the realm."
 naval_initiative_ren: "Deployment Tactics"
 naval_initiative_ren_desc: "It is true that victory often comes to those who draw first blood. Exhaustive study and effective implementation of deployment tactics will permit us to mobilize quickly and take initiative in combat situations, helping us achieve that victory."
 army_initiative_ren: "First Strike"
 army_initiative_ren_desc: "The element of surprise, combined with landing the first strike, often determines the ultimate victor in an armed conflict. Boosting our military initiative is an excellent way to maintain a competitive advantage."
 
 law_making_renaissance: "Legal Scrutiny"
 law_making_renaissance_desc: "New times mean new situations, and the laws that have been in place for generations may not be applicable to these new contexts. We should assign legal experts to continuously scrutinize and revise our laws, so that we can adapt them to our current times and needs."
 subject_integration: "Consolidation of Titles"
 subject_integration_desc: "Although having many countries serving us can be beneficial, only by gathering their different titles under our own will we be able to best utilize their resources. In the end, it is clear that a ruler with only one title will pale in comparison to us, with our splendid array of impressive-sounding titles."
 rgo_construction_ren: "Infrastructure Efforts"
 rgo_construction_ren_desc: "Our country is nothing without its land and its people. Improving the infrastructure of our nation will benefit the common folk as much as it benefits us."
 naval_repair_ren: "Tighter Joints"
 naval_repair_ren_desc: "Everyone knows that a hole in a ship's hull will inevitably lead to its sinking. With better building techniques, we can build a hull with more tightly jointed planks, making the ships less prone to leakage and holes in the hull much easier to repair."
 linked_armies_advance: "Message Relays"
 linked_armies_advance_desc: "Good coordination between the different units of an army is crucial for it to function well. Having an organized system to relay messages between our generals and their unit officials allows all our troops to work more cohesively and respond faster to any situation."
 regular_levy_training: "Designated Instruction"
 regular_levy_training_desc: "Levies are by definition not the best-trained troops, but that does not mean that we have to send a bunch of untrained rabble to war. Assigning them proper instructors from our most proficient units will allow them to learn from the best, and a mandatory training period with them will make them ready — and eager — to fight."
 court_accounting: "Court Accounting"
 court_accounting_desc: "The court is the symbol of our country, and its prosperity shall represent that of the nation. However, this does not mean that the court can spend more than the country can sustain; there should be proper accounting for what is spent at court." 
 
 lead_ore_dressing: "Lead Ore-Dressing"
 lead_ore_dressing_desc: "Through the dressing process, lead ore is washed and crushed to remove impurities and separate the ore from rocks, clay and other minerals."
 bole_smelting: "Bole Smelting"
 bole_smelting_desc: "A method where lead is smelted in the open air using the constant strong winds at the top of hills to blow fresh air into the melting ore."
 cupola_smelting: "Cupola Smelting"
 cupola_smelting_desc: "Using a cylinder-shaped furnace, this method provides a cheap and efficient process of smelting iron, with the unique ability of continuous smelting."
 faster_levy_recruitment: "Mandatory Weapon Training"
 faster_levy_recruitment_desc: "All male peasants are required to be proficient with a spear or bow and to train regularly, so as to be a competent soldier if ever they are called to arms."
 merchant_power_from_maritime_discovery_advance: "Merchant Guilds"
 merchant_power_from_maritime_discovery_advance_desc: "The confraternities of merchants allow our traders to organize, share profitable trade route information, and join forces when buying and selling in foreign markets."
 merchant_power_from_maritime_reformation_advance: "Merchant Companies"
 merchant_power_from_maritime_reformation_advance_desc: "The expansion of markets overseas — and the associated expenses and risks — require the creation of merchant associations that share the burden of trading in these new lands."
 merchant_power_from_maritime_absolutism_advance: "Chamber of Commerce"
 merchant_power_from_maritime_absolutism_advance_desc: "With the emergence of new ideas about commerce and economics, the local businesses have joined together to form a business network that can further their interests and protect their rights against political entities and foreign influences."
 
 
 paper_guild_fiber_pulp_maintenance_advance: "$paper_guild_fiber_pulp_maintenance$"
 paper_guild_fiber_pulp_maintenance_advance_desc: "Utilizing fiber plants like hemp or paper mulberry, paper production will become widely available across the world. While cheap to produce, this paper is lacking in quality."
 paper_guild_cloth_maintenance_advance: "$paper_guild_cloth_maintenance$"
 paper_guild_cloth_maintenance_advance_desc: "$paper_guild_cloth_maintenance$, made from cotton unfit to be processed or otherwise used, set new standards for quality and durability."
 paper_guild_wood_pulp_maintenance_advance: "$paper_guild_wood_pulp_maintenance$"
 paper_guild_wood_pulp_maintenance_advance_desc: "Using widely available softwood, paper will be easier and cheaper to produce than ever before."
 cannon_guild_steel_maintenance_advance: "Steel Barrel Cannons"
 cannon_guild_steel_maintenance_advance_desc: "Using cannons made of steel will give our artillery greater accuracy and range, without sacrificing their mobility."
 firearms_guild_steel_maintenance_advance: "Steel Barrel Firearms"
 firearms_guild_steel_maintenance_advance_desc: "Introducing steel into firearms production allows us to produce more reliable guns in higher quantities."
 grant_privilege_cost_modifier_renaissance_advance: "Codified Privileges and Duties"
 grant_privilege_cost_modifier_renaissance_advance_desc: "By formally codifying the societal roles of each estate in written law, we will clarify their exact privileges and obligations. When rights and responsibilities are clearly defined, each estate knows exactly what it is owed and what it owes in return, and therefore it will be easier for us to grant new privileges without sparking rivalries."
 
 war_no_cb_cost_modifier_renaissance_advance: "Recurrent Warfare"
 war_no_cb_cost_modifier_renaissance_advance_desc: "The nature of war is strongly influenced by which actors are involved. Those with superior capabilities can wage war for longer periods, and thus inter-state wars are becoming increasingly more common."
 global_nobles_max_literacy_advance: "Nobiliary Literature"
 global_nobles_max_literacy_advance_desc: "The nobles are increasingly changing their primary function from being warriors to courtiers in the direct service of their ruler, leading them to give more importance to intellectual matters than military concerns. This has created a demand for engaging literature that appeals to their aristocratic sensibilities."
 global_burghers_max_literacy_advance: "Merchant Literature"
 global_burghers_max_literacy_advance_desc: "Members of our merchant class rely on their abilities to make a living, and those abilities in turn depend on their having had a thorough education in certain fields. Their increased wealth also increases their demand for any literature that might broaden their written culture."
 global_clergy_max_literacy_advance: "Clerical Literature"
 global_clergy_max_literacy_advance_desc: "Clerics are required to be literate by the nature of their occupation, which centers around learning, interpreting, and spreading their religious doctrine. Therefore, their spiritual formation and overall efficacy relies heavily on their access to religious doctrine and teachings."
 land_morale_recovery_renaissance_advance: "Organized Army March"
 land_morale_recovery_renaissance_advance_desc: "Managing armies becomes increasingly more complex as they become less reliant on levies. A key aspect of this is improved organization of armies on the march, which helps the troops to be more prepared if a battle occurs."
 merchant_power_from_maritime_renaissance_advance: "Merchant Partnerships"
 merchant_power_from_maritime_renaissance_advance_desc: "The rising prominence of long-distance trade has led merchants to innovate new ways of making the most of their activities through partnerships. The most common kind is having one partner invest a sum of money in the trading expedition, while the other does the traveling and procurement of goods to be sold after their return."
 merchant_power_from_maritime_revolutions_advance: "Limited Companies"
 merchant_power_from_maritime_revolutions_advance_desc: "The frequent failures of chartered companies have led to the development of a new business model: limited companies, where shareholder liability is limited to their initial investment. This protection from unlimited debt makes such partnerships far less risky and more attractive to potential investors."
 
 send_people_to_colonial_charter_advance: "New Lands of Plenty"
 send_people_to_colonial_charter_advance_desc: "New lands mean new opportunities — and new resources to exploit. By encouraging our population to settle abroad and take advantage of these abundant resources, we will reap enormous benefits."
 send_people_to_the_colonies_advance: "New Lands of Opportunity"
 send_people_to_the_colonies_advance_desc: "A whole new world lies open before us, and that means our people are dreaming about what their lives could be in these distant lands. We should encourage these thoughts, embellishing stories of gold and glory to be found in the unexplored territories, so that our people will be eager to settle these new lands for us."
 study_institutions_advance: "Shared Knowledge"
 study_institutions_advance_desc: "It is not a shame that others know what we do not, but it is never to our benefit if we do nothing to remedy that ignorance. By actively studying and learning from the discoveries of others, we can better improve our own knowledge of the world."
 reduce_inflations_advance: "Strict Monetary Control"
 reduce_inflations_advance_desc: "Some may think that if we need more money, the only thing we need to do is mint more, but that is neither sustainable nor wise. By keeping strict control over our minting industry, we can keep our inflation in check, and possibly even reduce it."
 pop_promote_actions_advance: "Social Ladder"
 pop_promote_actions_advance_desc: "It is said that chaos is a ladder for those seeking higher status. For us, this ladder comes not from chaos but from order, as we have systematized pathways allowing our people to improve their social standing through merit. We not only permit such advancement; we actively encourage it."
 alleviate_concerns_advance: "Deflating Tensions"
 alleviate_concerns_advance_desc: "No country benefits from its neighbors being constantly vigilant of its movements. We must employ active diplomacy to immediately deflate any tensions that may arise, so that our neighbors have no reason to be concerned about us."
 counter_espionage_action_advance: "Restricted Information Access"
 counter_espionage_action_advance_desc: "We cannot expect to perform well in either the diplomatic or military spheres if our secrets can easily be leaked to any foreign country. We must keep stronger control over how our information flows to quickly plug any possible leakage."
 pacify_population_advance: "Keep Agitators in Check"
 pacify_population_advance_desc: "At some point, people may be discontent with our leadership — it is practically unavoidable. However, these grumblings will not grow into anything major as long as we do not let them fester. If we actively seek out those who raise their voices against us, we can nip any agitation in the bud before they have the chance to rally others around them, and thus keep the general populace content. Or at least complacent."
 nation_state_advance: "Nation State"
 nation_state_advance_desc: "Uniting as a single culture under a single flag is a powerful, moving idea. By fostering a sense of national identity, we will ensure the loyalty of our subjects and citizens to our cause."
 
 LIV_a_order_knights: "Knights of the Livonian Order"
 LIV_a_order_knights_desc: "Our nation is founded on the strong backs of the brave $christian_ADJ$ men who have joined our order as knights. Their martial prowess will compensate for our low numbers, compared to those of the Pagans surrounding us, as will the light and strength of our faith."
 LIV_a_order_knights_2: "Bannerets of the Livonian Order"
 LIV_a_order_knights_2_desc: "The knights of our order have proven their valor and skill in battle time and time again. By promoting the most capable among them to bannerets, we ensure that our armies will always be led by the best."
 wallachian_tradition: "A Fortified Nation"
 wallachian_tradition_desc: "Our lands are bounded by mountains and the Danube river, but are otherwise quite flat. The rich soil of our territory is like a highway for invading armies once they breach our natural barrier. In order to better defend our people, we will build fortifications and castles all across the region."
 wallachian_heritage: "A History of Resistance"
 wallachian_heritage_desc: "Having been part of several empires in the past, our people are resilient fighters. Any enemy that dares to attack us will pay with blood."
 khedivates: "Khedivates"
 khedivates_desc: "Large empires are usually formed around a core territory, and otherwise surrounded by subject nations of somewhat dubious loyalty. We should take the necessary measures to keep these nations under our surveillance."
 french_tradition: "La Cour de $FRA$"
 french_tradition_desc: "Our diplomatic maneuvers are renowned for their complexity and finesse, and our skilled envoys emulated across the continent. Yet only a fool would become complacent now — we could further refine our diplomacy through measures such as cultivating networks of informants and perfecting the art of negotiation. Let other nations muddle through yesterday's techniques while we pioneer tomorrow's."
 french_heritage: "A Knightly Nobility"
 french_heritage_desc: "The aristocrats of our nation have always provided the best soldiers for our armies. Their well-trained fighters will serve our nation and defeat our enemies in the name of righteous glory!"
 french_ambition: "Grande Armée"
 french_ambition_desc: "When measured against our adversaries, our need for military reform becomes painfully apparent. By introducing modern drilling techniques, we can transform our troops into a disciplined force capable of destroying any foe in combat."
 
 
 english_tradition: "Lionhearts"
 english_tradition_desc: "The bravery and discipline of $ENG_ADJ$ foot soldiers has been witnessed from the shieldwalls of $northumbria_area$ to the darkened skies of $FRA$. Inspired by the lion-hearted spirit of our kings and the stoicism of the common man, our infantry fights with the ferocity of the Anglo-Saxon warriors before them."
 english_heritage: "Our Island Home"
 english_heritage_desc: "Our island protects us from outside enemies, but that will not matter if we do not protect the surrounding waters. By being true masters of our surrounding seas, we will keep a firm control on those who threaten our land."
 english_ambition: "Rulers of the Waves"
 english_ambition_desc: "A massive sea presence is required for any nation attempting to rule the waters. Our fleet will be so imposing that the shores of our enemies will always be surrounded by our vessels."
 omani_tradition: "Gulf of $OMA$"
 omani_tradition_desc: "Our nation is at the back of the ample and hostile deserts of $arabia_region$, but the sea to our east allows us to circumvent them. It is by sea, not by land, that we will need to perform our diplomacy, trade, and expansion."
 omani_heritage: "Control of the Gulf"
 omani_heritage_desc: "Our sailors are used to navigating far and wide upon the seas, but control of the gulf surrounding us is what allows such travels. We must always stand ready to defend our waters against any foreign threat."
 omani_ambition: "Land Isolation"
 omani_ambition_desc: "Despite not being an island, our land is factually isolated from the rest of $arabia_region$ due to the surrounding deserts. As such, we have learned how crucial it is to have access to the sea, and how useful it will be for us if we take that option away from our enemies."
 breton_tradition: "$breton$ Peninsula"
 breton_tradition_desc: "Ever since our ancestors came from $great_britain_region$, our extensive coastal holdings have been bustling with activity. Our people live by the sea and for the sea, and our ports are always full of trade and fishing boats."


 house_of_parliament_advance: "$house_of_parliament$"
 house_of_parliament_advance_desc: "$house_of_parliament_desc$"
 
 lacquerware_guild_advance: "$lacquerware_guild$"
 lacquerware_guild_advance_desc: "$lacquerware_guild_desc$"
 
 bur_between_two_realms: "Between Two Realms"
 bur_between_two_realms_desc: "We can consider ourselves to be both members of the traditional lands of the $hre$, and of the realm of $FRA$. While this can complicate feudal relations, the situation has molded us into adept diplomats, able to skillfully play both sides to our own advantage."
 bur_knightly_prowess: "Knightly Prowess"
 bur_knightly_prowess_desc: "We occupy a prestigious position within the feudal system of $FRA$. Therefore, it is only right that our troops are seen as a reflection of the $BUR_ADJ$ spirit."
 bur_rich_soil_of_burgundy: "Foster Agriculture"
 bur_rich_soil_of_burgundy_desc: "The lands of $BUR$ are well-suited to growing plants and herding animals. Grapes are particularly apt for local growing conditions. With skilled cultivation, it should be easy to foster an agricultural industry."
 mos_skilled_tax_collectors: "Gatherers of Tribute"
 mos_skilled_tax_collectors_desc: "Our position as the collector of tribute for the $GLH_horde$ has given us many years of experience in gathering tribute... and in retaining some of the profits for ourselves."
 mos_dynastic_ties: "Rule through Dynastic Ties"
 mos_dynastic_ties_desc: "The lands of $russian_region$ have been ruled by one dynasty since time immemorial. We should utilize our position among our peers and our blood ties to take a leading role."
 mos_patrol_the_territories: "Organized Levies"
 mos_patrol_the_territories_desc: "Governing the vast expanse of $russian_region$ is no easy task. We should establish local recruitment centers to make drafting levies into our armies easier."
 russian_integration: "$russian_group$ Traditions"
 russian_integration_desc: "The $russian_group$ are vast and diverse in their culture. To unify them like the rulers of old once did, we should promote our shared history and forge an unbreakable cultural bond between the different groups."
 russian_resiliance: "$russian_group$ Recruitment"
 russian_resiliance_desc: "The $mongolian_group$ invasions of the past left a strong determination within the $russian_group$ to resist foreign rule. We can utilize their zeal to reinforce our troops."
 land_of_the_rus: "Land of the Rus'"
 land_of_the_rus_desc: "Reunification of the Rus' is a common goal among the $russian_group$ rulers, and aspiring conquerors can use this as a justification of conquest."
 russian_legitimization: "Common Legitimacy"
 russian_legitimization_desc: "The $russian_group$ people have occupied and ruled these lands for centuries. It is only natural that a $russian_group$ ruler should govern their own people. The more $russian_group$ we present ourselves to be, the easier the people will accept our leadership."
 nor_seaborn_country: "Seaborn Country"
 nor_seaborn_country_desc: "The $NOR_ADJ$ people have always chosen to traverse the country by boat, whenever it is convenient. This makes our people adept sailors, ready to man our navy whenever necessary."
 nor_bounties_of_the_sea: "Bountiful Seas"
 nor_bounties_of_the_sea_desc: "The $NOR_ADJ$ land cannot provide our people with enough food to sustain themselves. We will look to the sea to feed our people instead. Fortunately, the waters of the North Sea provide us with plenty of fishing grounds."
 nor_merchant_tradition: "$NOR_ADJ$ Merchants"
 nor_merchant_tradition_desc: "The ports of $NOR$ have long been a desirable destination for merchants from all around $europe$. It is time that we not only host foreign merchants in our ports, but benefit from the trades of northern $europe$ ourselves."

