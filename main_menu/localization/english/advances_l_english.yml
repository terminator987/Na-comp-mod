 #Novgorod
 northern_center_of_arts: "Northern Center of Arts"
 northern_center_of_arts_desc: "$novgorod$ is an important cultural center in $europe$. Epic tales are told of our's literate and intellectual population, intricate religious art, and grand architecture, increasing the prestige of our flourishing city and indeed the whole nation."
 city_of_churches: "City of Churches"
 city_of_churches_desc: "There are over eighty $orthodox_ADJ$ churches in $novgorod$, and some are the largest landholders in the principality. Their wealth and religious prestige allows the Church to significantly influence the population in many areas, and our citizens are more pious as a result — in a good way."
 novgorodian_fur_trade: "Novgorodian Fur Trade"
 novgorodian_fur_trade_desc: "$fur$, the silken gold of $RUS$! While other states gain their wealth from trading in $goods_gold$ and other rare metals, our source of income comes from the high-quality $fur$ the motherland provides us with."
 grand_dukes_army: "Grand Duke's Army"
 grand_dukes_army_desc: "Leading troops is the most important duty for the Grand Duke, who is appointed to rule over the Veche Republic. Under such strong and experienced leadership, our armies will become far more deadly in battle."
 ushkuiniks: "The Ushkuyniks"
 ushkuiniks_desc: "The Viking-like #italic Ushkuynik#! pirates were once a useful tool to suppress our competitors. Unfortunately, we were forced to stop using them due to foreign intervention, mainly from Moscow. We should begin funding them again, and send these pirates to plunder farther shores — that will show everyone who the true masters of the North are!"
 baltic_shipyard: "Baltic Shipyard"
 baltic_shipyard_desc: "We shall build a grand shipyard on the eastern coast of the Baltic Sea, and dominate overseas trade!"
 veche_advance: "The Veche"
 veche_advance_desc: "$veche_advance$ is a popular assembly with its origins in ancient tribal councils, which themselves existed long before the time of the Rus'. It is the highest judicial and legislative authority of the state."
 birch_bark_manuscript: "Birchbark Manuscripts"
 birch_bark_manuscript_desc: "Writing and reading are fundamental pillars of our society. Religious texts, as well the details of our history, need to be written down so that future generations can learn of our cultural achievements. We have an abundant supply of birch trees in this nation, and their papery white bark will become our parchment."
 novgorod_first_chronicle: "$NOV$ First Chronicle"
 novgorod_first_chronicle_desc: "The #italic Novgorod First Chronicle#! details the history of our country, from the days of the legendary Varangian chieftain Rurik up to the present. It is a cultural heirloom that is proudly handed down from one generation to another."
 defenses_of_novgorod: "Defenses of $NOV$"
 defenses_of_novgorod_desc: "The Republic of $NOV$ is the target of many external threats. But be it the western heretics from $scandinavia_region$, the rampaging Germans to our southwest, or even other $RUS_ADJ$ powers to our south; they all shall all crumble at the feet of our unbreakable fortifications."
 reforms_of_the_posadnichestvo: "Reforms of the Posadnichestvo"
 reforms_of_the_posadnichestvo_desc: "The #italic Posadnik#! is the highest administrative position in our towns and cities, and is a more significant role than that of a mayor. As their city grows, so do the responsibilities, influence, and number of Posadniks in the administration."

 #

 cork_stoppers: "Cork Stoppers"
 cork_stoppers_desc: "Developments in bottle manufacturing have allowed wine producers to create bottles in standardized sizes, and as a result, they have been able to reintroduce the use of cork bottlestoppers. This is a much more efficient way to seal in the wine than with cloth stoppers, and means that it can now be transported much farther away than was previously possible. Perhaps we are now seeing the birth of a worldwide $wine$ trade..,"
 colonial_policy_advance: "Colonial Policy"
 colonial_policy_advance_desc: "The new lands and frontier territories that our people are colonizing require new forms of management and organization."
 native_policy_advance: "Natives Policy"
 native_policy_advance_desc: "The new lands discovered by our daring explorers are usually inhabited by people we find strange and unsophisticated. It is time that we created an official policy to regulate encounters between our expeditionary forces and the natives of the lands they explore."
 slave_raid_advance: "Coastal Raiding"
 slave_raid_advance_desc: "Our country has a long tradition of raiding the coastlines for slaves, money, and all the other necessary things in life."
 crown_power_advance_discovery: "Statecraft"
 crown_power_advance_discovery_desc: "As our ruler's authority becomes the dominant power in our domain, it highlights the need for a comprehensive government structure, as well as a proper bureaucratic corpus to manage it."
 crown_power_advance_reformation: "'Cuius Regio, Eius Religio'"
 crown_power_advance_reformation_desc: "While our ruler has a firm grasp over matters mundane, it is becoming a necessity that they also take control of heavenly concerns. Church and state must become one."
 crown_power_advance_absolutism: "Absolutism"
 crown_power_advance_absolutism_desc: "Now that earthly and divine matters are both under the authority of our ruler, few things escape their reach. Absolute rule now holds sway in our domain."
 crown_power_advance_revolutions: "Nation"
 crown_power_advance_revolutions_desc: "After unifying all the powers under the iron fist of our leader, subjects across the nation have suddenly become aware of a sense of belonging. Whatever region our monarchs rule, they are part of the nation and its people all the same."
 sergeants_at_arms_advance: "Sergeants-at-Arms"
 sergeants_at_arms_advance_desc: "A small band of loyal retainers who protect and serve the monarch, Sergeants-at-Arms rank just below knights. They serve the monarch not only by becoming bodyguards, but also by collecting loans, drafting men and ships, and acting as a police force."

 #Genoa
 alberghi_28_advance: "$alberghi_28$"
 alberghi_28_advance_desc: "$alberghi_28_desc$"
 genoese_banking_traditions: "$GEN_ADJ$ Banking Traditions"
 genoese_banking_traditions_desc: "The rise of $GEN$ as a main commercial center of medieval $ITA$ led to the early development of new forms of credit and some of the world's earliest banking institutions."
 genoese_maritime_diplomacy: "$GEN_ADJ$ Maritime Diplomacy"
 genoese_maritime_diplomacy_desc: "As the city of $GEN$ became a republic focused on serving the interests of its merchant class, it developed a strong influence abroad, and struck numerous deals with allies and clients across the Mediterranean."
 bank_of_saint_george: "Bank of Saint George"
 bank_of_saint_george_desc: "The Bank of Saint George is a financial institution founded to consolidate all the debts of $GEN$, with the aim of becoming the credit arm of the country and financing its enterprises overseas."
 the_age_of_the_genoese: "The Age of the $GEN_ADJ$"
 the_age_of_the_genoese_desc: "The financial development of $GEN$ in recent decades has led$GEN_ADJ$ bankers to becoming among the most sought-after, stimulating the splendor of our country by becoming patrons of renowned artists for their villas and palaces."
 hospital_advance: "Hospitals"
 hospital_advance_desc: "Hospitals were first established during the Middle Ages to provide care for the sick, poor, and disabled. Typically run by religious orders, these hospitals offered a range of medical services, including basic nursing care, herbal remedies, and later on, surgery. They were often located near churches or monasteries and had separate wards for men and women. Despite limited medical knowledge, these hospitals played a vital role in offering sanctuary, comfort, and some form of medical treatment to those in need during a challenging period in history."
 banking_country_traditions: "Banking Traditions"
 banking_country_traditions_desc: "While many seek wealth in the opportunities of trade and commerce, our state fills its coffers by offering entirely fair and highly affordable loans."
 genoese_crossbowmen: "$a_genoese_crossbowmen$"
 genoese_crossbowmen_desc: "$a_genoese_crossbowmen_desc$"
 genoese_galley: "$n_genoese_galley$"
 genoese_galley_desc: "$n_genoese_galley_desc$"
 italian_galleass: "$n_italian_galleass$"
 italian_galleass_desc: "$n_italian_galleass_desc$"
 genoese_flexibility: "$GEN_ADJ$ Flexibility"
 genoese_flexibility_desc: "Our state navy can serve multiple purposes instead of just being a weapon for war. With our knowledge and experience, we can repurpose our war galleys to merchant galleys — and vice-versa, if need be — in no time."
 genoese_school: "$GEN_ADJ$ School"
 genoese_school_desc: "Painting, and the visual arts in general, has flourished in $ITA$ since the $renaissance$. It is therefore hardly surprising that a rich and esteemed state such as $GEN$ opens its own $GEN_ADJ$ School of Art."

 government_size_renaissance: "Permanent Cabinet"
 government_size_renaissance_desc: "Rulers traditionally had a council of advisors to counsel them through making important decisions. Over time, our government has grown so complex that we need to establish more permanent advisory positions to help us deal with day-to-day governance."
 renaissance_court: "$renaissance$ Court"
 renaissance_court_desc: "The $renaissance$ has spread far and wide, and as a result, our court is attracting dedicated artists and scholars, creating the most splendid works ever made."
 rgo_size_advance_renaissance: "Mills"
 rgo_size_advance_renaissance_desc: "Mills have been used since ancient times. However, we are now able to develop more modern and efficient wind and water mills, which in turn improve our production."
 food_advance_renaissance: "Intensive Agriculture"
 food_advance_renaissance_desc: "Agriculture is the foundation of most societies. Recent advances have improved the productivity of our fields and farms, creating valuable food surpluses."
 crown_power_advance_renaissance: "Sovereignty"
 crown_power_advance_renaissance_desc: "Traditional governance required rulers to negotiate with estates and balance competing powers. Modern theories of government, however, establish the ruler as supreme authority within the realm — above all other institutions, estates, and subjects, while bowing to no earthly power."
 global_supply_limit_modifier_advance_2: "Supply Lines"
 global_supply_limit_modifier_advance_2_desc: "Land warfare is becoming more dependent on supplying bigger and bigger armies. Therefore, better organization of our supply carts would lead to an increased operational capacity."
 naval_morale_advance_1: "Medieval Sailing"
 naval_morale_advance_1_desc: "The advancements made in the field of sailing in recent decades have increased the expertise and confidence of our sailors, allowing them to navigate with confidence in coastal waters."
 slave_trade_act_advance: "Slave Trade Act"
 slave_trade_act_advance_desc: "The flow of workers to and from our colonies is a lucrative and sensitive affair. As such, we must invest in our legislative attempts to refine it."
 order_headquarters_advance: "$order_headquarters$"
 order_headquarters_advance_desc: "Establishing loyal Orders will undoubtedly increase our local defensive capabilities and make it easier to recruit able-bodied fighters."
 LIV_crusader_forts: "Baltic Crusader Forts"
 LIV_crusader_forts_desc: "The many fortifications in our territories owe their construction and funding to our numerous Crusader bands. Flanked by sturdy walls, these fortifications will serve and protect our people for years to come!"
 scholasticism: "Classic Scholasticism"
 scholasticism_desc: "Based on Aristotelian logic and the writings of the early $christian_ADJ$ Fathers, scholasticism aims to spread knowledge by emphasizing religious dogmatic beliefs and traditions."
 organized_religion: "Organized Religion"
 organized_religion_desc: "Religion plays a major role in every society, yet not every faith has the same structure. An organized religion has its rituals and belief systems systematically arranged, and follows defined doctrines."
 guilds: "Guilds"
 guilds_desc: "A guild is an association of merchants or craftsmen who have come together for mutual protection, aid, and for the pursuit of their own interests. Guilds establish monopolies of their goods and trade, and set standards for the quality and price of trade goods."
 colonial_tradition: "Colonial Traditions"
 colonial_tradition_desc: "Our state was formed and shaped by the ambitions of the 'founding fathers,' the first colonists to come over from the old country. Many of the customs and traditions they brought with them have influenced our own society in this new and strange world."
 colonial_heritage: "Colonial Heritage"
 colonial_heritage_desc: "As a colony, we bear the heritage of our mother country's imperial ambitions."
 colonial_ambition: "Colonial Ambition"
 colonial_ambition_desc: "Many of our people settled in the New World to start a new life; to discover the wonders beyond the sea and make an untamed continent their home. Their ambition is ours as we push further and further into the unknown."
 power_projection_advance_1: "Imperial Ambitions"
 power_projection_advance_1_desc: "As the countries grew and states consolidated during the High Middle Ages, their ambitions also grew, leading to attempts at creating and recreating empires in their regions."
 trade_advance_age_of_trad: "Trade Fairs"
 trade_advance_age_of_trad_desc: "As trade routes were revived and expanded during the Middle Ages, new mercantile practices began to appear. One such were trade fairs, large-scale events held annually in towns and cities where merchants and traders from different places could meet and broker deals."
 colonial_assembly: "Colonial Assembly"
 colonial_assembly_desc: "Much of the legislative power over taxes and government spending has been moved into colonial administrations."
 founding_fathers: "Founding Fathers"
 founding_fathers_desc: "This refers to all the politicians, soldiers, diplomats, and others who played an influential role in establishing their nation by winning their country's independence and creating a new system of governance."
 colonial_militia: "Colonial Militia"
 colonial_militia_desc: "In the absence of regular garrisons, colonial militias played an important role in local conflicts and border raids against native tribes and other colonies. They were typically made up of adult male citizens who were usually expected to provide their own weapons and equipment."
 new_frontiers: "New Frontiers"
 new_frontiers_desc: "The movement to push the colonial frontier further and further inland in the New World, by establishing everything from small trade stations to full settlements with large areas of cultivated land."
 continental_trade: "Continental Trade"
 continental_trade_desc: "While the New World colonies had to import a lot of manufactured products, they also became a major supplier of raw materials for markets in $europe$."
 manufacturing_center: "Imperial Manufacturing Center"
 manufacturing_center_desc: "Our citizens are the power base of our overlord's trade empire. Foreign goods are delivered to us, which we then mold into finished products."
 free_thinkers: "Free Thinkers"
 free_thinkers_desc: "The belief that every man is entitled to both freedom of thought and freedom of speech is widely held in our colonies. Without these rights in place, there could be no such thing as civil liberty."
 liberty_heroes: "Sons of Liberty"
 liberty_heroes_desc: "Many leaders of the New World independence wars possessed not only the necessary military skills, but also the charisma needed to encourage morale, hold the army together, and be an inspiration to the people."
 beat_to_windward_advance: "Beat to Windward!"
 beat_to_windward_advance_desc: "Lateen-rigged caravels are highly maneuverable, allowing them to easily tack against the wind. This makes sailing through unfavorable weather and hostile seas much quicker."
 route_to_the_indies_advance: "Route to the Indies"
 route_to_the_indies_advance_desc: "Trade with the Far East is essential to maintaining our way of life. However, the land route is slow and costly. If we could find a route over the seas, it would open up many business opportunities for our merchants."
 educated_bureaucrats: "Educated Bureaucrats"
 educated_bureaucrats_desc: "The officials running our administration are not illiterate and lazy heirs to their parent's seats, but rather educated and talented individuals who have earned their positions through effort and merit. An administration like this will undoubtedly run more smoothly and efficiently than any other."
 efficient_bureaucracy: "Efficient Bureaucracy"
 efficient_bureaucracy_desc: "Bureaucracy is the oil that makes the wheels of our administration turn smoothly. With the appointment of efficient bureaucrats that have both talent and the will to properly fulfill their tasks, we will ensure the seamless operation of our government structures."
 appointed_chain_of_command: "Appointed Chain of Command"
 appointed_chain_of_command_desc: "Having talented military experts leading our men into battle, rather than entrusting that duty to inept nobles who only were put in leadership roles because of their blue blood, make our armies work more efficiently. The result of that is that we can more easily command larger forces."
 abacus_advance: "Abacus"
 abacus_advance_desc: "Abaci may be ancient technology, but it is precisely thanks to proper accounting tools and ledgers that we are able to keep accurate accounts of our wealth. Without these tools and the talented experts who know how to use them, we would be blind to the actual richness of our country."
 temporary_appointments: "Temporary Appointments"
 temporary_appointments_desc: "Having our court members serve a position for life carries the inherent risk of them amassing undue power and influence. They also tend to dedicate less effort to their tasks, due to being given excessive responsibilities. To avoid this messiness, we can establish a system of temporary assignments. That way, officials are assigned to the positions they are best qualified for, but can be reassigned with ease should they grow too complacent in their roles."
 non_inheritable_offices: "Non-Hereditary Offices"
 non_inheritable_offices_desc: "Having our court officials pass their offices from father to son is a plague on our administrative system! It does nothing but cause apathy and rot to blight every branch of our authority. All offices should from now on be assigned to those best able to fulfill the required duties, regardless of their lineage."
 government_sanctioned_celebrations: "Government-Sanctioned Celebrations"
 government_sanctioned_celebrations_desc: "Our people are always eager to celebrate any good tidings, be they in honor of our country or to mark days on the calendar. Instead of letting them hold these joyful gatherings on their own, we should have our administration organize grand public celebrations, so that we can show our people we care about them while fostering a greater sense of unity between them at the same time."
 efficient_logistics: "Efficient Logistics"
 efficient_logistics_desc: "Logistics and communications are what allow us to properly administer our entire territory. To facilitate better communication between our provincial governors and the central rulership, we need a well-established network of roads for our messengers to travel upon."
 ledgers_double_checking: "Meticulous Accounting"
 ledgers_double_checking_desc: "A lack of rigor in accounting is what allows corruption to thrive, and rots countries from within! To avoid this threat to our administration, we must ensure that any changes in our treasury are fastidiously accounted for."
 province_governors: "Provincial Governors"
 province_governors_desc: "Our provinces are not ruled autonomously, nor by any local nobles hungry for power. Instead, governors appointed by our central administration are the ones responsible for extending our authority into every settlement in our country."
 right_to_rule: "Right to Rule"
 right_to_rule_desc: "Our administration is centered around the premise that the most talented people should be assigned to appropriate posts. As such, the ruler should be the most gifted member of the realm, as befits someone who leads an entire country. In the unfortunate case that the ruler might be lacking, we will need people skilled at 'embellishing' the truth to communicate the ruler's extraordinary competence, be it through imposing statues, astonishing paintings, or exalting verses."
 talented_traders: "Talented Traders"
 talented_traders_desc: "Just as we staff our administration with talented officials, we need to ensure our commercial infrastructure is managed by skilled professionals. Having only the brightest minds overseeing our trade operations will keep products moving and revenues flowing without interruption."
 smooth_administration: "Smooth Administration"
 smooth_administration_desc: "Having an administration composed of the most talented and suitable individuals in our realm helps our country run smoothly and our authority to flow uninterrupted, regardless of any circumstances in which we may find ourselves."
 ara_a_maritime_realm: "A Maritime Realm"
 ara_a_maritime_realm_desc: "Our realm is firmly fixated on the vast expanse of the sea, its attention directed towards maritime pursuits. With a strategic outlook, it harnesses naval power and maritime trade to strengthen its position and expand its influence. Our maritime focus shapes our policies, fostering a seafaring culture that propels the nation's prosperity."
 ara_desperta_ferro: "Desperta Ferro!"
 ara_desperta_ferro_desc: "#italic Desperta Ferro!#! — Awake Iron! — is the fearsome battle cry of the $a_almogavars$, invoking the presence of iron in combat. It is accompanied by striking lances and darts against flints to create sparks. Among other war cries like #italic Aragó!#! and #italic Sant Jordi!#!, #italic Desperta Ferro!#! stands out as the most renowned and unique."
 ara_a_mediterranean_trade_power: "A Mediterranean Trade Power"
 ara_a_mediterranean_trade_power_desc: "The Mediterranean Sea's gentle embrace caresses our shores, beckoning our people to engage trade endeavors from generation to generation. Our bustling commercial centers and strategic trade posts scattered throughout the Mediterranean will play a crucial role in realizing our ambition to become a dominant force in trade."
 ara_fleet_ordinances: "Fleet Ordinances"
 ara_fleet_ordinances_desc: "In the bustling Mediterranean, fleets gather from around the world, prompting the need for a legal system to address crimes in the crowded land and sea. #italic Ordinacions sobre lo fet de la mar#!, or #italic Ordinances on What Happens in the Sea#!, is one of the earliest military codes of justice, created to govern fleets. This unique response to the post-Black Death era recruits crew members, including criminals, from outside $ARA$, resulting in a harmonized code formed from diverse traditions rather than a mere codification of existing naval customs."
 ara_valencian_golden_age: "$VAL_ADJ$ Golden Age"
 ara_valencian_golden_age_desc: "The realm we inhabit has ascended to literary heights as yet unattained by many neighboring nations, thanks to the remarkable contributions of esteemed authors such as Joanot Martorell, Ausiàs March, and Isabel de Villena. Their profound literary works have elevated our culture to unparalleled levels, instilling a sense of pride within our people. Undeniably, our nation stands as a radiant beacon of culture, shining brightly for all to behold."
 ara_remenca: "Remença"
 ara_remenca_desc: "The #italic Remença#! system, particular to $CAT$, has close equivalents in other territories of the Crown, fostering a collective drive towards greater raw goods production. Through this framework, our lands experience a surge in wealth, igniting the potential for substantial progress towards fulfilling our objectives. By harmonizing these systems, we will cultivate an environment where our endeavors are fortified by the abundance of resources, fueling a path of growth and prosperity for our realm."
 ara_chartered_merchant_companies: "Chartered Merchant Companies"
 ara_chartered_merchant_companies_desc: "Our traders are wasting resources competing with each other. This is silly; we should focus all our efforts on taking trade from others instead! Let us charter companies who will be given temporary monopolies on trade from certain regions and whose renewal will be dependent on giving the Crown its rightful due."
 ara_stronger_united: "Stronger United"
 ara_stronger_united_desc: "Since the merger of between us and the County of Barcelona in 1164, $ARA$ has functioned as a Confederation, comprising distinct realms under a central ruler. These differences have fostered prosperity and maintained individual identities, yet have also given rise to an illusion of disunity. This has led to the need for administrative reforms to strengthen our union while honoring the unique characteristics of each territory."
 ara_constellation_cities: "Constellation of Cities"
 ara_constellation_cities_desc: "Since its inception, our nation has consisted of diverse realms brought together under a single ruler. However, each realm retains its unique traditions and laws. Consequently, numerous major cities have emerged as regional metropolises, representing and governing their respective regions."
 ara_protection_of_the_little_folk: "Protect the Smallfolk"
 ara_protection_of_the_little_folk_desc: "Our soldiers would want their loved ones to be looked after in the event they perish in battle. $ARA$ will do its duty and ensure that this is done through establishing a system of workhouses for orphans of the fallen."
 ara_gunpowder_souls: "Gunpowder Souls"
 ara_gunpowder_souls_desc: "The #italic Fallas#! celebration has acted as a catalyst within the Crown of $ARA$, spurring advancements in artillery techniques through the practical expertise gained from handling gunpowder for firecrackers and fireworks. This festive tradition has fueled a spirit of innovation, resulting in the development of new strategies and knowledge about artillery."
 ara_mossos_esquadra: "Mossos d'Esquadra"
 ara_mossos_esquadra_desc: "The #italic Escuadras de Paisanos#!, known as #italic Esquadres de Catalunya#! or #italic Mossos d'Esquadra#!, are a local militia dedicated to safeguarding trade routes and fairs, making the most of their intimate familiarity with the terrain. Inspired by their success, we aim to establish similar militias in our other territories, compOsed of local inhabitants. This should foster a harmonious coexistence and ensure peace in these regions."

 cas_repoblaciones: "Repoblaciones"
 cas_repoblaciones_desc: "The extensive conquests of our ancestors have created a country with more land than people available to inhabit and work it. That has resulted in a dire need to attract migrants from other regions."
 cas_the_reconquista: "The Reconquista"
 cas_the_reconquista_desc: "In the many years since the Visigothic Kingdom fell to invaders, we have waged war against the Moors. This has given us the sort of iron discipline that not many can boast of. Arise, warriors of $CAS$, and show the world your determination!"
 cas_castilian_navy: "$CAS_ADJ$ Navy"
 cas_castilian_navy_desc: "Situated as we are on a peninsula, surrounded by sea on three out of four sides, and with the valuable $strait_of_gibraltar$ bitterly fought over by different powers, dominating the seas has become a matter of life and death. From our hundreds of kilometers of coastline, our ancestors started taming the waves, evolving our nation into a fearless naval power."
 cas_cronicas_reales: "Crónicas Reales"
 cas_cronicas_reales_desc: "By compiling the chronicles written by previous rulers, we are able to create a compendium that details every past event in our realm and the origins of all our rulers. This knowledge will help us not only to create better cultural foundations, but will also help present and future rulers to correctly assess present events through comparisons to past ones."
 cas_masters_of_the_orders: "Masters of the Orders"
 cas_masters_of_the_orders_desc: "As the Reconquista is no longer our main focus, we can no longer justify the independence of Holy Orders. By having our ruler assume the position of Master in every Order, they will not only gain significant power, but they will also have access to the military knowledge of these crusaders."
 cas_new_world: "The New World"
 cas_new_world_desc: "Newly-discovered lands can be claimed and settled by enterprising colonists, and will send valuable trade goods back to our realm. We will send a few loyal colonists to the New World, have them stake their claims and find ways to harness the treasures of nature, and thereby form the backbone of our colonial endeavors."
 cas_reform_of_millones: "Reform of the Millions"
 cas_reform_of_millones_desc: "With the approval of the Reform of the #italic Millones#!, we might be able to tax our populace more efficiently. This will be an indirect extraction of revenue, done through a levy on food products."
 cas_marine_infantry: "$CAS_ADJ$ Marine Infantry"
 cas_marine_infantry_desc: "With a strong navy comes the need for crew members adept at combat in any situation, including having to fight outside their vessels. In order to overcome this challenge, we will regulate our marine infantry so they become a powerful weapon no matter where they fight."
 cas_pasos: "$CAS_ADJ$ Pasos"
 cas_pasos_desc: "While the #italic Pasos#! of the Holy Week are an old tradition in $CAS$, the sculpted artworks that accompany them have recently reached a stunning new peak. Artists such as Juan de Juni and Gregorio Fernández have started down the path of making $CAS_ADJ$ #italic Pasos#! the most impressive on the Peninsula."
 cas_real_academia_espanola: "Real Academia Española"
 cas_real_academia_espanola_desc: "As our language evolves and spreads across the world, the need to regulate and preserve it becomes obvious. To preserve the essential character and defining traits of our mother tongue, the #italic Real Academia Española#! will be established to set standards for how to properly speak our language."
 cas_canal_de_castilla: "Canal de Castilla"
 cas_canal_de_castilla_desc: "Inspired by other water systems across $europe$, which are used for both commercial purposes and irrigation, the #italic Canal de Castilla#! will bring water from the mountains in the north of the #italic Meseta#! and irrigate the cereal fields of Old Castile. This feat of engineering will increase our yield, create a surplus with which we can trade, and be the way to transport it for export."
 cas_royal_factories: "Royal Factories"
 cas_royal_factories_desc: "To combat the export of raw materials instead of more valuable manufactured goods, we will develop a system of government-backed factories that will industrialize our nation. More robust domestic manufacturing will lead to a stronger national economy."

 gra_banu_nasr: "Banū Naṣr"
 gra_banu_nasr_desc: "We descend from the Banū l-Ḫazraj tribe and come from the lineage of Saʿd ibn ʿUbāda, a companion of the Prophet Muhammad. The founder of our dynasty, Muhammad I, controlled a territory that included $granada$, $jaen$, $almeria$, and $malaga$, though some of those lands fell to the $christian_ADJ$ forces. Since then, we have been resisting their advances with tenacity, and we will continue doing so with the strength of our ancestors."
 gra_nasrid_art: "Nasrid Art"
 gra_nasrid_art_desc: "The artisans and architects of $GRA$ are the most skillful in the world. They create things that are not only useful, but pleasing to the eye, beautifully combining form and function."
 gra_skillful_envoys: "Skillful Envoys"
 gra_skillful_envoys_desc: "Our skillful use of diplomacy has been the deciding factor between life or death many times before. But we must not let ourselves be lulled into complacency; we must train our envoys even more to ensure their success."
 gra_razzias: "Nasrid Razzias"
 gra_razzias_desc: "The borders of our enemies are tantalizing opportunities for us. Should we boldly strike with lightning attacks, we can catch the enemy off-guard and inflict lasting damage."
 gra_muttavia_armies: "Mutawwi'a Armies"
 gra_muttavia_armies_desc: "$GRA$ has a limited number of people, and we cannot draft enough soldiers to defend our nation effectively. However, where we lack people, we do not lack gold, and that can be used to bring mercenary swords under our banners."
 gra_expand_qanahs: "Expand the Qanāh"
 gra_expand_qanahs_desc: "The lands of $GRA$ are fertile, but expanding our irrigation canals would allow us to make better use of our water supply, and grow better-quality crops as a result."
 gra_adaptative_trade: "Adaptive Trade"
 gra_adaptative_trade_desc: "Our privileged position as middlemen between $christian_ADJ$ and $muslim_ADJ$ nations is being challenged. This threat could be an opportunity to modernize our trade methods and recover our position as a link between more distant markets and $europe$."
 gra_expand_the_frontier: "Expand the Frontier"
 gra_expand_the_frontier_desc: "Since the foundation of our dynasty, our territorial holdings have been shrinking. However, we are now in a stronger position, capable of not only recovering every piece of lost land, but enlarging our realm even beyond those original borders."
 gra_a_strong_rule: "A Strong Rule"
 gra_a_strong_rule_desc: "For decades, generations of our ruling family have fought incessantly with each other, destabilizing our nation. It is about time a powerful ruler decisively asserted their authority, proving they are the only one who can keep the peace and bring prosperity to our nation."
 gra_modernized_economy: "Modernized Economy"
 gra_modernized_economy_desc: "Modern times demand a modern economy, capable of thriving in a highly competitive environment. By upgrading our infrastructure and making our production methods and processes more efficient, we will maximize production using the same amount of resources."
 gra_ghazawat: "Nasrid Ghazawat"
 gra_ghazawat_desc:  "As the descendants of the warriors who fought under the Prophet, we must defend our realm with similar bravery. Every battle for $GRA$ is a #italic ghazawat#! — a holy struggle to preserve $muslim$ against the onslaught of $christian$."
 gra_a_new_golden_era: "A New Golden Era"
 gra_a_new_golden_era_desc: "Al-'Andalus was once a center for learning, home to exceptional scholars like 'Aḥmad Ibn Rušd, 'Abū al-Qāsim, and Muḥammad bin Ṭufayl. We should endeavor to continue this long-standing intellectual tradition."

 nav_transatlantic_whaling: "Transatlantic Whaling"
 nav_transatlantic_whaling_desc: "$basque$ whaling traditions represent centuries of experience, and our specialists are often consulted by other nations looking to expand and improve their own whaling industries. We should capitalize on this expertise by establishing whaling enterprises throughout the $atlantic_ocean_continent$."
 nav_shipbuiling_experts: "Expert Shipbuilders"
 nav_shipbuiling_experts_desc: "The sea kissing our shores teems with resources waiting for those brave enough to grab them. For centuries, our coast has been full of ports and shipyards, tirelessly building vessels with which to slake our thirst for adventure and profit on the open seas."
 nav_memories_reconquista: "Memories of the Reconquista"
 nav_memories_reconquista_desc: "Our people were active participants in the Reconquista, contributing to the $christian_ADJ$ efforts to reclaim $iberia_region_ADJ $ from $muslim_ADJ$ rule. Despite reaching a stage where further territorial expansion became unattainable, $NAV$ still played a significant role in this Crusade, through military campaigns and alliances with neighboring $christian_ADJ$ kingdoms"
 nav_a_renaissance_realm: "A $renaissance$ Realm"
 nav_a_renaissance_realm_desc: "Though our realm originates in the mountain valleys of the Pyrenees, our people have been heavily influenced by humanistic ideas coming from both north and south. By embracing this new way of thinking, the people of $NAV$ are not abandoning their traditions, but merging them into their overall identity."
 nav_fearless_seamen: "Fearless Seafarers"
 nav_fearless_seamen_desc: "Our people have always looked to the sea with awe and fear, well aware of both the rewards and dangers to be found in its briny embrace. Our brave forefathers founded communities that would live not only by the sea but from it, developing impressive skills on the water. Sailors from our shores are well known all across the Atlantic Coast."
 nav_always_ready: "Always Ready"
 nav_always_ready_desc: "We were born as a small realm, encircled by formidable adversaries from every direction. This has profoundly influenced the development of our national character and our approach to engaging with the world. Consequently, we remain ever-watchful, poised to respond to the slightest indication of a threat."
 nav_chartered_councils: "Chartered Councils"
 nav_chartered_councils_desc: "Each historical territory will form a council, dependent on the ruler and elected by the locals, which will guarantee the respect of their traditional laws or #italic Fueros#!. This intermediate step will give us better and more efficient administrative power over our lands, without meddling in local interests."
 nav_people_of_the_sea: "People of the Sea"
 nav_people_of_the_sea_desc: "Our people are expert mariners, and all the world knows it. Our expertise will be an obvious advantage in maritime battles to come."
 nav_basque_ferocity: "$basque$ Ferocity"
 nav_basque_ferocity_desc: "Even before the Battle of $roncesvalles$, for which the $FRA_ADJ$ still weep, or the campaigns of the $NAV_ADJ$ Company, our people have always been considered ferocious fighters. We should never let our enemies forget it."
 nav_an_industrious_folk: "An Industrious Folk"
 nav_an_industrious_folk_desc: "The land we live in might not be the richest, but the $basque$ people are industrious individuals, working hard to obtain what they need. Be it by smelting $iron$ in our ironworks, converting wood from our forests into charcoal, or building the finest ships, our realm is bountiful thanks to the efforts and expertise of our community."
 nav_mercantile_expansion: "Mercantile Expansion"
 nav_mercantile_expansion_desc: "For centuries, our society has traded not only with our neighbors, but with faraway lands. This has had the effect not only of making our merchants particularly skilled in the art of trade, but has disseminated innovations from many nations farther and wider than they would have been able to otherwise."
 nav_navarrese_defense_force: "$NAV_ADJ$ Defense Force"
 nav_navarrese_defense_force_desc: "Over time, our neighbors have gained significant strength, posing an increasing threat to our nation's survival. To address this, we will establish a military department aimed at bolstering our forces with a higher number of soldiers without compromising on the quality of recruits."
 nav_shipyards_ironworks: "Shipyards and Ironworks"
 nav_shipyards_ironworks_desc: "The traditions of shipbuilding, steelmaking, and ironworking have been common activities in our lands for centuries. But as new techniques develop, we must obviously update our processes correspondingly. Even the most ancient traditions must embrace modernity in order to remain valuable in the modern world."
 nav_adept_traders: "Adept Traders"
 nav_adept_traders_desc: "The quality of our ships, the proficiency of our merchants, and the efficacy of our production processes have made our trade incredibly lucrative. The influx of wealth into our nation will make us stronger than ever before."
 nav_the_national_military_academy: "The National Military Academy"
 nav_the_national_military_academy_desc: "With the professionalization of our army, the necessity of a training center for our recruits becomes apparent. We will form a corps of experienced soldiers to teach the fundamentals of war and to forge our recruits into the spearhead of our army."
 nav_royal_basque_society: "Royal $basque$ Society"
 nav_royal_basque_society_desc: "#italic Euskalerriaren Adiskideen Elkartea#!, the Royal $basque$ Society of Friends of the Country, has been founded to encourage the development of $basque$ economy, culture, and science. It will benefit the country greatly in the coming years."
 nav_efficient_bureaucracy: "Efficient Bureaucracy"
 nav_efficient_bureaucracy_desc: "Our nation has maintained bureaucratic traditions since the realm's establishment, but changing times demand new approaches. $NAV$ has drawn particular admiration for pioneering certain administrative innovations."
 nav_riflemen_march: "Riflemen March"
 nav_riflemen_march_desc: "The introduction of rifles to our armies has required new approaches to military training and discipline. Our commanders have developed innovative marching formations that have become famous as proof of our military competence and focus."

 por_battle_ourique: "The Battle of $ourique$"
 por_battle_ourique_desc: "In 1139, our brave troops defeated five Moorish kings in battle. This feat shall live on eternally in the memories of our soldiers, and they can use it as inspiration to defeat any enemy, no matter how powerful or well-armed they are."
 por_establishment_portuguese_navy: "Establishment of the $POR_ADJ$ Navy"
 por_establishment_portuguese_navy_desc: "King Dinis laid the foundations for the $POR_ADJ$ Navy when he appointed $GEN_ADJ$ merchant Manuel Pessanha, originally Pessagno, as admiral of the national fleet. Pessanha's missions were to defend $POR_ADJ$ shores from $muslim_ADJ$ pirate raids, and to create a powerful trade fleet."
 por_estimulate_rural_areas: "Stimulate Rural Areas"
 por_estimulate_rural_areas_desc: "Many places across our country, mainly in rural and remote regions, are becoming depopulated, with fields, forests, and mines falling into disuse. By reforming relevant aspects of our legal system, we will encourage people to remain in the countryside and restore its productivity."
 por_pursuing_waves: "Pursuing the Waves"
 por_pursuing_waves_desc: "It seems the land is not enough for part of our populace. Some people look at the sea and feel #italic saudade#!, as if it was a long-lost lover. The ports and docks bustle with eager sailors, all enrolling in expeditions as if they were drunk with a desire to explore the world. We will make great use of these eager seafarers."
 por_bombardeiros: "Bombardeiros"
 por_bombardeiros_desc: "Technological advancements have helped us develop much more powerful cannon, but most ships' decks cannot support their weight. By reinforcing our ships, we will be able to carry more munitions, and our navies will be feared for their awesome firepower."
 por_feitorias: "Feitorias"
 por_feitorias_desc: "Let us send forth our #italic feitors#! to all corners of the East, and establish our country as the dominant trading force in the $indian_ocean_region$. By creating a network of strong fortified trading posts along the coasts of $africa$ and $india$, we can dominate local trade without expending too many resources."
 por_ordenancas: "Ordenanças"
 por_ordenancas_desc: "Our nation needs a professional army to guard the sacred borders of our glorious nation. We will reform the conscription system and train our young recruits to fulfill that duty with honor."
 por_the_bandeirantes: "Encourage the Bandeirantes"
 por_the_bandeirantes_desc: "Sometimes, members of slave-raiding expeditions stumble across gold and other precious metals or stones. Spreading word of these valuable discoveries should pique the interest of hardy souls who might be willing to emigrate to our colonies in search of their fortunes."
 por_colonial_governors: "Colonial Governors"
 por_colonial_governors_desc: "By sending our most capable administrators to govern our colonies and outposts, we will ensure that these settlements remain peaceful and loyal to their mother nation, while we sit back and watch the profits roll in."
 por_royal_absolutism: "Royal Absolutism"
 por_royal_absolutism_desc: "For too long, our royal authority has been hindered by hapless meddling from the nobility, whose narrow local interests threaten the greater good of the realm. We will ignore the Cortes entirely, and rule without their interference."
 por_royal_military_academy: "Royal Academy of Fortification, Artillery, and Drawing"
 por_royal_military_academy_desc: "Our artillery corps and fortifications have long been the key to defending our land, making our small country a tougher nut to crack for enemy armies. We shall establish a military academy — the #italic Academia Real de Fortificação, Artilharia e Desenho#! — to train our officers in these fields, so that they, in turn, may fashion our forts and our artillery corps into the finest in the world!"
 por_vinho_porto: "Vinho do $porto$"
 por_vinho_porto_desc: "On the banks of the Douro river, in the north of the country, grapes are cultivated to create a unique $wine$ fortified with spirits, which is famously known as #italic Port Wine#!. As we are the only nation producing this delightful intoxicant, we must not miss our chance to make scads of money from its export."

 spa_school_salamanca: "School of $salamanca$"
 spa_school_salamanca_desc: "Based in the University of $salamanca$, the School's interests lie in fields as diverse as theology, economics, and political philosophy. As one of the leading schools of thought in the $catholic_ADJ$ world, its entrenched presence in $SPA$ ensures that our nation always remains at the forefront of intellectual affairs."
 spa_viceroyalties: "$SPA_ADJ$ Viceroyalties"
 spa_viceroyalties_desc: "New lands across the ocean are waiting for us to claim them. We will divide this territory and have each section ruled by representatives of our government, who will establish orderly settlements. The aim there is for our people to find these new lands an attractive destination, and will settle there and secure our presence."
 spa_siglo_de_oro: "Siglo de Oro"
 spa_siglo_de_oro_desc: "Our realm bustles with cultural and artistic achievements of all kinds. Should we channel that creativity to the proper places, feeding it when needed through wealthy benefactors, we will start a truly Golden Century of $SPA_ADJ$ art."
 spa_revival_of_ecclesiastical_discipline: "Revival of Ecclesiastical Discipline"
 spa_revival_of_ecclesiastical_discipline_desc: "Religious laxity has become widespread among our people, turning us away from God. We will sign treaties with our religious leaders to encourage a stronger bond between them and our government, and return to being a devout nation."
 spa_naval_reforms: "$SPA_ADJ$ Naval Reforms"
 spa_naval_reforms_desc: "We have not made our navy a priority, and as a result, we have fallen behind our competitors in terms of naval quality and performance. A reform is in order, which will re-elevate us to our rightful position of maritime supremacy."
 spa_spanish_enlightenment: "$SPA_ADJ$ Enlightenment"
 spa_spanish_enlightenment_desc: "Radical new ideas have permeated the minds of $SPA$'s leading figures, inspiring them to develop ambitious plans that will make us stand out among all the other nations of the world."

 #Iberian Shared Land
 tercio: "Tercios"
 tercio_desc: "#italic Tercio#! infantry were developed principally by the brilliant general Gonzalo Fernández de Córdoba, called #italic El Gran Capitán#!, during the Italian Wars. It is a mixed infantry formation of pikemen and musketeers. Because of this combined-arms approach, the formation simultaneously utilizes both the rigidity of its heavy infantry and the long-range firepower of its musketeers, making it an ideal defensive and offensive formation."
 #Iberian Shared Naval
 catalan_galley: "$CAT_ADJ$ Galleys"
 catalan_galley_desc: "The $n_catalan_galley$ is a larger version of the ancient Greek galleys that once dominated the Mediterranean Sea."
 early_iberian_caravel: "Early $iberia_region_ADJ$ Caravels"
 early_iberian_caravel_desc: "Originally of $iberia_region_ADJ$ origin, the first caravels were small but very fast ships that were used for offshore fishing and coastal trade. Their use in $iberia$ is so widespread that the region can easily boast of possessing the most advanced caravels."
 iberian_caravel: "$iberia_region_ADJ$ Caravels"
 iberian_caravel_desc: "The need for faster and more reliable caravels has driven our shipbuilding experts to make improvements to their design. While caravels have become common across $europe$, the $iberia_region_ADJ$ models remain superior in both innovation and speed."
 early_iberian_galleon: "Early $iberia_region_ADJ$ Galleons"
 early_iberian_galleon_desc: "An early, but powerful ocean-going vessel, the $n_early_iberian_galleon$ is an original invention from $iberia$ that has a lower forecastle and a long hull, making them especially stable and resistant to headwinds."
 square_rigged_caravel: "Square-Rigged Caravels"
 square_rigged_caravel_desc: "By combining the $n_iberian_caravel$ and the $n_carrack$, a new ship hAs been born: fast, strong, and exactly what we need help us dominate the seas."
 iberian_galleon: "$iberia_region_ADJ$ Galleons"
 iberian_galleon_desc: "The $n_iberian_galleon$ is a more stylized version of the $n_early_iberian_galleon$. They are tremendously powerful vessels that absolutely crush any opposition on the high seas."
 #Iberian Unique
 ara_almogavars: "$a_almogavars$"
 ara_almogavars_desc: "$a_almogavars_desc$"
 ara_catalan_crossbowmen: "$a_catalan_crossbowmen$"
 ara_catalan_crossbowmen_desc: "$a_catalan_crossbowmen_desc$"
 ara_late_almogavars: "$a_late_almogavars$"
 ara_late_almogavars_desc: "$a_late_almogavars_desc$"
 cas_lanzas_de_castilla: "$a_lanzas_de_castilla$"
 cas_lanzas_de_castilla_desc: "$a_lanzas_de_castilla_desc$"
 por_cacadores: "Caçadores"
 por_cacadores_desc: "Nicknamed the #italic Fighting Cocks#!, the #italic Caçadores#! are an elite light infantry unit in the $POR_ADJ$ Army who wear brown uniforms to distinguish them from regular soldiers."

 #Denmark
 dan_levy_recruitment: "Reliance on Levies"
 dan_levy_recruitment_desc: "Our domain is protected by natural barriers, namely the Jutland Peninsula and the $DAN_ADJ$ archipelago. This defensive geography is extremely helpful when we are under attack, as it gives us time to raise levies before our enemies can reach our core territory."
 dan_old_naval_traditions: "$DAN_ADJ$ Sea Networks"
 dan_old_naval_traditions_desc: "Every part of our country is surrounded by the waters of the Baltic and North Seas. This gives us the unique advantage of being able to utilize waterways for both transport and communication, considerably shortening the time it takes to travel between regions."
 dan_rulers_of_the_north: "True Rulers of the North"
 dan_rulers_of_the_north_desc: "The rulers of $DAN$ have claimed overlordship over the Nordic regions for centuries. Embellishing the legacy of Kings like Canute 'the Great' will grant us the internal and external legitimacy needed to support our assertions."
 dan_reliance_mercenaries: "Reliance on Mercenaries"
 dan_reliance_mercenaries_desc: "4DAN$ cannot rely on a vast population to supply their armies. Therefore, we need to ensure that mercenary companies are willing to serve our state, while guaranteeing their loyalty with solid contracts."
 dan_rentekammer_advance: "Rentekammeret"
 dan_rentekammer_advance_desc: "By establishing a separate department for our Treasury, the #italic Rentekammeret#!, we will have better control over our finances and be able to run the government more efficiently. With the documentation of all our financial records, we will be able to estimate our future expenditures more easily, stabilizing our finances."
 dan_royal_danish_navy: "$DAN_ADJ$ State Navy"
 dan_royal_danish_navy_desc: "Our country is surrounded by water, and therefore vulnerable to domination by any power with a large enough fleet. To ensure this will never happen, we must fund a navy capable of protecting our coastline and projecting our power over the north of $europe$."
 dan_danish_orthodoxy: "Religious Uniformity"
 dan_danish_orthodoxy_desc: "In the tumultuous religious landscape of $europe$, we must set $DAN$ on the path to righteousness, and remain true to the doctrines of our church."
 dan_expanded_dockyards: "The $kobenhavn$ Dockyard"
 dan_expanded_dockyards_desc: "Our country has a long and proud history of shipbuilding. Our experienced shipwrights need a modern and spacious dock in which to construct a navy worthy of calling itself $DAN_ADJ$. The waters around $kobenhavn$ are the perfect place to construct such a dockyard."
 dan_danish_legislation: "$DAN_ADJ$ Legislation"
 dan_danish_legislation_desc: "The regional laws of Jutland, Zealand and Scania formed the basis of our legal code for centuries. For the benefit of our realm, we should compile and unify these laws into a single comprehensive legal system, which will be known as the #italic Danske Lov#!."
 dan_danish_agriculture: "Agricultural Focus"
 dan_danish_agriculture_desc: "While the $DAN_ADJ$ terrain is relatively poor in terms of rare materials available to exploit, they make up for it with agricultural abundance. We shall focus on optimizing our farming and food production, safeguarding our people against future periods of famine."
 dan_royal_life_guards: "Royal Life Guards"
 dan_royal_life_guards_desc: "The Royal Life Guards are an elite $DAN_ADJ$ regiment that also serve as the ruler's personal guard and perform ceremonial duties."
 dan_scanian_regiment: "Scanian Regiment"
 dan_scanian_regiment_desc: "The Scanian Regiment is a military unit composed of drafted peasants, established to reduce reliance on mercenary forces and build a more organized standing army under direct royal authority."
 dan_admiralty_college: "College of the Admiralty"
 dan_admiralty_college_desc: "With the establishment of a centralized college to train our naval commanders, we will be able to produce skilled leaders familiar with our coastal waters. This will improve our marine defense strategy, and ultimately better safeguard $DAN_ADJ$ sovereignty."
 dan_trading_economy: "A Maritime Nation"
 dan_trading_economy_desc: "We cannot produce everything we need to maintain economic stability on our own. We must instead rely on a stable trade network to export our goods and import everything that we ourselves are not able to produce."

 ven_printing_industry: "Printing Industry"
 ven_printing_industry_desc: "Since the invention of the printing press, the people of $VEN$ have shown an aptitude for its use. We should encourage further development of our printing industry, as the potential benefits are manifold."
 ven_stato_da_mar: "Stato da Mar"
 ven_stato_da_mar_desc: "Trade is the lifeblood of $VEN$, and competent management of our overseas trade stations is vital to our trading interests. By centralizing the administration of these lands into a single unit, we will enhance our trade."
 ven_state_inquisition: "Found the State Inquisition"
 ven_state_inquisition_desc: "The State Inquisition is a panel of three judges that was set up to handle threats to internal security. The panel's small size means they can deal quickly with threats, and it will not take them long to establish a network of agents both at home and abroad to root out the traitors."
 venetian_arsenal_advance: "$VEN_ADJ$ Arsenal"
 venetian_arsenal_advance_desc: "Dating from the 12th century, the Arsenal of $VEN$ is the foundation on which all our power rests."
 ven_venetian_thalassocracy: "$VEN_ADJ$ Thalassocracy"
 ven_venetian_thalassocracy_desc: "$VEN$ has always had a close connection to the sea. Trade and commerce are deeply integrated into our administration, and $VEN_ADJ$ merchants have access to more resources than in any other government."
 ven_venetian_palaces: "$venetian_palaces$"
 ven_venetian_palaces_desc: "$venetian_palaces_desc$"
 ven_gothic_architecture: "Gothic Architecture"
 ven_gothic_architecture_desc: "Influenced by $BYZ_ADJ$ architecture and with nods to Islamic aesthetics, the unique $ven_gothic_architecture$ is a core element of $VEN_ADJ$ identity and highly beloved by the upper class. Many aristocrats and prosperous merchants show their support for proliferating this style of architecture with their gold."
 ven_ship_mounted_gunpowder_weapons: "Ship-Mounted Gunpowder Weapons"
 ven_ship_mounted_gunpowder_weapons_desc: "Naval combat has been more like fighting a land battle on floating planks than actual ship-to-ship combat for millennia. With the introduction of gunpowder weapons on our ships, we are able to break away from old-fashioned warfare and annihilate enemy ships before they come even close to boarding our galleys."
 ven_magistrato_alla_sanita: "Magistrato alla Sanità"
 ven_magistrato_alla_sanita_desc: "The #italic $ven_magistrato_alla_sanita$#! — Magistracy of Health — is a crucial office in our state which oversees the prevention of diseases and epidemics."
 ven_venetian_painting: "$VEN_ADJ$ Painting"
 ven_venetian_painting_desc: "$ITA$ as a whole is famous for its cultural achievements, and $VEN_ADJ$ painting is one of its greatest contributions. Artists come from far away to experience our magnificent galleries and witness our cultural rebirth firsthand."
 ven_venetian_school_of_music: "$VEN_ADJ$ School of Music"
 ven_venetian_school_of_music_desc: "While our paintings attract enthusiasts of visual art, $VEN_ADJ$ music travels far and beyond, beloved by those who seek melodic enlightenment. Many great composers graduate from our conservatories and go on to find great success throughout $europe$, spreading our culture with every golden note."
 ven_mixed_naval_tactics: "Mixed Naval Tactics"
 ven_mixed_naval_tactics_desc: "Oar-propelled vessels have been standard since the inception of the $VEN_ADJ$ navy. However, sailing ships now play an increasingly dominant role in Mediterranean naval combat. Our navy will adapt by adopting the mighty galleass, a hybrid ship that can use both oars and sails."
 ven_naval_conscription: "Naval Conscription"
 ven_naval_conscription_desc: "For as long as $VEN$ has stood, our galleys have been rowed by free men who worked for a wage, but an acute manpower shortage is making it harder to find qualified oarsmen. We have no choice but to resort to conscription to staff our galleys."
 ven_provveditori_ai_beni_inculti: "'Provveditori ai Beni Inculti'"
 ven_provveditori_ai_beni_inculti_desc: "This department for uncultivated natural resources was set up to facilitate the draining of marshes and the irrigation of arid land. The ultimate goal is to improve the supply of food to $VEN$."
 cunning_diplomacy: "Cunning Diplomacy"
 cunning_diplomacy_desc: "Faced with superior enemies on both sides, $WAL_ADJ$ rulers developed a knack for shifting alliances when prudent. Several secured their throne with $TUR_ADJ$ support, then went on to form alliances with $HUN_ADJ$ or the $hre$."
 boyar_regime: "Boyar Regime"
 boyar_regime_desc: "The Treaty of Alba Iulia cemented the power of the $WAL_ADJ$ nobility. A council of twelve influential Boyars now works alongside the #italic voivode#! to carry out the executive rule of the country."
 home_of_hussars: "Home of the Hussars"
 home_of_hussars_desc: "Although light cavalry formations are an old concept, the first Balkan hussars — or #italic gusars#! — appeared as auxiliary units of $BYZ$, recruited mainly from $BYZ-ADJ$-held $serbia_region$ in the 10th and 11th centuries. Even after $BYZ-ADJ$ power dwindled, this tradition remained, and was further refined over the following centuries."
 serbian_mining: "$SER_ADJ$ Mining"
 serbian_mining_desc: "The Balkan Mountains are brimming with abundant ore, just begging to be extracted by skilled miners. As in other parts of $eastern_europe$, $SER$ welcomed experienced $SAX_ADJ$ miners to help develop its mining industry. Cities like $novo_brdo$ grew into vast metropoli, fueled by the wealth extracted from the land."
 mimic_the_phoenix: "Mimicking the Phoenix"
 mimic_the_phoenix_desc: "We eagerly embrace the ways of $BYZ$, aiming to mirror their laws and overall style. Drawing from the rich tapestry of Roman influences, we strive to infuse our governance and legal system with their essence, in a conscious effort to emulate the grace and sophistication of $BYZ$ within our realm."
 rallying_the_troops: "Rallying the Troops"
 rallying_the_troops_desc: "Our realm has developed various methods for swiftly amassing troops, so no enemy can catch us unprepared. This edge has helped us stand tall, despite all odds being against us, and we are prepared for battle. United, we march forward, resolute in purpose and ready to defend our honor and homeland!"
 keepers_of_the_gate: "Keepers of the Gate"
 keepers_of_the_gate_desc: "$SER$'s rugged terrain has birthed a formidable network of defenses, epitomized by the imposing Smederevo Fortress. These enduring fortifications safeguard our nation, making invasion a daunting prospect. From the sprawling mountain ranges to the strategic river valleys, $SER$'s defenses stand as a testament to our resilience and indomitable spirit."
 poklisars: "Poklisars"
 poklisars_desc: "Since the earliest days of our nation, we have often cast our gaze beyond our borders, be it to establish profitable trade routes, placate formidable neighbors and build alliances, or even to forge robust partnerships against common adversaries. #italic Poklisars#! are the ambassadors who carry out these missions in our name."
 the_rebirth_of_the_patriarchate: "The Rebirth of the Patriarchate"
 the_rebirth_of_the_patriarchate_desc: "In the fourteenth century, Stefan Dušan aimed to elevate the Archbishopric of $SER$ to a Patriarchate. Since then, our clergy has tried to be independent from $constantinople$, cementing the union between the physical realm, our nation, and the spiritual one."
 reform_the_ecclesiastical_authorities: "Reform the Ecclesiastical Authorities"
 reform_the_ecclesiastical_authorities_desc: "$SER$ has long stood at the crossroads of Eastern and Western influences, including those of the $orthodox_ADJ$ $christian_ADJ$ faith and the $catholic_ADJ$ Church. It is time to embark on a path of ecclesiastical reform to strengthen our religious institutions and secure the spiritual well-being of our realm."
 balkan_hajduks: "Balkan Hajduks"
 balkan_hajduks_desc: "Unlike their $HUN_ADJ$ counterparts, #italic Hajduks#! in $SER$ and neighboring Balkan territories have earned an infamous reputation. These men live the hard life of brigands, always in danger, always on the move. However, during wars these experienced, tough men often filled the ranks of $SER_ADJ$ armies, providing excellent — if slightly undisciplined — infantry."
 foreign_relations_bureau: "Foreign Relations Bureau"
 foreign_relations_bureau_desc: "Our realm has recognized the importance of fostering friendly relations and alliances with neighboring countries. To facilitate this, we will establish a specialized bureau dedicated to foreign affairs. By maintaining a dedicated focus on diplomacy, we are better positioned to navigate the complex web of international relations and secure our nation's prosperity."
 serbian_enlightenment: "$SER_ADJ$ Enlightenment"
 serbian_enlightenment_desc: "Inspired by other nations of the Enlightenment, our national heroes, such as Dositej Obradović, have sought to elevate our vernacular language and literature. Touched by the dearth of secular works accessible to the common folk, Dositej Obradović has taken the lead in bridging the gap between written and spoken $serbian_dialect$. By diligently crafting grammar books and dictionaries, authoring new tomes, and translating foreign works, our nation is fostering a literary revival thanks to the work of these visionaries."
 military_modernization: "Military Modernization"
 military_modernization_desc: "Our people remember the birth of our nation: surrounded by formidable powers that pose permanent, looming threats to our security. This enduring vigilance has forged a culture of unwavering readiness, ensuring our armed forces stand as a shield against adversity. Fearless and respected, our soldiers have transformed us from potential prey to a mighty adversary, deterring any who dare encroach upon our sovereignty."

 seljuk_heritage: "Seljuk Heritage"
 seljuk_heritage_desc: "To embrace the future, we must remember what we learned from $IRA$ and the Great Seljuks, and build a state that can unite disparate peoples and beliefs into a greater whole."
 turkic_traditions: "Turkic Traditions"
 turkic_traditions_desc: "We hail from the steppes. The wind, the hardships, and the thrill of battle will always be in our blood, and we must never forget them."
 millets: "Kanunnames"
 millets_desc: "By establishing unique codes of law in each of our empire's provinces, we can ensure that our rule will be viewed as equitable and just. These law books, known as #italic Kanunname#!, will take into consideration the local circumstances and traditions of each of our diverse and far-flung provinces."
 ghazi: "Ghazi"
 ghazi_desc: "In keeping with steppe traditions, our nobles are warriors of the frontier, and we shall be fearless in the fight to expand the Abode of $muslim$."
 azeb_irregulars: "Azeb Irregulars"
 azeb_irregulars_desc: "Unmarried youths drafted from the poorest segments of society, the Azebs will not only function as soldiers and sailors, but also builders, sappers and armorers. Through a system of fortress garrisons, we will ensure that they always get paid."
 bashi_bazouks: "Bashi-bazouks"
 bashi_bazouks_desc: "Unruly irregulars recruited from disenfranchised segments of the population, and sometimes outright vagabonds, the #italic bashi-bazouks#! provide an affordable way of garrisoning forts and outposts. With their proclivity for brigandage and wanton killing, they can always be relied upon to disturb the enemy's frontier."
 ottoman_bureaucracy: "Birûn"
 ottoman_bureaucracy_desc: "The #italic Birûn#!, or the Exterior Service, comprises the group of administrators, military officers and religious scholars just outside the ruler's personal inner circle. Together, they make up an efficient bureaucracy inherited from $IRA$ and the Great Seljuks, but adapted further by elements from $BYZ$, making it uniquely $TUR_ADJ$ indeed."
 ahdnames: "Ahidnâme"
 ahdnames_desc: "Also called capitulations, the $ahdnames$ are contractual agreements with other nations, drawing upon both $muslim_ADJ$ and secular law. $ahdnames$ are most often used for guaranteeing the protection and rights of foreign merchants and clergy within our lands, ensuring that justice is upheld and trade can flow unhampered."
 dragomans: "Dragomans" 
 dragomans_desc: "Interpreters, translators, and guides in one, the $dragomans$ are skilled officials who work to enhance our diplomatic and commercial efforts with different communities and countries. Most dragomans are of $greek_culture$ ancestry, though some hail from $jewish_ADJ$, $armenian_culture$, or other multilingual backgrounds."
 kafes: "Kafes"
 kafes_desc: "By keeping our unruly princes confined to a special part of the harem, the $kafes$, we can prevent wanton rebellions and the rivalry between brothers that used to plague our regime."
 timariots: "Timariots"
 timariots_desc: "By offering Timar land grants to Sipâhi cavalrymen, they can use this new state-sponsored wealth to supply themselves and their retinue. This allows us to field more formidable cavalry forces."
 autonomous_pashas: "Autonomous Pashas"
 autonomous_pashas_desc: "Balancing local needs versus national interests is one of the most difficult aspects of government. Given the slow pace of communications, it can take a long time for the most basic directives to reach even relatively close provinces. We must encourage local governors towards more autonomy to ensure that local interests are served in a timely manner."
 lawcode_of_suleiman: "The Legal Code of Suleiman"
 lawcode_of_suleiman_desc: "Suleiman is remembered as one of the great rulers of history, a soldier, a lawmaker, and a reformer. In fact, while the West knows him as Suleiman the Magnificent, in his homeland, he is called 'The Lawgiver'. Central to his reforms was the re-examination of $TUR_ADJ$ dynastic law, #italic Kanun#!, in order to bring it in line with $sharia$."
 ottoman_tax_farming: "Muqāta'ah"
 ottoman_tax_farming_desc: "A system of tax farming where nobles purchase the right to collect revenue from parcels of land owned by the state. $ottoman_tax_farming$ balances the distribution of wealth across the empire, and turns the nobility away from corruption, giving them a vested interest in supporting the state."
 ottoman_waystations: "Menzil"
 ottoman_waystations_desc: "A complex system of supply depots and lodgings for use by soldiers and officials, #italic menzil#! waystations allow our armies to rely less on plunder, and remain well-supplied on every frontier."
 late_ottoman_bureaucracy: "Mālīye"
 late_ottoman_bureaucracy_desc: "A vast, diverse, and highly organized bureaucracy staffed by the most skilled of scribes, the $late_ottoman_bureaucracy$ aspires to be a fundamental and incorruptible institution of the state."
 tulip_period: "Tulip Period"
 tulip_period_desc: "We will reform old and stagnant traditions, plant tulips in all gardens, and usher in a new golden age of commerce and connection."
 imperial_school_of_naval_engineering: "Imperial School of Naval Engineering"
 imperial_school_of_naval_engineering_desc: "This new school, #italic Mühendishane-i Bahr-i Hümâyûn#!, will help us train shipwrights, naval officers, and sailors for both the navy and the merchant fleet."
 ayans: "Âyan"
 ayans_desc: "$ayans$ are provincial magnates of diverse backgrounds that wield significant local autonomy, but still provide a ready source of tax farming income and military forces for the state."
 french_language_in_all_courts: "$french_language$ Language in All Courts"
 french_language_in_all_courts_desc: "For a long time, $latin_language$ has been the language of cultural exchange in $europe$... but to be honest, that language is nearly as dead as the ancient Romans who spoke it. We need to find a new #italic lingua franca#!, and nothing says 'lingua franca' like $french_language$."
 elan: "Élan!"
 elan_desc: "Cultivating the doctrine of attack is the hallmark of our army. Our men must fight with #italic élan#! — spirit and vigor — giving us a clear edge on the battlefield."
 estates_general: "Estates-General"
 estates_general_desc: "According to some, the Estates-General have existed since 1303. Over time, its form has shifted from being a council of royalty appointees to one of elected representatives. This change in structure has given the Estates-General, and the taxes levied by them, greater legitimacy."
 fra_gendarmes: "Gendarme Companies"
 fra_gendarmes_desc: "Reliance on a levy system has exposed our government to great risks, and has proved to be severely limiting. We should recruit heavily armed cavalrymen and pay them a fixed salary in order to create a standing army."
 fra_integration_of_new_territories: "Consolidation of the Country"
 fra_integration_of_new_territories_desc: "Our influence over other states is undeniable. Why not use this persuasive power to incorporate them directly into our country?"
 fra_reliance_on_privateers: "Reliance on Privateers"
 fra_reliance_on_privateers_desc: "Direct competition with other maritime powers could be detrimental to our finances. We should empower our mercantile fleet to plunder and seize the merchant ships of our enemies. This will not only ensure a healthy income for our state, but also disrupt the maritime economies of our rivals."
 fra_reformation_of_taxation: "Establishment of Recettes Générales"
 fra_reformation_of_taxation_desc: "The intendants responsible for collecting the taxes of the people shall not be appointed by the estates, but by our ruler directly. This way, we will ensure these officers will be loyal to the ruler alone, and gather all of the rightful tribute owed."
 fra_school_of_fontainebleau: "Northern Mannerism"
 fra_school_of_fontainebleau_desc: "As a nation much enriched by the $renaissance$, we should invest in the creation of a unique, distinctively $FRA_ADJ$ aesthetic. By inviting foreign artists to our realm and sponsoring a school for artist training directly, we will be able to brand any artistic works produced as identifiably $FRA_ADJ$."
 vauban_fortifications: "Innovative Fortifications"
 vauban_fortifications_desc: "Our genius in fortification does not represent a radical departure in their design; rather, the innovation comes from the placement of the fortresses. By taking maximum advantage of local terrain, even the most basic fort requires more effort and supplies to take."
 the_philosophes: "The Philosophes"
 the_philosophes_desc: "We are proud to be the home of so many of the most renowned philosophers of these enlightened times. These thinkers produce a constant stream of groundbreaking ideas, which are stimulating advances in all fields, from the most trifling to the most vital."
 fra_expansion_of_france: "Historic Claims"
 fra_expansion_of_france_desc: "We trace our nation's lineage back to the empire of Charlemagne, and can therefore claim all those lands to be part of our rightful territory. With the support of dedicated courts, we will be able to identify and re-claim all of this long territory."
 liberty_egalite_fraternity: "Liberté, Egalité, Fraternité"
 liberty_egalite_fraternity_desc: "With all men declared to be equal under our new laws, adherents of other beliefs are finally allowed full participation in our government, and may thus now contribute to our national progress."
 fra_code_civil: "Code Civil"
 fra_code_civil_desc: "We must replace the chaotic patchwork of laws governing our state with a single, unified legal code that applies to our entire population. This #italic Code Civil#! will serve as the foundation of our government and establish a just system for everyone in our realm."
 magna_carta_advance: "$magna_carta_reform$"
 magna_carta_advance_desc: "$magna_carta_reform_desc$"
 royal_navy: "A Royal Navy"
 royal_navy_desc: "Beginning around 1495, the $tudor_dynasty$ monarchy invested heavily in not just ships, but extensive infrastructure to maintain and otherwise support them. This for many marked the official founding of the Royal Navy."
 eltham_ordinance: "The Eltham Ordinance"
 eltham_ordinance_desc: "The Eltham Ordinances represented $ENG$'s first attempt to streamline royal bureaucracy and make it more adaptable and cost-effective. The Ordinances attempted reform through reducing royal household expenditures and consolidating certain bureaucratic functions."
 secretaries_of_state: "Secretaries of State"
 secretaries_of_state_desc: "The monarch has always had a secretary responsible for their royal correspondence. This position eventually evolved into that of the Secretary of State, a powerful minister who not only transmits royal decrees, but also has a high level of administrative authority."
 navigation_acts: "The Navigation Acts"
 navigation_acts_desc: "These acts represent the apex of mercantilism. Trade must be conducted with our ships and pass through our ports first, where we will collect customs duties and any other applicable taxes."
 eng_red_coats: "Redcoats"
 eng_red_coats_desc: "Life in the $ENG_ADJ$ army is grueling and strictly regimented, but it instills in one a certain character. The unflappable nature of our troops, as well as their expertise with firearms, strikes fear into the hearts of our enemies."
 eng_experimental_riflemen: "$a_experimental_riflemen$"
 eng_experimental_riflemen_desc: "$a_experimental_riflemen_desc$"
 sick_and_hurt_board: "The Sick and Hurt Board"
 sick_and_hurt_board_desc: "This institution looked after the welfare of ordinary enlisted seamen in the Navy. It brought about a series of reforms that greatly improved the health of sailors on duty."
 british_bill_of_rights: "$ENG_ADJ$ Bill of Rights"
 british_bill_of_rights_desc: "A sweeping series of reforms limiting royal power, particularly in judicial matters. Among other stipulations, they state that the monarch may not unilaterally raise armies, prescribe cruel and unusual punishment, or interfere with the free election of members of Parliament."
 defense_of_the_faith: "Defense of the Faith"
 defense_of_the_faith_desc: "We have been driven from $acre$ and $CYP$, but the Order of the Hospital of St. John will retreat no further. In pagan times, a Colossus stood sentinel over the harbor of Rhodes, but today, the greatest fortifications the world has ever known have taken up the guard!"
 assistance_to_the_suffering: "Assistance to the Suffering"
 assistance_to_the_suffering_desc: "Our Order is named the Knights Hospitaller for a reason: we were originally the protective force of a pilgrims' hospital in $jerusalem$. Though $jerusalem$ is lost to the Saracens, we still provide medical aid to those in need, including our brave knights, who heartily return to the battlefield much faster than most armies."
 reconquista_of_the_sea: "Reconquista of the Sea"
 reconquista_of_the_sea_desc: "In our frequent clashes with fierce foreign corsairs, the thought has occurred to us that these scurvy dogs might have the right idea about looting and pillaging the coast, but they are preying on the wrong targets. Piracy may be a vile sin in peacetime, but in times of war, it is known as 'privateering,' and that is another thing altogether."
 friends_in_need: "Friends in Need"
 friends_in_need_desc: "Our Order was formed by faithful souls from every nation in Christendom. This fact, combined with our need for external support to fulfill our missions, have made us adept at recruiting helping hands for our cause. We will take advantage of our omnipresence in $europe$ to reach the ears of powerful $catholic_adj$ rulers, and sway them to our side."
 scourge_of_the_corsairs: "Scourge of the Corsairs"
 scourge_of_the_corsairs_desc: "The famed $turkish_culture$ privateer Hayreddin Barbarossa fought many legendary encounters against the Knights, but he was hardly the only corsair we have encountered. $turkish_culture$ raiding and looting of all of Southern $europe$, tolerated by the Barbary states and funded by the Turks, must end. The Knights will do their job protecting innocent sailors at any cost."
 crusader_tradition: "Crusader Tradition"
 crusader_tradition_desc: "Knights of our Order were present in the wars against Saladin and defended the last Outremer Crusader outpost, $acre$. If any among us needs inspiration to do heroic deeds, they need to look only at what the Knights of the Order of the Hospital of St. John have accomplished in the past. The name Knights Hospitaller is truly eternal, as is our famed courage in battle."
 ecumenical_defenders_of_christendom: "Ecumenical Defenders of Christendom"
 ecumenical_defenders_of_christendom_desc: "The Reformation has harmed our cause as knights from $GER$ and $scandinavian_region$ have started murmuring questions about the nature of the Communion Host, but the always-present $turkic_group$ threat has a way of making such disputes seem minor. Perhaps we should focus on defending the realm, and debate theology once the Saracen threat is safely at bay?"
 a_neverending_crusade: "A Never-Ending Crusade"
 a_neverending_crusade_desc: "As long as any faithful $catholic_ADJ$ is in danger of religious persecution, our mission is not over! Be it during a pilgrimage to the Tomb of our Lord and Savior, or while crossing the seas and fending off corsair, we will never stop training and never rest, ready to leap into combat at a moment's notice."
 inspired_builders: "Inspired Builders"
 inspired_builders_desc: "While our Order's principal duty is to fight, we serve our people in other ways as well. Over the centuries, we have developed the art of rapid construction, erecting buildings and fortifications with remarkable speed. We will use this expertise to make our capital into both an impregnable fortress, and a dynamic center of culture."
 the_right_hand_pope: "The Right Hand of the Pope"
 the_right_hand_pope_desc: "As time goes on, and the Crusades start to fade from the memory of our people, the importance of having the Pope's ear increases. We ingratiate ourselves until we are the closest confidantes to the Supreme Pontiff. Naturally, our devotion to his service will benefit us enormously — and why not enjoy our hard-won privileges?"
 a_brand_new_world: "A Brand New World"
 a_brand_new_world_desc: "The world evolves, and those who fail to adapt are forgotten by history. Our Order has endured for over half a millennium, and we will not fade away now! Our mortal bodies will eventually join the Creator, but our Order must first become immortal. We will transform ourselves into the most modern nation of our age, strengthening ourselves from the very core."
 an_order_with_state: "An Order with a State"
 an_order_with_state_desc: "While some nations are often described as an #italic Army with a State#!, we, on the other hand, have always been an Order with a nation, ever since our acquisition of Rhodes from the Greeks. Nevertheless, we cannot help but admire how efficiently they have harnessed their resources to become a formidable nation. Inspired by their success, we will implement reforms to ensure our military can confront any adversary with confidence."

 local_merchant_preference: "Local Merchant Preference"
 local_merchant_preference_desc: "Theoretically a merchant can be a citizen of the world, sailing to and from whichever port he pleases. We are going to give advantages to home merchants, for example, priority for loading and unloading of cargo, to ensure that our merchants have every incentive to bring their products home."
 association_with_unbelievers: "Association With Unbelievers"
 association_with_unbelievers_desc: "There are those who feel that we should not associate with unbelievers at all. We have done much to quash this, as only through association with heathen nations will we be able to trade with them."
 port_security_improvement: "Port Security Improvements"
 port_security_improvement_desc: "To reap the full financial potential from trade, we need ships and any cargo they carry to be safe when docked in our ports. We must ensure that any areas that merchants consort in are free from petty crime."
 end_of_shipbuilding_guilds: "End of the Shipbuilding Guilds"
 end_of_shipbuilding_guilds_desc: "As long as ships have been built in $arabia$, there have been guilds who control the production. Although they may have performed a valuable service in keeping shipbuilding traditions alive, they now stand in the way of progress. We must open up the shipbuilding industry to all with talent."
 skilled_captains: "Skilled Captains"
 skilled_captains_desc: "We must ensure that our captains meet the highest standards of seamanship and nautical knowledge, ensuring that they will be able to use every advantage in all situations."
 expansion_of_trade_contacts: "Expansion of Trade Contacts"
 expansion_of_trade_contacts_desc: "We must ensure that our merchants are always welcome wherever they go. Thus, we will use any means possible to make sure that all rulers we know about welcome our merchants."
 #Scottish Advances
 unlock_gallowglass_advance: "$a_gallowglass$"
 unlock_gallowglass_advance_desc: "$a_gallowglass_desc$"
 unlock_reformed_gallowglass_advance: "$a_reformed_gallowglass$"
 unlock_reformed_gallowglass_advance_desc: "$a_reformed_gallowglass_desc$"
 unlock_late_gallowglass_advance: "$a_late_gallowglass$"
 unlock_late_gallowglass_advance_desc: "$a_late_gallowglass_desc$"
 scottish_salmon: "$SCO_ADJ$ Salmon Conservation"
 scottish_salmon_desc: "Our rivers and coastlines are rich in salmon. With careful attention and strict legislation, we will be able to harness this resource and shape our local economy towards export of this highly sought-after fish."
 scottish_morale: "$SCO_ADJ$ Courage"
 scottish_morale_desc: "Since the start of our war against $ENG_ADJ$ tyranny, we have preserved our independence through the valiant efforts of the courageous $SCO_ADJ$ people. The memory of brave men like William Wallace will motivate our armies to defend and protect $SCO_ADJ$ independence for all time!"
 scottish_longbowmen: "$ENG_ADJ$-$SCO_ADJ$ Longbowmen"
 scottish_longbowmen_desc: "Now that our ties to $ENG$ have been strengthened, we shall incorporate some of their military tactics, refining our units into fearsome forces."
 peel_towers_advance: "Peel Towers"
 peel_towers_advance_desc: "Peel Towers were developed to mitigate the dangers of life in our borderlands. They serve as protection against incursions of hostile raiding parties, sheltering both people and valuable livestock, and are a fast way to alert neighboring towns of approaching hostile armies by being a high place to light signal fires."
 scottish_tenacity: "Tenacious Land"
 scottish_tenacity_desc: "War can be a long and tiring affair. If we are to defend our independence, we need to be prepared to endure hard times. Luckily, our people are as tenacious as the land they call their home, and resist foreign invaders to their last breaths."
 influx_of_english_nobles: "$ENG_ADJ$ Administrators"
 influx_of_english_nobles_desc: "Securing peace with our southern neighbor has led to a steady influx of $ENG_ADJ$ aristocrats entering our administration. This makes it possible to exert our control over our country more effectively."
 scottish_trade_connections: "$north_sea$ Trade Connections"
 scottish_trade_connections_desc: "Our country is situated at the far edge of $western_europe$ and is sparse in resources. If we are to thrive economically, we need to invest and expand our trade connections to further regions. The $north_sea_area$ can connect us to rich markets and business opportunities, provided we learn to harness its potential."
 comets: "Comets?"
 comets_desc: "We have recently received a rather curious new tome. It is called #italic On the True Significance of Comets against the Vanity of Astrologers#!, and it is positively filled with vital information on these highly suspicious entities. We have decreed that all in the realm should be aware of its contents."
 modernized_royal_scots_navy: "Royal Scots Navy"
 modernized_royal_scots_navy_desc: "Since the Wars of Independence, we have been looking at reinforcing and updating our navy. Previously, we had used feudal obligations to bulk out our fleets with crew and ships, but we will now create a modern fleet, owned by the King and based in our port of Newhaven."
 royal_revenue: "Assert the Royal Revenue"
 royal_revenue_desc: "If $SCO$ is to continue its independent existence, we must secure stable sources of income. By tightening our control over the obligations owed to us by royal estates and feudal properties, we can increase our rightfully received taxes. Through these methods, we can ensure the Crown has sufficient funds to enact their will without relying on other sources of money."
 scottish_education: "$SCO_ADJ$ Universities"
 scottish_education_desc: "Having sent our brightest scholars to be educated in foreign universities for many years, it is time to improve our domestic education, and provide a place here in $SCO$ where the greatest minds of our nation can learn and grow. Our people should strive to acquire valuable knowledge and skills in their home country rather than wasting their money on expensive travel and their time on foreign institutions."
 act_of_revocation: "Act of Revocation"
 act_of_revocation_desc: "It has long been the custom to gift parts of the Royal Domain to our nobility as a reward for their services, but this system cannot be sustained if we want to ensure the integrity of our domain. From now on, we will insist on renting these lands instead of outright giving them away."
 scottish_diplomacy: "Reliable Alliance"
 scottish_diplomacy_desc: "For centuries, we relied on diplomacy and contact with foreign powers on the continent to ensure our independence. It is time to formalize this practice, and secure the endurance of our bonds for centuries to come."
 scottish_highlander_advance: "Establish Highlander Regiments"
 scottish_highlander_advance_desc: "Recruiting regiments from the people who live in the $SCO_ADJ$ Highlands can be a crucial measure for our military efforts."
 scottish_whisky: "Scotch Whisky"
 scottish_whisky_desc: "While distilleries have existed in $SCO$ for a long time, we should ensure these industries are finally put under the purview of the state. This supervision will allow us to establish ourselves at the forefront of liquor production, and expand our exports industry."
 scottish_enlightenment: "$SCO_ADJ$ Enlightenment"
 scottish_enlightenment_desc: "Rapid advancements in philosophy, political economy, and medicine have led to a plethora of accomplishments by our fellow countrymen that will propel $SCO$ to the forefront of global innovation. This period of $SCO_ADJ$ Enlightenment can be a very powerful tool for us on the world stage."

 #Semi generic Advances for german countries
 swabian_league_of_cities: "League of Cities"
 swabian_league_of_cities_desc: "$SWA$ is home to many wealthy cities, which are desirable targets for foreign ambition. To better protect our nation, we should come together in times of war and fight united against foreign incursions."

 swabian_frugal_people: "Frugal Finances"
 swabian_frugal_people_desc: "Many have accused our people of stinginess, and laughed at our good sense of economic caution. Fortunately, we cannot hear their mockery over the sound of all these ducats jingling in our purse."

 franconian_proud_knights: "Knights of the Empire"
 franconian_proud_knights_desc: "Our people have committed a long line of proud knights to Imperial service. They embody knightly ideals that have become less common over time, but remain an essential part of our identity. We have a long history to look at for proper education in both chivalric conduct and military matters. This tradition of Imperial knights naturally increases the willingness of our noble class to contribute levies in hopes of winning glory in honorable combat."

 franconian_wine_bottles: "Silvaner and Bocksbeutel"
 franconian_wine_bottles_desc: "The #italic bocksbeutel#! is a major part of our winemaking traditions. Being easily recognizable, the shape of this bottle serves as a sort of ambassador for the beautiful wines produced in our region, such as the Silvaner or Riesling. The exemplary talents of our glassmakers and winemakers will surely bring us economic advantages."

 westphalian_monastic_traditions: "Land of Monasteries"
 westphalian_monastic_traditions_desc: "$north_german_region$ is home to many $catholic_ADJ$ strongholds, such as the Bishoprics in $munster$ and $paderborn$. Monastic life and associated regional religious traditions have a generally positive effect on the literacy and education of our clergy, as there are plenty of opportunities for them to further educate themselves. This access to learning also helps the Holy Mother Church by creating an intellectual flock well-suited to priestly duties."

 north_german_hanseatic_traditions: "Hanseatic Traders"
 north_german_hanseatic_traditions_desc: "The people of $north_german_region$ have for a long time reaped the benefits of access to the Baltic Sea. While many of our southern neighbors must make do using rivers to transport goods, our traders have a long tradition of sailing the Baltic to make their fortunes, bringing enviable wealth back to our shores."
 
 german_baltic_sailors: "Baltic Sailors"
 german_baltic_sailors_desc: "Harsh climates breed hardy people. Traversing the cold Baltic Sea has certainly left its mark on our sailors, making them mentally resilient and particularly skilled at their profession. This is for their ultimate benefit, as the sea can be a merciless mistress."

 german_populating_the_countryside: "Attracting the Right People"
 german_populating_the_countryside_desc: "Encouraging settlement in rural areas and giving the people land to work there will be a great foundation to slowly but surely increase the wealth and productivity of our more sparsely populated territories."

 german_fair_towns: "Reichsmessestädte"
 german_fair_towns_desc: "I,perial fairs are a rare privilege granted to only a few select cities, creating some of the largest marketplaces in $europe$ and making these cities the commercial heart of the $hre$. The centralized nature of these markets allows merchants to plan and negotiate effectively in a setting where they can benefit from freedom and access to a diverse variety of goods."

 german_imperial_roads: "Imperial Road Network"
 german_imperial_roads_desc: "Since Roman times, road networks have connected places across $GER$, making trade and travel easier and more accessible. These roads also provide critical logistical advantages, particularly when moving troops."

 landsknechte: "Landsknechte"
 landsknechte_desc: "A new type of unit organization has been born out of $GER$'s constant wars: The $landsknechte$, which takes the form of mixed troops formed by innovative pikemen squares, with arquebusiers supporting from their flanks, and a front line composed of the infamous #italic Doppelsöldner#!, 'double-pay men', carrying two-handed swords. This allows for tactics that combine close-quarters and medium-range combat."

 german_biedermeier: "Biedermeier"
 german_biedermeier_desc: "The Biedermeier period marks a shift in social conservatism stemming from the upper classes and their nostalgia for the time when they held the most influence and power in our country. This social change has led our more free-thinking citizens to shroud their creative and intellectual pursuits in relative secrecy, well out of the public's disapproving gaze. While this inadvertently strengthens the development of a cultural identity amongst our merchants, it has also forced many valuable minds to leave our nation, seeking their lost freedoms — and taking their talents — elsewhere."

 custom_union_of_the_rhine: "Rheinischer Münzverein"
 custom_union_of_the_rhine_desc: "In the sprawling patchwork of our great empire, cooperation and collaboration between neighboring groups is vital to the health of our economy. We shall join the customs union of the Rhine and adopt their #italic gulden#! coins to make business transactions less complicated for our merchants, and streamline our international diplomacy."

 lub_hanseatic_coins: "Wendischer Münzverein"
 lub_hanseatic_coins_desc: "A newly founded organization between cities with a strong Hanseatic presence, the Wendish Coinage Treaty will provide us with a strong basis to facilitate trade and commerce in our lands."

 hamburg_port_cities: "Port Networks"
 hamburg_port_cities_desc: "Our country survives through its strong ties to maritime trade and the constant exchange of goods. To maintain an orderly harbor, we will need to dredge fresh waterways and build more docks and warehouses, attracting new merchants and their ships."

 saiger_process: "Saiger Process"
 saiger_process_desc: "A new and revolutionary smelting process, enriching silver-containing copper with lead, will allow us to increase the productivity of our mining operations."

 german_river_toll_castle_advance: "$german_river_toll_castle$"
 german_river_toll_castle_advance_desc: "$german_river_toll_castle_desc$"

 german_mountain_toll_castle_advance: "$german_mountain_toll_castle$"
 german_mountain_toll_castle_advance_desc: "$german_mountain_toll_castle_desc$"

 #Austria
 austrian_tradition: "A House of Glory"
 austrian_tradition_desc: "Our rise to power has made us the target of much envy, and the rival houses of the $hre$ vie for our position as the protectors of the south-eastern border. Despite these circumstances, we pride ourselves on executing diplomatic maneuvers unrivaled by any others."
 austrian_heritage: "Legacy of Rudolf I"
 austrian_heritage_desc: "The victory of Rudolf I over his rivals secured our place among the great houses of the $hre$ and is the subject of many tales and songs. The fervor displayed by him and his knights in the Battle on the Marchfeld will inspire our troops for centuries to come."
 hab_expert_mountaineers: "Land of Mountains and Rivers"
 hab_expert_mountaineers_desc: "Our people are highly adapted to traverse the obstacles of our country, from the high peaks and passes of our mountains to the wide rivers of our valleys."
 austrian_marriage_policy: "'Tu Felix Austria Nube'"
 austrian_marriage_policy_desc: "'Let others wage war; you, happy $HAB$, marry! For what Mars gives to others, Venus gives to you — kingdoms.'"
 habsburg_dominance: "$HAB_ADJ$ Diplomatic Expertise"
 habsburg_dominance_desc: "Given our location at the center of all $europe$, we must adopt a highly flexible attitude towards external diplomacy. Alliances and rivals can shatter as easily as they are formed, and our diplomats must be trained to cover every possible position."
 austrian_military_flexibility: "Landsknecht Tactics"
 austrian_military_flexibility_desc: "Only well-rounded tactics of artillery shock, cavalry charges, and unyielding infantry recruited from the $landknechte$ can lead us to victory."
 edict_of_restitution: "Edict of Restitution"
 edict_of_restitution_desc: "A bit of bookkeeping will help us to weather any religious strife that could befall our realm. This harmless edict will surely not spark any further conflict."
 austrian_court: "$HAB_ADJ$ Court"
 austrian_court_desc: "Maintaining our diplomatic relations requires time and effort, and committing too many people to diplomatic missions could negatively affect our efficiency and damage our reputation. The $HAB_ADJ$ Court's streamlined approach ensures we deploy the right envoys at the right times and still gather the information we need without overextending our diplomatic resources."
 geheimrat: "Geheimer Rat"
 geheimrat_desc: "The #italic Geheimer Rat#! is an elite advisory body composed of high-ranking nobles and officials, serving as the central institution for guiding our political, military, and administrative decisions."
 hofkriegsrat: "Hofkriegsrat"
 hofkriegsrat_desc: "Our war council can only function with a proper bureaucratic structure. Only when we know every detail about our troops and logistics can we defend our realm from hostile intruders."
 military_border: "Military Frontier"
 military_border_desc: "Defending our frontiers is a serious issue, and puts significant financial pressure on the state. The solution we have hit upon is to make generous grants of frontier lands in order to build up a professional military class. This will ensure more discipline overall and facilitate migration to the underpopulated regions of our realm."
 austrian_ambition: "Enlightenment Through Education"
 austrian_ambition_desc: "Our rulers must receive the best education possible to live up to the ideal of the enlightened monarch."
 austrian_state_industrialization: "State Industrialization"
 austrian_state_industrialization_desc: "Industrial modernization must always be a priority for our administration. Only through modern manufacturing can we compete with our rivals on a global stage."
 wiener_klassik: "Wiener Klassik"
 wiener_klassik_desc: "Viennese Classicism is a transformative force in music. Our best composers' works shall revolutionize Western musical tradition through bold, trend-setting innovation of symphonic, operatic, and chamber arrangements."
 multicultural_empire: "Multicultural Empire"
 multicultural_empire_desc: "$HAB$ is a diverse and multicultural realm, committed to embracing and accommodating its numerous ethnic minorities to maintain unity and stability amidst growing nationalist tensions."
 imperial_artillery: "Imperial Artillery"
 imperial_artillery_desc: "The rapidly changing nature of warfare urges us to modernize our troops and tactics. In order to stay ahead of our foes, we shall make our artillery the pride of the Imperial army."

 alchemy_advance: "Alchemy"
 alchemy_advance_desc: "The art of alchemy involves the creation of potions and elixirs using a combination of herbs, minerals, and other natural ingredients. While not always reliable, the use of alchemy can sometimes produce remarkable results in treating various ailments."
 anatomy_advance: "Anatomy"
 anatomy_advance_desc: "Physicians are developing a more advanced understanding of the human body, which is leading to more effective treatments for injuries and diseases. This knowledge, largely gleaned from practical dissections of human cadavers, is also helping to improve surgical techniques and reduce the risks of medical procedures."
 surgery_advance: "Surgery" 
 surgery_advance_desc: "Barber-surgeons are developing more sophisticated techniques for treating injuries and illnesses, and the invention of new surgical instruments makes procedures safer and more effective. As a result, patients are surviving injuries and illnesses that would have been fatal just a few years ago." 
 pharmacology_advance: "Pharmacology"
 pharmacology_advance_desc: "Alchemists and physicians are exploring new compounds and chemical mixtures in their search for remedies. Some of these early pharmacists have developed treatments for common illnesses like fevers, colds, and digestive problems, and their methods show promise for the future. However, there is still much to be learned, and many of these new remedies can be dangerous if not prepared correctly."
 sanitation_advance: "Sanitation"
 sanitation_advance_desc: "Settlements are investing in improved sanitation measures, such as waste disposal and clean water systems. This will reduce the spread of disease, and improve the overall health of the population. The development of modern sanitation practices will make it possible for people to live in closer proximity without succumbing to disease."
 vaccination_advance: "Vaccination"
 vaccination_advance_desc: "With the development of vaccines, physicians are able to provide the populace with immunity against deadly diseases. These vaccines are helping to reduce the spread of disease and prevent epidemics. By injecting a small amount of weakened or dead bacteria or virus into the body, the immune system is able to recognize and fight off the disease if it ever encounters it again."

 vibrant_court_advance: "Vibrant Court"
 vibrant_court_advance_desc: "Great minds flock to our court from across the known world, bringing with them diverse languages, fashions, and art. As a result of this exposure, we have grown more accommodating of their foreign 'manners'."

 patio_process_advance: "Patio Process"
 patio_process_advance_desc: "The $patio_process_advance$ consists is a method of refining low quality silver and gold ores with a chemical solution based on mercury to catalyze the amalgamation reaction."
 pan_amalgamation_advance: "Pan Amalgamation"
 pan_amalgamation_advance_desc: "The $pan_amalgamation_advance$ is an improvement of the $patio_process_advance$ that speeds up processing."

 milanese_tradition: "$lombard$ Heritage"
 milanese_tradition_desc: "The glory and influence of the $lombard$ Kingdom is still felt to this day. As their clear spiritual heirs, the nobles of $MLO$ enjoy a higher degree of authority and respect than their peers."
 milanese_heritage: "Condottieri Tradition"
 milanese_heritage_desc: "The people of $MLO# are used to fighting as mercenaries in the constant squabbles all around the region, earning a reputation for being very capable soldiers."
 renaissance_prince: "$renaissance$ Prince"
 renaissance_prince_desc: "Other rulers in $italy_region$ may pay lip service to their support of the cultural rebirth that manifests itself before us; let $MLO$ emerge as its heart under our patronage."
 patron_of_music: "Patron of Music"
 patron_of_music_desc: "The musical arts have been sadly neglected by other princes. We, by contrast, shall patronize music for the glory of God and ourselves, and $MLO$ will shine as a result."
 lowered_power_of_barons: "Lowered Baronial Power"
 lowered_power_of_barons_desc: "Art and culture are valuable things, but if we wish to remain independent, what we really need is #italic money#!. To acquire what we need, we must diminish the power of regional nobility, and ensure that more money flows into the center of our state."
 age_of_condottieri: "The Age of the Condottieri"
 age_of_condottieri_desc: "With mercenaries forming the mainstay of so many armies, we would be wise to ensure that we too have soldiers of fortune at our disposal. Let us ensure that passing mercenary captains are warmly welcomed in $MLO$, so they remember us fondly when our need for them arises."
 encouragement_of_philosophers: "Encouragement of Philosophers"
 encouragement_of_philosophers_desc: "We in $MLO$ have long been supporters of $renaissance$ thought. We should continue this tradition by extending patronage to and building facilities for the finest thinkers in all of $europe$. Hopefully, that will draw them here."
 merchant_princes: "Merchant Princes"
 merchant_princes_desc: "The great coastal cities of $ITA$ have long benefited from great trade networks bringing wealth and power to their shores. Our country may not be on the coast, but it does not mean that $MLO$ cannot get its own share of the maritime trade. Let it be known that any wealthy trades who go forth and bring back the riches of the world will be looked upon with favor at the court of $MLO$."
 rulership_of_enlightened_principals: "Rulership Through Enlightened Principals"
 rulership_of_enlightened_principals_desc: "Enlightenment philosophers have inspired new theories of governance. By structuring our government along those principles of merit, justice, and efficiency, we will enjoy greater support. At least, among those who actually matter..."
 milanese_ambition: "A New $lombard$ Kingdom"
 milanese_ambition_desc: "The glory of the previous $lombard$ Kingdom pales in comparison to what the people of $MLO$ have managed to achieve, and what they are still entitled to receive. All shall bow before us!"

 #Papal States
 pap_head_of_the_church: "Head of the Church"
 pap_head_of_the_church_desc: "The Curia and the Holy See are tightly intertwined with the $PAP_ADJ$ government. Cardinals from other nations and states might try to influence the theological trends of 4christian$, but in the end, the $PAP$ will always have the most influence in the Curia."
 pap_the_word_of_the_lord: "The Word of the Lord"
 pap_the_word_of_the_lord_desc: "As His most loyal servants; His holiest of bishops, it is we who read and interpret the Word of the Lord. As such, our diplomacy is backed by the divinity of God."
 ecclesiastical_primacy: "Ecclesiastical Primacy"
 ecclesiastical_primacy_desc: "The Pope has the sovereign authority to establish religious canon and law in the $catholic_ADJ$ Church. The State shares a special relationship with those who conform to the will of the $catholic_ADJ$ authority."
 papal_investiture_and_tithes: "$PAP_ADJ$ Investiture and Tithes"
 papal_investiture_and_tithes_desc: "Into $rome$ flows the riches of $christian_ADJ$ $europe$."
 glory_of_rome: "Glory of $rome$"
 glory_of_rome_desc: "We control the great city and the ancient capital of the Romans. We are the sole keepers of their marvelous tradition!"
 donation_of_constantine: "Donation of Constantine"
 donation_of_constantine_desc: "The Donation of Constantine demonstrates our authority to bestow the title of the Emperor of the Romans upon whomsoever we choose. It may also prove that we are rather good at forging documents."
 centralize_the_states: "Centralize the States"
 centralize_the_states_desc: "We will consolidate our power in $PAP_ADJ$ provinces by seizing authority from the local princes."
 holy_father: "The Holy Father"
 holy_father_desc: "Being the Vicar of God to the Roman $catholic_ADJ$ faithful gives us a certain amount of political leeway. The Papal Bull, documents carrying the Pope's official seal, carry the weight of the very word of God. With these, rulers have been cursed and entire continents divided."
 pap_legacy_of_the_military_orders: "Legacy of the Military Orders"
 pap_legacy_of_the_military_orders_desc: "Although the era of Holy Orders has long come to its end, its legacy still remains a major inspiration for the soldiers of God who pledge to defend the Holy See from heathens and heresy."

 #Teutonic Order
 teu_crusader_discipline: "Crusader Discipline"
 teu_crusader_discipline_desc: "Our grand order was forged in the flames and blood of the Third Crusade during the siege of $acre$ in 1191. While we originally nursed the sick and feeble, the order has transformed into a militarized group of knights of unbreakable devotion and discipline."
 teu_teutonic_heavy_cavalry: "Teutonic Heavy Cavalry"
 teu_teutonic_heavy_cavalry_desc: "There is no greater symbol of power and military prowess than the heavy cavalry. While for many states the cavalry is made of nobles, every Teutonic Knight is also a member of our heavy cavalry, and undergoes the strict training of a crusader."
 teu_reformed_order_army: "Reformed Order Army"
 teu_reformed_order_army_desc: "The $GER_ADJ$ knights, and veterans of the Crusades and other wars are simply not numerous enough to remain the base of our armies. We must reorganize the army to incorporate domestic levies, regiments capable of replacing the knights on the battlefield."
 teu_peasants_recruitment: "Peasant Recruitment"
 teu_peasants_recruitment_desc: "It has become clear to us that we can no longer rely on foreign volunteers to fill up our army ranks, no matter how experienced and valuable they might be. Instead, we will develop a system that would allow us to levy our subjects, both $GER_ADJ$ and non-$GER-ADJ$ folk alike."
 teu_infantry_tactics: "Infantry Tactics"
 teu_infantry_tactics_desc: "Contemporary battles in $europe$ have proven that the age of infantry is about to begin. It is now time to develop new tactics, adopt use of the pike, and reform our medieval concept of auxiliary infantry into the main fighting force of our future armies."
 teu_teutonic_religious_authority: "Teutonic Religious Authority"
 teu_teutonic_religious_authority_desc: "We will put an end to the loose religious autonomy local bishops hold within our realm. All religious matters, from taxation to converting the populace, will be state matters from now on."
 teu_expanded_marches: "Expanded Marches"
 teu_expanded_marches_desc: "Grant autonomy to the local governors of our border regions, and reform their holdings into marches. These special zones will pay fewer taxes to the state in return for an obligation to maintain the highest combat readiness during times of war as well as peace. This should provide us with substantial military flexibility at little cost."
 teu_prussian_bishops: "$prussian$ Bishops"
 teu_prussian_bishops_desc: "We shall grant further rights and privileges to our $prussian$ bishops, ensuring their loyalty in all matters."
 teu_one_state_one_religion: "One State, One Religion"
 teu_one_state_one_religion_desc: "Reserve all state offices only for those who follow our religion. Heretics and heathens are no longer welcome in our realm."
 teu_absolute_order: "Absolute Order"
 teu_absolute_order_desc: "All powers of the state are consolidated in our order. Every action taken and every decision made goes through the hierarchy of the Teutonic Order first before it gets executed. Of course, this bureaucracy is not in everyone's favor, but it ensures the absolute power of the #italic Hochmeister#!."

 legacy_of_breton_independence: "Legacy of $breton$ Independence"
 legacy_of_breton_independence_desc: "$brittany_area$ has never truly been part of $FRA$ Though we have been ravaged by Franks, Vikings, and the $ENG_ADJ$ in the past, we have, thus far, maintained our unique identity as a people. Let all of our neighbors be aware that $BRI$ shall remain forever free, the last bastion of true Gallic traditions!"
 estates_of_brittany: "The Estates of $BRI$"
 estates_of_brittany_desc: "First called in the 14TH century, the Estates of $BRI$ allowed free men from all rungs of society, even the Third Estate, to share their grievances and petition the ruler for redress. By calling in the Estates, we can mitigate some of the tension felt throughout our domain."

 dutch_education: "Dutch Education"
 dutch_education_desc: "While our people always enjoyed superior literacy rates at all levels of society, this advantage is becoming more apparent in the world taking shape before us. Only those with a limited understanding would not take advantage of and increase this edge."
 dutch_golden_age_art: "Dutch Art"
 dutch_golden_age_art_desc: "$common_string_prefix_article$ $NED$ has historically been at the forefront of technological and cultural advancements. We must continue to patronize inventors, artists, and writers to maintain our edge over other nations."
 a_trading_hub: "A Trading Hub"
 a_trading_hub_desc: "Our nation is blessed with a well-established hub of cities focused on trade, and adventurous sailors willing to bring riches from all over the world back home. These seafarers will be an excellent way for us to trade with other nations and make significant profits."
 platoon_fire: "Platoon Fire"
 platoon_fire_desc: "Standard volley fire involved each rank delivering its volley in one go to maximize firepower. But we have developed a different system of firing by platoon, with the idea being that one part of the regiment would always be firing at the enemy while others reloaded and got ready for the next volley. This removed time between attacks that the enemy could use to recover or otherwise gain an advantage."
 concentration_power: "Concentration of Power"
 concentration_power_desc: "For too long, our nation has been unevenly governed by multiple #italic stadtholders#! across different provinces, with the most powerful acting as #italic primus inter pares#! among their peers. It is time to make the position hereditary and concentrate authority in a single ruler."
 a_fortified_border: "A Fortified Border"
 a_fortified_border_desc: "Our borders are not well-defended by natural features, as is the case in some other nations. However, we have wit and wisdom in abundance, enough to construct the mightiest fortifications possible to deter our enemies and protect our families."

 #Netherlandish Shared
 netherlandish_protoindustry: "$NED_ADJ$ Verlagssystem"
 netherlandish_protoindustry_desc: "For a long time, our land has been home to bustling towns and cities with a higher concentration of craftsmen than our neighbors. This focus has made us a highly productive nation."
 a_dynamic_society: "A Dynamic Society"
 a_dynamic_society_desc: "Our lands are a haven for the bold. Those looking to better their lives will find opportunity here, and we will in turn capitalize on the talents of these ambitious individuals to strengthen our nation."
 an_early_urbanization: "Early Urbanization"
 an_early_urbanization_desc: "The Low Countries have traditionally had a high rate of urbanization, which has allowed us to achieve power beyond what most might expect. We should accelerate this trend by creating a robust network of prosperous settlements that can help us create a wealthier future."

 polders_advance: "Polders"
 polders_advance_desc: "The Low Countries are highly susceptible to flooding, and the many disastrous floods that happened between the 11th and 14th centuries led to the creation of the Zuiderzee. This excessive flooding also caused coastal soils to become uselessly salinated. Thankfully, we now have the technology to reclaim this damaged land and use it productively for agriculture."
 netherlandish_ship_building: "$NED_ADJ$ Shipbuilding"
 netherlandish_ship_building_desc: "As the Low Countries are home to some of $europe$'s greatest port cities, it is only fitting that they should also boast some of $europe$'s greatest shipyards. Being able to employ skilled local craftsmen dramatically reduces the costs of acquiring new merchant fleets."

 #Netherlandish Unique
 brb_the_four_quartiers: "The Four Quartiers"
 brb_the_four_quartiers_desc: "The Four Quartiers are the four provinces into which the core of $BRA$ is divided. Each quartier is formed by a satellite of large and smaller towns, some walled and others not. They all work in perfect synergy like a well-greased engine, filling our coffers with great riches."
 fla_cloth: "$FLA_ADJ$ $cloth$"
 fla_cloth_desc: "The $FLA_ADJ$ $cloth$ industry is the envy of the world. Merchants come from far away to sell their $wool$ in $FLA$, where we manufacture the best quality $cloth$."
 frisian_trading_traditions: "Trading Traditions"
 frisian_trading_traditions_desc: "Long before the counties south of us developed their own routes, our ancestors dominated coastal trade in $europe$, from the Baltic to Biscay. We must revive this ancient maritime expertise to reclaim our rightful position."
 gel_warring_spirit: "A Warring Spirit"
 gel_warring_spirit_desc: "Some may call us bellicose, but that is only because they fear our might. A well-trained standing army is essential for survival in this chaotic age. Our adversaries will soon learn to respect our hardened spirit."
 hai_expert_embassadors: "Expert Ambassadors"
 hai_expert_embassadors_desc: "Our rulers have always been skillful with their words, and their diplomatic acumen has established their influence far beyond our national borders. As time goes on and geopolitical pressures intensify, we must start cultivating friendship with other nations for protection while expanding our sphere of influence."
 hol_sailors: "Hollander Sailors"
 hol_sailors_desc: "A land of sands and flooded terrain, the people of $HOL$ have always looked at the sea as their natural second home, where bountiful resources and glorious adventures await those brave enough to pursue them."
 lie_athens_north: "Athens of the North" 
 lie_athens_north_desc: "$liege$ has been a cultural center for centuries, the home of the most celebrated scholars in the region and the envy of our rivals. But we shall not allow ourselves to become complacent; we shall never stop improving our institutions."
 lux_destined_rule: "Destined to Rule"
 lux_destined_rule_desc: "The great Luxembourg dynasty, whose very name is derived from that of our nation, is now the most important family in $europe$. This has to be a sign from Heaven, and we will use this divine benediction to further extend our influence."
 utr_city_churches: "The City of Churches"
 utr_city_churches_desc: "$utrecht$, often called the #italic City of Churches#!, is home to the iconic Dom Tower. The spiritual center of $common_string_prefix_article$ $NED$ and the seat of the Bishopric of Utrecht, it has been a beacon of faith since antiquity."
 brb_brabantine_rights: "$BRB_ADJ$ Rights"
 brb_brabantine_rights_desc: "As other nations have, it is time to codify the liberties of our subjects, in order to identify and safeguard their rights and motivate them to continue working towards a better future for our country."
 fla_flemish_renaissance: "$FLA_ADJ$ $renaissance$"
 fla_flemish_renaissance_desc: "As one of the most prosperous regions on the continents, much of the wealth we have created naturally flows toward artistic patronage. $FLA_ADJ$ merchants commission master painters to create art that, while perhaps not practical, casts light over even the cloudiest of days. With dozens of our merchants actively hiring artists and commissioning new pieces, we are creating a distinctive $renaissance$ of our own."
 frisian_resisting_invader: "Resisting the Invader"
 frisian_resisting_invader_desc: "Surrounded as we are by enemies, our people are accustomed to aggressively defending their lands, fighting so fiercely that many would-be invaders turn tail and never return. Those who cannot escape us can take comfort in the thought that their blood shall nurture the $FRI$ soil."
 gel_healthy_economy: "A Healthy Economy"
 gel_healthy_economy_desc: "We have expanded our borders not only by the sword, but through careful financial planning, which allowed us to purchase influence over desirable territories — or to buy them outright. With continued wise budget management, this economic trend should be sustainable."
 hai_frontier_march: "A Frontier March"
 hai_frontier_march_desc: "As a border province of the $hre$, $HAI$ has developed a rough-and-ready spirit, born from centuries of frontier conflict. This spirit makes our people naturally inclined towards taking defensive action, which we can exploit to our benefit."
 hol_maritime_warfare: "Maritime Warfare"
 hol_maritime_warfare_desc: "As a maritime nation, our sailors are accustomed to naval combat, whether against members of rival nations or pirates attempting to plunder our trading vessels. In any case, our navy must be prepared to face any enemy at any time."
 lie_devoted_land: "A Devoted Land"
 lie_devoted_land_desc: "As part of one of the biggest dioceses in the area, there is no doubt as to the depth of devotion our people hold. We will show the world that our faith in God is as strong as our faith in our nation."
 lux_fortress_europe: "The Fortress of $europe$"
 lux_fortress_europe_desc: "The impregnable position of $LUX$, with the formation of the Bock acting as a natural fortress, is incredibly strong. Our enemies would perish in any attempt to usurp our holdings. We shall learn from nature, and construct all our fortresses so as to use the local terrain to their advantage."
 utr_blessed_land: "A Blessed Land"
 utr_blessed_land_desc: "The Pope himself influences the election of our Prince-Bishop, challenging the traditional five-chapter election format that we had before. This is clear proof that our land has been divinely blessed!"
 brb_land_culture: "A Land of Culture"
 brb_land_culture_desc: "With the foundation of the University of $leuven$, $BRA$ has placed itself firmly at the center of culture in $common_string_prefix_article$ $NED$. Students from all over $europe$ come to our lands to study and share their knowledge."
 fla_prospering_agriculture: "Prospering Agriculture"
 fla_prospering_agriculture_desc: "As our cloth, luxury goods, and financial industries face growing competition, it is becoming obvious that we need to manage our land use better. By creating regional granaries, we further diversify our economy, and bolster our food stores against famine or poor harvests."
 frisian_legend_grutte_pier: "The Legend of Grutte Pier"
 frisian_legend_grutte_pier_desc: "There are stories in our lands about a pirate who was seven feet tall and strong as an ox. These tales inspire many to take to the seas and do what our ancestors did best: loot unguarded coasts."
 gel_expand_kwarteers: "Expand the Kwarteers"
 gel_expand_kwarteers_desc: "As in the case of $BRA$, $GEL$ has traditionally been divided into four quarters. This system of provinces arranged around a strong central city has proven to be an efficient way to govern our nation, and we should apply this system to new regions that join our realm in the future."
 hai_bustling_towns: "Bustling Towns"
 hai_bustling_towns_desc: "Our lively urban settlements are full of potential. With just a little effort, we can make them and their hinterlands incredibly wealthy, allowing us to thoroughly tax them."
 hol_trading_spirit: "Trading Spirit"
 hol_trading_spirit_desc: "Our country is surrounded by the sea, so it is only natural that we would brave the roiling waves in search of trading ports and enriching goods to bring back."
 lie_inspiring_mecenas: "An Inspiring Maecenas"
 lie_inspiring_mecenas_desc: "Our nation inspires artists from across $europe$, who come here to create their masterworks. We will spare no expense to support these artists and attract new talent, establishing ourselves as a hub of arts and culture."
 lux_heirs_john_blind: "Heirs of John the Blind"
 lux_heirs_john_blind_desc: "John the Blind, the heroic King of $BOH$ and Count of $LUX$, was born in our humble realm. He died in the Battle of Crécy at fifty, having charged headlong into combat despite his blindness. His brave, honorable death will inspire our soldiers for centuries."
 utr_skilled_diplomats: "Skilled Diplomats"
 utr_skilled_diplomats_desc: "Given the growing influence of our neighbors, our nation's survival depends on our ability to find loyal, powerful allies who will support us in our times of need."

 golden_fleece: "The Order of the Golden Fleece"
 golden_fleece_desc: "One of $europe$'s foremost chivalric orders. Being a Knight of the Golden Fleece is a mark of great status, and reflects well upon us."
 
 
 
 wagenburg: "Wagenburg"
 wagenburg_desc: "During the Hussite Wars, our armies relied on wagon forts called #italic Wagenburg#! to win battles against superior forces. While we may not always deploy wagons, the principle remains: infantry sharpshooters fighting from prepared defensive positions become our standard doctrine."
 hussite_traditions: "$hussite_ADJ$ Traditions"
 hussite_traditions_desc: "Through struggle and brotherhood, the adherents of our faith withstand all external conversion pressures. Our unshaken religious roots, stemming from ancient teachings, ring true to the hearts of all those who seek to protect their beliefs and live in peace alongside their fellow 4christian_ADJ$ faithful."
 kutnohorian_deal: "The Kutnohorian Deal"
 kutnohorian_deal_desc: "The nobility will always be rather sensitive about protecting their privileges. It would go far towards winning their loyalty if said privileges were to be guaranteed forever."
 bohemian_thaler: "$BOH_ADJ$ Thaler"
 bohemian_thaler_desc: "For years, the standard currency in our country has been the #italic groschen#!, a coin made of silver and used all throughout the $hre$. The discovery of new sources of silver allows us to create another kind of bigger coin, the #italic thaler#!, also called 'toler' or 'daler', which will become strong and influential enough to dominate all trade and become a new standard."
 fortified_towns: "Fortified Towns"
 fortified_towns_desc: "Through the ravages of the $hussite_wars$, and in an effort to safeguard our faith and people, we funded many fortified towns. Since then, we have gained great expertise in erecting fortifications and engineering impenetrable defenses."

 maori_ta_moko_advance: "Tā Moko"
 maori_ta_moko_advance_desc: "With the intricate curves and spirals of #italic Tā Moko#!, we ritualistically etch pigment into our very skin, transforming our bodies into living tapestries of honor and history."
 maori_ceremonial_haka_advance: "Ceremonial Haka"
 maori_ceremonial_haka_advance_desc: "The ground shakes as our warriors perform the #italic Haka#!, their fierce cries and synchronized movements echoing across the battlefield. This intimidating ceremonial war dance emboldens the heart of every warrior, granting a significant morale boost to land forces."
 maori_whakapapa_advance: "Whakapapa"
 maori_whakapapa_advance_desc: "Strength and unity come from knowing one's #italic Whakapapa#!, the intricate web of genealogical connections that binds an #italic iwi#! together. This deep understanding of collective ancestry fosters a united front against all adversities."
 maori_te_reo_advance: "Te Reo"
 maori_te_reo_advance_desc: "We know that by preserving and nurturing #italic Te Reo#!, our sacred language, we maintain a vibrant connection to our culture and traditions."
 maori_rua_kumara_advance: "Rua Kūmara"
 maori_rua_kumara_advance_desc: "By perfecting the art of growing and storing #italic kūmara#! tubers in specially-constructed #italic rua#!, or storage pits, we can ensure that our bellies are filled even in the harshest of winters."
 maori_he_whakaputanga_advance: "He Whakaputanga"
 maori_he_whakaputanga_advance_desc: "The so-called 'Declaration of the Independence of New Zealand' is a document that once and for all establishes a unified $maori_culture$ state that is independent. With the wording fully understood by all sides, our chieftains may finally unite, and be free from foreign interference."
 
 #Ethiopia
 the_ark_of_the_covenant: "The Ark of the Covenant"
 the_ark_of_the_covenant_desc: "We are the only nation to house the sacred Ark of the Covenant after it was secretly taken by Menelik I with divine assistance thousands of years ago. It is hidden away from public view, lest someone attempt to steal our sacred national treasure. Replicas of the Ark are placed in every single one of our churches as a reminder that our rule is blessed by God."
 roof_of_africa: "The Roof of $africa$"
 roof_of_africa_desc: "Our people have inhabited the highlands for generations, enduring extreme conditions that have made us resilient and strong. This gives us a significant advantage over our enemies whenever we engage in conflict."
 solomonid_claim: "$solomonid_dynasty$ Dynastic Claim"
 solomonid_claim_desc: "Our rulers' forefathers are descended from the monarchs of Aksum; from the bloodlines of King Solomon and the Queen of Sheba. We have deposed the $zagwe_dynasty$ monarchs in order to legitimize our rule and firmly establish the kingdom being restored to its rightful dynasty."
 nagusa_negast: "Nəgusä Nägäst"
 nagusa_negast_desc: "Our ruler is the king of all kings; the heir to the pedigree of the kings of Aksum along with that of the first ruler, Menelik I, the son of King Solomon and the Queen of Sheba. All of our kings are descended from the $solomonid_dynasty$ dynasty, and the line of inheritance need not be from father to son."
 a_permanent_capital: "A Permanent Capital"
 a_permanent_capital_desc: "For centuries, our nation has lacked a permanent capital, with the court following the rulers wherever they desired. While this approach has its advantages, in order to effectively govern our vast nation we need to establish a strong central authority in a proper permanent location."
 external_friends: "External Friends"
 external_friends_desc: "Our envoys to $rome$ and $iberia_region$, looking for military support, were quite successful — in fact, they put us on the map. These endeavors to find allies should continue."
 eternal_crusade: "An Eternal Crusade"
 eternal_crusade_desc: "As a $christian_ADJ$ nation, we find ourselves surrounded by $muslim_ADJ$ adversaries who seize every opportunity to attack us. To ensure our survival, we must be prepared to fight back immediately."
 prester_john: "Prester John"
 prester_john_desc: "People from $europe$ have been looking for Prester John for centuries, and are convinced that our ruler has to be him, somehow, as we are fellow $christian_ADJ$ worshippers. There is no reason to point out that they are wrong, however, as they are now happy to share their ideas with us."
 an_iron_fist: "An Iron Fist"
 an_iron_fist_desc: "Our region is diverse in cultures and religions, and the only thing that keeps it united is not compassion, but a powerful ruler, capable of dealing swiftly and decisively with any attempt at revolt."
 a_true_ethiopian_church: "A True $ETH_ADJ$ Church"
 a_true_ethiopian_church_desc: "External influences have their uses, but exposure to them can alter the nature of our beliefs. In order to maintain our identity, we must secure the domestic primacy of our own Tewahedo Church."
 origin_of_coffee: "Origin of $coffee$"
 origin_of_coffee_desc: "It is from our lands that $coffee$ comes, as we have the perfect growing conditions. While it can be cultivated in other places, ours is revered for its quality and exported by the ton. We have to make this a way to channel wealth into our nation."
 a_modern_nation: "A Modern Nation"
 a_modern_nation_desc: "Despite our apparent isolation, we are well aware of the innovations happening around the world, and we waste no time in implementing these modernizations in order to maintain a competitive advantage over our rivals."
 cawa_advance: "Ç̌äwa Regiments"
 cawa_advance_desc: "The #italic Ç̌äwa#! serve as $ETH$'s noble feudal warriors, recruited and appointed for the Emperor's army service. They are a professional soldier class, renowned for their ferocity."
 a_renaissance_cawa_advance: "$a_renaissance_cawa$"
 a_renaissance_cawa_advance_desc: "$a_renaissance_cawa_desc$"
 a_discovery_cawa_advance: "$a_discovery_cawa$"
 a_discovery_cawa_advance_desc: "$a_discovery_cawa_desc$"
 a_reformation_cawa_advance: "$a_reformation_cawa$"
 a_reformation_cawa_advance_desc: "$a_reformation_cawa_desc$"
 a_absolutism_cawa_advance: "$a_absolutism_cawa$"
 a_absolutism_cawa_advance_desc: "$a_absolutism_cawa_desc$"
 a_revolutions_cawa_advance: "$a_revolutions_cawa$"
 a_revolutions_cawa_advance_desc: "$a_revolutions_cawa_desc$"
 
 #Mali
 epic_of_sundiata: "Epic of Sundiata"
 epic_of_sundiata_desc: "The $epic_of_sundiata$ tells of the legendary campaign of Sundiata Keita, the founder of the $MAL_ADJ$ Empire and hero of our people. His story has passed from generation to generation, and has always been a great source of inspiration to our people."
 kouroukan_fouga_advance: "Kouroukan Fouga"
 kouroukan_fouga_advance_desc: "The $kouroukan_fouga_advance$ is the basic constitution of $MALI$. It covers every aspect of living, from simple family life in the villages all the way to the sovereignty of the Mansa."
 gold_of_bure: "Gold of Bure"
 gold_of_bure_desc: "The twin gold fields at Bambuk and Bure are renowned as the largest gold deposits anyone has ever heard of, and they belong to us! Bure's gold mines in particular produced fantastic wealth that famously destabilized the entire Egyptian economy through inflation when Mansa Mūsā visited there. Our economy, though, is used to a constant influx of gold, and is more difficult to inflate."
 accounts_of_the_atlantic_voyage: "Accounts of the Atlantic Voyage"
 accounts_of_the_atlantic_voyage_desc: "According to the legendary Mansa Mūsā, his predecessor started a journey across the $atlantic_ocean_continent$ in hopes of discovering the furthest limits of the ocean. While some among the ruling class consider this endeavor a shameful abdication of duty, others see this as inspiration to explore corners of the world previously unknown to man."
 reclamation_of_land: "Reclamation of Land"
 reclamation_of_land_desc: "The Sahara is not static. It can wax and wane depending on rainfall, and the habitable belt known as the $sahel_region$, where we reside, can grow or shrink accordingly. A major drought could render much of our kingdom useless desert, an addition to the Sahara where no one reigns but death. However, in good years, we might reclaim some of the marginal lands from the Sahara and make it productive again."
 mandinka_warrior_spirit: "Mandinka Warrior Spirit"
 mandinka_warrior_spirit_desc: "Whether pagan or $muslim_ADJ$, Mandinka men have been the greatest fighters the $sahel_region$ has ever seen. The courage of our troops is admirable, as is their pride. When the Mansa raises an army, not only is it the largest in all the $sahel_region$, it is the best!"
 markets_for_salt: "Markets for $salt$"
 markets_for_salt_desc: "In our kingdom, $salt$ is worth its cost in gold. But south of us, in the great forests of the Ashanti and the Yoruba, salt is worth considerably #italic more#! than gold. Luckily for us, we have our own supply of $salt$, and enough gold to obtain as much as we could ever want. Perhaps we could find yet more markets of people for whom $salt$ is more valuable than gold?"
 west_african_slave_trade: "West African Slave Trade"
 west_african_slave_trade_desc: "Even before our Empire existed, the great Wagadou, the Ghana Empire that preceded us, sold $slaves_goods$ across the desert to the Arabs. We have followed suit all these years, supplying the Arab world with a vast number of $slaves_goods$. Now the Europeans clamor for even more $slaves_goods$ to work their holdings in the so-called New World. We have had little report, but the amount of $slaves_goods$ they demand is truly stunning, and they keep coming back, sometimes even raiding our shores and abducting our subjects. The time has come to impose order on this trade and restrict the Europeans to select commercial ports where they will purchase, not steal, $slaves_goods$."
 kele_koun_advance: "The Kèlè-Koun"
 kele_koun_advance_desc: "The Kèlè-Koun, or 'war-head', are the commanders of infantry fighting for Empire, called the Kèlè-Bolo, or 'war-arm'. Unlike the Ton-Tigi, the feudal lords of $MAL$, the Kèlè-Koun are not necessarily part of the $nobles_estate$. The Kèlè-Koun have #italic jonow#!, 'slaves', serving as carriers of the weapons and equipment until their inclusion in the Sofa battalions."
 sofa_levies_advance: "Sofa Levies"
 sofa_levies_advance_desc: "Originally, all soldiers in the Kèlè-Bolo levies are #italic horon#!, or 'freemen', but the latest developments in $MAL$ have forced the inclusion of #italic jonow#!, 'slaves', to serve in the army as fighters instead of weapon-bearers. These slave warriors would thereafter be known as 'Sofa', protecting fortifications as part of garrison forces."
 mandekalu_levies: "Mandekalu Levies"
 mandekalu_levies_desc: "The $mandekalu_levies$ are the backbone of the $MAL_ADJ$ military. Freemen of the Empire are called to arms in times of war, and it is a great honor for them to participate in these battles with their own weapons."
 farari_corps_advance: "Farari Corps"
 farari_corps_advance_desc: "The $farari_corps_advance$ are the elite of the $MAL_ADJ$ military. Commanders in their own right, they are highly respected for their experience and bravery."
 sudano_sahelian_architecture_advance: "Sudano-Sahelian Architecture"
 sudano_sahelian_architecture_advance_desc: "The grasslands, savannas, and deserts of $west_africa$ provide few resources suitable for construction projects, so we have made the best of what we can get. The usage of mudbricks and adobe plaster reduces the cost of buildings significantly while also giving them a distinct style that is pleasing to the eye."

 #Songhai
 stories_of_the_gao_empire: "Stories of the $gao$ Empire"
 stories_of_the_gao_empire_desc: "Before the $MAL_ADJ$ Empire came to dominate $west_africa$, the city of $gao$ was the capital of an empire in its own right. Although there are barely any written records of the $gao$ Empire, its legacy lives on in our oral traditions, inspiring all who want to achieve greatness one day."
 malian_military_tactics: "$MAL_ADJ$ Military Tactics"
 malian_military_tactics_desc: "During our time as subjects of $MAL$, our people learned much from their military command and combat tactics. This knowledge shall help our own infantry in battles to come."
 gold_to_salt_trade: "$golds_goods$ to $salt$ Trade"
 gold_to_salt_trade_desc: "Some say that $salt$ is worth its weight in $golds_goods$... perhaps it would be more accurate to say that $golds_goods$ is worth its weight in $salt$. Either way, by exchanging these two commodities, we have established thriving trade networks."
 independence_from_mali: "Independence from $MAL$"
 independence_from_mali_desc: "For many years, we were a subject of $MAL$. As $MAL$'s power has weakened, ours has grown, and we can now claim to be fully independent of $MAL_ADJ$ overlordship. Let us take steps to make sure we remain so."
 jihad_against_the_pagans: "$jihad$ Against the Pagans"
 jihad_against_the_pagans_desc: "Despite the best efforts of centuries of Sunni sultanates, $west_africa$ is still plagued by the menace of Animistic pagans. By lifting the banner of $jihad$, we can cleanse our lands of the unbelievers and expand our frontiers at the same time."
 sankore_madrassah: "Sankoré Madrasah"
 sankore_madrassah_desc: "We have been told that the Sankoré Mosque's school is the greatest center for learning in the entirety of $africa$. Who could be surprised if this were true, given how many wise men from distant $arabia_region$ and the $maghreb_region$ are here right now, arguing the finer points of philosophy and religion?"
 the_hajj: "The Ḥajj"
 the_hajj_desc: "Like Mansa Mūsā of $MAL$ once did, our rulers can travel to $mecca$ on pilgrimage, fulfilling the fifth pillar of $muslim$ and bearing gold as a symbol of our wealth and power. Like the $MAL_ADJ$ pilgrims of old, the world will gasp in wonder at the wealth and grandeur of $SON$."
 sharia: "Sharī'ah"
 sharia_desc: "The Holy Law that the Prophet followed when ruling $medina$ should be the unshakable foundation of the laws we use to run our society. By reforming our criminal code to reflect the teachings of the Prophet, we will bring harmony and justice to our people."
 trans_sahara_trade: "Trans-Sahara Trade"
 trans_sahara_trade_desc: "Our traders frequently bring back fascinating things from the courts of $north_africa$. Perhaps they could find and bring back yet more fascinating trinkets?"
 modernization_of_the_military: "Modernization of the Military"
 modernization_of_the_military_desc: "Our state lives and dies by the capabilities of our army. Our military not only ensures our survival, but is also what has set us on the path to greatness. We cannot allow ourselves to fall behind in progress!"

 
 
 university_naples: "The University of $NAP$"
 university_naples_desc: "Founded in 1224 by Emperor Frederick II, the University of $NAP$ is one of $ITA$'s oldest public institutions. Embracing a secular ethos, it has provided generations of students with a comprehensive education and contributed to intellectual advancements across various fields."
 mercantile_spirit: "Mercantile Spirit"
 mercantile_spirit_desc: "$NAP$, inspired by the influential maritime republic of Amalfi, boasts a vibrant culture of trade. Strategic ports, including the city of $naples$ itself, served as vital hubs, connecting the kingdom to distant lands and fostering economic prosperity through commercial exchanges and the flourishing exchange of goods and ideas."
 consolidate_the_royal_domain: "The Royal Domain"
 consolidate_the_royal_domain_desc: "We have inherited a wealthy realm, but we have been stymied from achieving true prosperity by the constraints of archaic laws and customs. Previous rulers balanced noble privilege with economic power, but we must bring attitude and regulations into the modern era. By strengthening courts of the nobility and consolidating their landholdings, we will create a clearer legal hierarchy. Simultaneously, we will empower cities as centers of royal authority and encourage the proliferation of urban trade and craftsmanship."
 academia_pontaniana: "Accademia Pontaniana"
 academia_pontaniana_desc: "For a long time, $NAP$ has striven to be a center of modern learning, attracting the great minds of the age and spreading the light of the $renaissance$. Under the leadership of Giovanni Pontano, these discussion circles have been given structure and organization. It is only fitting that we name the academy after its industrious leader."
 encouraged_city_living: "Encouraged City Living"
 encouraged_city_living_desc: "We have inherited an exquisite city from our predecessors. We must continue to beautify and improve this metropolis of the Mediterranean so that it can continue to grow and prosper. No longer can we content ourselves with merely repairing and maintaining the port and buildings; we shall make holistic improvements that better sustain our people by also building aqueducts, draining wetlands, and paving more roads."
 crush_the_barons: "Crushed Power of the Barons"
 crush_the_barons_desc: "Local barons still exert a large degree of power over the $NAP$ countryside. If we wish to continue centralizing our kingdom, we must crush the power of these barons, or risk them conspiring against us."
 expanded_arsenale: "Expanded Arsenale"
 expanded_arsenale_desc: "For centuries, the Arsenale of $NAP$ has been the center of our ship production and our main naval installation. However, it needs to be expanded and modernized to remain effective against hostile Mediterranean fleets. Let us expand both the commercial and military capabilities of our port, building a more efficient Arsenale to maintain a larger, more powerful fleet."
 city_of_artists: "City of Artists"
 city_of_artists_desc: "Through patronage of the world's greatest artists, the glory of our city will become known throughout the world. All will marvel at the greatness of our painters, poets, singers, and actors. Let $NAP_ADJ$ culture be the mark by which other centers of art are measured!"
 institutional_reorganization: "Institutional Reorganization"
 institutional_reorganization_desc: "By abolishing the Collateral Council and establishing the #italic Real Camera di Santa Chiara#!, we will implement important legal reforms in $NAP$. Ongoing projects will aim to reorganize the legislative complex, consolidate laws into the #italic Codice Carolino#!, and implement the #italic Onciario Cadastre#! for tax reform."
 a_central_power: "A Central Mediterranean Power"
 a_central_power_desc: "Our advantageous central position in the Mediterranean enables effortless access to any shore. We should capitalize on this asset to seek alliances, forge new friendships, and expand our borders. With the sea as our gateway, opportunities abound for growth and prosperity in our quest for greater influence and security."
 neapolitan_industrialization: "$NAP_ADJ$ Industrialization"
 neapolitan_industrialization_desc: "$NAP$ has witnessed a gradual industrialization process over the past decades. Key sectors such as textiles, shipbuilding, and ironworks have experienced significant growth, fueled by investments and technological advancements. This shift towards industrialization will play a significant role in transforming $NAP$ into a major economic center."
 neapolitan_army_reforms: "$NAP_ADJ$ Army Reforms"
 neapolitan_army_reforms_desc: "Our nation needs to undergo sweeping military reforms, modernizing its armed forces to meet the challenges of the changing battlefield. These reforms will bolster tactical capabilities, streamline command structures, and enhance training programs, positioning us as a formidable force in our region."

 #Two Sicilies
 tws_unified_legal_code: "Unified Legal Code"
 tws_unified_legal_code_desc: "The territories which constitute our land have suffered revolts due to unjust applications of laws. In order to prevent these occurrences in the future, we should standardize our legal code and ensure our laws are applied fairly. This will surely prevent any uprising from spiraling into chaos."
 tws_ensure_loyal_families: "Loyalty of the Noble Families"
 tws_ensure_loyal_families_desc: "The Noble Families of both Sicilies exert much power in our stead. By granting them prestigious yet meaningless roles at court, we will ensure their loyalty and guarantee stable rule over our countryside."
 tws_revitalize_the_lands: "Attract new People"
 tws_revitalize_the_lands_desc: "Previous rulers put too much focus on particular areas of our country. If we want to retain control of both Sicilies, we will have to invest equally and fairly in both parts. One step towards this goal is attracting people to settle in previously neglected areas."
 tws_capable_vicars: "Capable Vicars"
 tws_capable_vicars_desc: "A particular struggle of our unified country is governing both sides of the Strait of Messina. Since our ruler can only be present on one side at a time, the other will have to be given to a vicar, ruling in our name. We must be sure to appoint only the most capable and trustworthy people to this vital role to prevent corruption."
 tws_oversea_ambitions: "Overseas Ambitions"
 tws_oversea_ambitions_desc: "Expanding our territories within Italy is a difficult task, navigating a treacherous web of alliances and risking the anger of the Pope himself. Therefore, we should look overseas, where potential riches await us in the lands of northern Africa and Greece."
 tws_protect_the_coastline: "Increase Maritime Patrols"
 tws_protect_the_coastline_desc: "Our coastline is vast, and vulnerable to raids by pirates hunting for slaves. We need to establish a navy to patrol, protect, and eventually defeat this vile threat to our people."

 #Florence & Tuscany

 arte_della_lana: "Arte della Lana"
 arte_della_lana_desc: "The #italic Arte della Lana#! — the Wool Guild — controls one of the most important industries in $FLO$. Devoted to the production of quality $cloth$ and supported by a strong and skilled workforce, this guild has helped many traders and artisans build their fortunes across the centuries."

 florino_d_oro: "Fiorino d'Oro"
 florino_d_oro_desc: "A very powerful currency, backed by excellent gold purity and shared by many states and institutions across $europe$. By adopting the #Y Florin#! as our currency, we are sure to positively impact our income and cut down on monetary deficits."

 a_land_of_banks: "A Land of Banks"
 a_land_of_banks_desc: "$TUS$ is the center of banking in $europe$, with many powerful financial institutions headquartered in their major cities. From these bases, their influence extends across $italy_region$ and into northern $europe$ through extensive trade networks and lucrative partnerships."

 florentine_citizen_militia: "$FLO_ADJ$ Citizen Militia"
 florentine_citizen_militia_desc: "If our people are to flourish well into the future, they must be ready to mobilize and defend our ideals and homeland! Forming a citizen militia, equal in experience and ferocity to other armies in $europe$, will greatly aid us in protecting our domain."

 birthplace_of_renaissance: "Birthplace of the $renaissance$"
 birthplace_of_renaissance_desc: "Our dedication to fine arts, cultivating artistic talent, and innovative thought have led us to be regarded as one of the foremost leaders of cultural, philosophical, and scientific advancements worldwide!"

 florentine_school: "$FLO_ADJ$ School"
 florentine_school_desc: "As one of the most influential contemporary schools of art, $FLO_ADJ$ techniques and fine details have established us as the cultural leader of $europe$, producing masterworks that define the $renaissance$."
 
 tuscan_uffizi: "Uffizi"
 tuscan_uffizi_desc: "Originally meant to consolidate the administration of several guilds and agencies, the Uffizi is a valuable source of centralized power, preserving and displaying various works of art as a sign of cultural superiority and an exhibition of affluence."

 medici_porcelain: "Medici $porcelain$"
 medici_porcelain_desc: "Many attempts have been made during the last few decades to replicate the properties of true $porcelain$, an exotic good from the Far East. With the help of experienced alchemists and thorough scientific knowledge, we will surely be able to produce $porcelain$ of great quality."

 porto_franco: "Porto Franco"
 porto_franco_desc: "By opening our ports for business with foreign merchants and eliminating import dues, we are sure to accumulate more capital gains from our mercantile ventures."

 accademia_cimento: "Accademia del Cimento"
 accademia_cimento_desc: "The #italic Accademia del Cimento#! is a scientific society established in $FLO$ by students of Galileo. The first institution of its kind, this groundbreaking incubator of scientific development was devoted to the principles of experimentation. The society had the motto 'Try and try again' and published the #Italic Saggi#!, a book that would set contemporary standards for laboratory practice and procedure."

 tuscan_municipal_reforms: "$TUS_ADJ$ Municipal Reforms"
 tuscan_municipal_reforms_desc: "As we enter the era of absolutism and supreme centralized authority, we must reform local administration accordingly by establishing uniform procedures and transforming  local systems into instruments of central power."

 tuscan_physiocratic_reforms: "$TUS_ADJ$ Physiocratic Reforms"
 tuscan_physiocratic_reforms_desc: "By strengthening our agricultural sectors and taking better care of our people, we will undoubtedly secure a strong foundation for our newly modernized economic systems."
 
 tuscan_new_trade_system: "New $TUS_ADJ$ Trade System"
 tuscan_new_trade_system_desc: "The era of trade guild supremacy is slowly coming to an end as their influence wanes in the face of absolute centralized power. By reforming their administration and shifting much of their control to our heads of state, we are sure to increase profits."

 pis_anziani_del_popolo: "Anziani del Popolo"
 pis_anziani_del_popolo_desc: "The Council of the Elders was initially founded in an effort to pacify the rivalry between the $gherardesca_dynasty$ and $visconti_dynasty$ families. It has influenced who controls and governs the republic since it was established."

 pis_maritimes_legacy: "Maritime Republic Legacy"
 pis_maritimes_legacy_desc: "For centuries, $PIS$ was one of the dominant powers in the Mediterranean, massively influential and in control of an impressive trading network. While we may currently be but a shadow of the great $PIS$ of the past, our legacy remains. $PIS$ remembers."

 pis_the_university_of_pisa: "The University of $PIS$"
 pis_the_university_of_pisa_desc: "One of the oldest centers for higher learning in $ITA$ and indeed all of $europe$, the University of $PIS$ has a near-legendary reputation for excellence in both teaching and research."

 sie_artists: "$SIE_ADJ$ School of Painting"
 sie_artists_desc: "The art of painting has flourished in $ITA$ since the beginning of the $renaissance$, but no artists can match the sheer skill and quality of those from $SIE$. $SIE_ADJ$ art is otherworldly and elegant, with a heavy focus on the miracles performed by Biblical figures and Saints. While other artists may create works considered beautiful for the moment, the subtler style of the $SIE_ADJ$ school will ensure its works are admired for centuries to come."
 
 sie_studium_senese: "Studium Senese"
 sie_studium_senese_desc: "Considered the first publicly funded university, the University of $siena$ is the pride of the city, educating our citizens so that all may serve the nation with strength and skill."

 sie_council_priori: "The Council of Priori"
 sie_council_priori_desc: "Following a series of failed republican and royal governments, we have established a Council for the People of $SIE$, one which hopefully shall not fall to highborn maneuverings and corruption like so many before it have. Though the exact number of representatives in the Council and how they are elected is somewhat in flux, decentralizing our government in this way will prevent $SIE$ from sinking into aristocratic control ever again."

 #Generic Advances
 republican_assembly_advance: "Republican Assembly"
 republican_assembly_advance_desc: "The heart of our republic, the $republican_assembly$ is an incredibly vital institution, allowing us to be governed by noble virtue and excellence."

 #Kanem Bornu Advances 
 kbo_iron_helmet_musketeers: "$a_iron_helmet_musketeers$"
 kbo_iron_helmet_musketeers_desc: "As warfare tactics advance, so must our strategy. By adapting foreign innovations and techniques like formations, lines of fire, and new gunpowder recipes, we will surely be victorious!"
 
 kbo_fixed_military_camps: "Fixed Military Camps"
 kbo_fixed_military_camps_desc: "By establishing permanent military camps at strategic locations throughout our domain, we will ensure our army suffers fewer casualties from attrition and can be mobilized quickly when needed."

 kbo_permanent_sieges: "Kanem Siege Tactics"
 kbo_permanent_sieges_desc: "Our armies are experienced with siege machinery, but adopting mobile artillery that can maintain sustained fire would secure our victory whenever we attack an enemy's walls!"

 kbo_council_clan_heads: "Council of Clan Heads"
 kbo_council_clan_heads_desc: "Delegating administrative duties to local clan heads may mean relinquishing some of our central authority, but our advisors insist that we shall reap great benefits in return."
 
 # Saxon advances
 meissen_lion: "The Meißen Lion"
 meissen_lion_desc: "The Meißen Lion, also known as the #italic Markmeißnische Löwe#!, holds a special place in heraldry. Representing the $wettin_dynasty$ dynasty's symbol of power, an armored black lion with a red tongue gazes to the left on a golden field. Its image appears in various forms, including on painted tombstones, ensigns, helmets, coins, and seals, symbolizing the affiliation of the city of $meissen$ to the #italic Mark Meißen#! and adorning the coats of arms of numerous towns and communities. Some link it to the recolored Thuringian lion."
 a_mining_heritage: "A Mining Heritage"
 a_mining_heritage_desc: "For centuries, mining has shaped our landscape, economy, and culture. Significant $silver$ discoveries in the region have attracted miners and traders from diverse regions, fostering the Ore Mountains' growth and expanding our realm's significance and development."
 meissner_groschen: "Meißner Groschen"
 meissner_groschen_desc: "The #italic Meißner groschen#! will serve as our national currency. This coin is based on the #italic Prague groschen#!, which we will replace. This new large groschen will mark the beginning of a new era in the history of our coinage and will let us better control its influxes."
 a_resilient_soul: "A Resilient Soul"
 a_resilient_soul_desc: "Our people are truly resilient, embodying unwavering determination in the face of challenges. They weather adversity with unwavering spirit, finding strength in unity and a steadfast commitment to their shared values. Their indomitable resilience propels us forward, enabling us to overcome any obstacle that comes our way. We will always emerge stronger and more determined than ever before."
 saxon_court: "The $SAX_ADJ$ Court"
 saxon_court_desc: "The $SAX_ADJ$ Court is a pillar of Electoral $SAX$'s government, alongside civil and military administration. Court regulations define the responsibilities and daily routines of officials, while the court itself is composed of both nobles and peasants serving the ruling family in governance and administration. Traditionally, each adult member of the ruling family maintained their own household court, but we will now create a single, permanent court in our capital, attracting the finest minds in the realm."
 a_tolerant_society: "A Tolerant Society"
 a_tolerant_society_desc: "Religious infighting and intolerance plagues other lands, but we stand firm against allowing such strife to fester in our realm. Regardless of the diverse faiths our subjects hold, this nation shall be built on the strong pillars of tolerance and brotherhood, fostering a harmonious coexistence among all communities. United by a common vision, we will be forging a nation where respect and understanding flourish, paving the way for a prosperous future."
 furstenschule: "Fürstenschule"
 furstenschule_desc: "As the Reformation takes hold and the state assumes control over religious administration, a new responsibility arises for the emerging state: education, which was previously the duty of the Church. We will found princely schools at Pforta, $grimma$, and $meissen$ using former monastic properties. Thus, the state will take on a significant role in shaping the educational landscape, fostering knowledge and intellectual growth for the future leaders of $SAX$."
 bonded_by_loyalty: "Bonded by Loyalty"
 bonded_by_loyalty_desc: "Our valiant armies never waver! They demonstrate exceptional morale and loyalty, standing firm whether defending our realm or supporting allies. With indomitable spirits, they will press forward even in desperate circumstances, refusing defeat until physically unable to continue."
 meissner_porcelain: "Meissner $porcelain$"
 meissner_porcelain_desc: "$SAX$ is the first country in $europe$ to produce $porcelain$, which will bring wealth and prestige to the $wettin_dynasty$ court."
 saxon_baroque: "$SAX_ADJ$ Baroque"
 saxon_baroque_desc: "$dresden$ and $leipzig$, among other locales, have gained international recognition for being centers of $SAX_ADJ$ Baroque culture. Magnificent architecture, like the Dresdner Hof, epitomize the grandeur of $SAX$, while Johann Sebastian Bach's work has transformed $leipzig$ into a city of music and thriving highbrow culture. The region boasts unique expressions of culture, including handicrafts from the Ore Mountains and culinary traditions like the #italic Dresdner Christstollen#!."
 retablissement: "Rétablissement"
 retablissement_desc: "After tumultuous wars, a new era dawns upon $SAX$ — the remarkable $SAX_ADJ$ #italic Rétablissement#!. Amidst the ruins of our past, our nation will rise like a phoenix, rebuilding its shattered economy and charting a path toward prosperity. Driven by a blend of visionary state reforms and disciplined spending, our nation will emerge as a commercial hub.\n\nWith unparalleled administrative prowess and a strategic focus on economic growth, this resolute transformation will mark a pivotal moment in history, shaping the destiny of $SAX$ well into the future."
 saxon_industrialization: "$SAX_ADJ$ Industrialization"
 saxon_industrialization_desc: "$SAX$'s successful early industrialization is evident, with a highly developed industrial sector compared to other regions. The manufactory system, producing mainly for export, has flourished and will make $SAX$ a leading state in $GER$'s industrialization process. The emergence of smaller commercial landscapes and trade will be instrumental in promoting the region's economic growth and connections to other markets in $europe$."

 
 # Lithuanian
 land_of_many_religions: "Land of Many Religions"
 land_of_many_religions_desc: "Our people coexist with fellow men and women of many faiths. This diverse social composition is embedded in our legal frameworks and beliefs. Together, we are stronger!"

 ukrainian_farmlands: "Ukrainian Farmlands"
 ukrainian_farmlands_desc: "Ukraine, or the 'borderlands' in $slavic$ language, is a region that spreads across the southern end of our great domain. It is home to highly productive grain farms, which are vital to our continued existence and prosperity, as they supply much grain for our storage and to merchants across all of $europe$."

 migrant_opportunities: "Migrant Opportunities"
 migrant_opportunities_desc: "Mercantile opportunities and the promise of a better life are some of the reasons as to why our towns and settlements tend to receive constant waves of immigration. Many men and women relocate to our lands seeking their fortune, and their presence and contributions increase our fortune in turn."

 two_realms: "Two Realms"
 two_realms_desc: "Due to the size of our realm, our jurisdiction falls under two distinct frameworks: To the north lies the core of our territories, proudly embracing our cultural traditions and social mores. However, our southern and eastern regions often diverge to a certain degree from our central norms. To respect such diversity will strengthen our nation as well as our position on the geopolitical stage."

 chacery_slavonic: "Chancery Slavonic"
 chacery_slavonic_desc: "To help connect our people across our vast realm, we need a unified language, and require many literate members of the clergy to spread it. The development of such a language to record our history and maintain our administrative apparatus is not only a sign of national pride and prestige, but also a means of creating a distinct government, separating us linguistically and culturally from our neighbors to the east."

 supremus_dux_lithuaniae: "'Supremus Dux Lithuaniae'"
 supremus_dux_lithuaniae_desc: "If we are to defend ourselves against our aggressive $polish$ and $russian_group$ foes, we must project strength! Establishing the title of #italic Supreme Duke of Lithuania#! will decisively assert our authority, especially against the growing power of our nobility and others who seek to violate our sovereignty."

 ties_with_the_holy_see: "Holy See Ties"
 ties_with_the_holy_see_desc: "Years of negotiations with the Holy Father have resulted in our embracing $catholic$, with the blessing of our $polish$ neighbors and the Pope himself, during a turbulent and unique Christianization process. After our struggle to seek our spiritual identity subsided, it is clear that we have become a beacon of $catholic$, a shield against the heathens and heretics that threaten our society."

 patriarchate_of_lithuania: "Patriarchate of $LIT$"
 patriarchate_of_lithuania_desc: "The abolition of $romuva$, a faith embraced by our ancestors, has shaken the very foundations of $LIT_ADJ$ society. Yet, in order to secure a brighter future, we have chosen the path of $orthodox$ and fully celebrate our new identity. But if we are to be successful in that, the religious authorities of our newfound $orthodox_ADJ$ faith must maintain autonomy from foreign patriarchates in order to avoid external interference."

 columns_of_gediminids: "Columns of $gediminid_dynasty$s"
 columns_of_gediminids_desc: "The coat of arms that hangs on our banners originates from one of our most celebrated dynasties, the $gediminid_dynasty$ family. Many of their brightest have led our nation through turbulent times into ample prosperity with careful statesmanship and capable guidance. The columns of such great leaders symbolize the strong foundation and tenacity of our country and our fellow men and women."

 warlord_dukes: "Warlord Dukes"
 warlord_dukes_desc: "Over two remarkable centuries of warfare, $LIT_ADJ$ warlord dukes transformed a loose federation of tribes into a unified warrior state. They mounted fierce resistance against the aggression of $catholic_ADJ$ holy orders, while simultaneously conquering vast territories in the East. These legendary achievements continue to inspire our military leaders today."
 auksine_laisve: "Auksinė Laisvė"
 auksine_laisve_desc: "#italic Auksinė Laisvė#!, or 'Golden Liberty', is a set of laws and privileges that set the nobles of our country above other classes, and often even above the power of the Crown or the Council. This unique system spread to $LIT$ via $POL$, and is intended to increase the loyalty of the aristocracy to the Crown, as long as the monarch does not attempt to renege on their promise to uphold this extraordinary state of liberty for the nobles."
 magdeburg_laws: "Magdeburg Laws"
 magdeburg_laws_desc: "One consequence of $LIT$'s drift towards the West is the introduction of 4GER_ADJ$ city laws to many urban areas of the country. Magdeburg Laws in their unique local form govern many different economic and political aspects of national urbanization, from city planning to trade and taxation."
 magnate_estates: "Magnate Estates"
 magnate_estates_desc: "Magnates in $LIT$ are called 'little kings' for their vast estates and private armies. Defending the indivisibility of their domains and trying to maximize the profits from them, they will develop a system in many regards resembling that of ancient Roman #italic latifundia#!, wherein wealthy individuals hold large estates, often worked by slaves or tenant farmers."
 lithuanian_hussars: "$LIT_ADJ$ Hussars"
 lithuanian_hussars_desc: "Winged Hussars are the heavy cavalry of $LIT$, just as they are in $POL$. Introduced in both countries by reforms of Stephen Batory, King of $POL$ and Grand Duke of $LIT$, they will remain undefeated on the battlefields of $eastern_europe$ for more than a century."
 statutes_of_lithuania: "Statutes of $LIT$"
 statutes_of_lithuania_desc: "Statutes of $LIT$ are a set of three different legal reforms which aggregate, unify, and update the laws of the realm. Known for harsh punishments and the introduction of the death penalty, these statutes are in line with many contemporary Western penal codes. Each crime is supposed to be punished the same regardless of the class of the person committing it, but in practice, the peasants were often at a disadvantage compared to how members of other estates were treated."
 lithuanian_renaissance: "$LIT_ADJ$ $renaissance$"
 lithuanian_renaissance_desc: "$LIT$ experienced a $renaissance$ in the late 15th and early 16th centuries. Inspired by the ideas of the Reformation and influenced by the $ITA_ADJ$ $renaissance$, there was a prolific flourishing of education, arts, architecture, and literature during this era. This period will also see the creation of a written form of $lithuanian_dialect$ and, subsequently, the first works of $lithuanian_dialect$ literature."


 bavarian_legitimacy: "$BAV_ADJ$ Dukedom"
 bavarian_legitimacy_desc: "We have been granted the rulership of $BAV$ directly by the Emperor! By embellishing ourselves as the divinely-appointed protectors of $BAV$, we will ensure our legitimacy cannot be questioned."
 bavarian_imperial_knights: "$BAV_ADJ$ Imperial Knights"
 bavarian_imperial_knights_desc: "Our nobles have distinguished themselves as formidable knights in the service of the $hre$. We should nurture and scrupulously maintain these troops to ensure the survival of our ducal integrity."
 exploit_the_alpine_trade: "Trading Hubs of $BAV$"
 exploit_the_alpine_trade_desc: "Our lands are frequently crossed by merchants wishing to trade $salt$, $silver$, and $livestock$ in the rich lands to our south. We would be foolish not to take advantage of their presence, and therefore will establish bustling trade hubs in our own lands to attract their business."
 bavarian_brewing_expertise: "Skilled Brewers"
 bavarian_brewing_expertise_desc: "Our lands are rich in the crops and fresh water required to brew beer, and our people readily enjoy this abundance. Many small breweries could grow into successful businesses, with the right support."
 bavarian_culture_buildings: "$BAV_ADJ$ Cultural Institutions"
 bavarian_culture_buildings_desc: "With our homeland at the feet of the beautiful Alps, we are a destination for artists from all over $europe$, who seek inspiration in our incredible landscape. If we were to construct and support the appropriate cultural institutions, we could refine our court into a center of refinement and elegance, one that could rival even the most prestigious powers of $europe$."
 bavarian_stem_duchy: "Dreams of Unification"
 bavarian_stem_duchy_desc: "We once were ruled by $BAV$, unified in culture and allied under a single banner. We must ensure that the new $BAV_ADJ$ state is equally mighty, a home worthy of its strong and proud people."
 bavarian_zelousness: "One Faith for $BAV$"
 bavarian_zelousness_desc: "We must ensure our people remain united in their faith, and that they will not be divided by heretical thoughts."
 bavarian_hofkriegsrat: "$BAV_ADJ$ Hofkriegsrat"
 bavarian_hofkriegsrat_desc: "Establishing a council with the sole duty of advising our ruler during times of conflict will help us develop a more capable fighting force."
 bavarian_flexible_diplomats: "Practical Diplomacy"
 bavarian_flexible_diplomats_desc: "No matter if we are answering to an Imperial overlord or cozying up to a potential foreign ally, our diplomats must be prepared for everything. But only if they keep $BAV_ADJ$ interests first and foremost in their efforts will we be able to claim true success in our diplomatic maneuverings."
 foundation_of_bavarian_army: "An Army for $BAV$"
 foundation_of_bavarian_army_desc: "Only with a formidable standing army will we have the military might necessary to match our ambitions. With careful focus, we can expand it without having a ruinous impact on our state's finances."
 bavarian_coinage: "$BAV$ Coin"
 bavarian_coinage_desc: "Our realm needs a new standardized coin to serve as our national unified currency. Establishing a state-owned mint in our capital would ensure our total control over this new coinage."
 bavarian_purity_law: "$BAV_ADJ$ Purity Law"
 bavarian_purity_law_desc: "The excellent quality of our beer has been celebrated for centuries, but for our brews to achieve legendary status, we must ensure their continued prestige and superiority for all time. Several rulers in the past have created regulations and standards for the brewing of this wonderful substance; and we could use this fact as a stamp of our breweries' quality."
 

 hsa_holpfennige: "Hohlpfennig"
 hsa_holpfennige_desc: "Originally minted between the cities of $LUB$ and $HAM$, the #italic Hohlpfennig#! was a hollow currency developed as a countermeasure to rampant debasing, during an era where each mint had different standards regarding the concentration of silver on each coin. As a means of conducting transactions, the currency will smoothen our trade activities and bridge the gap between foreign markets and our merchants."
 hsa_the_cog: "The $n_hanseatic_cog$"
 hsa_the_cog_desc: "$n_hanseatic_cog_desc$"
 hsa_hanseatic_ties: "$HSA_ADJ$ Ties"
 hsa_hanseatic_ties_desc: "Our League is home to a great many cities and merchant guilds, all with their own agendas and endeavors. In order to maintain our prosperity and expand our reach, we must take a keen interest in diplomatic efforts."
 hsa_seal_of_the_hansa: "Seal of the $HSA$"
 hsa_seal_of_the_hansa_desc: "In markets across $europe$, from $london$ to $novgorod$, our merchants are famed for their affluence. Our ability to mobilize great trade fleets and bring dozens of cities into a perfect symphony of profit and exchange of commodities is second to none."
 hsa_hanseatic_shipwrights: "$HSA_ADJ$ Shipwrights"
 hsa_hanseatic_shipwrights_desc: "At a time when $europe$ is enveloped in war, with rulers desperate for expansion pressing claims in all directions, they look to us to build grand fleets that will allow them to fulfill their ambitions. Armed with centuries of accumulated shipwrighting knowledge, and some of the best timber on the continent, our ship-building process is unparalleled!"
 hsa_draft_merchant_privileges: "Draft Merchant Privileges"
 hsa_draft_merchant_privileges_desc: "The merchants who conduct business under our seal carry with them tremendous influence and purses brimming with coin. As such, solidifying their privileges in foreign and domestic markets will only further increase our capacity for profitable business."
 hsa_mastery_of_the_sea: "Mastery of the Sea"
 hsa_mastery_of_the_sea_desc: "Our maritime traditions have linked our fortunes to the mighty sea. To reap all the benefits we possibly can from our marine resources, we must learn to harness the awesome power of the sea — and to treat it with the proper deference. This will have tremendous effects on our trade activities."
 hsa_exchange_of_ideas: "Exchange of Ideas"
 hsa_exchange_of_ideas_desc: "Our traveling merchants who carry our business abroad are excellent resources of foreign knowledge. Whenever they return to our shores, they bring innovation and inspiration in their wake."
 hsa_global_reach: "Global Reach"
 hsa_global_reach_desc: "The widespread adoption of trade on a global scale has shaken the mercantile world to its core. It is now customary to do regular business with foreign traders from all corners of the world, and our treasury has benefited as a result."
 hsa_hanseatic_treasury: "$HSA_ADJ$ Treasury"
 hsa_hanseatic_treasury_desc: "A strong economy is but one result of our prosperity. With ample coin and overflowing coffers, we have established ourselves as robust and dependable creditors."
 hsa_regularized_contributions: "Standardized Contributions"
 hsa_regularized_contributions_desc: "The many entities within our League must be brought under our firm control in a bid to standardize their monthly and annual contributions to our treasury."
 hsa_reform_the_hanstag: "Reform the Hanstag"
 hsa_reform_the_hanstag_desc: "In times of troubles and evolving thought, our central institutions for assembly and deliberation must adapt to deal with emerging challenges and new paradigms."
 hsa_concept_of_mercantilism: "Concept of Mercantilism"
 hsa_concept_of_mercantilism_desc: "Over the past centuries, we have worked tirelessly to integrate our dealings into the global scale of trade. Now, more than ever, we must protect our own merchants, lest we fall victim to factionalism and external competition."
 the_hansa_bank: "The $HSA$ Bank"
 the_hansa_bank_desc: "Following our new system of contributions, we can underwrite a bank for members to use. Backed by the resources of the League, a letter of credit from the bank will be as good as cash. This, as well as other financial instruments, will give our merchants an edge over those in other countries."

 #Palatine
 pal_palatine_lion: "Palatine Lion"
 pal_palatine_lion_desc: "Originating from the dynastic coat of arms of the Wittelsbach family, the Palatine Lion is the centerpiece of our legitimacy. Displayed with a red crown, it signifies our role as the Imperial Vicar and Arch-Steward of the Holy Roman Empire. As long as the Palatine Lion is proudly displayed on our crest, our legitimacy will not come into question."
 pal_castles_on_rhine: "Castles on the Rhine"
 pal_castles_on_rhine_desc: "By erecting multiple castles in key positions along the Rhine, we will be able to exert and expand our control over both the river and the trade flowing through it."
 pal_cultivate_vineyards: "Vineyards and Orchards of the Rhine"
 pal_cultivate_vineyards_desc: "Although our territory is small, the sunny banks of the Rhine are perfectly suited to cultivate vineyards and orchards. With some effort, these could sustain our local economy by producing wine."
 pal_protection_of_exclaves: "Local Fortification"
 pal_protection_of_exclaves_desc: "By virtue of having our territories disperse, we are vunerable to attacks from several foreign powers. Constructing many fortified outposts within our lands will buy us time to raise an army and repel any attempt to take over one of our many disconnected territories."
 pal_fractured_territory: "Consolidate the Territories"
 pal_fractured_territory_desc: "Our administration is skilled in handling multiple disconnected territories without losing our grasp on them. With that, we can build a strong bureaucracy capable of handling even the most difficult tasks."
 pal_a_just_ruler: "A Mild and Calm Ruler"
 pal_a_just_ruler_desc: "The only effect of bloodshed is to cause further bloodshed. Therefore, we need to be a forgiving ruler, and reconcile with our enemies to establish a lasting peace in our territories."
 pal_heaven_of_tolerance: "Palatinate Tolerance"
 pal_heaven_of_tolerance_desc: "No matter their denominations, all $christian_ADJ$ people must be welcomed in the towns and cities of our lands. While others may decide to suppress their religious minorities, our tolerance will ensure a steady stream of immigrants into our territory, and we shall benefit from their presence."
 pal_mildness_to_the_commoners: "Forgiveness for Peasants"
 pal_mildness_to_the_commoners_desc: "When our peasantry rises up against our nobility, they unmistakably rise up against our own rule. However, we should not excessively punish those who revolt. With mild consequences, everyone will be more in alignment with our authority."
 pal_humanist_court: "Humanist Education"
 pal_humanist_court_desc: "To govern well, our rulers must receive a comprehensive education in humanist ideas. To this effect, we must hire renowned humanists for the education of our rulers and heirs, while also focusing our court on these principles."
 pal_heidelberg_catechism: "Heidelberg Catechism"
 pal_heidelberg_catechism_desc: "The Reformation has created many discussions around the nature of our faith. We should invest into a comprehensive catechism, to which our people will be able to adhere."
 pal_bilbiotheca_palatina: "Protect the #italic Bibliotheca Palatina#!"
 pal_bilbiotheca_palatina_desc: "Rich in theological scriptures of several $christian_ADJ$ denominations, the #italic Bibliotheca Palatina#! is one of our most prized possessions. Protection of the knowledge and the cultural value contained within must be a high priority, so that we are able to keep relying on its documents."
 palatinate_romanticism: "Support the Romantic Movement"
 palatinate_romanticism_desc: "A significant part of the Romantic movement is centered around $heidelberg$. We should capitalize on this phenomenon, and support these and other artists in order to bolster our global recognition."

 amazigh_slave_raids: "Amazigh Slave Raids"
 amazigh_slave_raids_desc: "Our coastal raiders provide our nation with a constant influx of captives from $europe$ through maritime raids and coastal incursions. This steady supply of enslaved labor is key to expanding our workforce and increasing our economic success."
 zenata_roots: "Zenata Roots"
 zenata_roots_desc: "Our people are descendants of the Zenata, a tribe best known for its vital wool production and skill at shepherding great herds of rams."
 mor_marabouts: "Ṣūfī Marabouts"
 mor_marabouts_desc: "Several groups of Ṣūfī teachers have made Morocco their home. We must make sure that we accommodate these holy men, and take their teachings to heart."
 trans_saharan_trade: "Trans-Saharan Trade"
 trans_saharan_trade_desc: "The caravans of the great Saharan routes trade $salt$ and other goods from $north_africa$ for $slaves_goods$ and $goods_gold$ from the Sub-Saharan kingdoms. Through these valuable avenues of coin, we will build our great legacy."
 first_fleet_of_the_med: "First Fleet of the Mediterranean"
 first_fleet_of_the_med_desc: "The great al-Muwaḥḥidūn once prided themselves upon owning one of the most formidable navies in the entire Mediterranean Sea. Our people today still possess the traditions and expertise to reignite that passion and restore our greatness across the oceans."
 slave_soldiers: "Slave Soldiers"
 slave_soldiers_desc: "To ensure a loyal corps of well-trained standing troops, we will employ disciplined slave soldiers from within our society."
 desert_power: "Desert Power"
 desert_power_desc: "Our region is inhabited by many peasants and tribal groups, who represent the lower classes of our society. Despite their relative poverty, they command great influence over trade routes that cross the barren deserts between our cities. Bringing these people under our jurisdiction, and ensuring their allegiance, will help us establish ourselves as powerful scions of the desert."
 atlantic_trade_routes: "Atlantic Trade Routes"
 atlantic_trade_routes_desc: "Successfully navigated by sailors starting from $europe$, these new maritime routes have opened the floodgates to goods and coin from both the New World and the Far East."
 foreign_politics: "Foreign Politics"
 foreign_politics_desc: "To prevail over our foes, we must establish proper diplomatic channels and official cooperation with countries that share our animosity towards them."
 saharan_gold_trade: "Saharan $goods_gold$ Trade"
 saharan_gold_trade_desc: "The $goods_gold$ mined within our territory is of superior quality, and an excellent tool with which to further spread our influence over trade routes with foreign ports."
 jaysh_armies_advance: "Jaysh Armies"
 jaysh_armies_advance_desc: "A new era in warfare is dawning, and with it comes the need for a new regiment of loyal forces. Jaysh fighters, recruited from our tribal population, provide disciplined soldiers familiar with regional warfare and the local terrain."
 black_guard: "$a_black_guard$"
 black_guard_desc: "$a_black_guard_desc$"
 shurfa_status: "Shurfā' Status"
 shurfa_status_desc: "The most revered and prestigious amongst all those who inhabit the $muslim_ADJ$ world, there are not many who can proclaim themselves descendants of the Great Prophet. We, of course, are among these blessed few."
 maghrebi_administration: "Maghrebi Administration"
 maghrebi_administration_desc: "Centuries of autonomy and our harsh environment have bred separatist tendencies among regional tribes within our borders. Maghrebi administration addresses this through creating a network of regional governors, who enforce central authority and the ruler's will while respecting local customs."
 

 barid: "Barīd"
 barid_desc: "A postal service that extends even to the farthest corners of our Empire, this institution is responsible for all communication between our capital and centers of local authority across the land."
 karimi_merchants: "Kārimī Merchants"
 karimi_merchants_desc: "Formidable traders that primarily deal in spices, these maritime giants have profited greatly from the flow of exotic goods that trail their origin as far as the shores of $india$ — and beyond."
 mamluk_soldiers: "$a_mamluk_unit_traditions$"
 mamluk_soldiers_desc: "$a_mamluk_unit_traditions_desc$"
 royal_mamluks: "The Royal Mamluks"
 royal_mamluks_desc: "The Royal Mamluks are the elite core of the Mamluk army, serving as the Sultan's personal guard. Handpicked and rigorously trained, they are renowned for their loyalty, exceptional combat skills, and unwavering dedication."
 red_sea_trade: "Red Sea Trade"
 red_sea_trade_desc: "The spice trade flowing through the Red Sea is a key source of our wealth, and we must seize full control of it. By threatening to burn down any Red Sea ports outside our authority that accept spice traders, we can capture the lion's share of this lucrative commerce. We may not win many friendships with our aggression, but we shall have gold enough to comfort us."
 mamluk_halqah: "$a_halqah_unit$"
 mamluk_halqah_desc: "$a_halqah_unit_desc$"
 reform_the_mamluk_corps: "$a_mamluk_unit_renaissance$"
 reform_the_mamluk_corps_desc: "$a_mamluk_unit_renaissance_desc$"
 kashif: "Kāshif"
 kashif_desc: "Our Sultanate is enormous, and therefore we must make wise, careful choices about its administration. To employ particularly learned individuals as local governors is a brilliant move, one that should eventually tip the geopolitical scales in our favor."
 port_customs: "Port Customs"
 port_customs_desc: "Designating our ports as official merchant zones for incoming cargo is a move that will certainly increase the mercantile significance of our territory, albeit at the expense of our neighbors and foes alike."
 masters_of_the_nile: "Masters of the Nile"
 masters_of_the_nile_desc: "The heart-vein of our Sultanate is the river Nile. Traversing our nation, its touch creates our most fertile lands, and its life-bringing waters of the river channel prosperity and ample wealth throughout our domain."
 indian_networks: "Indian Networks"
 indian_networks_desc: "Our merchants deal in goods from the markets of $alexandria$, to the shores of Aden, and as far away as $india$ itself. These extensive networks of contacts, business, and capital have positioned us at the forefront of maritime commerce."
 study_foreign_gunpowder_techniques: "Foreign Gunpowder"
 study_foreign_gunpowder_techniques_desc: "The great empires of $europe$ and the East have made groundbreaking advances in the use of gunpowder and its military applications. To study their ways and make the according improvements to our own armaments would greatly strengthen our own military."
 secure_mediterranean_ports: "Secure Mediterranean Ports"
 secure_mediterranean_ports_desc: "Our ports across the Mediterranean Sea are some of the most affluent in the entire region. Merchants from every corner of the known world travel to $alexandria$ and Cairo to deal in spices, $silk$, and precious stones. The creation of a merchant navy to facilitate and protect our maritime avenues would therefore be a wise idea."

 bohemian_imperial_standing: "$BOH_ADJ$ $HRE_ADJ$ Standing"
 bohemian_imperial_standing_desc: "Our place within the $hre$ is one of prestige, grandeur, and authority. Few members wield as much soft power as us, due to our capable diplomats and alliance networks."

 bohemian_crystal: "$BOH_ADJ$ Crystal"
 bohemian_crystal_desc: "There are very few workshops in the known world with the capacity to craft glass and crystal with the same quality and clarity as ours, let alone rival our superior production techniques."

 students_of_foreign_courts: "Students of Foreign Courts"
 students_of_foreign_courts_desc: "Members of our royal dynasties are accustomed to journeys abroad. They have spent much of their upbringing as students of illustrious courts far away from home, in the pursuit of a thorough education in matters of statesmanship."

 urbanization_decrees: "Urbanization Decrees"
 urbanization_decrees_desc: "As part of our efforts to modernize $prague$, we will issue grants encouraging prominent figures to relocate their business to the capital while offering privileges to attract skilled and wealthy foreign immigrants. This influx of talent and capital will transform our $prague$ into a thriving, cosmopolitan metropolis."
 
 

 seat_of_metropolitan_bishop: "Seat of the Metropolitan Bishop"
 seat_of_metropolitan_bishop_desc: "The $RUS_ADJ$ people need firm religious guidance. We have historically cooperated well with the Church, and expanding this relationship would benefit us all. If we can move the seat of the Metropolitan Bishop to $moscow$, we will be able to strengthen the bonds between our faith and our state."
 pomestnoe_voisko: "Pomestnoe Voisko"
 pomestnoe_voisko_desc: "By redistributing plots of confiscated lands to noble cavalrymen, we can build a new class of soldiers to defend our principality."
 strength_of_the_boyars: "Strength of the Boyars"
 strength_of_the_boyars_desc: "The Boyar class is in many ways the foundation of $RUS$, but just as we need to strengthen the Boyars, we also need to control them. We must protect seats for the Boyars in the Duma, but also to make sure that they are dependent on us to further their influence."
 zasechnaya_cherta: "Zasechnaya Cherta"
 zasechnaya_cherta_desc: "In order to withstand the constant threat of Tatar raids, our ancestors have built a line of tightly positioned and well-defended forts. As our state grows larger, we should keep expanding this 'Abatis Line' to ensure our people are always protected from foreign attacks."

 russian_artillery_yard: "$RUS_ADJ$ Artillery Yard"
 russian_artillery_yard_desc: "Superior firepower is what determines who wins the sieges of today as well as the pitched battles of tomorrow. We must build a state-of-the-art artillery yard in the heart of our country, to ensure our armies are never without cannons nor ammunition."
 life_long_conscription: "Life-Long Conscription"
 life_long_conscription_desc: "In order to feed our ever-growing armies, we should expand the terms of military service so that it becomes a lifelong commitment. This will offer social mobility to those that would otherwise lead lives in lesser occupations, and it will give us a reliable source of soldiers for our imperial endeavors."
 the_mestnichestvo_advance: "$the_mestnichestvo$"
 the_mestnichestvo_advance_desc: "$the_mestnichestvo_desc$"
 table_of_ranks: "The Table of Ranks"
 table_of_ranks_desc: "The abolishment of the Mestnichestvo was the first step toward creating a more meritocratic state bureaucracy. The Table of Ranks further codified this principle, making military advancement conditional on performance rather than noble birth."
 voivode_advance: "Voivode"
 voivode_advance_desc: "The #italic voivode#! is a military leader with regional administrative authority, defending territory and maintaining order. A voivode can be useful in overcoming the challenges posed by the limited means of communication available, as they have the authority to make crucial decisions without waiting for approval."
 
 haudenosaunee_tradition: "Legacy of Hiawatha"
 haudenosaunee_tradition_desc: "The legendary Hiawatha, renowned among the $IRO_ADJ$ people as a great speaker and leader, has set a very high precedent for what a diplomat should be. We will honor him by following his example in our diplomatic relations."
 haudenosaunee_heritage: "Fierce Warriors"
 haudenosaunee_heritage_desc: "It would be a mistake for our enemies to regard us as weak based on our diplomatic strength. Our warriors are as fierce and proud as those from any militaristic society, and underestimating them is the leading cause of death among our rivals."
 tree_of_peace: "Tree of Peace"
 tree_of_peace_desc: "The Tree of Peace is the legacy of the Great Peacemaker, and is a symbol of our commitment to unity among the different tribes, as well as a representation of the chiefs themselves."
 kainerekowa: "Kaianere'kó:wa"
 kainerekowa_desc: "We must always honor the work of Hiawatha and the Great Peacemaker, the Great Law of Peace, which united our five nations under a single purpose, and gave us our rules of governance."
 mourning_wars: "Mourning Wars"
 mourning_wars_desc: "It is a long-established tradition of our people to adopt captured warriors into our tribe. But to replenish our numbers and ensure our defensive and offensive strength, we should seek to adopt entire tribes into the $IRO$, not just individual fighters."
 warriors_unity: "Warriors Unity"
 warriors_unity_desc: "We may not be the largest tribe in terms of sheer number, but our tribal nature gives us something that others lack: unity! Our warriors fight as brothers and stand together on the field of battle. So long as we maintain this tradition, we cannot lose!"
 haudenosaunee_ambition: "Model Confederacy"
 haudenosaunee_ambition_desc: "The $IRO$ Confederacy has become a model for success. All nations around us are awestruck by our excellent rulership!"
 three_sisters: "Three Sisters Agriculture"
 three_sisters_desc: "Our land is plentiful, with many crops, but the method of cultivating maize, beans, and squash together is one of our greatest agricultural achievements. Grown together, these crops have a better output than they do when planted separately."
 maple_syrup: "Maple Syrup"
 maple_syrup_desc: "The many maple trees in our country produce great quantities of sap, which can be collected and boiled to create a delicious sweet syrup and other confections."
 stickball_game: "Stickball Game"
 stickball_game_desc: "The ancient tradition of playing the stickball game has been part of our culture for ages. Used for ritual purposes or to settle disputes, hundreds of warriors gather in a field with wooden sticks and a single ball, which must be directed towards a marked goal. This practice not only brings our people together, but keeps our warriors in prime condition."
 wampum: "Wampum"
 wampum_desc: "A mix of white and purple beads made from different kinds of shells, wampum are used for many purposes, such as recording treaties and oral histories, facilitating diplomacy, and functioning as a system of exchange in trade. Wampum appears wherever our people tread."
 shared_brotherhood: "Shared Brotherhood"
 shared_brotherhood_desc: "United in the teachings of the Great Law of Peace, our people maintain a strong sense of brotherhood and unity, despite their disparate tribal background."
 captives_in_war: "Captives in War"
 captives_in_war_desc: "We fight wars mainly to take captives, which replace our own losses. However, not all those captives need to be adopted into our tribe, and some can be used for labor instead."
 haudenosaunee_present_giving: "$IRO_ADJ$ Gift-Giving"
 haudenosaunee_present_giving_desc: "The basis of our trade interactions is represented in the form of gift exchanges. As our people come together and work for the benefit of the whole, the act of gifting is guaranteed to be followed by another gift in return."

 pochtecayotl: "Pōchtēcayōtl"
 pochtecayotl_desc: "Traders travel far afield, to provinces well beyond the reach of our authority, and even to the territories of our rivals. If these traders were to, perhaps, also serve as our eyes and ears, what secrets might we learn?"
 warrior_societies: "Warrior Societies"
 warrior_societies_desc: "Our society is remarkably dynamic, offering commoners, also known as #italic mācēhualtin#!, the path to become #italic pīpiltin#!, or noble, by exceptional military service through the #italic tlahuiztli#! honor dress rank system. This unique opportunity for upward mobility grants our people a distinct advantage over those in neighboring societies."
 chinampas: "Chinampas"
 chinampas_desc: "Proficient in terracing hills for cultivation and skilled in crafting arable land on shallow lake portions through ingenious #italic chinampas#!, our populace's remarkable agricultural abilities will significantly benefit our society."
 people_of_war: "People of War"
 people_of_war_desc: "Whether we take up arms on a search for prestige, to instill fear in our foes, to take captives for sacrifice,  or simply to acquire wealth, our people are accustomed to a continuous state of warfare, enduring its hardships with more resilience than members of other nations."
 tlahtocayotl: "Tlahtohcāyōtl"
 tlahtocayotl_desc: "We will create a system of provinces for the city-states that are integrated into our realm in an effort to centralize our power."
 calpixcayotl: "Calpixcāyōtl"
 calpixcayotl_desc: "Our tributary regions will receive appointed tribute collectors, called #italic calpixqueh#!, who will be in charge of ensuring the flow of tribute never stops. There will be a #italic calpixqui#! in the region, and another in the capital of our nation, for each tributary state."
 reformed_telpochcalli: "Reformed Tēlpōchcalli"
 reformed_telpochcalli_desc: "As we face new enemies, new military tactics have to be developed or learned. This invaluable knowledge will be taught in our #italic Tēlpōchcalli#!."
 nahuatl_domination: "$nahua_culture$ Domination"
 nahuatl_domination_desc: "The superiority of $nahua_culture$ culture is very clear, as neighboring peoples increasingly adopt it as their own. This cultural diffusion and spread of influence creates opportunities for us to extend our political control well beyond our borders."
 the_return_of_quetzalcoatl: "The Return of Quetzalcōātl"
 the_return_of_quetzalcoatl_desc: "Contact with foreigners from other continents has given us interesting new ideas about our gods. The #italic Quetzalcōātl#! prophecy unveils a reality beyond myth — a glimpse of truth. #italic Quetzalcōātl#!, 'the Feathered Serpent', will soon return and herald a transformative era, vanquishing darkness for enlightenment. Symbolizing cosmic fusion, he will bridge matter and spirit, restoring balance and elevating human consciousness."
 brave_as_hummingbird: "Brave as a Hummingbird"
 brave_as_hummingbird_desc: "The hummingbird holds a crucial role in our mythology. Linked to the god of war, Huītzilōpōchtli, it embodies fallen warriors' reincarnation and is honored for its bravery. The hummingbird will be made a new symbol for our banners, one that will inspire our soldiers to fight unto their deaths!"
 new_trade_opportunities: "New Trade Opportunities"
 new_trade_opportunities_desc: "The needs of our people have been adapting to the new markets that have opened to our traders, and we have been training our merchants in methods to maximize our earnings."
 aztec_chargers: "$AZT_ADJ$ Chargers"
 aztec_chargers_desc: "The aggressive nature of our warriors is known — and feared — beyond our borders. When battle starts, our enemies shiver in fear at the sight of our combatants charging at them with frenzy, as if they were about to be run down by the heralds of Death itself."

 chasqui: "Chasqui"
 chasqui_desc: "The #italic chasquis#! are the messengers of our state. Chosen from the fittest and most durable runners of our country, these agile men carry $quipu$ strings, messages, gifts, and other kinds of information, and deliver them to the target recipient. The spread of ideas, as well as the bulk of our diplomacy, rests on their shoulders."
 military_mita: "Military Mit'a"
 military_mita_desc: "The #italic mit'a#! is a mandatory public service system fundamental to Incan society, and forms the backbone of the military service. Every #italic ayllu#! must contribute capable men, adapted to combat in the highlands, to provide labor for state projects and military service."
 warachikuy: "Warachikuy"
 warachikuy_desc: "The #italic warachikuy#! is a holy ceremony where young men are tested in their skills, valor, and wits, as well as their physical abilities like racing, marksmanship, combat, and durability for extended lengths of sleep deprivation. Those who pass these tests with excellence are promoted to the rank of officers for our ever-growing army."
 mitma: "Mitma Obligations"
 mitma_desc: "In order to undertake great building projects in the past, our rulers had to fulfill ancient traditions by inviting every single petty chief in our empire to the capital, showering them with gifts, and holding lavish feasts. As our state grows, however, this is far from an ideal way to undertake these projects. Supplying labor and materials for construction should be the duty of each and every chief in our lands."
 quipu: "Quipu"
 quipu_desc: "A system which uses knots on a string to store information, do accounting, and perform other informational tasks. Each knot represents a number from zero to nine. The knots can also be used to refer to logograms on the same string. The knots show which syllable in the logogram to use, and by combining more strings, sentences can be formed."
 drafted_hatun_runas: "Drafted Hatun Runas"
 drafted_hatun_runas_desc: "The #italic Hatun Runas#! are the peasant class of our empire. One in fifty men are chosen for military service on their twenty-fifth birthdays, and conscripted for the next seven years. This conscription system helps us maintain a substantial professional army with superior discipline than the troops of our adversaries."
 llama_michis: "Llama Michis"
 llama_michis_desc: "Llamas have many functions in our society. They act as beasts of burden, as sacrifices, provide meat and wool, and even give us fertilizer for our crops with their dung. Controlling the breeding and use of llamas through government #italic michis#!, or herders, we ensure that the llama population is strictly monitored. This will provide an opportunity for the llama population to increase"
 inc_tambo: "Improved Tambo Way Stations"
 inc_tambo_desc: "Our road system is one of our empire's most valuable assets. To further benefit our military and administration, we will erect #italic tambo#! way stations along all the main roads. These stations will be built within a day's march of each other, and will provide shelter and carry supplies for travelers."
 adapted_incan_army: "Adaptable Incan Army"
 adapted_incan_army_desc: "Invaders from strange lands have set foot in our territory, and threaten our very existence. But our armies are adaptive; they adjust to new enemy tactics, learn to wield their very own weapons against them, and fight with an unbreakable resolve inspired by their foes."
 pukara_advance: "$pukara_building$"
 pukara_advance_desc: "$pukara_building_desc$"
 terraces_advance: "$terraces$"
 terraces_advance_desc: "$terraces_desc$"
 tambo_advance: "$tambo$"
 tambo_advance_desc: "$tambo_desc$"
 incamisana_advance: "$incamisana$"
 incamisana_advance_desc: "$incamisana_desc$"

 kor_fortresses_of_goguryeo: "Fortresses of Goguryeo"
 kor_fortresses_of_goguryeo_desc: "$korea_region$ was home to many kingdoms in the past. However, the influence of one kingdom in particular is still felt today: Goguryeo, the precursor to Goryeo. Goguryeo has left us many legacies, including its stone fortifications and castle-building techniques, which are still in use to this day."
 kor_korean_artisanry: "$korean_culture$ Artisanry"
 kor_korean_artisanry_desc: "$korea_region$ has always had artistic traditions, but art has truly blossomed since our national unification, thrusting us into a golden era of cultural achievement. Among our many accomplishments, the artisanry of our people shines as a beacon of skill and refinement."
 kor_korean_barracks_advance: "$korean_barracks$"
 kor_korean_barracks_advance_desc: "$korean_barracks_desc$"
 kor_court_poetry: "Court Poetry"
 kor_court_poetry_desc: "Our aristocracy puts great emphasis on the cultural development of their spirit and mind. Literature, such as poetry in $classical_chinese_language$, is seen as greatly valuable by the court. The nobility and ruling class alike are enthusiastic about the cultural impact of the written word."
 kor_metal_movable_type: "Metal Movable Type"
 kor_metal_movable_type_desc: "Movable type is an ancient printing technology first used by the $CHI_ADJ$ people many centuries ago. But it is the Goryeo dynasty who developed the metal form of movable type, streamlining the printing process. We can now print books with unparalleled efficiency."
 kor_gunpowder_engines: "Gunpowder Engines"
 kor_gunpowder_engines_desc: "Our forces have been aware of gunpowder's tactical value for centuries. Through reverse-engineering $CHI_ADJ$ designs and the innovations of Choe Museon, we have mastered both gunpowder production and the construction of machines that employ it for military use."
 kor_hwachas_advance: "$a_hwacha$"
 kor_hwachas_advance_desc: "$a_hwacha_desc$"
 kor_early_turtle_ship_advance: "$n_early_turtle_ship$"
 kor_early_turtle_ship_advance_desc: "$n_early_turtle_ship_desc$"
 kor_korean_gunnery: "$korean_gunnery$"
 kor_korean_gunnery_desc: "As gunpowder technology advances, so does our ingenuity, and as a result we have devised a new defensive system. Although simple in concept and execution, installing cannons in our fortifications will increase their defensive capabilities tremendously."
 kor_hangeul_alphabet: "The Hangeul Alphabet"
 kor_hangeul_alphabet_desc: "The $korean_language$ language is so fundamentally different from any form of $chinese_language_family$ that the use of $chinese_language_family$ characters renders all except the most highly educated people illiterate. Our new alphabet is more scientific, and will allow all our people to be able to read and write in their own language."
 kor_grand_code: "Grand Code for State Administration "
 kor_grand_code_desc: "To ensure proper, stable governance, we must first codify exactly how the government will work. This will be the basis for our nation's first written constitution."
 kor_border_defense_council: "Border Defense Council"
 kor_border_defense_council_desc: "Our borders are constantly threatened, both by barbarians from the north and pirates from beyond the seas. To ensure our armies are always ready to meet every threat with swiftness, we will establish a council of officers dedicated to controlling and securing our borders."
 kor_panokseon_advance: "$n_panokseon$"
 kor_panokseon_advance_desc: "$n_panokseon_desc$"
 kor_korean_cannon: "The $korean_culture$ Cannon"
 kor_korean_cannon_desc: "Although we are already quite experienced at using gunpowder and cannon, we should not stop making technological advancements. By developing smaller, but more durable cannons, as well as inventing more efficient methods of reloading, we will revolutionize our artillery and greatly benefit both our army and our navy."
 hyanyak_system: "Hyangyak System"
 hyanyak_system_desc: "Agriculture is the bedrock of our economy, and therefore efficient village management is paramount. To this end, we will implement the #italic hyangyak#! system, which establishes self-governance for villages. These agreements establish behavioral standards, dispute resolution regulations, and other civil procedures aimed at creating stable, self-reliant communities."
 kor_geobukseon: "Geobukseon"
 kor_geobukseon_desc: "Defending our coastlines is vital to our survival, and as a result of this vigilance, we have developed the ingenious 'turtle ship'. These heavily armored behemoths will ensure that no enemy ship penetrates our coastal holdings."
 kor_hopae_system: "The Hopae System"
 kor_hopae_system_desc: "The #italic hopae#! is an identity tag system requiring all $korean_culture$ people to carry proof of their name, birthplace, status, and residence. This allows authorities to quickly verify identities, and to track a person's movement, if needed."
 kor_daedongbeop: "Daedongbeop"
 kor_daedongbeop_desc: "A new set of reforms that will gradually introduce previously ignored improvements into the tax system. The tribute tax levied against households will be replaced with a unified tax on arable land, and the tax on goods will be limited to a quota which lets enterprising peasants and wholesalers make and sell surplus goods. This will result in lower taxes for the peasantry, increased revenues for the state, and an overall rise in commerce."

 natural_seamanship: "Natural Seamanship"
 natural_seamanship_desc: "With the growth of our fishing industry, we have also seen a corresponding expansion in the number of sailors in our realm. We should take advantage of this and recruit some of them to our navy, as seamanship is just as important as the ship itself."
 call_of_our_forefathers: "The Call of our Forefathers"
 call_of_our_forefathers_desc: "Long ago, our illustrious forefathers sailed forth and established colonies in the North. Our sagas even tell us that they reached a new world and established Vinland. We must follow in their footsteps."
 pioneer_spirit: "Pioneer Spirit"
 pioneer_spirit_desc: "In days gone by, our people would brave the high seas to establish colonies on distant shores. Let us rekindle this adventurous spirit in our people so that they sail forth again!"
 nor_shipbuilding: "Military Shipbuilding"
 nor_shipbuilding_desc: "The expansion of our fishing industry has also led to an expansion in shipbuilding. We have a ready pool of trained shipwrights at hand to expand our own production process."
 write_new_sagas: "Write New Sagas"
 write_new_sagas_desc: "Keen minds preserve knowledge\nKnown from ages past\nSung in the sundown\nSagas are our inheritance\nEncouraged by the establishment\nEach country will have its own"

 expansive_policies: "Expansive Policies"
 expansive_policies_desc: "$brandenburg_area$'s infertile, sandy soil has earned it the unflattering nickname 'Sandbox of the $hre$.' Such poverty spurred the margraves to aggressively expand, pursuing claims to neighboring territories. These conquests have made our country much more culturally diverse than the rest of the Empire."
 northern_march: "The Northern March"
 northern_march_desc: "In the early days of the $hre$, the $brandenburg_area$ area was settled and governed by $slavic_group$ tribes, until the Emperor created the Northern March to subjugate and fortify the area. Over time, this Northern March evolved into $brandenburg_area$, becoming one of the most important regions in the $hre$."
 divide_estates: "Divide the Estates"
 divide_estates_desc: "United, the three estates form an effective block against the power of the ruler. To consolidate our control, we must systematically leverage the nobility against the other estates."
 soldiers_fortune: "Soldiers of Fortune"
 soldiers_fortune_desc: "Our lands are sparsely populated, for the most part, and surrounded by enemies. The necessity for more robust defenses has prompted us to hire soldiers from foreign lands, who will fight under our banner for a price."
 iron_tooth: "Iron Tooth"
 iron_tooth_desc: "Enhancing our court's control over the Margraviate's lands will earn our ruler the moniker #italic Iron Tooth#!, as if we bit it like an attack dog. Our rule will leave a mark on our nation, a mark which will instill a sense of pride and loyalty in even the lowliest peasant in $brandenburg_area$."
 kammergericht: "Found the Kammergericht"
 kammergericht_desc: "In order to regularize control of the Mark of Brandenburg, we will replace local common law with Roman law. We will further regulate justice by moving the Supreme Court from the court of the Elector, who is prone to moving around, to a fixed central location. This will simultaneously improve justice and curb the power of local magnates."
 margrave_council: "Geheimer Rat für die Kurmark"
 margrave_council_desc: "The authority of the Margrave is greatly threatened by the ever-increasing power of our Estates. The Estates are of great benefit to our nation, but the threat they represent to our base of power necessitates the creation of a new council, one which reduces the very real power that the estates hold over our nation into more of an advisory position for the Margrave. This way, we may continue to enjoy the benefits of our Estates while having fewer concerns about their needs."
 religious_toleration: "Religious Toleration"
 religious_toleration_desc: "Stability in our home regions is the key to our success elsewhere. Expanding outwards while fostering religious tolerance, we not only improve stability at home, but we also make our realm a haven for those fleeing persecution elsewhere."
 army_professionalism: "Army Professionalism"
 army_professionalism_desc: "As we learned from the Persian invasion of Greece so long ago, a small army can defeat a larger one — as long as they have iron discipline and the proper training. We must elevate our own army to meet these extraordinary standards."
 soldier_king: "The Soldier-King of $PRU$"
 soldier_king_desc: "Most states are countries that have an army. $PRU$, on the other hand, is an army that has a country! The many Kings of $PRU$ were soldiers as much as monarchs; each concluded their reign not only by reforming the state but also leaving a lasting impact on the army."
 auftragstaktik: "Auftragstaktik"
 auftragstaktik_desc: "#italic Auftragstaktik#!, or 'Mission Tactics'. is a system by which our subordinate leaders are informed about the objectives of the battle or the war by their commanders, and then are allowed to act on their personal initiative. This system allows our battalions to develop a tighter relationship with their leaders, yielding better results."
 goose_step: "The Goose Step"
 goose_step_desc: "Although it looks rather odd, the 'goose step' is specifically designed to facilitate our men holding their line as they advance towards the enemy. This provides our armies with a tangible advantage on the battlefield."


 mounted_people: "Mounted People"
 mounted_people_desc: "Our people have thrived on horseback for centuries, and these majestic creatures are an integral part of our culture and power. We take immense pride in our unrivalled skills in our equine husbandry and talent for mounted archery, both of which contribute to our supremacy on the battlefield."
 falconry_mastery: "Falconry Mastery"
 falconry_mastery_desc: "Deeply rooted in our culture, falconry represents a bond forged between our people and these magnificent birds of prey, and we have finely honed our skill in this ancient art. Our falconers are renowned for their ability to train these majestic raptors to hunt and capture prey."
 rich_lands: "Rich Lands"
 rich_lands_desc: "Our lands are rich with fertile soil and abundant resources from the prairies to the dense forests, ready to be transformed by our hardy men and women. We will use every tool at our disposal to wisely manage the land we have been gifted, and thereby bring prosperity to every household."
 jurchen_honor: "Jurchen Honor"
 jurchen_honor_desc: "Our people are enthusiastic about feats of strength and other demonstrations of skill, as each Jurchen feels that by showing off their abilities they earn the respect of their peers. This well-earned self-respect makes our warriors immensely brave, ready to fight anyone."
 unite_the_tribes: "Unite the Tribes"
 unite_the_tribes_desc: "Since the birth of our nation, the Jurchen people have been unified and divided into multiple tribes and alliances, and not always friendly ones. This dynamic has been constant for as long as we can remember — as has the urge to unify all our tribes under a single banner. The time has come to satisfy this long-cherished desire!"
 leader_under_sky: "A Leader under the Sky"
 leader_under_sky_desc: "Our people have been divided for too long, and we need someone strong enough to unite them and make the world tremble at our feet. The Sky will direct the acts and thoughts of this leader, and guide us to a bright future."
 foraging_our_way: "Foraging our Way"
 foraging_our_way_desc: "We are hunters and live in communion with nature, even those of us dwelling in cities. It is in our blood to find the correct path in a dark forest; to know which of Nature's gifts to take with us. This wisdom lets us survive everywhere without difficulty."
 deliberative_council: "Deliberative Council of Princes and Ministers"
 deliberative_council_desc: "Originally called the 'Council of Deliberation', this body evolved from informal institutions that promoted collaborative governance among the leaders of the realm. The Council's structure has been transformed, focusing on collective aristocratic governance and policy deliberations, mainly in foreign and military affairs. Membership is restricted to military leaders from outside the imperial clan, ensuring elite participation while maintaining the ultimate authority of the ruler."
 manchu_script: "Manchu Script"
 manchu_script_desc: "The Manchu alphabet has emerged, combining Classical $mongolian_language$ characters with Jurchen phonetics. This unique writing system facilitates left-to-right vertical column writing. With diverse letter forms and contextual adaptability for initial, medial, final, and isolated positions, it preserves the most subtle nuances of our language."
 the_eight_banners: "The Eight Banners"
 the_eight_banners_desc: "The Eight Banner System is the core of our society and military. Through hereditary membership and grants of land and income, the Banners are granted elite status, and for good reason — from the conquest of our neighbors to future campaigns, our dominance depends on their might."
 a_new_dawn: "A New Dawn"
 a_new_dawn_desc: "Our nation has been reborn. The old ways of living are gone, like dreams melting into the morning light. It is time for us to face the world as a fully modernized nation."
 manchu_reborn: "Manchu Reborn"
 manchu_reborn_desc: "As our nation has undergone fundamental transformations, so will our army. The world has opened itself to us, and new challenges will appear on the horizon. If we want to survive in this new paradigm, we have to be ready to act."

 inigo_architecture: "Palladian Architecture"
 inigo_architecture_desc: "The architectural innovations made by Inigo Jones will undoubtedly have a significant impact on future generations of architects. His promotion of classical architecture and his priority on proportion and harmony are considered hallmarks of the neoclassical movement in $ENG$."
 sailing_and_fighting_instructions: "Blake's Sailing and Fighting Instructions"
 sailing_and_fighting_instructions_desc: "Robert Blake has written several sets of rules and regulations that resulted in sweeping naval reforms. These include new tactics for blockades and landings, as well as adoption of the single line ahead battle formation."
 coke_smelting: "Coke Smelting"
 coke_smelting_desc: "The invention of coke smelting, specifically its application in $iron$ and $steel$ production, is closely tied to the Industrial Revolution. $iron$ and $steel$ are currently produced using traditional methods like charcoal smelting, whereas this new method will result in improved output and reduced maintenance costs."
 water_frame: "Water Frame"
 water_frame_desc: "The water frame is a spinning frame used in the textile industry to produce cotton thread. This innovation will contribute to the establishment of large textile factories powered by water wheels."
 
 fortress_church_advance: "$fortress_church$"
 fortress_church_advance_desc: "$fortress_church_desc$"
 saquiyah: "Sāqiyah"
 saquiyah_desc: "The $saquiyah$ is a mechanical device designed to ease the transportation of water to higher elevations. Also known as the #italic Persian wheel#!, #italic tablia#!, #italic rehat#!, and #italic tympanum#!, the wheel is crucial in the irrigation systems in areas with little to no flowing water."
 sepak_takraw: "Sepak Takraw"
 sepak_takraw_desc: "Having been practiced all over $south_east_asia$ for a long time since its adaptation from the ancient $chinese_group$ #italic Cùjū#!, and also known as #italic Sepak Raga#!, #italic Takraw#!, #italic Chinlone#!, or #italic Sipa#! depending on the country, #italic $sepak_takraw$#! is not just a game. Although the objective is to kick a ball between players and keep it in the air, it is also a way to have regular physical exercise, and thus played not only for entertainment but as military training for the army."
 three_teachings: "Three Teachings"
 three_teachings_desc: "The $three_teachings$ are a philosophy originating from $CHI$ which combines the teachings of $SECT_CONFUCIANISM_NAME$, $SECT_DAOISM_NAME$ and $buddhist$ into a harmonious, singular teaching. $SECT_CONFUCIANISM_NAME$ represents the ideology of the law while $SECT_DAOISM_NAME$ is the worldview of the radical intellectuals. These two opposite ends of the philosophical spectrum would then be connected with the philosophies of $buddhist$."
 #INDIAN ADVANCES
 dlh_origin_of_hindustani: "Origin of $hindustani_language$"
 dlh_origin_of_hindustani_desc: "The $hindustani_language$ language developed from Apabhramsa — a Middle Indo-Aryan language — and emerged as the contact language of $DLH$. As $hindustani_language$ has influences from $persian_language$, $arabic_language$, and Turkic but also Old Hindi, diplomacy with the $muslim_ADJ$ world and the $hindu_ADJ$ world becomes an uncomplicated task."
 dlh_indo_persian_culture: "Indo-Persian Culture"
 dlh_indo_persian_culture_desc: "$persian_language$ has been the dominant language of the court ever since the first inception of the $DLH_ADJ$ Sultanate. As such, the influence of $persian_language$ has synthesized with local Indian cultures."
 dlh_turkic_conqueror_roots: "$turkic_group$ Conqueror Roots"
 dlh_turkic_conqueror_roots_desc: "Although we call $india$ our home, the ancestors of our state were of $turkic_group$ origins. Their early successes as conquerors and rulers from the days of the $mamluk$ dynasty, as well as the achievements of the following Khalji dynasty, inspire our military and diplomats alike to push the borders of $DLH$ into every corner of $india$."
 dlh_revert_ghiyath_reforms: "Revert Ghiyath's Reforms"
 dlh_revert_ghiyath_reforms_desc: "The foolish economic decisions of Ghiyath al-Din have brought nothing but financial ruin to the state of $DLH$. We must revert his madness and restore the usage of gold and silver for our coins."
 dlh_restore_the_delhi_empire: "Restore the Greatness of $DLH$"
 dlh_restore_the_delhi_empire_desc: "The $DLH_ADJ$ Sultanate once encompassed nearly all of $india$. It must rise again!"
 dlh_reintegrate_former_provinces: "Re-integrate Former Provinces"
 dlh_reintegrate_former_provinces_desc: "The once vast $DLH_ADJ$ Sultanate has lost most of its former possessions, but we have not forgotten the means of administering them. As we work towards restoring our past glory, we will remind local rulers of their duties to the Sultan."
 dlh_textile_innovation: "Innovative Textile Production"
 dlh_textile_innovation_desc: "The thriving textile industry in $DLH$ makes our nation a hotspot for related technological innovations. As early adopters of the cotton gin and worm gear roller, we know the importance of staying ahead of the curve in these matters. We must now ensure that the spinning wheel is adopted as widely as possible."
 dlh_afghan_nobility: "$afghan_culture$ Nobility"
 dlh_afghan_nobility_desc: "Much of the $DLH_ADJ$ nobility is drawn from the ranks of the $afghan_culture$ community, a people with a long history of conquest and rule in northern $india$. Though at times a political hindrance, their martial skills are beyond question."
 dlh_grand_trunk: "Protect the Grand Trunk Road"
 dlh_grand_trunk_desc: "The Grand Trunk Road runs from $kabul$ in Afghanistan to the coast of $bengal_area$. Many of the most important trading cities along its route are part of our empire, and so it falls to us to ensure that the road is well maintained and free of banditry."
 dlh_cosmopolitan_religions: "Cosmopolitan Religions"
 dlh_cosmopolitan_religions_desc: "$india$ is a massive subcontinent with several religions present. In order to ensure stability within our realm, we should expand the rights of the different faiths, and secure the loyalty of their worshippers."
 dlh_revive_the_tughlaq_architecture: "Tughlaq Architectural Revival"
 dlh_revive_the_tughlaq_architecture_desc: "During the height of the $tughlaq$ dynasty and the most stable period of our state, great architects and artists of grand vision constructed mosques and tombs in the unique Tughlaq style. As the decades went on and our power was challenged by internal issues, the resources for maintaining this architecture faded. It is time to revive it, and re-establish $DLH$ as an empire of art and wonders."
 dlh_throne_of_india: "Indian Throne"
 dlh_throne_of_india_desc: "For centuries, every great Indian empire has been ruled from $delhi$. It is the seat of conquerors and our birthright. All must know that $delhi$ is once again home to the rightful ruler of all $india$!"
 dlh_hindustani_identity: "$HIN_ADJ$ Identity"
 dlh_hindustani_identity_desc: "Foreign ideas of nationalism and cultural identity have reached $india$. While the cultural diversity of $india$ will remain high, it is clear that our geography, as well as the values of $muslim$, give us all a sense of unity in the form of a $HIN_ADJ$ identity."

 vij_city_of_victory: "City of Victory"
 vij_city_of_victory_desc: "$vijayanagar$ — the 'City of Victory' — is the heart of our state, and will one day become the heart of the entire $hindu_ADJ$. Let it shine as a beacon of culture and tradition even as it fends off the $muslim_ADJ$ invaders!"
 vij_an_army_for_city_of_victory: "An Army for the City of Victory"
 vij_an_army_for_city_of_victory_desc: "For the City of Victory to be worthy of its name, we must have an army that can bring about these namesake triumphs. We will ensure our troops are well-trained and take great pride in their service."
 vij_arab_horses: "Arabian Horses"
 vij_arab_horses_desc: "Horses from $arabia_region$ are far superior to our local breeds. We will use our trade connections to ensure that we have a steady supply for our military."
 vij_first_indian_artillery: "First Indian Artillery"
 vij_first_indian_artillery_desc: "The military application of gunpowder is not yet widespread, but it has the potential to mold the future of warfare. We must explore the utility and benefits of gunpowder."
 vij_the_bunds: "The Bunds"
 vij_the_bunds_desc: "Our society is built on agriculture in the rather arid $karnakassala_area$ area. The #italic bunds#!, also called #italic anecut#!, provide our cities and fields alike with much-needed fresh water."
 vij_adroit_diplomacy: "Adroit Diplomacy"
 vij_adroit_diplomacy_desc: "The numerous invaders of our $hindu_ADJ$ people have shown time and time again the same weakness: the tendency to fight amongst themselves. We must be ready at all times to exploit this to our own ends."
 vij_promotion_of_trade: "Promotion of Trade"
 vij_promotion_of_trade_desc: "Our territory is situated on one of the key trade routes from East to West. We must ensure that our ports are safe and secure so that visiting captains will land there... giving us the opportunity to tax them."
 vij_carnatic_music: "Carnatic Music"
 vij_carnatic_music_desc: "We must resist the $muslim_ADJ$ invasion on all fronts. The musical traditions of the Northern States are already showing signs of foreign influence. This is blasphemy, because we all know that music is a divine art form that originated with the Devas and Devis themselves. We will show the $hindu_ADJ$ people that we are committed to defending this holy art form."
 vij_cultural_integration: "Cultural Integration"
 vij_cultural_integration_desc: "The cultural diversity of $india$ is one of our defining traits. By allowing our various settlements to rule by their own customs, we will assure their loyalty and integration into our society."
 vij_rule_in_accord_with_dharma: "Rule According to Dharma"
 vij_rule_in_accord_with_dharma_desc: "#Italic Dharma#! is a major pillar of our religious and social values. Our state can only be just and virtuous if our rulers themselves embody and live in accord with dharma."
 vij_harsh_penal_code: "Harsh Penal Code"
 vij_harsh_penal_code_desc: "Harsh punishments — including being put to death — are how we uphold law and order in this society. By establishing and strictly enforcing a harsh penal code, we ensure criminals fear the consequences of their actions, creating stability through the certainty of punishment."
 vij_decentralized_rule: "Decentralized Rule"
 vij_decentralized_rule_desc: "As our state grows, so do our administrative burdens on the government and the risk of revolt. To counteract this, we shall establish a system of decentralized rule, where settlements can manage their own minor issues, only seeking intervention from the central court for severe matters."
 vij_indian_throne: "Indian Throne"
 vij_indian_throne_desc: "$india$ has been subject to $muslim_ADJ$ threats for far too long. Heathen empires claim their rule from $delhi$ in the north, yet their beliefs and government are in direct opposition to what our people want. No, a new seat of power must be established — and $vijayanagar$ shall be the new Throne of $india$!"
 #pandya advances
 tnk_legitimate_rule: "Ancient Roots"
 tnk_legitimate_rule_desc: "Our ancestors ruled the lands of $tamil_land_area$ for centuries. In these times when we are dominated by foreign invaders, we should rely on our ancient connections to this land to justify our rule."
 tnk_resist_invaders: "Expert Resistance"
 tnk_resist_invaders_desc: "Our troubled history records both victories and crushing defeats. If we want to endure and dominate as a significant power once more, we must develop a thorough understanding of how to best utilize our native terrain to delay and stall hostile armies until we can mount a direct resistance."
 tnk_pearls_of_india: "Pearl-Diving Expertise"
 tnk_pearls_of_india_desc: "Our people have developed an outstanding skill for diving for and harvesting pearls along our coasts. While this has clear economic benefits, the natural affinity our people have for water makes them excellent and easily-trained sailors, granting us an edge against our seafaring foes."
 tnk_expertise_in_conflicts: "Hardened by War"
 tnk_expertise_in_conflicts_desc: "Throughout our turbulent history, we never wavered in the face of conflict and insurmountable odds. We need to weaponize this determination, and use it to instill a sense of fervor into our people that will inspire them to fight harder than ever."
 tnk_imperial_legacy: "Imperial Pandyan Legacy"
 tnk_imperial_legacy_desc: "The lands of southern $india$ have long endured the incursions of foreign invaders and upstart warlords looking to establish their own domains. We must use the grand history of our ancient dynasty to lay claim to this land, as only we can bring stability and peace back to our rightful territory."

 paik_system_advance: "$paik_system$"
 paik_system_advance_desc: "$paik_system_desc$"
 paik_regiments_advance: "$a_paik_infantry$"
 paik_regiments_advance_desc: "$a_paik_desc$"
 advanced_paik_system_advance: "Advanced Paiks"
 advanced_paik_system_advance_desc: "$a_late_paik_infantry_desc$"
 baghlah_advance: "$n_baghlah$"
 baghlah_advance_desc: "$n_baghlah_desc$"

 bng_bengali_vassal_system: "$BNG_ADJ$ Vassal System"
 bng_bengali_vassal_system_desc: "During the reign of $DLH$, the $bengali$ people served their overlord as productive vassals. The $DLH_ADJ$ system shall serve as the foundation for our own vassal systems for the years of $bengali$ sovereignty to come."
 bng_bengali_paik: "$BNG_ADJ$ Paik"
 bng_bengali_paik_desc: "The #italic paiks#! are the backbone of our military. While other states have the Paik System active and use paiks as their general levies, our state maintains smaller, but very well-organized paiks, and provides them with sufficient military support."
 bng_bengali_architecture: "$bengali$ Architecture"
 bng_bengali_architecture_desc: "A mixture of ancient urban architecture, $muslim_ADJ$ engineering influences, and traditional $bengali$ roof-building techniques, the unique $bengali$ architectural style is used for religious and cultural buildings of all kinds. Due to our expertise in this style, constructing such buildings is significantly easier and more affordable for us than other nations."
 bng_habshi_generals: "Habshi Generals"
 bng_habshi_generals_desc: "Abyssinian slave-soldiers play a significant role in our military as elite infantry. Those who excel as leaders shall be given greater levels of command, while those who demonstrate exceptional loyalty shall make up the palace guard."
 bng_war_elephants: "War Elephants"
 bng_war_elephants_desc: "Although slow, the maneuverability of elephants in the riverine terrain of our country is crucial to quickly resupplying our military. Additionally, war elephants will aid our troops on the battlefield with their imposing stature and terrifying strength."
 bng_rupees: "Minting of Rupees"
 bng_rupees_desc: "The lack of a widely adopted standardized currency is stunting our commercial development. As one of the foremost economic powers on the subcontinent, we are in a good position to begin minting a new silver coinage with standard weights, which we shall call the #italic rupee#!."
 bng_bengali_traders: "$BNG_ADJ$ Traders"
 bng_bengali_traders_desc: "The $indian_ocean_region$ connects our local markets with those of $south_east_asia$ and $china$. We shall therefore greatly emphasize maximizing our presence in these markets via sea routes, and through this increase our trade profits."
 bng_bengali_poetry: "$bengali$ Poetry"
 bng_bengali_poetry_desc: "The written word is one of the most influential and enduring forms of art. $bengali$ poetry shall tell the tales of epic conquerors, relatable dramas, and engaging philosophical questions, all of which shall further the spread and reputation of $bengali$ culture."
 bng_religious_pluralism: "Religious Pluralism"
 bng_religious_pluralism_desc: "$india$ is home to many religions: $hindu$ for the majority, $muslim$ as the preferred faith of the ruling classes, and a few remarkable minor religions such as $buddhist$ and $jain$ amongst the working minorities. Promoting one religion over another will cause inevitable chaos and unrest. Thus, we should aim for religious pluralism, and neither favor nor discriminate against any religion in our state."
 bng_artillery_corps: "Artillery Corps"
 bng_artillery_corps_desc: "Cannons are an impactful asset to military campaigns. We must ensure an efficient artillery corps that specializes in dealing damage to the enemy's rows before they even start to clash with our soldiers on the field."
 bng_bengali_trade_fleet: "$BNG_ADJ$ Trade Fleet"
 bng_bengali_trade_fleet_desc: "The $bengali$ trade fleet brings exotic goods from foreign lands, as well as precious $goods_gold$ and $silver$, to the markets of the Ganges Delta. Our merchants are well renowned in far-flung parts of the world, thanks to our impressive trade fleet."
 bng_shipbuilding_industry: "Shipbuilding Industry"
 bng_shipbuilding_industry_desc: "Maritime trade is vital to our state. Our trade and our warships are some of the most important aspects of our economy, and therefore we focus heavily on supporting the shipbuilding industry."
 bng_bengali_industrialization: "Industrialized Muslin Production"
 bng_bengali_industrialization_desc: "$BNG$ is uniquely situated in $india$ to start a revolution unlike any seen before. Muslin — the special cotton fabric $bengali$ spinners are famous for — is a prime trade good for industrialization. We stand poised to exploit new developments in our already world-class textile industry. Let us begin an industrial revolution!"

 raj_militaristic_society: "Militaristic Society"
 raj_militaristic_society_desc: "There is almost no division between civil and military society among the Rajputs. Our nation is a host, defined by its people rather than by the land we control, and its people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands."
 raj_combat_training: "Combat Training"
 raj_combat_training_desc: "Every soldier is trained for battle, but our people start combat training at a much younger age, granting them skills surpassing those of other green soldiers."
 raj_clan_loyalties: "Clan Loyalties"
 raj_clan_loyalties_desc: "The influence of our clan extends far beyond our own borders. We are able to draw from other Rajput groups from all over northern $india$ when filling the ranks of our armies."
 raj_monumental_architecture: "Monumental Architecture"
 raj_monumental_architecture_desc: "What purpose does victory serve if there is nothing to immortalize our achievements? Monuments, such as an awe-inspiring Tower of Victory, shall be erected, so future generations will know of our greatest battles and be appropriately inspired."
 raj_marwari_horses: "Marwari Horses"
 raj_marwari_horses_desc: "Like their masters, Rajput cavalry horses are meticulously trained to perform on the field of battle. It is said that a Marwari horse will only leave the battlefield under one of three conditions - victory, death, or when carrying a wounded master to safety. By taking good care of these divine beings, we will ensure the everlasting dominance of our horsemen on the battlefields of $india$."
 raj_reorganized_rajput_regiments: "Reorganized Rajput Regiments"
 raj_reorganized_rajput_regiments_desc: "Traditional clan structures are an excellent foundation for a modernized regimental system. Existing hierarchies based on kinship and unconditional loyalty can be easily translated into an organized and formal chain of command."
 raj_martial_smiths: "Martial Smiths"
 raj_martial_smiths_desc: "Wars are not only won through tactics and bravery, but also through weaponry. Our blacksmiths shall forge the finest martial weapons for our warriors to wield in defense of the Rajput people."
 raj_fortress_architecture: "Fortress Architecture"
 raj_fortress_architecture_desc: "The rise of $DLH$, and the invading $muslim_ADJ$ warriors of the past, were wake-up calls. We must always be prepared for foreign invaders, and thus, we must hire the most skilled architects to design impregnable forts throughout our realm. The immensely long walls that will be needed to protect our land make this an ambitious project, but our determination to defend our people shall ensure that it is done."
 raj_expanded_artillery_arm: "Expanded Artillery Arm"
 raj_expanded_artillery_arm_desc: "Sieges are what win wars. We must experiment with ways of creating bigger and better cannons to bring down the many forts of our enemies, both within $india$ and outside it."
 raj_the_purbias: "The Purbias"
 raj_the_purbias_desc: "The Rajputs have spread themselves throughout northern $india$ in their pursuit of glory. The #italic Purbias#!, elite Rajput soldiers who venture as mercenaries, are renowned for their combat ability, and as such spread our fearsome reputation."
 raj_mandatory_firearm_drilling: "Mandatory Firearm Drills"
 raj_mandatory_firearm_drilling_desc: "Many Rajput soldiers are experts in the use of personal firearms. We should put these hardened veterans to work training the next generation of soldiers, rather than risking the loss of their expertise in battle. All of our soldiers must be drilled in firearms tactics before they are expected to meet our enemies on the front line."
 raj_painting_school: "Rajput Painting School"
 raj_painting_school_desc: "Rajput painters already have an excellent reputation, but it could be even better. We must encourage our artists to develop their skills and add to the glory of our dynasty by creating a school of painting particular to our state."
 raj_rajput_resistance: "Rajput Resistance"
 raj_rajput_resistance_desc: "Rajput poet-musicians tell stories of our people's many battles against foreign invaders, and how our ancestors would rather die than admit themselves defeated. We must encourage this spirit of unity, and give our musicians reason to write new ballads of bravery in the face of death."
 raj_martial_ethos: "Martial Ethos"
 raj_martial_ethos_desc: "The upbringing and traditions of Rajput warriors ensure a wide base for recruiting officers to lead our armies. In order to capitalize on this, we should formalize career opportunities and advancement paths to encourage these promising young fighters to serve as officers in our forces."

 npl_the_divya_upadesh: "The Divya Upadesh"
 npl_the_divya_upadesh_desc: "The #italic Divya Upadesh#! lays out nine principles that form the core of political and national life in $nepal_area$, as well as guidelines for successful foreign policy. It encapsulates centuries of $nepali_group$ thought on governance, war, and peace. Following these principles, $nepal_area$ shall be able to avoid the subversion of nearby empires and marauding foreigners."
 npl_gurkhas: "$a_gurkha$"
 npl_gurkhas_desc: "$a_gurkha_desc$"

 ori_bulwark_of_the_hindu: "Bulwark of the $hindu$"
 ori_bulwark_of_the_hindu_desc: "The $muslim_ADJ$ faithful have invaded $india$ and subjugated many $hindu_ADJ$ residents under their gruesome rule. Yet, $ORI$ stands unflinching against the warriors of $muslim$. We are the bulwark of $hindu$, and we shall defend our traditions and culture against any foreign invader!"
 ori_anka_year_system: "Anka Year System"
 ori_anka_year_system_desc: "The #italic Anka#! system is our method of documenting the regnal years of our rulers. Years ending in 6 or 0 are skipped, except for year 10, which is retained. The count begins at year 2, not year 1, and always starts on the #italic Sunia#!, our fiscal new year."
 ori_lord_of_elephants: "Gajapati"
 ori_lord_of_elephants_desc: "Horses are not native to $ORI$, and the lands here are unsuitable for raising them. Our jungles are, however, famously teeming with elephants. In the dense jungles of Eastern $india$, well-executed tactical cooperation between elephants and infantry can be just as deadly as a cavalry. Let us further increase the size of our elephant corps and refine their tactics, so that we will be known as a true #italic Gajapati#!, 'Lord of the Elephants'."
 ori_servitor_of_jagganath: "Servitor of Jagannath"
 ori_servitor_of_jagganath_desc: "Worship of Jagannath, the Lord of the Universe, is what unites our people. Previous rulers of $ORI$ were even considered to be the scions of Jagannath. Our current ruler might not be one of his descendants, but we must imprint on all that our leader is the servitor of Jagannath, and that any disobedience to them equals treason against Lord Jagannath himself."
 ori_parikshas: "Parikshas"
 ori_parikshas_desc: "$ORI$ has long been divided among many different princes, but their time is over! We will take control of these lands, and appoint regional governors — #italic parikshas#! — instead of allowing these petty princelings to dilute our imperial authority."
 ori_odia_militarization: "Odia Militarization"
 ori_odia_militarization_desc: "The $muslim_ADJ$ threat never ceases, nor does it ever rest. We must ensure our military is ready to face and combat invaders at any and all times."
 ori_refined_cloth_production: "Refined $cloth$ Production"
 ori_refined_cloth_production_desc: "$ORI$ has been famous for its high-quality textiles since ancient times. Let us further encourage the textile guilds of $ORI$ to refine their methods of producing their fine Kalinga $cloth$."
 ori_patronize_temple_construction: "Patronized Temple Construction"
 ori_patronize_temple_construction_desc: "The glory of past dynasties is reflected by the grandeur of the temples they left behind. We should improve our many magnificent temple complexes, and construct new ones to further the development of Kalinga architecture."
 ori_encourage_salt_trade: "$salt$ Trade"
 ori_encourage_salt_trade_desc: "The high-quality $salt$ of $ORI$ is in demand all over $india$. Let us do whatever we can to encourage the $salt$ trade so that we may grow rich from it."
 ori_expansion_of_infrastructure: "Expansion of Infrastructure"
 ori_expansion_of_infrastructure_desc: "As technology advances, so does the number of people in our realm. Industrialization has driven significant population growth, and as such, we must expand our infrastructure to accommodate these growing communities."

 bah_arabian_horses: "Arabian Horses"
 bah_arabian_horses_desc: "The climate of $india$ is suboptimal at best for breeding and raising horses. The horses of $arabia_region$, however, are superb mounts that outclass our local breeds. We will use our trade connections to ensure that we have a steady supply of these horses for our troops."
 bah_amir_rebellion: "Amir Rebellion"
 bah_amir_rebellion_desc: "Our state was born from the rebellion of Amir Hasan Gangu against the pathetic rule of $DLH$. The victory against the $DLH_ADJ$ Sultanate still lives on in the minds of our own nobility and military to this day."
 bah_nobility_hindu_expansion: "Hindu Elite Integration"
 bah_nobility_hindu_expansion_desc: "Although at times a challenge to the sovereignty of the ruler, the noble class is nonetheless useful to our government, as they are crucial in administrating our vast properties. With winning our independence from $DLH$, we gained rulership over almost exclusively $hindu_ADJ$ subjects, while our $muslim_ADJ$ nobles are a small minority, unable to manage the masses. We must expand and stabilize our aristocracy by promoting promising $hindu_ADJ$ candidates into their ranks."
 bah_gharbians: "Gharbians"
 bah_gharbians_desc: "Cutting ties with $DLH$ to found our own kingdom has loosened our connection with the $muslim_ADJ$-dominated northern parts of $india$. As our state lacks any form of entrenched $muslim_ADJ$ aristocracy, we are in a precarious situation, and we could end up entirely at the mercy of local $hindu_ADJ$ nobles.\nFortunately, our reputation precedes us. Tales of the riches of the $deccan_region$ are told and retold all over the $muslim_ADJ$ world, and many ambitious fortune-seekers make the sea voyage to our ports. By using the vast riches of $india$ to attract talented westerners, or #italic Gharbians#!, to our court, we can ensure that our country shall never lack able minds to lead our armies, collect our taxes, and rule our subjects."
 bah_legacy_of_gisu_daraz: "Legacy of Gisu Daraz"
 bah_legacy_of_gisu_daraz_desc: "$india$ in general, and our state in particular, has a history as a center of Sufi teachings. The efforts of our rulers to attract and patronize Sufi sheiks from all over the world are a testament to the piety and the great spiritual strength of our monarchs and our court.\nThe state adopting the Sufi concepts of spiritual sovereignty and the inclusive nature of the Sufi teachings themselves will help create an environment where the diverse religious faiths of $bah_gharbians$ and the natives of $decca_region$ alike can mix and thrive without clashes or unproductive quarrels."
 bah_meltpot_of_languages: "Linguistic Melting Pot"
 bah_meltpot_of_languages_desc: "$decca_region$ is a region of many languages and cultures; the great influx of people of $iranian_group$, $turkic_group$, $afghan_culture$, and $arabian_group$ descent into these lands has accentuated the cosmopolitan nature of our state. While historically the $persian_language$ language fulfilled the needs of our predecessors, a new mix of local languages — as well as $persian_language$ and $arabic_language$ — has grown increasingly common. This mixture of languages has even become a source of cultural inspiration for emerging artists."
 bah_karimis: "Kārimī"
 bah_karimis_desc: "For centuries, the Indo-Egyptian trade has been dominated by $egypt_region$-based groups of traders and captains known as the $bah_karimis$. Instrumental in the day-to-day business of $indian_ocean_region$ trade, this merchant organization is now both wealthy and powerful. From the $tamil$ coasts and the ports of the $swahili_culture$ trading cities to the $lower_egyptian_culture$ port cities past the $gulf_aden_province$, sultans, nobles, and commoners alike come to buy exotic goods or borrow money for their projects from the $bah_karimis$.\nThis organization has lately taken a very active interest in our state, and we only stand to gain from cultivating our relationship with them further."
 bah_takht_e_firoza: "Takht-e-Fīrozā"
 bah_takht_e_firoza_desc: "The first thing any guest in our royal audience chamber notices is the Turquoise Throne of our dynasty. This unique piece of royal furniture was originally donated to us by the defeated $telugu$ Raja Kapaya, and it is in many ways the ultimate symbol of our dynasty. Exquisite and splendidly unique, it embodies the riches of the $deccan_region$ and the unusual combination of styles that is the hallmark of our cosmopolitan state."
 bah_bahmani_primogeniture: "Bahmani Primogeniture"
 bah_bahmani_primogeniture_desc: "Our unusual practice of always passing the throne to the eldest son of the current ruler has at times created some instability in our realm, as power-hungry regents and opportunistic nobles initially showed little hesitation in trying to take advantage of a child ruler or in supporting an envious relative's claim to the throne. By now, however, the practice has become firmly institutionalized, and when the time for succession comes there are very few who would oppose the true heir of our dynasty."
 bah_madrasa_of_mahmud_gawan: "Great Madrasa of the $deccan_region$"
 bah_madrasa_of_mahmud_gawan_desc: "For many years now, our state has drained able men from the greater $muslim_ADJ$ world, while also incorporating the best of the states that came before us. This has created a rich cosmopolitan culture that is not entirely $farsi_culture$, $arabian_group$, $marathi_culture$, $telugu$, nor $kannadiga$ in nature. Creating a major madrasa in our capital would serve to further the development of learning this multitude of cultures and also allow the world to see the greatness of our state."

 guj_hub_of_the_indian_ocean_trade: "Hub of the $indian_ocean_region$ Trade"
 guj_hub_of_the_indian_ocean_trade_desc: "Due to the nature of the monsoon tradewinds and its specific location, $GUJ$ has long served as the hub of the East-West trade in the $indian_ocean_region$, connecting the $red_sea_area$, $egypt_region$, and Malacca. Due to this, $GUJ$ merchants were important middlemen bringing such precious goods as spices from the Maluku Islands and $silk$ from 4CHI$, and then selling them to the merchants coming from the west."
 guj_garba: "Garba!"
 guj_garba_desc: "Originating out of the worship dances done by women in praise of the $hindu_ADJ$ goddess Ambaji, our people have refined a new and very graceful form of dance called the Garba. The basics of the dance are singing and clapping rhythmically in a circular formation. Today, our men and women use this dance to celebrate any occasion with great fervor, coming together as a community and wearing exquisitely embroidered outfits. All of us together, young and old, peasant and prince, $muslim_ADJ$ and $hindu_ADJ$, dancing in an ever-growing circle."
 guj_jain_routes: "$jain_ADJ$ Connections"
 guj_jain_routes_desc: "$jain$ is an ancient way of life, shaped into its current form by Mahavira. For a thousand years, $GUJ$ has been the stronghold of the $jain_ADJ$ community and faith, with many holy sites and temples. Royal dynasties have patronized the religion, forming a community with the $hindu_ADJ$ people. $muslim_ADJ$ invasions from the west by Mahmud Ghazni and Mohammad Ghori, oppressed the $jain_ADJ$ community, vandalizing temples or converting them into mosques, as well as burning $jain_ADJ$ libraries. However, the $jain_ADJ$ people of $GUJ$ have survived, adapted, and prospered, using their connections with $jain_ADJ$ communities across the world to serve as a hub for both faith and commerce."
 guj_gujarati_lipi: "$GUJ_ADJ$ Lipi"
 guj_gujarati_lipi_desc: "The $GUJ_ADJ$ Lipi is a new script and writing system developed by mercantile interests. Also known as the #italic saraphi#! (bankers), #italic vaniasai#! (merchants), or #italic mahajani#! (traders) script due to its association with commerce, its use has rapidly become widespread throughout $GUJ$, $KUT$, and $SND$ for writing regional languages and studying $sanskrit_language$. The $zoroastrian$ community has also adopted it as a writing system for Avestan. This common writing system unites diverse communities, facilitating both practical communication and a common identity."
 guj_gujarati_merchant_diaspora: "$GUJ_ADJ$ Merchant Diaspora"
 guj_gujarati_merchant_diaspora_desc: "Our people trade on every shore, pursuing commerce and following the trade winds. Our fleets sail constantly in pursuit of new opportunities, and our merchants understand both the craft of shipbuilding and the value of building good, hardy ships on a limited budget."
 
 mug_zamindar_system: "Zamindar System"
 mug_zamindar_system_desc: "The Zamindar are feudal rulers who govern our territories autonomously or semi-autonomously. While they are owners of the land they administrate and part of our nobility, in the end, they serve as internal vassals to the Crown itself."
 mug_mughal_ibadat_khana: "$ibadat_khana$"
 mug_mughal_ibadat_khana_desc: "$ibadat_khana_desc$"
 mug_an_indian_padshah: "Indian Padishah"
 mug_an_indian_padshah_desc: "Though we came to $india$ as foreigners, we now rule as Indian Padishah, embracing local traditions while transcending divisions of caste and creed. As our realm is one of many faiths and cultures, our administration will draw talent from all communities, giving everyone — regardless of caste, religion, or culture — an equal opportunity to serve our great house and glorious realm."
 mug_mughal_architecture: "$MUG_ADJ$ Architecture"
 mug_mughal_architecture_desc: "A great empire demands equally monumental buildings. In our cosmopolitan realm, architects are already creating marvelous edifices that will awe generations to come. Our dynasty should be at the forefront of this movement, creating great architectural works such as the world has never seen."
 mug_fatawa_e_alamgiri: "Fatawa-i-Alamgiri"
 mug_fatawa_e_alamgiri_desc: "The $mug_fatawa_e_alamgiri$ is a sharia-based compilation, serving as the primary legal code regulating various aspects of life in our empire. It is one of the most comprehensive collections of $muslim_ADJ$ laws, ethics, military strategies, economic policies, justice, and principles."

 samanta_advance: "Sāmanta Feudalism"
 samanta_advance_desc: "Sāmanta — #italic neighbor#! — is a term denoting vassals and tributary chiefs alike. It is a feudal system that has for centuries acted as one of the pillars of our society. While this arrangement is currently losing prominence, it remains a foundation of our political structure."
 kalaripayattu_advance: "Kalaripayattu"
 kalaripayattu_advance_desc: "Kalaripayattu — the #italic Practice in the Arts of the Battlefield#! — is an old Indian martial art with its origins in the $malabar_area$. Warriors of our state shall be trained in the arts of Kalaripayattu to ensure their hand-to-hand and melee prowess."
 nair_military_advance: "Nair Military"
 nair_military_advance_desc: "The Nairs are a diverse group of $hindu_ADJ$ castes from $malabar_area$ and have a long history of involvement with the military. Their experience, as well as their role for the $kalari$, will be of great value in our current conflicts."

 mhr_ashta_pradhan_advance: "$mhr_ashta_pradhan$"
 mhr_ashta_pradhan_advance_desc: "$mhr_ashta_pradhan_desc$"
 mhr_tradition_of_military_service: "Tradition of Military Service"
 mhr_tradition_of_military_service_desc: "$marathi_culture$ cavalrymen have a long tradition of service as 'Bargirs' for the Deccan sultanates. The increased militarization of the Deccan due to the many wars fought in the area has made our cavalry one of the most dangerous forces in $india$."
 mhr_forts_of_maharashtra: "Forts of Maharashtra"
 mhr_forts_of_maharashtra_desc: "In these hilly and densely forested lands, maintaining a series of forts is an offensive necessity as well as a defensive one. Meticulous maintenance of our fortifications should therefore be a top priority."
 mhr_peasant_soldiers: "Peasant Soldiers"
 mhr_peasant_soldiers_desc: "The villages of the Desh are full of able men who would be more than willing to serve in our armies. Let us recruit the $marathi_language$-speaking members of our population into our military."
 mhr_office_of_the_peshwa: "Office of the Peshwa"
 mhr_office_of_the_peshwa_desc: "The #italic Peshwa#! Shall be our chief minister, entirely devoted to both civil administration and overseeing military operations. This consolidation of power will make us versatile enough to expand quickly and efficiently."
 mhr_encourage_brahmin_ties: "Encourage Brāhmaṇa Ties"
 mhr_encourage_brahmin_ties_desc: "Our financial sector is dominated by Brāhmaṇa banking families. Let us integrate them further in our administration by hiring them as tax collectors, and creating regulations to strengthen their rights and protect their traditions. We will have gained the favor of our financiers as well as access to learned and able administrators."

 pun_breadbasket_of_india: "Breadbasket of $india$"
 pun_breadbasket_of_india_desc: "The five great rivers — Indus, Jhelum, Chenab, Ravi, and Sutley — penetrate the lands of the $punjab_area$ area, granting the soil the blessing of unmatched fertility. Apart from allowing us to export food and cotton to our neighbors, this also allows our many cities to grow and encourages all sorts of specialized production. We must do our utmost to encourage the growth of agriculture and to defend our farmers from the bandits and brigands in the adjoining areas."
 pun_encourage_indo_persian_trade: "Encourage Indo-Persian Trade"
 pun_encourage_indo_persian_trade_desc: "Situated on the westernmost border of $india$, the $PUN$ has always been at the crossroads of economic and cultural exchange between $india$ and $persia_region$. The ancient Grand Trunk Road, which connects eastern $india$ to the $farsi_culture$ world, runs right through our lands before heading up into the Afghan mountain passes. These passes are, however, plagued by tribal raiders and bandits. We should encourage the traffic along this ancient and vibrant route and do everything in our power to look after the wellbeing of these traders by constructing caravanserais and policing these roads."
 pun_punjabi_textile_industry: "$PUN_ADJ$ Textile Industry"
 pun_punjabi_textile_industry_desc: "The $PUN$ is a major center for textile production. $cloth$ from our weavers is specially made for markets all over $asia$ and $europe$, and our weavers are among the most productive in $india$."
 pun_foundation_of_the_khalsa: "The Khalsa"
 pun_foundation_of_the_khalsa_desc: "$sikhism$, a religion native to the $PUN$, is spreading rapidly in our lands. Members of this faith come from all castes and backgrounds, and will defend their state regardless of their former professions."
 pun_gurmukhi_script: "Gurmukhī Script"
 pun_gurmukhi_script_desc: "The Gurmukhī script is an #italic abugida#! developed in the lands of $PUN$, and is highly favored by our $sikhism_ADJ$ gurus. Our clergy is using this script in order to record $sikhism_ADJ$ texts."
 pun_strength_of_the_misls: "Strength of the Misls"
 pun_strength_of_the_misls_desc: "The administrative system of the Misl states of $PUN$ allows them to field impressive cavalry forces. In times of need, we may call upon these forces to fight a common enemy."
 pun_reforming_the_punjabi_army: "Reforming the $PUN_ADJ$ Army"
 pun_reforming_the_punjabi_army_desc: "The ways of our forefathers were sound, and have served us well over the years. But in order for our armies to continue to triumph on the battlefields, we must create a more professional military. By studying the way other countries organize their armies and adapting their methods when prudent, we may create a more efficient $PUN_ADJ$ army while still retaining the unique qualities of our current military system."

 #Thai Culture
 religious_melting_pot: "Religious Melting Pot"
 religious_melting_pot_desc: "Many different religions have influenced our people, from their traditional folk beliefs to $hindu$ and $buddhist$, both from $india$ and $china$. Over time, our people have developed some degree of religious syncretism, mixing some beliefs with others and not fully disregarding any."
 akson_thai: "Akson Thai"
 akson_thai_desc: "Originally based on ancient $khmer_language$ script, $thai_culture$ writing has evolved to be quite distinct from its original form to accommodate the complex phonology of our language. Having a unique written language has certainly contributed to the development of our unique culture."
 father_governs_children: "Father Governs Children"
 father_governs_children_desc: "Our rulers are famed for their close connection to the common man. May our people always live free and happily under the guiding light of their majestic, heavenly rulers!"
 thai_war_elephants: "War Elephants"
 thai_war_elephants_desc: "War elephants have been used in $indochina_region$ for generations, both for cavalry and as personal mounts for the kings, who would then engage in elephant duels with the opposing side's leader."
 thai_royal_poets: "Royal Poets"
 thai_royal_poets_desc: "What is the point of winning wars if no songs are sung about our victories? Our court shall be a haven for poets, and our history shall be their source of inspiration."
 trading_links: "Trading links"
 trading_links_desc: "Our country has been a crossroads of trade since ancient times. Our proximity to $india$ and $china$ has allowed trade to flow through our lands, and with it relationships and interactions with the many different countries around us."
 foreign_mercenaries: "Foreign Mercenaries"
 foreign_mercenaries_desc: "We have recently received an influx of barbarians from foreign lands. Some are merchants but some are fighting men. Let us make use of them in our armies."
 toi_muay: "Toi Muay"
 toi_muay_desc: "Taught to our soldiers for use in combat, it is an unarmed martial art featuring punches, grappling, and ground-fighting techniques. Proficiency in this art allows our troops to remain deadly in battle even if they lose their weapons."
 trading_embassies: "Trading Embassies"
 trading_embassies_desc: "The numerous trade ships coming in and out of our waters have familiarized us with many distant realms. By establishing permanent trading embassies with these far-off places, we can transform casual commerce into formal relationships."
 photduang: "Photduang"
 photduang_desc: "Our currency may feel strange to outsiders, but #italic $photduang$#! have served us well for centuries. Roundish balls of silver and stamped with official marks, they serve as the basis of our economy."
 personal_executions: "Personal Executions"
 personal_executions_desc: "From now on, the most heinous criminals will be executed personally by the ruler. With this, people will know that we are an orderly nation committed to justice, and they will show the appropriate obedience to the law."
 close_subjects: "Close Subjects"
 close_subjects_desc: "For us, our subjects are not something separate from the nation, but rather an integral part of it. We keep close ties with them, and they are fully integrated into our bureaucracy and administration."

 #Ayutthaya
 ayu_prestigious_cavalry: "Prestigious Cavalry"
 ayu_prestigious_cavalry_desc: "Whether on horseback or atop an elephant, we can boast of an impressive cavalry, usually made up of descendants from the most prestigious families. Their contributions through supporting our infantry are invaluable."
 ayu_white_elephant: "White Elephant"
 ayu_white_elephant_desc: "The white elephant symbolizes sacred kingship in $buddhist$ tradition, and is also the emblem of our ruler. Possessing a white elephant legitimizes our authority, proving to our subjects that we rule with the blessing of the divine."
 ayu_ayutthaya_literature: "$AYU_ADJ$ Literature"
 ayu_ayutthaya_literature_desc: "Our country has a rich and complex literary tradition, from the epic #italic Lilit#! poems narrating famous military conflicts, to the #italic Nirat#! poetry of travels and lost lovers; from folk legend of local heroes to panegyrics praising the feats of our most glorious rulers."
 ayu_phrai_luang: "Phrai Luang"
 ayu_phrai_luang_desc: "All freemen subject to #italic phrai#! service not only serve in war — the #italic $ayu_phrai_thaan$#! — but also assist in the construction of public works, at the discretion of local governors."
 ayu_phrai_thaan: "Phrai Thaan"
 ayu_phrai_thaan_desc: "All males at the age of eighteen are to be registered with the military, and their information passed on to the government bureaucracy. Every male citizen is eligible to be conscripted and made to serve in the army in war, and we will make sure that they do so if needed."
 ayu_floating_rice: "Floating Rice"
 ayu_floating_rice_desc: "Rice has been grown in our country for centuries, but the constant flooding of our rivers has always been an issue for its proper cultivation. This new variety of rice, used to growing in flooded conditions, will provide us with a stable source of food even when the rivers overflow."
 ayu_sakdina: "Sakdina"
 ayu_sakdina_desc: "Our society is strictly organized along the $ayu_sakdina$ system. Each person knows their proper place in society and how much wealth and property they are entitled to have. This organization makes it much more efficient to extract taxes from them."
 ayu_cosmopolitan_trade: "Cosmopolitan Trade"
 ayu_cosmopolitan_trade_desc: "Our country is home to many people from afar, who came here hoping to profit from the richness of our land. Having so many people and goods flowing through our borders is something we derive numerous benefits from."

 #Sukhothai
 suk_breaker_of_chains: "Breaker of Chains"
 suk_breaker_of_chains_desc: "It was not so long ago that we saw ourselves under the $KHM_ADJ$ authority, but we have since gained our freedom, and have taken our rightful place as an independent power. We have earned the admiration of our peers, and their respect."
 suk_birthplace_of_a_culture: "Birthplace of a Culture"
 suk_birthplace_of_a_culture_desc: "We are called the first independent $thai_culture$ kingdom, as we were the first ones to rebel against $KHM_ADJ$ authority and establish ourselves as free from their influence. As such, all $thai_culture$ people look at us in admiration."
 suk_ram_khamhaeng_stele: "$name_ram_khamhaeng$ Stele"
 suk_ram_khamhaeng_stele_desc: "Most of the history of the early $SUK_ADJ$ kingdom comes from inscriptions on the $suk_ram_khamhaeng_stele$, commissioned by the great king to give a record of his glorious reign. The $suk_ram_khamhaeng_stele$ is a sacred piece of heritage and one that surely proves our place in history."
 suk_akson_sukhothai: "Akson $SUK$"
 suk_akson_sukhothai_desc: "Although the $thai_culture$ script is already common to all $thai_culture$ people, it should not be forgotten that it was in our country and under our guidance that it was developed. As such, $thai_culture$ script is not only a unifying force for our culture, but also proof of our individuality and distinctiveness."
 suk_wat_si_sawai: "Wat Si Sawai"
 suk_wat_si_sawai_desc: "We are known for our many gorgeous temples, such as the $suk_wat_si_sawai$, one of the oldest in $sukhothai$. Built under the $KHM_ADJ$ authority as a $hindu_ADJ$ temple, its ensuing repurposing has turned it into a symbol of our identity. The faith of our people is strong."
 suk_sukhothai_ceramics: "$SUK$ Ceramics"
 suk_sukhothai_ceramics_desc: "Ceramics have been created by the $thai_culture$ people since antiquity, influenced by $chinese_group$ ceramics but always retaining their own distinct style. However, the ceramics produced in our country are most valued, and they are often traded at great distances overseas."
 suk_military_history: "Military History"
 suk_military_history_desc: "Our armies have a long history of victory in combat. As a result, a position in our military is seen as a post of honor and prestige, and there are many willing to serve."
 suk_unstoppable_army: "Unstoppable Army"
 suk_unstoppable_army_desc: "Many have tried in the past to stop our progress and expansion, but all have failed in the face of our army. It has proved to be an unstoppable force, one that readily crushes any obstacles in our way."

 #Siam
 sia_experienced_ambassadors: "Experienced Ambassadors"
 sia_experienced_ambassadors_desc: "We have extensive political experience. The birth of our country was something achieved not only with the power of our military, after all. Surely our diplomatic reputation will prove to be a source of our influence on the world stage."
 sia_rise_to_equal_heights: "Rise to Equal Heights"
 sia_rise_to_equal_heights_desc: "There are many parts of our country with very low population. We should improve conditions in these regions to ensure that no part of our country is seen as lackluster, and all of it shines equally."
 sia_advanced_elephant_warfare: "Advanced Elephant Warfare"
 sia_advanced_elephant_warfare_desc: "It is not uncommon for our greatest poems to dedicate lines of text to list and honor our war elephants individually. Let us show our enemies why!"
 sia_consolidation_of_state: "Consolidation of the State"
 sia_consolidation_of_state_desc: "A decentralized system may cause us to lose control over our more distant provinces. If we are to be the true unifying realm for the $thai_culture$ people, our provinces must be unified as well."
 sia_education_reform: "Education Reforms"
 sia_education_reform_desc: "As our Lord Buddha said, we shall not accept something because it is often said, but we need to experience it ourselves. Education is the basis of knowledge, and if we want to excel at technology, we need to excel at education first."
 sia_royal_absolutism: "Royal Absolutism"
 sia_royal_absolutism_desc: "Second only to Heaven — that is what a ruler should be. Honored and worshipped, our leaders rule over the Earth as the Gods rule over Heaven."
 sia_thai_unity: "$thai_culture$ Unity"
 sia_thai_unity_desc: "We are undoubtedly the leaders of all $thai_culture$ people. Our troops are proud to serve as defenders of our culture and identity itself, and they fight fiercely for the privilege."

#Rome
 rom_spqr: "S.P.Q.R."
 rom_spqr_desc: "The Senate and the people of Rome are the eternal foundations of our state. By invoking this ancient authority, we remind all that Rome rules not merely by force of arms, but by the will of its citizens and its institutions."

 rom_pax_romana: "Pax Romana"
 rom_pax_romana_desc: "Peace under Rome does not mean the absence of war, but the triumph of order. Through enforcing our laws and building extensive road systems, as well as the might of our armies, we will bring stability and prosperity to every corner of the Empire."

 rom_restore_the_legions: "Restore the Legions"
 rom_restore_the_legions_desc: "The Legions were once the pride of Rome, feared and respected across the world. To restore them is to also revive the discipline, organization, and indomitable spirit that our great empire is built upon."

 rom_revival_of_arts_and_culture: "Revival of Arts and Culture"
 rom_revival_of_arts_and_culture_desc: "Rome was as much a center of culture as it was an Empire of conquest. By sponsoring poets, scholars, and architects, we will rekindle the creative flame that once illuminated the ancient world."

 rom_new_corpus_juris_civilis: "Novus Corpus Juris Civilis"
 rom_new_corpus_juris_civilis_desc: "Our jurists shall compile and refine our laws into a comprehensive body, drawing on the wisdom of Justinian and the Republic alike. In doing so, we will assure justice for all Roman citizens."

 rom_bread_and_circuses: "Panem et Circenses"
 rom_bread_and_circuses_desc: "The people must be kept happy and sated, for discontent breeds revolt. By putting grain on their tables and providing diverting activities such as games and public festivals, we shall win their loyalty and strengthen the state through their patriotism."

 rom_citizenship: "Roman Citizenship"
 rom_citizenship_desc: "Citizenship is the lifeblood of Rome, binding peoples of every province into a single political body. Extending these rights ensures integration and the promise of advancement for all who serve the empire."

 rom_all_roads_lead_to_rome: "All Roads Lead to Rome"
 rom_all_roads_lead_to_rome_desc: "The Roman road system is the envy of the world. It binds our empire together, speeding merchants, messengers, and soldiers alike, with all paths converging in the Eternal City."

 rom_provincial_governors: "Provincial Governors"
 rom_provincial_governors_desc: "Our more remote provinces cannot effectively be ruled from Rome only. By placing competent governors in the outlying regions, we will guarantee that our laws are followed and taxes paid promptly in even the most distant lands of the empire."

 rom_imperium_sine_fine: "Imperium Sine Fine"
 rom_imperium_sine_fine_desc: "Rome's destiny knows no bounds. From the Pillars of Hercules to the edges of the earth, we will expand our dominion without end, bringing civilization wherever the Imperial Eagle soars."

 rom_triumphs: "Roman Triumphs"
 rom_triumphs_desc: "A triumph is more than a mere procession. Indeed, it is the living memory of conquest, paraded through the streets of our greatest cities. Such ceremonies inspire loyalty, awe, fear, and ambition in equal measure."

 rom_roman_architecture: "Roman Architecture"
 rom_roman_architecture_desc: "From aqueducts to amphitheaters, Roman engineering leaves behind monuments that endure for centuries. Our mastery of stone and arch will show the entire world that Rome's greatness is eternal."

#Byzantium
 byz_heart_of_orthodoxy_advance: "Heart of $orthodox$"
 byz_heart_of_orthodoxy_advance_desc: "$constantinople$ is the beating heart of vibrant faith. We take great pride in being the home of $orthodox$, holders of the Ecumenical Patriarchate, and defenders of Christendom against our heathen enemies."
 byz_akritai_advance: "Akritai"
 byz_akritai_advance_desc: "Primarily focused on border defense, these light troops are also given lands to farm as well as protect. Akritai are most adept at defensive warfare, especially against cavalry, and are often the first response against external threats."
 byz_cataphracts_advance: "Late Cataphracts"
 byz_cataphracts_advance_desc: "Although warfare has evolved significantly since the first incarnation of our empire, including the introduction of gunpowder, the battle tactics refined by our forebears centuries ago are often still effective. Our cataphracts shall embody the best of both our ancient and modern combat wisdom."
 byz_historiography_advance: "$BYZ_ADJ$ Historiography"
 byz_historiography_advance_desc: "Our people stand on the shoulders of giants; it is our responsibility to leave comprehensive records of our empire's glory to inspire and instruct future generations. By thoroughly documenting the lives of our extraordinary ancestors, tracing our prestigious lineages, and detailing our intricate traditions, we will surpass mere historical records and become truly legendary."
 men_of_letters_advance: "Men of Letters"
 men_of_letters_advance_desc: "It is no secret that other nations envy our literary accomplishments and enlightened past. They seek to hire tutors from our court, eager to sink their claws into the knowledge that gave rise to powerful empires and carved the cultural landscape of the entire continent. It is through these men of letters that our neighbors will come to fall in love with our history and become educated in our ways."
 byz_shield_of_the_west: "Shield of the West"
 byz_shield_of_the_west_desc: "We stand between $europe$ and a sea of heathens, a shield against foreign threats. Our sword will forever be raised against those who seek to eradicate our faith, ready to strike against any who disrespect our traditions."
 byz_court_of_languages: "Court of Languages"
 byz_court_of_languages_desc: "The court of $constantinople$ attracts diplomats and dignitaries from every corner of the known world. As a result, we ensure all languages receive equal respect and accommodation — a practical necessity for an empire at the crossroads of civilizations."
 byz_poikilia: "Poikilia"
 byz_poikilia_desc: "Byzantine culture has taken $europe$ by storm, particularly #italic poikilia#! — our unique aesthetic. Emphasizing visual variety and a dizzying array of vibrant hues, poikilia creates a symphony of colors and elements in our art and architecture alike."
 byz_crossroads_of_continents: "Intercontinental Crossroads"
 byz_crossroads_of_continents_desc: "$BYZ$ is located between $europe$ and $asia$, making it in many ways the connection between East and West. Our advantageous position is highly lucrative, and has also allowed us to significantly expand our maritime influence."
 byz_the_new_helepolis: "The City-Taker"
 byz_the_new_helepolis_desc: "We are already familiar with deploying and refining powerful siege engines. However, by adapting our designs to use gunpowder, we will be able to completely dominate our foes with our cannons."
 byz_reaffirm_synod_powers: "Reformed Synod Proceedings"
 byz_reaffirm_synod_powers_desc: "Bureaucracy is a nightmarish endeavor for a country our size. To better refine the religious proceedings required every time we call the $orthodox_synod$, we will cut down on the red tape, and revisit the associated legislation."
 byz_byzantine_inquisition: "$BYZ_ADJ$ Inquisition"
 byz_byzantine_inquisition_desc: "$europe$ is engulfed in religious turmoil. We must be prepared to rip up noxious weeds of heresy that appear in the garden of our Empire, lest it become overgrown with heathens. Our pious defense against heretic incursion will prevent us from sinking into instability."
 byz_autokratoria_rhomaion: "Autokratoría Rhōmaíōn"
 byz_autokratoria_rhomaion_desc: "Our great nation is the undisputed heir to the splendor and prestige of Rome, and reclaiming that long-lost territory is our primary motivation."
 byz_modernized_strategikon: "Modernized Stratēgikon"
 byz_modernized_strategikon_desc: "The #italic Strategikon#! — the ancient manual of cavalry tactics, logistics, and battlefield doctrine — has served us well in times of war. However, as war changes, so must we. Our tactics and regiments have adapted to modern combat, employing weapons of such destruction that Maurice himself could never have anticipated their devastation."
 byz_ancient_greek_studies: "Ancient $greek_culture$ Studies"
 byz_ancient_greek_studies_desc: "The rediscovery and revival of ancient $greek_culture$ arts has provided us with a wonderful opportunity to better educate the masses and to preserve our lofty scientific and cultural ideals. We shall make a diligent study of the wisdom of our ancestors."
 byz_the_new_imperial_army: "The New Imperial Army"
 byz_the_new_imperial_army_desc: "Our army has lagged behind others in $europe$ for far too long. By enacting sweeping military reform and expanding our conscription efforts, we hope to build a modern army befitting the resurgent and resplendent phoenix that symbolizes our empire."
 expand_varangian_guard_advance: "Expand the Varangian Guard"
 expand_varangian_guard_advance_desc: "The Varangians have served our country for centuries with distinguished honor and unwavering faith. By expanding their ranks, we will further secure the stability and protection of $BYZ$."
 imperatorskiy_moskovskiy_universitet: "Imperatorskiy Moskovskiy Universitet"
 imperatorskiy_moskovskiy_universitet_desc: "The Imperial University is dedicated to the study of philosophy, medicine, and law, and plays a significant role in $RUS_ADJ$ education and research. It is established as part of educational reforms conceived by polymath Mikhail Lomonosov, emphasizing the importance of scientific inquiry and innovation."
 hurricane_hardy: "Hurricane Hardy"
 hurricane_hardy_desc: "The designs of Feodor Apraksin are robust and resilient, enabling ships to weather most storms that Mother Nature is able to conjure. The innovative construction greatly contributes to any burgeoning maritime ambitions."
 preobrazhensky_semyonovsky_imperial_guard: "Preobrazhensky Semyonovsky Imperial Guard"
 preobrazhensky_semyonovsky_imperial_guard_desc: "The 'Toy Army' is organized into elite companies, forming the Imperial Guard which protects the interests of the monarchy. They are frequently involved in court ceremonies, parades, and other significant events, showcasing their importance beyond their military duties."

#Poland
 kasztelanowie: "Kasztelanowie"
 kasztelanowie_desc: "Castellans represent the voice of the monarch across our domain. They are in charge of gathering taxes and enforcing the rule of law, and may even execute justice in the name of the Crown."
 land_of_promise: "Land of Promise"
 land_of_promise_desc: "The fertile lands of our domain are a coveted destination for many migrants, primarily those of lower status, seeking a better and more prosperous life."
 statute_of_kalisz: "Statute of Kalisz"
 statute_of_kalisz_desc: "Known as the General Charter of $judaism_ADJ$ Liberties, this legislation contains articles that allow all Jews in our realm the freedom to worship, trade, and travel. The statute also attempts to reduce the number of blood libel accusations against Jews propagated by the $catholic_ADJ$ Church."
 corona_regni_poloniae: "Corona Regni Poloniae"
 corona_regni_poloniae_desc: "This legislation establishes the kingdom as an indivisible, collective entity, owned not by any single dynasty or monarch but by the entire noble class. Rulers serve the realm, they do not #italic own#! it. This concept of collectivity is deeply entrenched in our society."
 krakow_grosz: "Grosz Krakowski"
 krakow_grosz_desc: "In an attempt to reform our monetary system, we will introduce a new currency, the #italic Kraków Grosz#!. Minted from silver, these coins are destined to challenge the power of the $BOH_ADJ$ #italic Prague Groschen#! and help establish our realm as pioneers of centralized taxation."
 stone_and_brick: "Stone and Brick"
 stone_and_brick_desc: "For centuries, we have used wood to build our towns and defenses, but we will now  systematically upgrade our infrastructure by replacing more vulnerable wooden structures with stronger ones. We have inherited wooden towns, but we shall leave them fortified with stone and brick."
 council_of_three_lands_advance: "Council of Three Lands"
 council_of_three_lands_advance_desc: "Our country has a long-standing history of accepting destitute, persecuted $judaism_ADJ$ people. To that end, a council that will look after their needs and advocate for their rights will benefit the stability and spiritual strength of this realm."
 polish_renaissance: "$polish_group$ $renaissance$"
 polish_renaissance_desc: "Inspired by the ideals of the $ITA_ADJ$ $renaissance$, we are experiencing a cultural golden age. Our literary achievements, architectural splendors, and cultivated atmosphere of religious tolerance have all led to a blossoming of culture across our land."
 granary_of_europe: "Granary of $europe$"
 granary_of_europe_desc: "The fertile fields of our domain are home to $europe$'s richest grain crops, in part thanks to the $folwark_system$. Through our grace, we supply the markets beyond our borders, ensuring our people continue to prosper and never go hungry."
 komisja_edukacji_narodowej: "Komisja Edukacji Narodowej"
 komisja_edukacji_narodowej_desc: "Our government's need for capable administrators has led to systematic education reform. We will establish the first education ministry in $europe$, devoted to spreading literacy throughout our population, which will hopefully lead to an increase in qualified candidates to staff our expanding administration."
 szkola_rycerska: "Szkoła Rycerska"
 szkola_rycerska_desc: "By establishing the 'Knight's School' to train noble youth in military science and their patriotic duty, we will forge generations of capable, dedicated military and civil personnel."
 great_sejm_reforms: "Great Sejm Reforms"
 great_sejm_reforms_desc: "If we are to survive and continue to prosper, our governmental mechanism must run efficiently and be based on robust foundations. The parliament shall adopt modernized procedures and strengthen its authority. The goals of this evolution are to curtail the power of the nobility and mitigate the escalating abuses of serfdom."
 late_winged_hussars_advance: "Late Winged Hussars"
 late_winged_hussars_advance_desc: "The evolution of $POL_ADJ$ hussars entailed the adoption of heavier armor with red and white colors. They used a longer lance of around six meters, which made their charge incredibly devastating, often breaking the morale of their foes and causing them to rout."
 winged_hussars_advance: "Winged Hussars"
 winged_hussars_advance_desc: "The hussars were originally light cavalry troops used for scouting, but with the decline of the old feudal army, we have switched over to professional regiments, the core of which shall be made up of these heavier, armored hussars. The fear of these winged warriors shall make our enemies tremble in the night like children!"
 wojsko_komputoe: "Wojsko Komputowe"
 wojsko_komputoe_desc: "The 'Compute Army' was based around an annual budget calculated and approved by the Sejm. The idea behind this was to provide the Commonwealth with a stable standing army for defense."
 folwark_system: "Folwark System"
 folwark_system_desc: "The Folwark System was a system of production that emphasized creating agricultural surpluses. Peasants were encouraged to work through either the use of rents or through compulsion. This system formed the bedrock of our economy."

#China & Variations
 baihua: "Báihuàwén"
 baihua_desc: "Our domain stretches well beyond the horizon. The emergence of a common written language among our subjects will surely bridge the gaps between us, elevate our culture, and reduce conflict based on misunderstanding and linguistic differences."
 zaju: "Zájù"
 zaju_desc: "Typically consisting of four acts, this brilliant display of dance and music is a colorful expression of the artistic heights that our society has achieved."
 successors_of_genghis_khan: "Successors of $genghis_khan_name_no_tooltip$"
 successors_of_genghis_khan_desc: "From the days of total conquest to the vast expanses of $genghis_khan_name_no_tooltip$'s great Empire, our people descend from generations of earthshakers. Our people are the ones destined to author history."
 confucian_influences: "Confucian Influences"
 confucian_influences_desc: "If we are to manage our realm properly, our advisors shall find great wisdom about administration in Confucian teachings, which emphasize meritocratic selection of officials, attention to administrative detail, and other foundational advice for creating a healthy and prosperous government."
 extensive_canal_works: "Extensive Canal Works"
 extensive_canal_works_desc: "The many rivers that cross our domain have tremendous economic potential. By constructing extensive canal networks, we can connect waterways to inland settlements, making transportation easier while also providing a reliable water supply to our people."
 zhongshu_sheng: "Zhōngshū Shěng"
 zhongshu_sheng_desc: "One of the most vital branches of the #italic Three Departments and Six Ministries#!, the central secretariat is responsible for the drafting and codification of many Imperial reforms and decrees."
 lijia_system: "Lǐ Jiǎ System"
 lijia_system_desc: "Under the #italic Lǐ Jiǎ#! system, we are able to exercise control over our borderlands through the allocation of settled armies. By granting land and agricultural rights to our stationed troops, our borders will be safer and our authority shall be affirmed."
 yulin_tuce: "Yúlín Túcè"
 yulin_tuce_desc: "Tax evasion is a timeless problem that even plagued our ancestors, but we may have found a solution: By compiling registers for districts and provinces, we will keep better track of the taxes owed to the central government by every plot. This taxation is largely determined based on the grain yield of every plot that undergoes survey."
 weisuo_system: "Wèi Suǒ"
 weisuo_system_desc: "Many would-be conquerors eye our lands with covetous intent. If we are to defend our territory, we must set up a garrison system, aimed at rapidly responding to hostile invasions. Through the recruitment of local troops, our defensive prowess will be supplemented through supplies and more efficient logistics."
 grand_coordinators: "Grand Coordinators"
 grand_coordinators_desc: "Maintaining control over our territories, policymaking, and military operations is vital for the continuation of our dynasty. Through the creation of Grand Coordinators, a body of high-ranking officials who can coordinate governance across our vast empire, we will succeed in cementing our position through effective stabilization of internal and external matters."
 the_censorate: "The Censorate"
 the_censorate_desc: "Parallel to other institutes within our administration, this branch of our government is in charge of preventing corruption. The censors are tasked with keeping palatial intrigues and malfeasance in check, often seen as the eyes and ears of the Emperor."
 the_tea_trade: "The $tea$ Trade"
 the_tea_trade_desc: "A staple beverage of our society, $tea$ has come to dominate social gatherings, becoming the choice drink of many. This will undoubtedly lead to not only new varieties being cultivated, but a production boom as well."
 tu_bing: "Tǔ Bīng"
 tu_bing_desc: "In our quest to shore up our border defenses, it has become apparent that we must create a system of recruitment centered around local soldiers and stalwarts. These fighters will be a valuable addition to our military capabilities, and shall be kept separate from the #italic Wèi Suǒ#! system."
 tusi_titles: "Tǔsī Titles"
 tusi_titles_desc: "Titles granted to warlords and local strongmen, these administrative positions are used to quell unrest and keep the rural populace under central control."
 salt_monopoly: "Restore the $salt$ Monopoly"
 salt_monopoly_desc:  "The $salt$ monopoly was once our most important revenue source, but previous Emperors abolished it to encourage free trade. It is time to return the $salt$ trade to state control."
 reform_the_grand_secretariat: "Reform the Grand Secretariat"
 reform_the_grand_secretariat_desc: "Considered the #italic de facto#! highest institution in our nation, the #italic Grand Secretariat#! has served our rulers for centuries. Wielding immense influence over administrative affairs, this body of cabinet ministers must undergo a reform to further increase its effectiveness."
 grand_military_parades: "Grand Military Parades"
 grand_military_parades_desc: "Our illustrious military history of our people is a great source of inspiration and pride for our people. By conducting elaborate parades to showcase our armies, we will decisively demonstrate our martial experience and unparalleled strength."
 silver_standard: "Silver Standard"
 silver_standard_desc: "By turning most obligations towards the central government - from poll taxes to the labor obligations of the peasants or the tributes of local officials - into a single silver payment, the amount of which is based on the population and cultivated land in each prefecture, tax collection will become easier and our income will increase."
 nine_garrisons_of_the_great_wall: "Nine Garrisons of the Great Wall"
 nine_garrisons_of_the_great_wall_desc: "In order to defend against the vicious barbarian onslaught, we must do more than simply repair the Great Wall. The Nine Garrisons are militarized garrison towns along the Wall that will not only help to defend the most important passes, but also improve the overall logistical situation on our northern border."
 the_red_cannon: "The Red Cannon"
 the_red_cannon_desc: "The red-haired barbarians from $europe$ may be uncivilized and ill-mannered, but they do know how to make artillery and firearms of good quality. Importing and duplicating their weapons will give our army a significant advantage against all invaders."
 woodblock_printing: "Woodblock Printing"
 woodblock_printing_desc: "The production of elegant illustrations, artworks, and books using this printing method has captivated our people's attention, and our master printers constantly strive to perfect their techniques. Woodblock printing has become part of our culture and, with recent improvements to and expansion of our literary production, will further elevate our prestige."
 green_standard_army: "Green Standard Army"
 green_standard_army_desc: "The Green Standard Army, a military force mainly composed of ethnic Hàn soldiers, coexists with our Eight Banner armies. Originally formed by surrendered troops and recruited on a voluntary, long-term basis, they attract individuals from socially disadvantaged backgrounds. Used as a police force post-consolidation, they will play a crucial role in local military governance, while Bannermen will be reserved for emergencies and sustained resistance."
 great_tax_reform: "Great Tax Reform"
 great_tax_reform_desc: "Our wealthy nation has ample coin and bounteous, fertile fields, but all this abundance requires comprehensive taxation. The Great Tax Reform enables more efficient revenue management, which should guarantee a healthier budget for our realm."
 junji_chu: "Jūnjī Chù"
 junji_chu_desc: "Also known as the Grand Council, the #italic Jūnjī Chù#! is tasked with overseeing military affairs. As the most important privy council, it has come to overshadow the Grand Secretariat that held sway over previous dynasties. Despite its crucial role, this council will retain an informal nature within the inner court, with its members holding other official roles besides their councilorship."
 jingdezhen_porcelain: "Jǐngdézhèn $porcelain$"
 jingdezhen_porcelain_desc: "Our $porcelain$ industry is emblematic of the prosperity and tradition of artisanal excellence alive in our Empire. By perfecting the already-superior $porcelain$ production techniques of Jǐngdézhèn, we will spread our cultural influence far and wide."
 sanxitang: "Sānxītáng"
 sanxitang_desc: "The Hall of Three Rarities is our most splendid repository of rare, valuable objects and works of art. Through the generous patronage of our ruler, it has flowered into a venue for academic discussions, lectures, and even cultural events, promoting intellectual exchange and scholarly pursuits."
 monuments_to_greatness: "Monuments of Greatness"
 monuments_to_greatness_desc: "In our people's many millennia of existence on this planet, they have endured thousands of catastrophes through sheer tenacity. This innate steely strength has come to be recognized as a defining feature of our society. We showcase our resilience in the strength of our army and the divine beauty of our art."
 ten_great_campaigns: "Ten Grand Campaigns"
 ten_great_campaigns_desc: "The Ten Great Campaigns are aimed at expanding our influence both inside and outside our borders. To achieve that, we will draft a huge army to crush any resistance that we might find in our way. We shall choke the life out of any rebellion before it has the chance to raise its head, and our glory will be eternal."
 tributary_system: "Tributary System"
 tributary_system_desc: "A system of subjugated local warlords and other rulers who send us regular gifts of allegiance in recognition of our overlordship. To refine and centralize this system would help us tighten our grip and squeeze more out of them."

#Timurids
 timurid_cavalry: "$TIM_ADJ$ Cavalry"
 timurid_cavalry_desc: "As the great $genghis_khan_name_no_tooltip$ dominated the steppes with the power of his cavalry, so will we triumph through our incomparable horses. Bred for the most rigorous combat, and mounted by the best-trained soldiers in the world, our cavalry will instill fear in the hearts of our enemies."
 timurid_architecture: "$TIM_ADJ$ Architecture"
 timurid_architecture_desc: "The architecture of $persia_region$ has been the envy of the known world for centuries. We must promote a new form of architecture, one that surpasses anything seen before, so that we may claim our birthright as the master of this art."
 the_mantle_of_the_great_khan: "The Mantle of the Great $rank_kingdom_horde_ruler_suffix_male$"
 the_mantle_of_the_great_khan_desc: "The death of $genghis_khan_name_no_tooltip$ created a power vacuum that led to people who should have known better vying to replace him. However, through strategic marriages, we have consolidated our claim to descent from the Great $rank_kingdom_horde_ruler_suffix_male$ himself, and the warriors of the steppes will declare their loyalty to us accordingly."
 turco_persian_tradition: "Turco-Persian Tradition"
 turco_persian_tradition_desc: "$IRA$ has always been the undeniable center of culture and language in the region, influencing the different $turkic_group$ peoples that have been around for centuries. We will embrace this blend of cultures to create our own unique tradition."
 tamerlane_chess: "Tamerlane Chess"
 tamerlane_chess_desc: "This new variety of chess, invented by our great eponymous founder, improves upon previous versions. Using it will help our generals to improve their strategic and tactical skills."
 chagatai_literature: "$karluk_language$ Literature"
 chagatai_literature_desc: "The $karluk_language$ language of the eastern steppes is far more worthy to carry the thoughts and ideas of our great lineage than $persian_language$ or $arabic_language$ ever could be. We must promote the use of our ancestral language, and create a new literary tradition."
 nambardar_levy: "Nambardar Levy"
 nambardar_levy_desc: "The $nambardar_levy$, or #italic čerig-i nambardar#!, refers to our troops that do not come from $mongolian_culture$ or $turkic_group$ origins, but instead come from the native $iranian_group$ population. Thanks to them, we can build larger armies than would have been possible before."
 timurid_renaissance: "$TIM_ADJ$ $renaissance$"
 timurid_renaissance_desc: "Ever since the initial $TIM_ADJ$ expansion, our realm has attracted the greatest artisans and wise men of the age. Through our continued patronage of art, science, and literature, we have made the cities of $herat$ and $samarkand$ the brightest jewels in the world."
 riches_of_the_silk_road: "Control of the Silk Road"
 riches_of_the_silk_road_desc: "As long as our merchants control the trade through the lands of $transoxiana_area$ and $samarkand$, the trade of the Silk Road shall flow unhindered and the wealth of our dynasty will continue to grow."
 reform_the_diwan: "Reform the Dīwān"
 reform_the_diwan_desc: "We are fortunate to be served by loyal and well-educated $farsi_culture$ administrators, who have perfected the art of governance for generations. Sadly, however, a hereditary office is one that over time might stagnate and lack innovation. By reducing the number of inherited offices with each generation, we can make sure that we reward not only loyalty, but also ability. Able administrators must rise to high positions regardless of which family they come from."
 conquerors_legacy: "Conqueror's Legacy"
 conquerors_legacy_desc: "Our glorious empire emerged from the legacy of great conquerors. It was the ferocity of $genghis_khan_name_no_tooltip$'s troops that allowed him to conquer from $europe$ to $china$. As his successors, our troops will be as fearsome as the ones in his army."

#Golden Horde
 glh_kipchak_khanate: "Kipchak Khanate"
 glh_kipchak_khanate_desc: "Our great country is also called the Kipchak Khanate, ruling over all the territories of the Cuman-Kipchak Confederation. With such swathes of land under our command, the armies we can gather will be innumerable."
 glh_legacy_of_jochi: "Legacy of Jochi"
 glh_legacy_of_jochi_desc: "After $genghis_khan_name_no_tooltip$ died, his son Jochi also passed not long after. However, his presence and legacy are still felt in our country, to the point that we are still known as the Ulus of Jochi. Warriors flock to our banners to uphold that legacy."
 glh_legacy_of_the_golden_horde: "Legacy of the Golden Horde"
 glh_legacy_of_the_golden_horde_desc: "We were one of the main constituent parts of $genghis_khan_name_no_tooltip$'s empire, and we represent the main political force in $eastern_europe$ and the Steppes. The world shall tremble before us!"
 glh_perso_mongol_administration: "Perso-$MGE_ADJ$ Administration"
 glh_perso_mongol_administration_desc: "Our ancestors refined our administrative system over the centuries, and they were not shy about incorporating the ideas and methods of the cultures they subdued. Our current system of administration is in part based on traditions dating back to the Great $genghis_khan_name_no_tooltip$ himself, and in part on what we have adopted from $IRA_ADJ$ and $muslim_ADJ$ bureaucrats in the lands conquered."
 glh_tatar_traditions: "Tatar Traditions"
 glh_tatar_traditions_desc: "Our empire may no longer be ruled from horseback, but our armies remain masters of the mount. Over the centuries, we have stayed true to our origins, ensuring that few can match the skill of our riders. As we go forward and adopt new technology and tactics when needed, we build on the strong organization and martial traditions of the $MGE_ADJ$ Empire."
 glh_secure_the_trade_routes: "Secure the Trade Routes"
 glh_secure_the_trade_routes_desc: "Not all riches in this world originate in our territory. Trade is the source of all wealth, and the Golden Horde has always protected merchants. By ensuring the safety of anyone who wishes to move goods through our country, we can ensure a steady stream of furs, silk, spices, and other necessities to our cities. Whether they choose to sell their goods to us or not, their mere presence will generate wealth for our people."
 glh_religious_pragmatism: "Religious Pragmatism"
 glh_religious_pragmatism_desc: "Constraining, inflexible doctrine has never won many admirers among the Tatar hordes. When the Great $Oz_Beg$ $rank_kingdom_horde_ruler_suffix_male$ adopted $muslim$, it was the faith of a Sufi Shaykh or a zealous Qāḍī that he invited into his lands.\n\nCenturies of tradition and loyalty are what we would rather build our state upon. Religion has a part to play, but we would prefer to see our country thrive than to fall apart in the chaos of forced religious homogeneity."
 glh_modernization_of_steppes: "Modernization of the Steppes"
 glh_modernization_of_steppes_desc: "It was long ago that $genghis_khan_name_no_tooltip$'s armies first seized control of the steppes. Our country has since surpassed our ancestor's every expectation, and now we stand as a global power on our own merit. We shall now begin the process of modernizing our territories, so that one day we shall be the beacon of all the world."

 #Crimea
 cri_genghisid_legacy: "Genghisid Legacy"
 cri_genghisid_legacy_desc: "Our forefathers rode with $genghis_khan_name_no_tooltip$ as he ravaged the known world. We have kept our military traditions alive, and continued to be ruled by $rank_kingdom_horde_ruler_suffix_male$s who claim descent from the Genghisid line."
 cri_slavers: "Slavers of the Steppe"
 cri_slavers_desc: "There is a fortune to be made from the $slaves_goods$ trade; unwitting $christian_ADJ$ believers who fall into our grasp fetch a high price in $turkish_culture$, $AIA_ADJ$, and $ITA_ADJ$ markets."
 cri_free_cattle_grazing: "Free Cattle Grazing"
 cri_free_cattle_grazing_desc: "We place no restrictions on pastoral farmers for the grazing of their great herds of horses and cattle. Herders are free to go about their business as they wish, able to traverse the steppe safely and trade freely."
 cri_steppe_commanders: "Steppe Commanders"
 cri_steppe_commanders_desc: "$CRI_ADJ$ cavalry commanders have mastered the art of mobility in steppes warfare, using speed, flanking, and ambush to outmatch slower European armies."
 cri_devshirme_of_the_steppes: "The Devshirme of the Steppes"
 cri_devshirme_of_the_steppes_desc: "$CRI_ADJ$ elites mimicked aspects of $TUR_ADJ$ military-administrative practices, blending $turkic_group$ and $muslim_ADJ$ systems to manage manpower and military efficiency."
 



#Chagatai
 chg_legacy_of_chagatai: "Legacy of Chagatai"
 chg_legacy_of_chagatai_desc: "The legacy of $genghis_khan_name_no_tooltip$ is ours through his son Chagatai. All shall tremble before us as we reclaim his glory!"
 chg_chagatai_riders: "Chagatai Riders"
 chg_chagatai_riders_desc: "The horses of $genghis_khan_name_no_tooltip$ trampled and conquered territories stretching from $europe$ to $china$. As his heirs and successors, our cavalry will instill fear of the same thing happening into our enemies."
 chg_the_mountain_khanate: "The Mountain Khanate"
 chg_the_mountain_khanate_desc: "We lie sheltered between $balkhash_lake$ and the Tiānshān Mountains. It is a harsh and unforgiving land, one which our people know how to use as a weapon against would-be invaders."
 chg_border_wars: "Ceaseless Border Wars"
 chg_border_wars_desc: "Surrounded by people that would oppose us, we face a constant struggle to maintain our borders. Our ever-vigilant soldiers have plentiful opportunities to hone their skills in battle, giving birth to a combat-hardened warrior people ready to reclaim the legacy of the Great $rank_kingdom_horde_ruler_suffix_male$."
 chg_sons_of_chagatai: "Sons of Chagatai $rank_kingdom_horde_ruler_suffix_male$"
 chg_sons_of_chagatai_desc: "We can trace our line back to Chagatai $rank_kingdom_horde_ruler_suffix_male$, the second son of $genghis_khan_name_no_tooltip$, who once ruled these lands and established a powerful Mongolian successor state. Although a long time has passed since then, we can still claim considerable legitimacy by appealing to the legacy of our fierce ancestor."
 chg_tradition_of_conquest: "Tradition of Conquest"
 chg_tradition_of_conquest_desc: "Conquering people can be a tricky business; not everyone is ready to accept our enlightened government. Still, we have discovered that there are easier ways to bring people into our empire than building a mountain of skulls — something that our ancestors never learned."
 chg_scheming_court: "Scheming Court"
 chg_scheming_court_desc: "The constant power struggles between the various princes, nobles, cities, and tribes in the Chagatai Khanate have produced a nation of highly adept schemers. If we can put aside our quarrels and channel this energy towards outsmarting our enemies, it would be a great boon to our people."
 chg_glory_of_conquest: "The Glory of Conquest"
 chg_glory_of_conquest_desc: "Let it be known that boy cannot be a man unless he has ridden first with our invincible host, that he can take no wife until he has taken another man's wife, that he is not worthy of a hut until he has burnt down someone else's. Let service in our armies be the only route to manhood."
 chg_unrelenting_horde: "Unrelenting Horde"
 chg_unrelenting_horde_desc: "Our armies shall march like the great hordes of $genghis_khan_name_no_tooltip$. Our troops shall trample our enemies under our hooves like blades of grass of our native steppes. All shall fear the power of our armies!"

#Mongol Empire
 mge_pax_mongolica: "Pax Mongolica"
 mge_pax_mongolica_desc: "Having unified all $mongolian_culture$ territories under our banner, the stability and prosperity our people will be able to enjoy has not been seen since the times of the great $genghis_khan_name_no_tooltip$."
 mge_all_under_a_khan: "All Under a $rank_kingdom_horde_ruler_suffix_male$"
 mge_all_under_a_khan_desc: "$genghis_khan_name_no_tooltip$ unified great swathes of territory under his banner. Having unified those territories again under the authority of a single $rank_kingdom_horde_ruler_suffix_male$, all people in our empire shall swear allegiance to us."
 mge_ghostly_horses_of_the_plain: "Ghostly Horses of the Plain"
 mge_ghostly_horses_of_the_plain_desc: "The prowess of $mongolian_culture$ horsemen is renowned across the entire world. Our enemies shake in terror at the sight of a dust cloud in the distance, fearing that it might signify our cavalry's approach!"
 mge_yeke_mongol_ulus: "Yeke Mongol Ulus"
 mge_yeke_mongol_ulus_desc: "As the original Mongols, we restored the #italic Yeke Mongol Ulus#!, the Great Mongolian State, resurrecting the glory of $genghis_khan_name_no_tooltip$'s great empire. Given the slightest chance, our people will emulate the exploits of the Great $rank_kingdom_horde_ruler_suffix_male$ and reclaim his legacy, reuniting the once-vast territories of the $MGE_ADJ$ Khanate."
 mge_life_of_steppe_warrior: "The Life of a Steppe Warrior"
 mge_life_of_steppe_warrior_desc: "The steppe is a foreboding and unforgiving place for the unprepared. We are accustomed to living in this harsh environment, and as such our people are sturdy and have a knack for survival. We will ensure that all of our soldiers share these skills, and are thus able to more easily survive extreme situations."
 mge_multicultural_empire: "Multicultural Empire"
 mge_multicultural_empire_desc: "The territories of the great $MGE_ADJ$ Empire are home to many different peoples, all unified under the glory of the mighty $rank_kingdom_horde_ruler_suffix_male$."
 mge_improved_yam_system: "Improved Yam System"
 mge_improved_yam_system_desc: "The system of #italic yam#! posts all over our empire have facilitated communication and logistics since the times of the great $genghis_khan_name_no_tooltip$. After re-establishing and improving this system, our messengers can cross the massive expanse of our empire at speeds that were not even thought possible before."
 mge_mongolian_mobility: "Mongolian Mobility"
 mge_mongolian_mobility_desc: "Each of our soldiers typically maintains three or four horses, allowing them to change each time their mount becomes tired, and thereby travel at high speed for days without stopping. Furthermore, their extra mounts provide them with food reserves through mare's milk as well as horse meat, making our armies far less vulnerable to starvation than other, so-called civilized nations' armies. This allows us to outmaneuver our enemies with ease, covering a staggering amount of territory in shorter periods than they had believed to be possible."
 mge_kheshig: "The Kheshig"
 mge_kheshig_desc: "The #italic Kheshig#! once formed the formidable bodyguard of the Great $MGE_ADJ$ $rank_kingdom_horde_ruler_suffix_male$. Their descendants will continue to protect the $rank_kingdom_horde_ruler_suffix_male$ of $MGE$ as they ride into battle."
 mge_glory_of_the_khan: "Glory of the $rank_kingdom_horde_ruler_suffix_male$"
 mge_glory_of_the_khan_desc: "The extraordinary $genghis_khan_name_no_tooltip$ amassed a huge army like never before seen. We are heirs to his glory, and therefore our army will outstrip even the greatest $MGE_ADJ$ hordes of the past."

#Steppe Hordes
 horse_lords: "Horse-Lords of the Steppes"
 horse_lords_desc: "Our people and horses share an inseparable bond. Children grow up alongside foals, learning horsemanship from infancy. The careful breeding and exhaustive training of these mounts is our greatest pride, and we are recognized far and wide as the greatest horse-lords in the world."
 kurultai_advance: "Kurultai"
 kurultai_advance_desc: "Upon gathering leaders from each warrior band beneath one tent, we will elect the $rank_empire_horde_ruler_suffix_male$ who will lead our hordes to victory. In this #italic kurultai#!, the fate of our people is decided, and leaders will be chosen from among those who think themselves worthy of leading us."
 beyond_the_sun: "Beyond the Sun"
 beyond_the_sun_desc: "The age of the Great Hordes is not over yet. We have learned from the mistakes of our enemies and will now rise wiser, and stronger. All the land where the sun lives and dies must be ours."
 steppe_slave_raiding: "Steppe Slave Raiding"
 steppe_slave_raiding_desc: "Our raiding parties move as fast as the wind, hitting and running almost before anyone is aware of our presence. Looting the settlements we attack is in itself lucrative, but any prisoners we capture can be sold for a high price as well."
 caravanserai_advance: "$caravanserai$"
 caravanserai_advance_desc: "Trade routes appeared in $central_asia$ over the last millennium, creating the network known as the Silk Road. Key to this was the flourishing of $caravanserai$, places where merchants and their caravans could stop and rest along the way."
 borjigin_blood: "$borjigin_dynasty$ Blood"
 borjigin_blood_desc: "We share the blood of the $borjigin_dynasty$, of $genghis_khan_name_no_tooltip$ himself. All countries bow in recognition of our heritage, and all territories of the steppes shall recognize us as their own."
 turco_mongol_tradition: "Turco-Mongol Tradition"
 turco_mongol_tradition_desc: "Although the $borjigin_dynasty$ dynasty has a $mongolian_culture$ origin, the territories conquered by $genghis_khan_name_no_tooltip$ in $central_asia$ were mainly hose of $turkic_group$ populations. As a result, a distinct blended culture emerged between those two groups."
 yams_of_the_great_khan: "Yams of the Great $rank_kingdom_horde_ruler_suffix_male$"
 yams_of_the_great_khan_desc: "In order to ensure that messengers could travel fast enough to keep up with Mongol armies, $genghis_khan_name_no_tooltip$ instituted a system of relay stations or #italic yams#!, which were set up every 30-60 km to provide food, shelter and spare horses for Mongol army messengers. This allowed messages to travel as fast as a horse can gallop, with fatigue no longer slowing the speed a messenger could travel. By these means, our empire was able to overcome the logistical problems caused by the vast scale of the Pax Mongolica - at least temporarily."
 mandate_of_the_khan: "Mandate of the $rank_kingdom_horde_ruler_suffix_male$"
 mandate_of_the_khan_desc: "As the $rank_kingdom_horde_ruler_suffix_male$ commands, gods do. The unity of our people comes from their loyalty to our great leader. Only someone capable of bending the will of those loyal to the ruler is worthy of our devotion."
 there_shall_be_no_grass: "There Shall Be No Grass"
 there_shall_be_no_grass_desc: "Where our horde has passed, the grass will never grow again; the land will no longer feed our enemies. Day and night will pass, and the ground will stay silent, no crops to be collected. Some hungers you cannot escape."
 slavery_before_death: "Slavery Before Death"
 slavery_before_death_desc: "Razing and the destruction of cities are part of warfare. In the past, our warriors would go on a rampage, destroying and looting every item they could find, and killing those who stood in their way. While it strengthened their morale, their actions were far from economical. With this new approach, we can ensure to at least enslave those capable of work instead of blindly beheading them for the skull throne."
 horde_loyalty: "Horde Loyalty"
 horde_loyalty_desc: "The loyalty of our people is unquestionable. No soul who has lived under the thriving rule of the $rank_kingdom_horde_ruler_suffix_male$ would think of ever leaving it."
 horde_loot_discovery_advance: "Raid Profits"
 horde_loot_discovery_advance_desc: "Raiding has always been part of our identity. Pillaging and plundering are how our people learn to fight and obtain much of their personal fortune. There is no harm in fomenting even more raids — at least, no harm for us."
 trampling_horde: "Trampling Horde"
 trampling_horde_desc: "$genghis_khan_name_no_tooltip$ made the world tremble with his conquests, and we will do the same. The world will learn to fear the sound of galloping hoofbeats as our riders approach!"
 watchers_of_the_silk_road: "Watchers of the Silk Road"
 watchers_of_the_silk_road_desc: "We do not build, we do not trade. We take what we need... and sometimes more. Our warriors have kept an attentive watch upon foreign merchants and their passage, and we now know the safest paths for transporting our goods."
 logistics_of_khan: "Logistics of the $rank_kingdom_horde_ruler_suffix_male$"
 logistics_of_khan_desc: "People forget that the conquests of the Great $rank_kingdom_horde_ruler_suffix_male$ were as much due to superior logistics as military strength. We must emulate the techniques of the Great $rank_kingdom_horde_ruler_suffix_male$ while updating them with modern knowledge. This will give us greater scope for conquest."
 populating_the_steppes: "Populating the Steppes"
 populating_the_steppes_desc: "Just as we bring destruction to our enemies, we must bring peace to the many who reside within our borders. By upholding internal stability and encouraging talented men and women from all over our empire to plan and populate new and great cities, we will tame the steppes."
 a_magnanimous_empire: "A Magnanimous Empire"
 a_magnanimous_empire_desc: "The Great $rank_kingdom_horde_ruler_suffix_male$ was not only known for his fearsome sword, but also for the exceptional generosity towards those who wisely bent the knee to him. Those who welcome the rule of our tolerant empire shall be treated as part of it."
 horde_ardor: "Horde Ardor"
 horde_ardor_desc: "Our horses are almost as fierce and terrifying to our enemies as their riders are. The sight of our cavalry marching to war is like watching an unstoppable force of demons from hell."

#Persia
 ira_sasanian_heritage: "Sasanian Heritage"
 ira_sasanian_heritage_desc: "Before the Islamic Conquest of $persia_region$, the region was home to the Sasanian Empire, which once ruled from Caucasia in the West to the Kirthar Range in the East. Many of its great cultural accomplishments have shaped our cultural and artistic identity."
 ira_islamized_persia: "$IRA_ADJ$ $muslim$"
 ira_islamized_persia_desc: "The Islamization of $IRA$ has been a lengthy process. It is not yet completely finished, but our religion has still become one of the major pillars of our national identity. Many of our ancient traditions have been combined with the teachings of $muslim$, and now make up our current core culture."
 ira_shahnameh: "$shahnameh$"
 ira_shahnameh_desc: "The #italic $shahnameh$#! - the Book of Kings - is an epic poem, and a national treasure of the $farsi_culture$ people. Describing the historical and mythical past of the empires which once occupied Greater $persia_region$, its stories contribute to the $farsi_culture$ culture in uncountable dimensions."
 ira_restoration_of_cities: "Restoration of Cities"
 ira_restoration_of_cities_desc: "The Mongol invasion of $IRA$ was catastrophic for the entire region. Population centers of magnificent size were reduced to mere rubble. But it is finally time to rebuild what was once destroyed, and restore the awe-inspiring empire of $IRA$."
 ira_improved_silk_road: "Improve the Silk Road"
 ira_improved_silk_road_desc: "A system of upgrades to roads and bridges, a system of guards to protect the roads — for a small fee — and a chain of $caravanserai$ for rest and refreshment. All these improvements will help the merchants as they traverse the Silk Road, and also provide revenue for the state."
 ira_promotion_of_irrigation: "Promotion of Irrigation"
 ira_promotion_of_irrigation_desc: "As a consequence of the Mongol invasion of the past, $IRA$ is somewhat depopulated compared to the earlier empires which claimed these lands as their own. Promoting the practice of irrigation should help our people develop the agriculture needed to boost the local population and help us recover from the death toll of past conflicts."
 ira_persian_horses: "$IRA_ADJ$ Horses"
 ira_persian_horses_desc: "Horses play a fundamental role in our society. Many of our people are raised alongside their steeds, which is reflected in both the care our horse breeders take and the durability of our cavalry."
 ira_spread_of_persian_influence: "$IRA_ADJ$ Influence"
 ira_spread_of_persian_influence_desc: "$persian_language$ is an ancient language with a history longer than the lifespan of many empires. Even the $muslim_ADJ$ conquest could not diminish the core of the $IRA_ADJ$ identity, and many other states try to imitate our culture."
 ira_persian_rug_production: "$IRA_ADJ$ Rug Production"
 ira_persian_rug_production_desc: "$IRA$ has long been famous for its beautiful carpets and rugs. However, when the Mongols devastated the empire, much of this cultural heritage was lost. For $IRA$ to fully recover its tumbled glory, we must regain our economic strength, and restoring this legendary ancient industry is the first step in that direction."
 ira_safaviyya_order_hall: "$safaviyya_order_hall$"
 ira_safaviyya_order_hall_desc: "$safaviyya_order_hall_desc$"
 ira_the_qizilbash: "The $qizilbash$"
 ira_the_qizilbash_desc: "The #italic $qizilbash$#! - the Red Heads - are a Shia military movement founded by the Ṣafawiyya. Guided by their religious convictions and deep ties to Sufism, these warriors are primed to fight for our state and to form the core of our army."
 ira_the_qurchi: "The Qurchi"
 ira_the_qurchi_desc: "While the $qizilbash$ are the backbone of the $IRA_ADJ$ military, the #italic Qurchi#! are the royal bodyguards enlisted from their ranks. Instead of being given land, these soldiers are paid from the royal treasury."
 ira_religious_state: "Religious State"
 ira_religious_state_desc: "No matter what the official faith of our state is, $IRA$ will always be an inherently religious country. Every aspect of our life is guided by religious principles, and even the government itself acts with our core beliefs in mind when dealing with matters of morality and justice."
 ira_the_ghilman: "The $a_ghilman$"
 ira_the_ghilman_desc: "The $a_ghilman$ are a military unit made up of formerly $christian_ADJ$ slaves with Caucasian origins. The $a_ghilman$ undergo strict military training and are well-practiced in the usage of firearms, making them an essential part of the national army. They serve as a counterbalance to other influential branches of the military."
 ira_encouraged_art: "Encourage Art"
 ira_encouraged_art_desc: "$IRA_ADJ$ art is highly in demand. Collectors from near and far travel here in droves to purchase our exquisite creations. We should offer state support for our talented artists, as this trade in aesthetic goods is extremely lucrative."
 ira_nazir: "Court Nāẓir"
 ira_nazir_desc: "The #italic Nāẓir#!, or overseers, are territorial administrators, and represent the eyes and ears of the Šâhanšâh. All actions of the court are supervised by the Nāẓir, and courtiers are promoted on their command. Even the Grand Vizier must work in association with the Nāẓir."
 ira_the_tofangchi: "The $a_tofangchi$"
 ira_the_tofangchi_desc: "The $a_tofangchi$ are our musket corps. Although firearms have been in use for a while, their presence in our ranks is highly irregular, as many of our fighters prefer to use their traditional weapon of bow and arrow. The regiments of the $a_tofangchi$ aim to change this, as they are trained in the use of modern weaponry."
 ira_the_tupchi: "The $a_tupchi$"
 ira_the_tupchi_desc: "$a_tupchi_desc$"
 ira_religious_unity_policy: "Religious Unity Policy"
 ira_religious_unity_policy_desc: "The time of great religious divides has come to its end. In these turbulent times, $muslim$ cannot afford any more in-fighting. We shall advocate for a policy of internal and external religious unity, and come to peace with what we used to consider heresy."
 ira_afsharid_navy: "$persian_gulf$ Coastal Defense"
 ira_afsharid_navy_desc: "Although our lands are located mostly in the highlands of the Zagros Mountains, $IRA$ does have coastal possessions. While past dynasties might have paid little attention to the maritime protection of the empire, our people are more aware of the sea, and our sailors are eager to defend our coasts."
 ira_jazayerchi: "The $a_jazayerchi$ Infantry Corps"
 ira_jazayerchi_desc: "$a_jazayerchi_desc$"

#Beyliks and Rum
 uc_bey_advance: "$uc_bey$"
 uc_bey_advance_desc: "$uc_bey_desc$"
 seljuk_roots: "Seljuk Roots"
 seljuk_roots_desc: "We are surrounded by enemies on all sides, making a strong military an absolute necessity. Fortunately, we are not weak people. From the irregular Ġuzāt and the Akıncılar raiders to the Sipâhi of the $TUR$, the world has come to fear and respect our military might. Let us build an army worthy of an empire, inspired by our glorious traditions and history, honing our might through the ages."
 heirs_of_rum: "Scions of Rûm"
 heirs_of_rum_desc: "After surviving a turbulent period, and winning the struggle to dominate our neighboring Beyliks, the time has finally come for us to restore the borders of the once-great Sultanate of Rûm!"
 splendor_of_anatolia: "Splendor of $anatolia_region$"
 splendor_of_anatolia_desc: "Our region is home to some of the most impressive madrasas and mosques in the entire $muslim_ADJ$ world. With their meticulous attention to detail and abundant talent, our artisans shine with unmatched prowess."
 persian_in_the_court: "$IRA_ADJ$ in the Court"
 persian_in_the_court_desc: "Persian has served as our administrative language for quite some time, a legacy stemming from our ancient roots. This has helped us transcend the social and cultural barriers that often arise in highly diverse nations like ours."
 akinji_cavalry: "Akıncılar"
 akinji_cavalry_desc: "Our light cavalry regiments often raid and sometimes even settle in neighboring territories. Known for their courage in battle, they lived and operated as raiders on the frontier, often the first line of response against incursions from our rivals and perfectly positioned to attack and rout enemy trade routes. "
 crossroads_of_commerce: "Crossroads of Commerce"
 crossroads_of_commerce_desc: "Our $caravanserais$ support the flow of commerce, information, and people from $china$ to $europe$ across our lands. This proximity to important trade routes has unleashed a flood of affluence throughout our nation."
 fratricide_succesion_advance: "$fratricide_succesion$"
 fratricide_succesion_advance_desc: "$fratricide_succesion_desc$"
#Ruthenia
 flexible_loyalty: "Flexible Loyalty"
 flexible_loyalty_desc: "Our nation is caught in a conflux between the warring religions of $europe$ and a variety of foreign threats. The only way we can ensure our survival in this storm is to take a flexible stance towards cooperating with local mercenary bands."
 heritage_of_the_rus: "The Legacy of the Rus'"
 heritage_of_the_rus_desc: "The lands of the Rus' shattered into fragmented states long ago, but the memory of our once-great empire, ruled from $kyiv$, burns brightly in us all. If we style ourselves in the old fashion, and highlight our connection to our ancestors, we will be able to carve out a distinctive set of traditions for our people."
 mother_of_russian_cities: "The Mother of Rus' States"
 mother_of_russian_cities_desc: "$kyiv$ was once the shining capital of a great empire spanning from the northern forests of $novgorod$ to the southern shores of the Black Sea. After suffering the dissolution of the Rus' and the invasions of the Mongols, little remained of it. But the time has come for our revival, and no matter what our cities have endured, we vow that they will recover and prosper for centuries to come!"
 international_influences: "Foreign Influences"
 international_influences_desc: "Many foreign merchants and travelers frequent our roads, bringing vast wealth to our land. We could convince some of these avid traders to permanently settle in our towns and cities, if we assure them they will not face persecution for their beliefs."
 reuniting_rus: "Reuniting the Rus'"
 reuniting_rus_desc: "We are the true heir of the Kievan Rus', and those lands must be reunited under our banner!"
 united_faith: "A United Faith"
 united_faith_desc: "No matter our situation, we must ensure the unity of our faith. Only if our clergy is aligned, and no discord exists between factions of the faithful, will they be able to focus on their primary function of guiding and aiding our population."
 east_and_west: "East and West"
 east_and_west_desc: "Our strategic position between eastern and western empires has given our merchants the opportunity to act as essential middlemen for lucrative regional trade routes."
 ruthenian_state_advance: "A $UKR_ADJ$ State"
 ruthenian_state_advance_desc: "In the past, we bowed to foreign influences, and were obliged to adapt to their customs to ensure friendly relations. But times have changed, and now we must affirm our own customs, or risk falling into the sphere of foreign influences again."
 ruthenian_rural_buildings: "$UKR_ADJ$ Villages"
 ruthenian_rural_buildings_desc: "Much of $ruthenia_region$ is rural, empty land. While our great cities like $kyiv$ serve many important purposes, we cannot neglect the remote lands or small villages that provide us with crucial supplies of food and raw materials."
 ruthenia_commoner_education: "Education for All $UKR_ADJ$ People"
 ruthenia_commoner_education_desc: "By establishing local schools, we will ensure that our population is well-educated at all levels of society."

 #Cossacks
 cossack_raids: "Cossack Raids"
 cossack_raids_desc: "Our Cossacks live in a near-permanent state of war, and have adopted pillaging and raiding tactics similar to those of the $MGE_ADJ$ hordes. Although that will surely not earn us many friends, it will decidedly enrich our coffers."
 tamed_steppes: "Tamed Steppes"
 tamed_steppes_desc: "Although most people would qualify the steppes as inhospitable and even worthless land, our Cossacks have adapted to the harsh environment, and are able not only to survive but to thrive in the wilderness. Thanks to their expertise, we are able to exploit those lands and benefit from them."
 cossacks_recruitment: "Cossack Recruitment"
 cossacks_recruitment_desc: "The Cossacks are fearsome warriors, and their skill in surviving in the unforgiving wilderness of the steppes is almost unmatched. There is a place for them in our state as well as our military, as an elite force that will enforce our lordship over the steppes."
 cossacks_escaped_serfs: "Escaped Serfs"
 cossacks_escaped_serfs_desc: "Many Cossacks were born into serfdom. Tired of feudal oppression, they fled their masters, and sought lives of freedom on the steppes. We must continue to welcome these escaped serfs into our society."
 cossacks_hetmanate: "Cossack Hetmanate"
 cossacks_hetmanate_desc: "There are no kings or khans among the Cossacks. They are led by the #italic ataman#!, who is their highest military commander, but in matters of state and society simply the first among equals. Political power lies in the Rada, the legislative and military assembly, in which all Cossacks can have their say."
 cossack_administration: "Cossack Administration"
 cossack_administration_desc: "By granting our Cossack leaders dual roles as both generals and administrators, we will be able to streamline army recruitment, and ensure a high training standard."
 steppe_riders: "Steppe Riders"
 steppe_riders_desc: "The steppes are a peculiar and treacherous place to live. When you enter the Endless Sea of Grass, your horse stops being an animal or piece of property, and truly becomes a part of you. Just as your body cannot survive without a heart or a liver, in the steppes it certainly will not survive without a horse. But the good news is that those who find themselves in that situation will find countless interesting ways to perish..."
 cossacks_exploration_advance: "Cossack Exploration"
 cossacks_exploration_advance_desc: "Our Cossacks live at the edges of our country, making them excellent candidates to serve as explorers and go beyond our borders to the final frontier, to explore strange new lands, to seek out new countries and new civilizations, to boldly go where no one has gone before..."
 cossacks_military_society: "Military Society"
 cossacks_military_society_desc: "There is almost no division between civil and military society among the Cossacks. They are a host, defined by their people rather than by the land they control, and their people are warriors. We must ensure that military divisions properly meet our administrative needs as the host expands."
 cossacks_serf_autonomy: "Cossack Serf Autonomy"
 cossacks_serf_autonomy_desc: "No man should suffer tyranny among the Cossacks. When we conquer new territories, the serfs, peasants, and slaves there will be treated as equals to our own people."
 cossacks_colonization_advance: "Cossack Colonization"
 cossacks_colonization_advance_desc: "Our Cossacks are already used to roaming freely and going beyond our borders. We can use them to advance further settlement, and thus expand our influence to those unclaimed lands."
 cossacks_registered: "Cossack Registers"
 cossacks_registered_desc: "As the ranks of our Cossacks swell, we must keep account of the strength of each regiment, their numbers, and how well they are supplied. A centralized registry will allow us to support the needs of all Cossacks."
 cossack_reputation: "Fearsome Reputation"
 cossack_reputation_desc: "Our Cossacks have already built for themselves a reputation of fierce warriors. That in itself is enough to instill fear in the hearts of our enemies when they have to face them in battle."

 #Georgian culture
 geo_georgian_highlands: "$GEO_ADJ$ Highlands"
 geo_georgian_highlands_desc: "The lands of $GEO$ are nestled among the Caucasus Mountains, and no foreign power has ever found it easy to penetrate our territory. Our tenacity and resilience are legendary."
 geo_georgian_script: "$georgian_culture$ Script"
 geo_georgian_script_desc: "The '$georgian_culture$ alphabet', created centuries ago, is not just one alphabet, but in fact three. #italic Mkhedruli#! is the script used by the civil administration, while #italic Asomtavruli#! and #italic Nuskhuri#! is used by our church. As such, our Holy Scriptures can remain uninfluenced by the lay language, while our people can still feel connected to them."
 geo_georgian_isolation: "$GEO_ADJ$ Isolation"
 geo_georgian_isolation_desc: "Surrounded by powerful countries with vastly different religions and cultures from ours, we are forced to use opportunistic diplomacy, and often change allegiances in order to appease everyone and preserve peace for as long as possible."
 geo_legacy_of_saint_nino: "Legacy of Saint Nino"
 geo_legacy_of_saint_nino_desc: "$GEO$ has one of the oldest $christian_ADJ$ churches in the world, tracing its roots back to the conversion of the region by Saint Nino over a millennium ago. Through the centuries, the $GEO_ADJ$ Church has served as an increasingly unifying force in all $GEO_ADJ$ states, and has served as a central element in $GEO_ADJ$ culture in the face of $BYZ_ADJ$, $MGE_ADJ$, and $muslim_ADJ$ influence. With few other $christian_ADJ$ kingdoms left in this region, and given the splintered loyalties within $GEO$, the Church still plays an important role as a unifying force against outsiders."
 geo_restoration_of_fortresses_and_churches: "Restoration of Fortresses and Churches"
 geo_restoration_of_fortresses_and_churches_desc: "Our many fortresses and churches have helped our country to resist and continue to survive among encroaching foreign influences. Our fortresses protect the land while our churches protect our spirit, and we must keep both in prime condition if we are to thrive."
 geo_sadrosho_districts: "Sadrosho Districts"
 geo_sadrosho_districts_desc: "#italic Sadrosho#!, banners, are special military districts used for mobilization purposes. By dividing our territory into several sadrosho, each under the command of their own dedicated military official, we can better organize the recruitment and distribution of all our troops."
 geo_dasturlamali: "Dasturlamali"
 geo_dasturlamali_desc: "$GEO$ has experienced tumultuous centuries since the $MGE_ADJ$ invasion, marked by periodic division, shifting external pressures, and the rising influence of the local nobility. The old $GEO_ADJ$ feudal system has been made obsolete, or at least partially discarded. The $geo_dasturlamali$, a comprehensive set of rules and guidelines detailing the obligations of subjects and nobles toward king and state, strengthens internal order and serves as the foundation for our kingdom's legal framework."
 geo_georgian_embassies: "$GEO_ADJ$ Embassies"
 geo_georgian_embassies_desc: "We have a tradition of establishing strong diplomatic ties with all nations around us, regardless of our possible differences. As a result, our diplomats are always well received and respected."
 geo_georgian_unification: "$GEO_ADJ$ Unification"
 geo_georgian_unification_desc: "$GEO$ has been divided in the past, both by foreign influences and internal causes. But the patriotic $GEO_ADJ$ people are more than willing to fight to ensure that $GEO$ is never divided again."

 #Georgia Specific
 geo_legacy_of_saint_george: "Legacy of Saint George"
 geo_legacy_of_saint_george_desc: "Our association with the legendary Saint George is well known through both the $christian_ADJ$ and $muslim_ADJ$ worlds. As he bravely faced and slew the fearsome dragon, so will our soldiers face our enemies in battle."
 geo_bagrationi_dynasty: "$Bagrationi$ Dynasty"
 geo_bagrationi_dynasty_desc: "A dynasty so old that its origins are shrouded in mystery, kings and queens of the $Bagrationi$ house have ruled $GEO$ ever since the 9th century, first as its princes and then as monarchs."
 geo_georgian_golden_age: "$GEO_ADJ$ Golden Age"
 geo_georgian_golden_age_desc: "$GEO$ enjoyed a cultural and religious Golden Age that was brought to a sudden stop, due to the $MGE_ADJ$ invasions. That period witnessed the peak of our cultural achievements, but we will now return to it, and achieve even greater heights."
 geo_legacy_of_tamar: "Legacy of Tamar"
 geo_legacy_of_tamar_desc: "Tamar was one of the greatest rulers our nation ever had. Her military and cultural successes are legendary, and the mere utterance of her name still stirs reverence in all $GEO_ADJ$ hearts."
 geo_david_the_builder: "Davit the Builder"
 geo_david_the_builder_desc: "Considered the greatest ruler in the history of our country, King Davit the Builder brought $GEO$ to its pinnacle. He built a powerful, culturally influential kingdom, and a beacon for $christian$ and the $GEO_ADJ$ people."
 geo_georgian_titles: "$GEO_ADJ$ Titles"
 geo_georgian_titles_desc: "'King of Kings, strong and invincible, majestic and protector of the holy kingdom of the Abkhazians, Iberians, Ranis, Kakhetians, Armenians, Shahanshah and Shirvanshah, of the East and the West, of the South and the North, of both countries, of two thrones and crowns, the godlike Suzerain and the Sovereign of the Throne.' The titles of our ruler are numerous, and all at court shall respect them!"
 geo_georgian_numismatics: "$GEO_ADJ$ Numismatics"
 geo_georgian_numismatics_desc: "Our country has a rich tradition of minting coins, inscribing them not only in $georgian_language$ but also in $arabic_language$ and $persian_language$, as they serve as currency for trade through our country and those that neighbor us."
 geo_beacon_of_christianity: "Beacon of $christian$"
 geo_beacon_of_christianity_desc: "$GEO$ has been a haven for $christian$ in the Caucasus for centuries, even after being surrounded and isolated by followers of $muslim$. The ardent faith of our people is a source of inspiration for all our religious brethren."
 geo_georgian_principalities: "$GEO_ADJ$ Principalities"
 geo_georgian_principalities_desc: "Our regional administration is divided into many different principalities and territories. Delegating authority this way allows us to exert our rule more effectively."
 geo_georgian_resilience: "$GEO_ADJ$ Resilience"
 geo_georgian_resilience_desc: "Our country has been torn apart, by external and internal influences, more than once in its long history. However, like the phoenix of legend, it has risen from the ashes and established itself as a presence to reckon with each time. The resilience of our people is commendable."

 #Samtskhe
 sme_jaqeli_dynasty: "$jaqeli_dynasty$ Dynasty"
 sme_jaqeli_dynasty_desc: "Despite its humble origins, the $jaqeli_dynasty$ dynasty has been able to establish many successful relationships, forging strong ties to the rulers of surrounding states. As such, we have a positive reputation in the diplomatic sphere."
 sme_atabegs_of_samtskhe: "Atabegs of $SME$"
 sme_atabegs_of_samtskhe_desc: "We are not just one part of the Kingdom of $GEO$, as a long time ago we received royal recognition and, with it, the title of Atabeg. This title had previously been granted only to the Armenian vassals, and therefore its conveyance is a sign of distinction and of the respect that the $GEO_ADJ$ monarch has for us."
 sme_proactive_diplomacy: "Proactive Diplomacy"
 sme_proactive_diplomacy_desc: "While still a part of $GEO$, $SME$ operates with substantial independence. This privileged position requires constant diplomatic awareness and a policy of active diplomacy, ensuring that we always have a direct channel to those in power. We do all this while actively engaging in our internal politics, meddling with the succession and forging dynastic alliances as best benefits us. The survival of our relatively small state depends on upholding these diplomatic traditions. Let it never be said that we have done too little or acted without sufficient wisdom!"
 sme_fortresses_of_samtskhe: "Fortresses of $SME$"
 sme_fortresses_of_samtskhe_desc: "Our mountainous terrain has acted as a shield against foreign invaders many times. Because of this, we learned to build strong fortresses and to always be prepared for defensive warfare. This legacy of strength and readiness is one we must strive at all costs to uphold — the fortresses of $SME$ must be perpetually well maintained, manned, and supplied, as foreign invaders are not a possibility but a certainty."
 sme_independent_ambitions: "Independent Ambitions"
 sme_independent_ambitions_desc: "$SME$ has often been obligated to bow to foreign rulers, be they $muslim_ADJ$ or $christian_ADJ$; $georgian_culture$, $turkic_group$, or $iranian_group$. To build an enduring state that survives as an independent entity and can stand against covetous outsiders, we must establish independent institutions: issuing our own coinage, creating our own laws, and patronizing our own theologians and writers."
 sme_protect_trade_routes: "Protect the Trade Routes"
 sme_protect_trade_routes_desc: "Our position at the crossroads of $georgia_area$, $anatolia_region$, $armenia_area$, and $azerbaijan_area$ also means that a great number of traders seek to cross our lands. However, the constant threat of being raided by nomadic tribesmen means that some have come to doubt the safety of traveling on our roads. We must properly defend all roads and merchant inns in our nation so that trade revenue can flow into our state treasury unhindered."
 sme_frontier_warriors: "Frontier Warriors"
 sme_frontier_warriors_desc: "The Caucasus have been shaped by nomadic emperors since time immemorial, but the lush pastures of $SME$ have convinced many tribesmen to settle. We must not let this affect the stability of our kingdom, but instead make arrangements with these settling tribes so that they contribute to our military ambitions in exchange for the lands they claim."
 sme_sacred_land: "A Sacred Land"
 sme_sacred_land_desc: "The lands of $SME$ are home to places both sacred and revered among the $georgian_culture$ people. The cave monastery of Vardzia, the ancient church of Atskuri with its miraculous icon of the Virgin Mary, and the Monastery of Ancha with its Anchiskhati icon, are some of the most significant holy places in our realm. By protecting and curating the $SME$ church, setting it apart as distinct from that of $GEO$, we ensure that our people stand united even in the face of adversity."
 sme_bridge_between_worlds: "Bridge Between Worlds"
 sme_bridge_between_worlds_desc: "Our country has always served as a bridge between the $christian_ADJ$ and $muslim_ADJ$ worlds. As such, people of both faiths within our borders have become accustomed to interacting with each other."

 #Armenia
 arm_legacy_of_hayk: "Legacy of Hayk"
 arm_legacy_of_hayk_desc: "Hayk, descendant of Noah, founded our kingdom at the base of Mount Ararat after defeating the Babylonians, and thus became the patriarch of our nation. All our people know this story, and all are proud to belong to such an ancient lineage."
 arm_mount_ararat: "Mount Ararat"
 arm_mount_ararat_desc: "Mount Ararat, where Noah's Ark came to rest after the Great Flood, is where our nation first formed. As a result, our people resist with a particularly holy fervor when the sanctity of our territory is threatened."
 arm_apostolic_church: "$ARM_ADJ$ Apostolic Church"
 arm_apostolic_church_desc: "$ARM$ was the first nation to declare $christian$ as its state religion. As such, our religious traditions, especially those of our clergy, are a major component of our identity."
 arm_land_reclamation: "Reclaimed Territory"
 arm_land_reclamation_desc: "$ARM$ has been ravaged by war for centuries. By reclaiming the lands lost in these struggles, making them suitable for inhabitation, and restoring ruined churches and fortresses, we can improve the lives of our people and take firmer control over our territory."
 arm_border_nation: "Border Nation"
 arm_border_nation_desc: "Since ancient times, $ARM$ has been the reluctant battleground between larger nations. Even after regaining our sovereignty, remaining neutral is extremely difficult — it is not impossible to appease everyone, but it is not easy, either."
 arm_melikdom_organization: "Melikdom Organization"
 arm_melikdom_organization_desc: "As one of the few bastions of an independent $ARM_ADJ$ state, $ARM$ is governed by feudal suzerains called #italic meliks#!, as the old system of $arm_nakharar_titles$ collapsed after the $MGE_ADJ$ invasions. The relationship between meliks and their subordinates is that of a military commanding officer and junior officer, and not of feudal lord and a serf."
 arm_mountain_armies: "Mountain Armies"
 arm_mountain_armies_desc: "$ARM$ is a mountainous land. Our people have adapted to this terrain over the centuries, and we have developed many ways to use those mountains to our advantage. Our armies will gather readily when called, confident in the additional protection our unique environment provides."
 arm_nakharar_titles: "Nakharar Titles"
 arm_nakharar_titles_desc: "The #italic Nakharar#! system of titles was in continuous use in $ARM$ from its inception until the times of the $MGE_ADJ$ invasions, when it collapsed. Although the titles themselves are no longer in use, certain characteristics of that system persist, enhancing the abilities of both our nobles and armies."
 arm_greater_armenia: "Greater $ARM$"
 arm_greater_armenia_desc: "In our long and illustrious history, $ARM_ADJ$ kingdoms spread over a large territory, and so did our $armenian_culture$ people. By emulating these bygone realms, we become a beacon of all $armenian_culture$ people, who will happily unite under our leadership."
 arm_highland_fortresses: "Highland Fortresses"
 arm_highland_fortresses_desc: "Our fortresses are a brilliant emblem of our resilience and fortitude, built to endure not only the difficult local climate, but also any foreign invader foolish enough to mount an attack into our unforgiving territory."
 
 #Switzerland
 swiss_oath_of_rutli: "The Oath of Rütli"
 swiss_oath_of_rutli_desc: "Let us recite the vow of this new union: We shall be one nation of brothers, and no trouble or danger shall separate us. No foreign tyrant shall ever rule over our realm!"
 swiss_halberd_infantry: "Legacy of Morgarten"
 swiss_halberd_infantry_desc: "When we defended our freedom in the Battle of Morgarten, we had a very important advantage over the cursed $habsburg_dynasty$ invaders: the halberd, a simple yet lethal weapon that can repel any foe with ease. Training our troops to use halberds with skill will give us an advantage against our foes, even if they have superior numbers."
 swiss_eternal_alliance: "Eternal Alliance of the Forest Cantons"
 swiss_eternal_alliance_desc: "We have forged an eternal alliance with our friends in the neighboring Cantons. Had it not been for this treaty, we would have surely succumbed to the $habsburg_dynasty$ invaders and fallen under the rule of foreign tyrants yet again. These alliances will ensure our survival for centuries to come."
 swiss_mercenaries: "$SWI_ADJ$ Mercenaries"
 swiss_mercenaries_desc: "Our troops are widely recognized as exceptional combatants. Fortunately for us, we are not permanently in need of their services, which allows us to rent them out to foreign powers, earning extra revenue and providing them with valuable combat experience."
 the_swiss_confederation: "Principles of the Confederation"
 the_swiss_confederation_desc: "Every member of our confederation contributes valuable resources to our cause. Our decentralized approach to governing this alliance of states serves a greater purpose, so we cannot break into civil war when disagreements arise between towns, cities, or our cantons."
 swiss_reislaufer: "The Reisläufer"
 swiss_reislaufer_desc: "$a_reislaufer_desc$ We should form regiments from these veterans and employ them in our own armies."
 swiss_recovery_and_prosperity: "A Tormented Realm"
 swiss_recovery_and_prosperity_desc: "Past conflicts have shown that repelling invaders is not our only concern. The valleys of our cantons are devastated with each battle; careful steps must be taken to bring prosperity back to our land."
 alpine_defensiveness: "Alpine Defense"
 alpine_defensiveness_desc: "The $SWI_ADJ$ landscape is dominated by rough terrain, mountains, and valleys. We must find a way to overcome the challenges our environment presents, and to find a way to use it as a weapon against any potential invaders."
 swiss_religious_refuge: "Haven for Refugees"
 swiss_religious_refuge_desc: "While others exile religious minorities and disruptive figures, we will gladly offer them a home. In $SWI$, they will be able to establish a new life for themselves, and as a result will be inclined to praise our rule."
 swiss_tolerance: "$SWI_ADJ$ Tolerance"
 swiss_tolerance_desc: "Why must we kill each other over obscure issues of transubstantiation and predestination, when we could spend that energy turning our mountain home into a realm united once more?\n\nFor that reason, every Canton of $SWI$ will have the ultimate jurisdiction over religious matters in their region. While this will not eliminate all religious strife in our country, it will at least ensure that no matter what someone believes, our people will be able to find a place where they are not persecuted."
 swiss_clockwork: "Masters of Clockwork"
 swiss_clockwork_desc: "Some fools think that clockwork is for timekeeping alone, but when one witnesses the power of rotating gears, it is obvious that clockwork can do just about anything one wants it to do. Maybe the Creator of the Universe Himself wound up existence like a clock and let the gears spin on their own, ticking away the centuries. Be that as it may, $SWI_ADJ$ clockmakers are the greatest masters of the art — barring God Himself, of course."
 swiss_ambition: "$SWI_ADJ$ Enlightenment"
 swiss_ambition_desc: "We do not need to construct a unique identity for our country, since our people readily rally around the banners of their cantons and the ideals of our confederacy. But by funding our most enlightened scholars of our time, we will be able to shape a new age for the $SWI_ADJ$ people, and solidify the unique traits of our #italic Eidgenossenschaft#!. This Helvetism forms the foundation of our Enlightenment."
 swiss_banking: "$SWI_ADJ$ Banking"
 swiss_banking_desc: "We are a sanctuary, not only for persecuted people from other countries, but also for their wealth. In large vaults, hidden away behind strong walls and protected by our most trustworthy soldiers, we will be the best place for every citizen of the poor, war-torn countries of the world to stash their valuables."

 #Zimbabwe
 zmw_experienced_cattle_herder: "Experienced Herders"
 zmw_experienced_cattle_herder_desc: "Herding animals requires some skill, and is crucial for our survival. If we want to stabilize and expand our rule, we should expand our herding and grazing grounds as well."
 zmw_stone_builders: "Builders of $ZMW$"
 zmw_stone_builders_desc: "The astonishing stone buildings of $ZMW$ impress many visitors to our great country. Continuing our architectural traditions will allow us to expand our great cities of stone, which shall stand tall for centuries."
 zmw_encourage_new_settlements: "New Grounds for Resources"
 zmw_encourage_new_settlements_desc: "Beyond our borders lie vast expanses of land, studded with resources and herding grounds waiting eagerly to be claimed by our people. We must encourage settlement in these territories, and establish new towns."
 zmw_rekindling_the_royal_fires: "Rekindling the Royal Fires"
 zmw_rekindling_the_royal_fires_desc: "Our subordinate chiefs must prove their loyalty to us and the gods by traveling to the capital once a year, and using our flames to rekindle their own local fire. Once a year has passed, our army will extinguish their fire, and they will have to make a new journey."
 zmw_strict_gold_regulations: "$goods_gold$ Trade Restrictions"
 zmw_strict_gold_regulations_desc: "The land provides us with plenty of goods that foreign merchants have a keen interest in, but our abundant reserves of $goods_gold$ shine brighter than any other. While such riches are a blessing, the state must tightly regulate all trade and ownership of $goods_gold$ in order to help prevent the destructive effects of human greed and skullduggery from affecting  our bottom line."
 zmw_spokesman_before_the_dead: "Spokesman Before the Dead"
 zmw_spokesman_before_the_dead_desc: "Our ruler is not only our leader in the temporal sense, but is also expected to speak on our behalf before the spirits of the dead. Prior to any campaign or harvest, he will communicate our respect and needs to the spirits of our ancestors through ceremonies or dances. Without a diligent ruler to maintain the royal graves and keep in close contact with our dead, things might go awry very quickly."
 zmw_elected_administrators: "Provincial Administrators"
 zmw_elected_administrators_desc: "Traditionally, all of our administrators, even on the local level, have been direct relatives of our ruler. As our empire has grown and matured, however, it is time we show deference to the local knowledge of our subjects, and allow them to select their own administrators."
 zmw_discipline_and_traning: "Regular Training"
 zmw_discipline_and_traning_desc: "Discipline, preparation, and training are the factors that win battles. With this in mind, our commanders have successfully pioneered elaborate new tactics and organizational improvements. Let us make good use of these innovations by dividing our warriors into regiments and having them train regularly with their bows, assegais, daggers, and axes. Practice will also allow them to fight in formation without fear, defeating many more numerous enemies."
 zmw_merchant_taxes: "Mercantile Fees"
 zmw_merchant_taxes_desc: "With the arrival of new traders in the Zambezi area, the need has arisen to assert our authority. Anyone who wishes to trade here, and carry our precious $goods_gold$ and $ivory$ to other shores, must first be approved by our ruler and pay a tax in order to be granted access. Should payments lapse, all foreign merchandise will be confiscated by our state."
 zmw_controlling_the_mutapan_riches: "Controlling the Riches"
 zmw_controlling_the_mutapan_riches_desc: "Western travelers have named our land 'Ophir', and the riches of our gold mines and the Zambezi trade have made many visitors envious of us over the centuries. Let us leverage our control over these riches, and build permanent trade posts which can grow into sprawling cities."
 zmw_empowering_the_rozwi: "Empowering the Rozwi"
 zmw_empowering_the_rozwi_desc: "Our lands are home to many skilled warriors. Among them are the Rozwi, disciplined fighters who stand ready to defend our people against any who would dare try to take our rightful lands from us."
 zmw_cow_horn_tactics: "Cow-Horn Formations"
 zmw_cow_horn_tactics_desc: "Adapting to the ever-changing tactics of war is no easy task. Against potentially superior enemies, we should rely on our own mobility over everything else. If we are able to pin our foes into a melee fight and send a regiment to flank and encircle their troops, we will be able to inflict devastating casualties."

 #Khmer
 khm_religious_flexibility: "One Faith for $KHM$"
 khm_religious_flexibility_desc: "Our country has lived through tumultuous times as royal patronage shifted between both $hindu$ and various branches of $buddhist$. We must promote the chosen faith throughout our country to breed stability, and trust that our ruler has chosen the true path for our people."
 khm_royal_procession: "$KHM_ADJ$ Royal Processions"
 khm_royal_procession_desc: "Our rulers excel at creating dazzling processions, events of glorious splendor that very few others can rival. These extravagant demonstrations of our national wealth confirm the power and brilliance of the ruler and the astonishing riches of our nation. The glittering procession of elephants, treasure, and the royal guard will strike awe and respect in the hearts of our people, winning their unbroken loyalty and admiration."
 khm_ballista_elephants: "Ballista Elephants"
 khm_ballista_elephants_desc: "Elephants are impressive creatures and tower over any other animal we have seen. It is time to utilize these qualities to strike fear into our enemies by using these majestic animals in warfare. Elephants are also able to carry great weight, allowing us to mount war machines on them. Constructing double-stringed crossbows and equipping our elephants with them will create a tool that will allow us to dominate the battlefields better than ever before."
 khm_great_builders: "Hydraulic Cities"
 khm_great_builders_desc: "Our great cities are home to many #italic barays#! and canals, primed to store and disperse water throughout the area. Constructing and maintaining this network of waterways with skill will ensure our population will thrive even during the unstable monsoon seasons."
 khm_recruitment_of_peasants: "Recruit the Peasantry"
 khm_recruitment_of_peasants_desc: "We will need to reinforce our army with new recruits, which are easily found among the peasant class. With some training, we will be able to ensure the ranks can be refilled at any time by capable soldiers."
 khm_foreign_production_skills: "Invite Foreign Experts"
 khm_foreign_production_skills_desc: "While our own people are not familiar with silk-weaving and prefer other fabrics, we are lucky that foreign artisans have settled in our cities and established their own weaving workshops. We should adopt this approach for other industries by directly inviting foreign artisans to bring their skills here, and thereby universally expand our production."
 khm_utilize_the_rivers: "The Lifeblood of $KHM$"
 khm_utilize_the_rivers_desc: "Our rivers provide an excellent way to transport goods harvested and produced in our inland territories to our harbors, which are connected to foreign trade routes. Utilizing this transport network will also connect our cities and make communication between them faster."
 khm_champa_mercenaries: "Mercenary Leaders of $CHA$"
 khm_champa_mercenaries_desc: "In the past, we both fought with and alongside the fierce warriors of $CHA$. If we can secure the service of their most capable leaders in times of conflict, we can ensure our own forces are trained and well-rested, ready to leap into battle as fresh reinforcements."
 khm_restore_angkor: "Restoration of $angkor$"
 khm_restore_angkor_desc: "The great city of $angkor$ was once a brilliant example of our architectural genius. Due to external pressures, we had to abandon our construction efforts, but we should connect to the roots of our society and start constructing new monuments to our splendor again."
 khm_modern_navy: "A Modern Navy for $KHM$"
 khm_modern_navy_desc: "We cannot allow others to dominate the seas and control the trade our state depends on. Let us create a new, modern naval force capable of taking on any pirate or rival navy in $south_east_asia$."
 khm_invest_in_irrigation: "Expand the Barays"
 khm_invest_in_irrigation_desc: "While our existing water reservoirs meet our current agricultural demands, we could easily support more people if we were to dig new #italic barays#! in other parts of our country, creating the foundations for new urban hubs."
 khm_protection_from_raids: "Secure the Borders"
 khm_protection_from_raids_desc: "Our lands are frequently threatened by invasion, and our precious $angkor$ lies especially vulnerable to siege. We must invest into a comprehensive system of fortifications, with sufficient garrisons to withstand any invading force, so that we can protect our people and national treasures from foreign conquest."
 khm_old_grudges: "Guided by Rivalry"
 khm_old_grudges_desc: "Our people were humiliated in the past by being forced to bow to foreign invaders. While not every defeat can be avoided, we use these old rivalries to spur our people to fight harder and longer on the battlefield, burning to erase the shame of these ancient humiliations."


 peasant_connections_advance: "Peasant Connections"
 peasant_connections_advance_desc: "Our merchants have established connections to the rural settlements within and beyond our borders. As a result, they are able to secure better prices for food than would otherwise be expected."

 
 
 
 settle_the_frontier_advance: "Call of the Frontier"
 settle_the_frontier_advance_desc: "We are surrounded by weakly defended territories ripe for the taking! Let us send out some adventurous courtiers to enforce our authority in these unclaimed lands."

#Trebizond
 tre_pontic_trail_mastery: "$pontic_greek_culture$ Trail Mastery"
 tre_pontic_trail_mastery_desc: "Our land is like our home; its forests, our garden. We know every bit of it better than anyone. Every path and every trail that crosses it is known to us, and we will make use of that knowledge if any dare to invade us."
 tre_komnenos_legacy: "$komnenos_dynasty$ Legacy"
 tre_komnenos_legacy_desc: "Let nobody forget that we are the descendants of the $komnenos_dynasty$ that ruled over the $BYZ_ADJ$ Empire. Although we now rule a different state, the legacy and prestige of our dynasty remains undeniable."
 tre_princes_of_the_lazes: "Princes of the $laz_culture$"
 tre_princes_of_the_lazes_desc: "The $laz_culture$ have inhabited these lands for centuries. While our Empire was forged by $greek_culture$ people, many $laz_culture$ nonetheless remain within our borders. This has led to some of our enemies calling us $tre_princes_of_the_lazes$ in mockery, regarding us as inferiors. However, no matter what they say, it does not diminish our heritage, and we shall wear the title proudly."
 tre_strategic_marriages: "Strategic Marriages"
 tre_strategic_marriages_desc: "Kingdoms are conquered not only by the sword. By forging marriage alliances with surrounding nations, we create opportunities to inherit their thrones — and, at the very least, extend stronger influence over them."
 tre_grand_komnenoi: "Grand Komnenoi"
 tre_grand_komnenoi_desc: "The $komnenos_dynasty$ dynasty may have been expelled from the $BYZ_ADJ$ throne long ago, but its glory never faded. Members of our lineage are still shown the appropriate deference, and this respect and admiration stretches far beyond our borders."
 tre_pontic_mountains: "$pontic_greek_culture$ Mountains"
 tre_pontic_mountains_desc: "Much as the Alps separate the $french_group$ and $italian_group$, the $pontic_greek_culture$ Mountains separate our last $greek_culture$ holdout in $anatolia_region$ from the $turkic_group$ invaders who have seized the Anatolian Plateau. Pontus has always been more $greek_culture$ than the rest of $anatolia_region$; perhaps the legacy of the great Mithridates will inspire our warriors and strike as much fear into the Turks as he did the Romans?"
 tre_byzantine_birthright: "$BYZ_ADJ$ Birthright"
 tre_byzantine_birthright_desc: "The great $BYZ_ADJ$ Empire, under the rule of our forefathers, was truly something to behold. Deceit and treachery may have toppled their regime, but $BYZ$ has risen like the phoenix to reclaim its former glory, and now no one shall doubt our authority!"
 tre_trapezuntine_monasteries: "$TRE_ADJ$ Monasteries"
 tre_trapezuntine_monasteries_desc: "It is our faith that saves the souls of our people, and our clergy are the ones who ensure their salvation. What,  then, are our monasteries, if not the source and origin of such salvation?"
 tre_greek_stronghold: "$greek_language$ Stronghold"
 tre_greek_stronghold_desc: "Since ancient times, $greek_language$ has been the language of education and science. When our ancestors came here, they not only brought their determination, but also their culture and native tongue. As such, the $greek_language$ tradition of learning is very much alive in our country."
 tre_komnenoi_princesses: "Komnenoi Princesses"
 tre_komnenoi_princesses_desc: "Some remarkable women have emerged from along the $komnenos_dynasty$, and many among the rulers of $europe$ and even the infidels have sought their hands in matrimony. Our line is well-respected, and our princesses doubly so, for they are what allow foreign countries to claim legitimacy through our line, and us to maintain influence in foreign courts."
 tre_terminus_of_the_silk_road: "Terminus of the Silk Road"
 tre_terminus_of_the_silk_road_desc: "Even when it was called Trapezous in the mists of antiquity, our nation was the point where the land route across $asia$ meets the sea route leading to the Mediterranean. We grew famous as the terminal point for the great Silk Road, the wealth of $china$ and $india$ passing through our lands on its way to $europe$. Since our nation still lies in this crucial location, there is no reason for us not to continue and encourage this steady flow of intercontinental trade."
 tre_lessons_of_the_fourth_crusade: "Lessons of the Fourth Crusade"
 tre_lessons_of_the_fourth_crusade_desc: "Isaakios Angelos, who deposed our line centuries ago, was himself deposed and blinded. On the pretense of putting the blind old fool back on the throne, the $VEN_ADJ$ troops then sacked $constantinople$. If there is something to learn from this incident, it is that treason and deceit are ubiquitous in the struggle for power, but they can also safeguard victory."
 tre_trapezuntine_endurance: "$TRE_ADJ$ Endurance"
 tre_trapezuntine_endurance_desc: "Banished from our country, and yet our line survived. Forced to live in a mountainous wasteland surrounded by enemies, and yet our people thrived. We are a resourceful people, determined to make the most of what we have and to best whatever situation we encounter."

#Kilwa

 palm_tree_masters: "Palm Tree Masters"
 palm_tree_masters_desc: "We may not have a very robust manufacturing industry, but one thing we do have in abundance are palm trees. Sturdy enough to support construction and shipwrighting, but flexible enough to be shaped by our artisans, mastering the use of this unique lumber will help us expand our seafaring activities, improve production, and ultimately line our pockets."
 kilwan_trade_network: "$ZAN_ADJ$ Trade Networks"
 kilwan_trade_network_desc: "Attracting merchants from as far away as $persia_region$ and $arabia_region$, our capital has become a bustling commercial hub, facilitating business from the horn of $africa$ all the way to the shores of $china$."
 the_dhow: "$n_kilwan_dhow$"
 the_dhow_desc: "$n_kilwan_dhow_desc$"
 the_kilwan_zambuc: "$n_kilwan_zambuc$"
 the_kilwan_zambuc_desc: "$n_kilwan_zambuc_desc$"
 bantu_and_perso_arabian: "$bantu_language_family$ and Perso-Arabian"
 bantu_and_perso_arabian_desc: "Ever since our descent from $arabia_region$ and $persia_region$, we have established communities across the $swahili_coast_region$ that integrate the local $bantu_language_family$ in an effort to maintain social order and make way for the rise of new architectural and cultural advances."
 zanj_taxation: "Zanj Taxation"
 zanj_taxation_desc: "Originally a term to describe the inhabitants of inner $africa$, particularly those of $bantu_language_family$ origin, these folk make up a substantial portion of our demographics. While they have many liberties and responsibilities, they are taxed accordingly in order to preserve these privileges. Their peaceful, relatively autonomous  place within our legal framework has led to the organic development of linguistic phenomena and new cultural traditions."
 zan_food_imports: "Food Imports"
 zan_food_imports_desc: "The dawn of a new age in seafaring has given us new opportunities to seek sustenance for our people. Whereas once we would only trade with the interior of $africa$ to procure crucial supplies of $millet$, $livestock$, and $rice$, we can now access new ports where food may be cheaper and more readily available."
 zan_kilwan_latitude_staves: "Latitude Staves"
 zan_kilwan_latitude_staves_desc: "Our superior ship technology allows us to sail further and for longer than any of our competitors, giving us a significant edge in any seafaring activity."
 shirazi_legacy: "Shirazi's Legacy"
 shirazi_legacy_desc: "Our ancestral founder came from $shiraz$, son of the 'Amīr of $persia_region$, which makes our right to rule undeniable."
 zan_gold_trade_of_africa: "$goods_gold$ Trade of $africa$"
 zan_gold_trade_of_africa_desc: "Our abundant reserve of $goods_gold$ from many sources across $east_africa$ is the cornerstone of our economy. We must take full advantage of our reserves, and use our wealth to support and disseminate a strong currency. This will help us develop as a trading hub."
 zan_diplomacy_through_trade: "Diplomacy Through Trade"
 zan_diplomacy_through_trade_desc: "We are uniquely positioned at the confluence of wealth coming from $china$, $india$, and $europe$. This not only benefits us financially, but it gives us great influence in the diplomatic game between Empires and foreign powers..."

 #Dai Viet
 cha_matrilineal_heritage: "Matrilineal Heritage"
 cha_matrilineal_heritage_desc: "Women in our society are given more reverence and appreciation than in many of our neighboring countries. The birthright of any child comes from their mother's side, and women have a wide array of liberties and social responsibilities."
 cha_religious_tolerance: "Religious Tolerance"
 cha_religious_tolerance_desc: "Our society is a melting pot of different religious influences. The $buddhist_ADJ$ ideas from $china$, the $hindu_ADJ$ practices from $india$, and the spread of $muslim$ in $south_east_asia$ create a unique environment where religious tolerance is paramount to keeping our society together."
 cha_dharmic_presence: "$dharmic_ADJ$ Presence"
 cha_dharmic_presence_desc: "The $dharmic_ADJ$ gods bless us with their presence. May their strength guide us through the most difficult of times."
 cha_kshatriya: "Kṣatriya"
 cha_kshatriya_desc: "The $cha_kshatriya$ is a term adopted from $hindu_ADJ$ societies, and describes the elite nobles of our state. Given the origin of this term, it follows that our nobility take  similar roles in military and court affairs as their counterparts in $india$."
 cha_veteran_shipbuilders: "Veteran Shipbuilders"
 cha_veteran_shipbuilders_desc: "Our state relies on maritime dominance to secure its political, military, and economical presence in $indochina_region$. As such, being able to build ships swiftly is of great importance to our survival."
 cha_haluwbilau: "Haluwbilau"
 cha_haluwbilau_desc: "The $cha_haluwbilau$ are elite warriors who occupy key positions in both our land and naval forces. Selected for their talents and bravery, these men lead armies and ships into battle against external threats, and also mediate disputes in local communities."
 cha_commercial_state: "Commercial State"
 cha_commercial_state_desc: "Much of our wealth comes from trade. We should concentrate on expanding and refining our exchange practices, with the ultimate goal of creating a commercial state in the process."
 cha_boarding_tactics: "Boarding Tactics"
 cha_boarding_tactics_desc: "Due to our challenging native terrain, would-be conquerors must rely on their naval capabilities when attempting to invade us. Decades of piracy in the surrounding seas have taught us valuable boarding tactics, which allow us to use an opponent's own ships against them."
 cha_towers_on_water: "Towers on Water"
 cha_towers_on_water_desc: "As a maritime power, much of our wealth and power comes from the sea and our dominance over it. In order to secure this supremacy, our shipwrights have designed special large warships which are known as #italic Towers on the Water#!, hybrid creations between a heavy ship and a galley."
 cha_cham_cultural_influence: "$cham_culture$ Cultural Influence"
 cha_cham_cultural_influence_desc: "Although some of our neighbors see our culture as inferior, they are just in denial, as many of our cultural aspects make their way into their self-proclaimed 'civilized' courts. $cham_culture$ drumming, songs, dances, poetry... all of these art forms have left a clear and lasting mark on what other nations consider artistic achievement!"
 dai_vietnamese_architecture: "$vietnamese_culture$ Architecture"
 dai_vietnamese_architecture_desc: "Though influenced by the $chinese_group$, our architecture remains distinct and unique to our state. While still following the concepts of Fēng Shuǐ, many typical $chinese_group$ elements have been left out or adapted to our unique environment."
 dai_tran_hung_dao: "Trần Hưng Đạo"
 dai_hung_dao_trans_military_feats: "$dai_tran_hung_dao$ Tactics"
 dai_hung_dao_trans_military_feats_desc: "$dai_tran_hung_dao$ was an Imperial Prince of $DAI$ long ago. He served as officer during the first $MGE_ADJ$ invasion of $DAI$ in 1258, and as leading commander during the second war against the $MGE_ADJ$s in 1285 and their third attempt in 1287. During these bloody conflicts, $dai_tran_hung_dao$ managed to develop tactics which reliably repelled the oncoming onslaught of cavalry."
 dai_nha_nhac: "Nhã Nhạc"
 dai_nha_nhac_desc: "The $dai_nha_nhac$ is the traditional music played at our courts and performed at annual ceremonies. It is a prominent aspect of our culture, and a pillar of our traditions."
 dai_confucian_administration: "Confucian Administration"
 dai_confucian_administration_desc: "Our state bureaucracy is obviously of the utmost importance, and as such, we select only the most capable administrators to hold government office. Learned in the Confucian texts of $CHI$, these bureaucrats ensure smooth and stable bureaucratic operations."
 dai_giao_chi_arquebus: "Giao Chỉ Arquebus"
 dai_giao_chi_arquebus_desc: "The $dai_giao_chi_arquebus$ is a staple of our military. Self-produced and adapted to the specific needs of our troops, this type of arquebus gains praise from not only $chinese_group$ people, but also Western observers."
 dai_ca_tru: "Ca Trù"
 dai_ca_tru_desc: "The $dai_ca_tru$ is a $vietnamese_culture$ genre of musical storytelling which serves both entertainment and religious purposes."
 dai_trade_advance: "Trading Contracts"
 dai_trade_advance_desc: "Our existence has been shaped by $CHI$ for too long. To leave our own mark on the world, we must expand our reach beyond the $chinese_group$ sphere of influence."
 dai_literary_reform: "Literary Reform"
 dai_literary_reform_desc: "For centuries, we used $classical_chinese_language$ to write our documents. However, the script used to write our language is Chữ Nôm, a native script based on Chữ Hán, the script of $classical_chinese_language$. Chữ Nôm was non-standardized and not used often enough compared to $classical_chinese_language$, so there has been some pressure to reform the script and make it more suitable for our administrative purposes."
 dai_don_dien: "Đôn Điên"
 dai_don_dien_desc: "The $dai_don_dien$ is a system which utilizes military colonies, in which soldiers and landless peasants clear the area for the establishment of new villages. These villages are then incorporated into our administrative system after three years, and the people who cleared the land may then claim and work it."
 dai_thuan_thien: "Thuận Thiên"
 dai_thuan_thien_desc: "$dai_thuan_thien$, or Heaven's Will, is the name of the legendary sword wielded by our liberator, Lê Lợi. According to the tales, the sword gave him the strength of a thousand men, enough to finally throw off the yoke of $CHI_ADJ$ rule. Many in our country look upon Lê Lợi as the perfect embodiment of the ideal leader."
 
 
#Majapahit

 foreign_architectural_influence: "Foreign Architectural Influence"
 foreign_architectural_influence_desc: "In our many conquests across $indonesia_region$, we have encountered many new and incredible forms of art, all of which could be adopted and refined by our people to further our legacy. By introducing new techniques and sponsoring artists, our culture will come to exemplify the artistic achievements of our region."

 maj_home_of_the_sea_nomads: "Home of the Sea Nomads"
 maj_home_of_the_sea_nomads_desc: "$n_kabang_desc$"

 maj_jong_advance: "$n_jong$"
 maj_jong_advance_desc: "$n_jong_desc$"

 maj_bajang_ratu: "The $bajang_ratu$ Gate"
 maj_bajang_ratu_desc: "$bajang_ratu_desc$"

 maj_late_karambit_warriors: "$a_late_karambit_warrior$"
 maj_late_karambit_warriors_desc: "$a_late_karambit_warrior_desc$"

 maj_sumpah_palapa: "Sumpah Palapa"
 maj_sumpah_palapa_desc: "The head of our military directly answers to our ruler, and holds enough influence and power to shape the future of our realm. To ensure they understand what an important role they have been given, they are required to swear a special oath, one that underlines our dreams of conquest and bolsters our spirits."
 
 maj_bubu_and_jala: "Bubu & Jala"
 maj_bubu_and_jala_desc: "$bubu_building_desc$"

 maj_the_magic_arrow: "The Magic Arrow"
 maj_the_magic_arrow_desc: "$a_cetbang_cannon_desc$"

 maj_maritime_silk_road: "Maritime Silk Road"
 maj_maritime_silk_road_desc: "Our geographical position, complemented by our growing influence, has led to us presiding over the extensive and profitable trade network that carries $silk$ and $spices$ from East to West."

 maj_restore_candi_shrines: "Restore Candi Shrines"
 maj_restore_candi_shrines_desc: "Scattered throughout Nusantara are a series of temples known as #italic candi#!. We should restore these temples wherever we find them to renew our people's faith."

 maj_the_ghali: "$n_madurese_gali$"
 maj_the_ghali_desc: "$n_madurese_gali_desc$"

 maj_island_colonies: "Island Colonies"
 maj_island_colonies_desc: "Contact with our neighbors in the archipelago has shown us clearly that the raw resources and unclaimed lands are ripe for the taking, promising to become secure and prosperous under our control."
 
 maj_preservation_of_javanese_history: "Preservation of $javanese_culture$ History"
 maj_preservation_of_javanese_history_desc: "The history of the $javanese_culture$ people is an integral part of our cultural identity. To protect this identity, we must preserve the traditions upon which we built our great country."

 #Japan
 heian_kyo: "Heian-Kyō"
 heian_kyo_desc: "The city of Heian-Kyō has been the residence of the Emperor for centuries, and is a center for art and culture. It is there where the lavish court of the $fujiwara_dynasty$ flourished, and all the people in $JAP$ looked to it with awe and inspiration. We shall embrace its traditional role, and with our patronage make the culture of our capital flourish once again."
 matsuri: "Matsuri"
 matsuri_desc: "Every local shrine and temple has its own festivals and celebrations. The people are always eager to participate, for it is their chance to offer devotion and gratitude towards their local protector #italic Kami#!."
 onmyodo: "Onmyōdō"
 onmyodo_desc: "Coming from $china$ centuries ago, the theories of Yīn and Yáng evolved in $JAP$ into $onmyodo$. Expert practitioners, called #italic onmyōji#!, deal with the purification and exorcism of evil and vengeful spirits, as well as with divination, astronomy, and the study of nature."
 sumo: "Sumō"
 sumo_desc: "Derived from an ancient agricultural ritual, in which dances served as prayers for a good harvest, the practice of $sumo$ has escaped the confines of the court and is now a popular practice among the commoners. It also serves as a form of combat training."
 nanto_rokushuu: "Nanto Rokushū"
 nanto_rokushuu_desc: "The temples of $nara$ have been influential since $buddhist$ first came from $china$. The six schools that formed around these temples are a renowned repository of knowledge, especially about the teachings of the Buddha and the various ways of achieving enlightenment. However, they also teach more mundane, but equally valuable subjects, such as how to properly administrate a monastery."
 shinbutsu_shuugou: "Shinbutsu-Shūgō"
 shinbutsu_shuugou_desc: "Since $buddhist$ came to $japan_region$, its teachings have coexisted with the worship of local #italic Kami#!. This has led to them both blending into a single combined set of beliefs, albeit with distinct ritualistic practices."
 honji_suijaku: "Honji Suijaku"
 honji_suijaku_desc: "One of the key practices in $shinbutsu_shuugou$ is to identify the local #italic Kami#! as manifestations of the different Buddha, and the Buddhas as manifestations of the different #italic Kami#!. In the end, they are one and the same, with core forms or #italic Honji#! taking on different aspects, or #italic suijaku#!."
 hachiman_worship: "Hachiman Worship"
 hachiman_worship_desc: "Hachiman is one of the most venerated divinities. Originally a deification of Ōjin Tennō, after the introduction of $buddhist$ he was later also identified as a Bodhisattva. He is the protector of the Imperial line and the tutelary god of the warrior class."
 gozan_jissetsu: "Gozan Jissetsu"
 gozan_jissetsu_desc: "The 'Five Mountains System' originated in $china$ from state-sponsored Chán $buddhist_ADJ$ monasteries, atop the holy mountains that gave the system its name. In $japan_region$, the practice continued in the $kamakura$ period by the sponsoring of the Zen temples, the Five Mountains of $kyoto$ and the Five Mountains of $kamakura$. By maintaining our sponsorship of such institutions, we can use them to help stabilize our rule."
 bodaiji: "Bodaiji"
 bodaiji_desc: "Since antiquity, our people have venerated our ancestors. The most influential of our rulers erect entire temples, where they will be entombed and then worshiped after death, and where their deeds and words will be remembered for all time."
 kagura: "Kagura"
 kagura_desc: "Originally sacred ritual dances performed in front of the court by the #italic miko#!, the shrine maidens, the $kagura$ also inspired the performance of popular ritual dances all around $japan_region$. These dances have evolved into a myriad of forms, but all of them preserving the tradition and ritual they come from."
 obon: "Obon"
 obon_desc: "One of the most important festivals in our culture, $obon$ is the time to honor the dead, and our ancestors in particular. During the celebrations, offerings of food and ritual dances are performed. People also light fires and lanterns to guide the souls of the dead back home for the celebrations, and once again back to the land of the dead."
 neo_confucianism: "Neo-$SECT_CONFUCIANISM_NAME$"
 neo_confucianism_desc: "$SECT_CONFUCIANISM_NAME$ has a millenary history, and Neo-$SECT_CONFUCIANISM_NAME$ has already existed in $japan_region$ for centuries. However, active state involvement and support of the faith will strengthen our authority."
 danka_system: "Danka System"
 danka_system_desc: "For centuries, households in $japan_region$ have had close relationships with local $buddhist_ADJ$ temples, giving them financial patronage in exchange for the temples taking care of their spiritual needs. Formally enforcing this system will keep our people devoted to the faith, and secure the vital role our religion plays in society."
 harae: "Harae"
 harae_desc: "In our faith, the practice of #italic $harae$#!, or ritual purification, is key to removing all #italic tsumi#!, sins, and #italic kegare#!, spiritual uncleanness. Mandating that our population performs the $harae$ rituals properly and frequently ensures that our country remains spiritually pure."
 jisha_bugyou: "Jisha-Bugyō"
 jisha_bugyou_desc: "The administrator and supervisor of all the temples and shrines, the $jisha_bugyou$ also oversees the activities these religious institutions perform, making sure that their interests align with those of the government."
 kokugaku: "Kokugaku"
 kokugaku_desc: "Almost since its inception as a country, $japan_region$ and $shinto$ have been influenced by foreign ideas coming from $china$ and $buddhist$. A new movement is taking root, claiming that our own national spirit is naturally pure, and that our society must be cleansed of any foreign influences."
 home_shrines: "Home Shrines"
 home_shrines_desc: "Ritual and religious practice have been traditionally relegated to shrines and temples. However, more and more of our people are placing in their homes both local family shrines, called #italic kamidana#!, to venerate the Kami, and #italic butsudan#! as $buddhist_ADJ$ altars for their ancestors."
 fukko_shinto: "Fukko $shinto$"
 fukko_shinto_desc: "As people are rejecting foreign influence in our culture, they are also starting to reject the teachings of $buddhist_ADJ$ and $SECT_CONFUCIANISM_NAME$ interfering in our faith. Given this emerging demand for doctrinal purity, a formal revitalization of $shinto$ might be wise."
 jap_bushido: "Bushidō"
 jap_bushido_desc: "Although never formally codified into specific rules, the way a warrior should behave is clear: A warrior's duty is to fight and win in battle, and to expand the glory of one's own clan, regardless of the methods needed to achieve that."
 jap_land_of_the_rising_sun: "Land of the Rising Sun"
 jap_land_of_the_rising_sun_desc: "$japan_region$ has a long and glorious history. Our unique cultural traditions, our brave soldiers, and our unconquerable geography make us stronger than many other states in our region. The time has come for the Land of the Rising Sun to take its place among the great nations of this world!"
 jap_ancestral_legacy: "Ancestral Legacy"
 jap_ancestral_legacy_desc: "The ancestral lineage of our clan is well-known, and our reputation is a pillar of our identity — one that we strive at all costs to uphold, as our history both defines us and ensures our right to rule."
 jap_shinobi: "Shinobi no Mono"
 jap_shinobi_desc: "Information is key to gaining the advantage in any situation. To that effect, we have long since used spies and infiltrators to gather reconnaissance. These $jap_shinobi$ are usually from the samurai class, although they can also be recruited from the local peasant population, and are sent into enemy territory, where they blend in and establish networks of informants."
 jap_head_hunting: "Head-Hunting"
 jap_head_hunting_desc: "The achievements of a warrior in battle are only truly noteworthy if they can be proven. To that end, samurai will collect the decapitated heads of enemies they have slain to present them later to their general. The more numerous and more important the heads that a samurai takes, the better the rewards he will receive."
 jap_ichiban_yari: "Ichiban Yari"
 jap_ichiban_yari_desc: "Drawing first blood in battle is an honor and a good omen, and thus our warriors are eager to land the first strike whenever they have the opportunity to do so."
 jap_ashigaru: "Ashigaru"
 jap_ashigaru_desc: "Warfare has always been the domain of the mighty samurai. Recent developments, however, have proved the need for more substantial reinforcements, and thus our battlefields now also include peasant troops. These #italic ashigaru#! will not be just common rabble, however, as their rigorous training and ample battle experience makes them formidable fighters, on equal footing with the samurai."
 jap_daiku_construction: "Daiku Construction"
 jap_daiku_construction_desc: "Traditional carpentry techniques, or #italic daiku#! have been used in $japan_region$ since the earliest days of our history. Our wooden buildings are resilient yet flexible, and admired by many for their beauty and skillful construction. From the lowliest hut to the most elaborate palace, wood is our most universal building resource."
 jap_wandering_ronin: "Wandering Rōnin"
 jap_wandering_ronin_desc: "It is fairly common for samurai to wander the country in search of the best employment opportunities, switching their allegiance to whoever pays them the most. These warriors come and go like the errant waves, but we can always make use of them."
 jap_reformed_land_holding: "Reformed Land Holding"
 jap_reformed_land_holding_desc: "Traditionally, we assessed land value based on size, but this failed to take into account that not all land is the same. From now on, it will be valued according to how much $rice$ can be grown there. This will streamline related economic actions and make it easier to get the best outcomes from our agricultural ventures."
 jap_jokamachi: "Jōkamachi"
 jap_jokamachi_desc: "Turbulent times are gravely dangerous for our people, so for safety, they tend to settle around the security of fortified places. These huddles eventually turn into cities, which of course provide commercial and cultural assets in addition to physical protection for those who huddle behind the walls."
 jap_terakoya: "Terakoya"
 jap_terakoya_desc: "These private schools provide basic education to commoners, promoting literacy, numeracy, and moral values. #italic Terakoya#! play a vital role in fostering a more educated and socially aware populace, contributing to national stability and progress."
 jap_codified_bushido: "Codified Bushidō"
 jap_codified_bushido_desc: "The expected behavior of a warrior is becoming increasingly idealized, with values such as honor and loyalty being given more importance than their actual utility in real battle. This romanticized and codified version of #italic Bushidō#!, however, will improve how our armies are perceived, even if it is not how they actually behave."
 #Japanese unique
 kgk_omi_genji: "Ōmi-Genji"
 kgk_omi_genji_desc: "We are the Ōmi-Genji, descendants of the Uda Genji branch of the Minamoto family, who have governed Ōmi as hereditary #italic Shugo#! for generations. Our well-established position gives us unquestioned legitimacy to defend and rule our ancestral domain."
 kgk_emerging_clan: "Emerging Clan"
 kgk_emerging_clan_desc: "Despite our impressive ancestry, our clan is very new, as our split from the Sasaki clan is relatively recent. Our people are eager to prove their worth as scions of an independent name."
 akt_march_of_akita: "March of $akita$"
 akt_march_of_akita_desc: "$akita$, our fief in northern Dewa Province, was an ancient zone of conflict against northern 'barbarians'. The border of $JAP$ has expanded far into the North, but the spirit of our ancestors still lives in our blood — let any who dare stand in our way!"
 akt_ezo_kanrei: "$ezo_area$ Kanrei"
 akt_ezo_kanrei_desc: "The position of the $ezo_area$ #italic Kanrei#!, or administrator of $ezo_area$, has been assigned to our clan since the time of the $kamakura$ Shogunate. We are in charge of managing the island as a place of exile for criminals, necessitating constant communication across the strait."
 akt_ainu_trade: "$ainu_culture$ Trade"
 akt_ainu_trade_desc: "We are among the first $japanese_group$ to have established permanent trade with the $ainu_culture$. Our ships go back and forth between their lands and ours, greatly benefiting both communities."
 asa_legacy_of_emperor_keitai: "Legacy of Emperor Keitai"
 asa_legacy_of_emperor_keitai_desc: "Many centuries ago, emperor Keitai launched his campaign to take the imperial throne from $echizen_province$. Like him, we must not hesitate to project power beyond our borders and to launch invasions into neighboring realms when the situation calls for it."
 asa_control_of_buddhist_sects: "Control of $buddhism_ADJ$ Sects"
 asa_control_of_buddhist_sects_desc: "$echizen_province$ is home to many important temples representing different sects, such as the Eiheiji of the Sōtō tradition and the Heisenji of the Tendai tradition, among others. If we could bring all of them under our control and establish religious peace throughout the province, it would be the foundation of an ideal religious policy for our entire nation."
 ask_defender_of_the_imperial_court: "Defenders of the Imperial Court"
 ask_defender_of_the_imperial_court_desc: "When the $kamakura$ Shogunate fell, we were the ones who protected the Emperor and the Imperial Court. This has afforded us a position at the forefront of all clans in $JAP$, as the true protector of the Empire and its courtly traditions."
 ask_bugyoshu_and_hokushu: "Bugyōshū and Hōkōshū"
 ask_bugyoshu_and_hokushu_desc: "We must strengthen the authority of our administrative officials, such as the Bugyōshū magistrates and the Hōkōshū commanders. A strong bureaucracy can sometimes be the only thing that stands between us and an open civil war."
 ask_higashiyama_culture: "Higashiyama Culture"
 ask_higashiyama_culture_desc: "Built around the ascetics of Zen $buddhism$, Higashiyama culture sees beauty in simplicity. It has promoted development of the formal tea ceremony, #italic ikebana#! flower arrangements, theater, and art. This blossoming of culture has brought great prestige to those who practice the arts, and will reflect well upon our realm."
 ask_shugo_system: "Shugo System"
 ask_shugo_system_desc: "#italic Shugo#! are important vassals for the Shogunate, administrating the lands in name of the $JAPANESE_SHOGUNATE_LEADER_MALE$. Thanks to them, we can administer our lands better and more efficiently."
 cba_lineage_of_taira: "$taira_dynasty$ Lineage"
 cba_lineage_of_taira_desc: "The $chiba_dynasty$ clan is an old branch of the $taira_dynasty$, having split from them in the late Heian period. This gives us more power and influence than our political situation would otherwise indicate."
 cba_katori_jingu: "$katori_shrine$"
 cba_katori_jingu_desc: "$katori_shrine$ is dedicated to Futsunushi no Kami, a patron god of martial arts who is revered by every warrior in $japan_region$. By becoming the shrine's primary patron and encouraging our samurai to train there, we will assert our legitimacy while also strengthening the morale and abilities of our warriors."
 cba_dream_of_masakado: "Dream of Masakado"
 cba_dream_of_masakado_desc: "$taira_dynasty$ no Masakado, a great warrior and close kinsman of our clan, once tried to become the Emperor of Eastern $japan_region$. Sadly, Masakado could not fulfill his ambition, but his dream of founding a new nation of samurai should be our guiding star."
 cba_irrigation_of_southern_kanto: "Irrigation of Southern Kantō"
 cba_irrigation_of_southern_kanto_desc: "Large parts of our domain is marshland that cannot support intensive agriculture. Recent developments in irrigation technology, however, make it possible to drain marshes and cultivate new arable lands. Let us undertake a grand project of developing these otherwise useless lands; we stand to profit enormously."
 csk_clans_of_tosa: "Clans of $tosa_province$"
 csk_clans_of_tosa_desc: "Our home province $tosa_province$ has always been divided between powerful clans. If we wish to expand our holdings, we must join forces with these other clans — they will help us rise up, and in return we will increase their power."
 csk_god_of_arts: "God of the Arts"
 csk_god_of_arts_desc: "The ancestral founder of our clan, Hata no Kawakatsu, was highly admired as the patron god of all art, from traditional dances to theater. Our clan must live up to his legacy if we are to earn the respect we deserve."
 csk_unification_of_shikoku: "Unification of Shikoku"
 csk_unification_of_shikoku_desc: "Shikoku is seen as a poor, isolated land by the rest of $japan_region$, where nothing of importance happens. Let them continue thinking that and overlook our unification of the island until it is too late."
 csk_expand_the_navy: "Expand the Navy"
 csk_expand_the_navy_desc: "$japan_region$ is a nation of islands, and as a result, a strong navy is an absolute necessity. $tosa_province$ is an ideal place to begin building an armada of our own."
 dte_fujiwara_hokke: "$fujiwara_dynasty$ Hokke"
 dte_fujiwara_hokke_desc: "As one of the branches of the northern house of the $fujiwara_dynasty$, the legitimacy of our rule is impeachable."
 dte_oshu_shugo: "Ōshū Shugo"
 dte_oshu_shugo_desc: "As an honorable clan dating back to the early $kamakura$ period, we have a strong claim to rule over the entire Ōshū province. Fortunately for us, what land Ōshū exactly covers is not well-defined."
 dte_dragon_of_oshu: "Dragon of Ōshū"
 dte_dragon_of_oshu_desc: "Our might and power will be the envy of our enemies. Our name will forever be associated with the Dragon of Ōshū."
 dte_intensive_domain_development: "Intensive Domain Development"
 dte_intensive_domain_development_desc: "Many dismiss $ou_area$ as poor due to its harsh weather and mountains, yet the region holds great potential. Through infrastructure investment — new towns, waterways, expanded cultivation — and by abolishing stifling tolls and taxes, we can substantially improve our heartland and make our subjects wealthy."
 htk_hatakeyama_heritage: "Hatakeyama Heritage"
 htk_hatakeyama_heritage_desc: "Some consider our clan leaders to be rebellious troublemakers due to the stigma attached to our clan name. However, this enmity is naught but a symbol of our resilience. We have been reborn; we will never surrender, and will fight for what is ours no matter who may oppose us!"
 htk_shogunate_ties: "Shogunate Ties"
 htk_shogunate_ties_desc: "As a clan descending from one of the branches of the $ashikaga_dynasty$, we have particularly strong ties to the authority of the Shogunate. As long as we maintain this association, our clan will continue to be held in high regard."
 htk_clan_spread: "Clan Spread"
 htk_clan_spread_desc: "Our clan is not content to occupy a single location, and we do our utmost to project our influence all over the country. No matter how far it may spread, our clan authority must be unquestionable in all our holdings."
 hsk_rising_clan: "Rising Clan"
 hsk_rising_clan_desc: "Although our origins are relatively humble, even compared to other clans descending from the $ashikaga_dynasty$, we have managed nonetheless to grow our influence considerably. Our clan is decidedly on the rise, and our ascension must not be hindered!"
 hsk_control_of_izumi_sea: "Control of the $izumi$ Sea"
 hsk_control_of_izumi_sea_desc: "Our clan's territory has traditionally been situated around the Kii Channel. Taking control of trade entering the mainland through that point will bring us massive profits, and we shall flourish immensely."
 hsk_branches_and_retainers: "Branches and Retainers"
 hsk_branches_and_retainers_desc: "Our widespread clan controls rich territories through a network of loyal kinsmen and retainers. By maintaining internal harmony in our dynasty, our clan will become one of the most powerful in $JAP$."
 img_claim_to_shogunate: "Claim to the Shogunate"
 img_claim_to_shogunate_desc: "As our clan is descended from the $ashikaga_dynasty$ family, we have a strong claim on the position of $JAPANESE_SHOGUNATE_LEADER_MALE$, should the main line perish. Even if the Bakufu is not threatened, it would still be in our best interests to remind everyone of our legitimacy. Just in case it ever becomes relevant..."
 img_supreme_ruler_of_tokaido: "Control of the Tōkaidō"
 img_supreme_ruler_of_tokaido_desc: "The Tōkaidō is the most important trade route between Central and Eastern $japan_region$. As our ancestral lands are in the middle of all this trade, it would behoove us to take control over the entire region, so as to reap the most benefits from local commercial activity."
 img_unlikely_alliances: "Unlikely Alliances"
 img_unlikely_alliances_desc: "Sometimes, the best way to defeat an enemy is to make them your friend. Securing our rule through strategic marriages will not only pacify our foes and gain us new allies, but will also ensure that we can ultimately dominate our rivals through blood."
 img_march_to_kyoto: "March to $kyoto$"
 img_march_to_kyoto_desc: "In these dangerous times when $japan_region$ and $kyoto$ are mired in political chaos, anyone could march into the capital and seize power. As close kinsmen of the $ashikaga_dynasty$, it is our obligation — and our right — to ensure the stability of the country."
 isk_sanindo_gate: "$sanindou_area$ Gate"
 isk_sanindo_gate_desc: "The province of $tango_province$ is the gate to $kyoto$ in $sanindou_area$ and a place of crucial economic importance. By firmly establishing and expanding our presence there, we can take advantage of such prosperity."
 isk_minister_of_samurai_dokoro: "Minister of Samurai-Dokoro"
 isk_minister_of_samurai_dokoro_desc: "We are one of four powerful clans traditionally appointed to be the chief of military and police in the Samurai-Dokoro. It is thus our responsibility, and our privilege, to keep the peace in the capital and other important places."
 ito_gokenin_family: "Gokenin Family"
 ito_gokenin_family_desc: "Our ancestors helped Minamoto no Yoritomo during the foundation of the $kamakura$ Shogunate. As a reward for this contribution, we were ranked as his #italic Gokenin#!, and awarded a fiefdom in $hyuuga_province$ Province. This is an honor few families in Kyūshū enjoy."
 ito_sympathy_to_foreign_faiths: "Sympathy for New Faiths"
 ito_sympathy_to_foreign_faiths_desc: "Foreigners coming to our land bring with them foreign beliefs. We must of course make sure that this is harmless to our traditional belief systems, but as long as there is no risk to us, we see no reason to disallow people from choosing their own faith."
 kkc_disinguished_family_in_kyushu: "Distinguished Family"
 kkc_disinguished_family_in_kyushu_desc: "Unlike other powerful clans in Kyūshū, our family settled here before the establishment of the $kamakura$ Shogunate. Our achievements are well known, and our name is respected."
 kkc_resistance_against_foreign_intervention: "Resistance Against Invasions"
 kkc_resistance_against_foreign_intervention_desc: "Our contributions to defending the country against the $MGE_ADJ$ invasions are well known. Kikuchi Takefusa's achievements in repelling the invaders are widely lauded, and all our troops aim to fight as bravely as him."
 ktb_southern_court: "Supporters of the Emperor"
 ktb_southern_court_desc: "We supported the Southern Court during the Imperial schism, showing loyalty to the Chrysanthemum Throne despite their struggles. This reputation for loyal service grants us more prestige and moral authority than many of the lesser houses that now dominate $japan_region$."
 ktb_control_of_ise: "Control of $ise_province$"
 ktb_control_of_ise_desc: "From the wealthy south to the densely populated urban north, we have extended our control over the entire province of $ise_province$. This will allow us to fully exploit provincial resources to further the growth of our clan's influence."
 ktb_blessing_of_amaterasu: "Blessing of Amaterasu"
 ktb_blessing_of_amaterasu_desc: "As the keepers of the holiest of $japan_region$'s shrines at $ise_province$, we are blessed by Amaterasu, goddess of the sun and the universe. We must rise to be worthy of the task of maintaining and caring for this national treasure, which will earn us the respect of the $japanese_group$ people."
 ktb_the_march_of_kitabatake_akiee: "March of Kitabatake Akiie"
 ktb_the_march_of_kitabatake_akiee_desc: "Our honorable ancestor Kitabatake Akiie proved that even the long march from $ou_area$ to central $japan_region$ can be undertaken rapidly if one has enough determination. We must learn from this feat and train our armies in swift maneuvering, so that we can quickly move from one front to another as needed."
 kno_shugo_of_iyo: "Shugo of $iyo_province$"
 kno_shugo_of_iyo_desc: "Since the late Heian Period, we have been the biggest naval power in the Seto Inland Sea. In fact, our navy is how we became #italic Shugo#! of this province."
 kno_ruler_of_inland_sea: "Rule Over the Inland Sea"
 kno_ruler_of_inland_sea_desc: "The Seto Inland Sea has a special importance for trade routes of $japan_region$, and maintaining naval dominance here could make or break our clan. We must ensure that we always have a strong navy with which to control maritime trade."
 kno_murakami_suigun: "Murakami Suigun"
 kno_murakami_suigun_desc: "The Murakami clan is well-known for committing piracy in the Seto Inland Sea. Let us integrate them fully in our own clan, and send these fearsome privateers after our enemies!"
 mri_descendant_of_oe_hiromoto: "Descendants of Ōe no Hiromoto"
 mri_descendant_of_oe_hiromoto_desc: "Ōe no Hiromoto, a scholar and politician who made great contributions to the establishment of the $kamakura$ Shogunate, was the ancestor of our clan. To this day, his spirit is embodied in our people, and we take pride in effectively administering the lands he secured for us."
 mri_munakata_three_goddesses: "Munakata Three Goddesses"
 mri_munakata_three_goddesses_desc: "The three daughters of Susanoo-no-Mikoto are patron goddesses of the sea and navigation. Their blessings will make our navies unstoppable."
 nbu_genji_in_the_north: "Ōshū Genji"
 nbu_genji_in_the_north_desc: "We are originally a cadet branch of the Kai Genji; our founder was given a fief in Ōshū Province as a reward for loyal service to the $kamakura$ Shogunate. Over time, we have grown accustomed to this region with its harsh winters, and know how to utilize these conditions to our strategic and tactical advantage."
 nbu_fight_against_famines: "Fighting Famine"
 nbu_fight_against_famines_desc: "Due to cold winds in the late autumn and heavy snows until the early spring, our people often suffer from severe famines and hunger. We must build reserves of food and look into how we can improve the lands under our control to counter future catastrophes."
 nbu_northern_horses: "Northern Horses"
 nbu_northern_horses_desc: "Mutsu has ranches, from which horses were sent to $kyoto$ in ancient times. The tradition of horse farming continues until today, and is one we should cultivate, as it allows us to raise cavalry more easily than many of our neighbors."
 oda_uninspiring_clan: "Uninspiring Clan"
 oda_uninspiring_clan_desc: "Despite having an illustrious lineage, our clan is not considered particularly relevant, threatening, or interesting to outsiders. Their underestimation of our strength and cunning will soon prove to be their undoing..."
 oda_generals: "$ODA$ Generals"
 oda_generals_desc: "Obsession with birth and privilege has made this country weak, and the rise of self-made powerful clans throughout the realm has clearly proven how useless such notions can be. Let us take this lesson to heart, and allow success and skill be the guiding principles for who should rise to command our armies. Strong leadership is a requirement for rapid expansion."
 oda_tenka_fubu: "Tenka Fubu"
 oda_tenka_fubu_desc: "It is clearly our destiny to hold all the country within our grasp. None shall resist our authority, and all under Heaven will bend to our military might."
 oda_triple_firing: "Triple Firing"
 oda_triple_firing_desc: "The advent of firearms has and will continue to revolutionize warfare in $japan_region$, and through mastering these new weapons, we can dominate any battlefield. In order to increase the rate of their fire, our arquebusiers will form ranks, allowing one line to fire while two others reload."
 oda_influential_strongholds: "Influential Strongholds"
 oda_influential_strongholds_desc: "$japan_region$ is a land of castles and fortifications. It is through the construction of strong defensive positions that one can assert influence both over the political realm and the routes vital to military campaigns. This learning is one we must take to heart. It is also through our castles that we impose our presence and power upon the common people. At all times, we must prioritize the reduction of enemy fortifications and the erection of our own in strategic locations."
 oda_patronization_of_the_west: "Patronization of the West"
 oda_patronization_of_the_west_desc: "Western missionaries brought many ideas and techniques to our land, and unlike the $buddhist_ADJ$ sects of old, they have no previous ties to corrupt landowners or rebellious cities. We should welcome these foreigners into our cities, and see what benefits they could bring to our court."
 ogs_ogasawara_ryu: "Ogasawara-Ryū"
 ogs_ogasawara_ryu_desc: "Traditional forms of many things are highly valued in our society. We have formalized the official system of martial arts and etiquette for samurai since the founder of our clan, Ogasawara Nagakiyo, originally developed a special school, where all samurai should go to learn the proper techniques."
 ogs_shinano_shugo: "$shinano_province$ Shugo"
 ogs_shinano_shugo_desc: "Our clan belongs to a sub-branch of the Minamoto, and rules $shinano_province$ Province as its #italic Shugo#!. Our land is mountainous and unwelcoming to many. For our people, however, it has for a long time been an integrated part of our defenses against outsiders. Let us take this experience with us wherever our armies go, and make sure to always obtain thorough information about the terrain in any region where we do battle."
 ogs_kiso_uma: "Kiso-Uma"
 ogs_kiso_uma_desc: "Horses from the Kiso area are our preferred breed. They are not as high nor as fast as other types, but they make up for it with high stamina, and are sturdy enough to survive in the mountains."
 ogs_improvment_of_nakasendo: "Improving the Nakasendō"
 ogs_improvment_of_nakasendo_desc: "The Nakasendō is one of the most important routes between central and eastern $japan_region$. Controlling it also means controlling the trade that flows through it."
 suw_suwa_taisha: "Suwa Taisha"
 suw_suwa_taisha_desc: "Suwa Taisha at Lake Suwa is one of the oldest shrines in $japan_region$, and highly adored throughout the country. Its most important festival, #italic Onbashira-matsuri#!, proves the bravery of our people as they carry the sacred logs from the mountain to the shrine."
 otm_lord_of_bungo: "Lord of Bungo"
 otm_lord_of_bungo_desc: "We have been the #italic Shugo#! of Bungo since the $kamakura$ era. These lands are known for their highly fertile soil, and the rich harvests from this region allow us to feed larger armies than many other $daimyo$ can support."
 otm_domination_of_kyushu: "Domination of Kyūshū"
 otm_domination_of_kyushu_desc: "We have been designated #italic Shugo#! of $bungo_province$, $hizen_province$, and $hyuuga_province$. This positions us perfectly to claim all of Kyūshū for ourselves!"
 otm_nanban_trade: "Welcoming the Nanban Trade"
 otm_nanban_trade_desc: "Others may denounce foreigners as barbarians, but we recognize the benefits and advantages of trading with them. Let it be known that they will always be welcome in our ports — and we will be able to expand our trade network further than our rivals."
 otm_christian_conversion: "$christian_ADJ$ Converts"
 otm_christian_conversion_desc: "Our increasing interactions with foreigners have sparked an interest in $christian$ for many in our clan. The $christian_ADJ$ people have many powerful advocates among our lords and vassals, and few are as zealous as recent converts. Let us make good use of these $christian_ADJ$ converts, regardless of which route our own clan takes, and use their influence and zeal to further our own agenda."
 ouc_descendant_of_baekje: "Descendants of Baekje"
 ouc_descendant_of_baekje_desc: "Our chronicle says we are descendants of Prince Imseong of the royal house of the ancient Baekje Kingdom, which once ruled in $korea_region$. This legendary connection means we hold a prestigious position in $east_asia$."
 ouc_korea_trade: "Trade with $korea_region$"
 ouc_korea_trade_desc: "Due to our location, we are the clan trading most actively with $korea_region$, and as a result we have a near-monopoly on many exotic goods. We must do what we can to retain this favorable position, and leverage it to out-compete any upstart that might challenge us."
 ouc_fight_against_wokou: "Countering Piracy"
 ouc_fight_against_wokou_desc: "In order to retain good relations with nations on the continent for the sake of our traders, we must mount constant sea patrols. As long as pirates and smugglers are common in our waters, foreigners will not trust us, and may even act against us."
 ouc_welcome_missionaries: "Welcome the Westerners"
 ouc_welcome_missionaries_desc: "As our trade network expands, we come in more frequent contact with foreigners and their strange habits and faiths. Regardless of what they believe, their coin is good enough; we should appear to be open to their ideas as we are to their business if we wish to secure repeat commerce."
 stk_hitachi_genji: "$hitachi_province$ Genji"
 stk_hitachi_genji_desc: "We are one of the oldest Minamoto lines in the Kantō region, and have fought for our clan's glory in eastern $japan_region$ since before Minamoto no Yoritomo founded the $kamakura$ Shogunate. Our position as #italic Shugo#! of $hitachi_province$ is therefore never in question."
 stk_kashima_jingu: "$kashima_shrine$"
 stk_kashima_jingu_desc: "$kashima_shrine$ is one of three most important shrines in the Kantō region. This shrine is dedicated to Takemikazuchi-no-O-no-Kami, who is the god of thunder and swords, and also the patron god of $sumo$ wrestling. Our custodianship of this shrine strengthens the resolve of our armies."
 stk_eastern_coalitions: "Eastern Coalitions"
 stk_eastern_coalitions_desc: "Regardless of the hostile clans around us, we have always presented ourselves as a reasonable third party for other clans to attach themselves to for protection against invaders. This tradition of eastern coalitions will serve us well, as long as we make sure that the clans who rely on us never have to worry about protection."
 sba_multiple_shugo: "Multiple Shugo"
 sba_multiple_shugo_desc: "We have been made #italic Shugo#! of multiple provinces. Administering all this land will make us rich from revenue generated by our fertile rice paddies and the workshops of the region's most skilled artisans."
 sba_access_to_northern_japan: "Ōshū Ties"
 sba_access_to_northern_japan_desc: "Ōshū Province is our second home and where our clan originated. We must make use of our ties to Ōshū to procure some of the strong war horses native to that region."
 sba_shiba_retainers: "$SBA$ Retainers"
 sba_shiba_retainers_desc: "We have talented, but ambitious vassals in our clan. They are a frequent cause of familial friction, and we would be wise to rein them in. Then again, close supervision and lavish, yet strategic rewards could turn these powerful families into the greatest assets of our rule."
 smz_satsuma_shugo: "$satsuma_province$ Shugo"
 smz_satsuma_shugo_desc: "We have always traditionally held the title of #italic Shugo#! of $satsuma_province$; its name has become synonymous with our clan. Our warriors are proud of this, and therefore always ready to defend our territory."
 smz_tsurinobuse: "Tsurinobuse"
 smz_tsurinobuse_desc: "#italic Tsurinobuse#!, 'lure and ambush', is our most effective tactic. This strategy enables us to beat enemies when we are vastly outnumbered, which is of course a very valuable skill. We must make this a central tactic of our armies, and give the dull-witted commanders of rival clans a little surprise."
 smz_shimazu_charge: "$SMZ$ Charge"
 smz_shimazu_charge_desc: "Even when surrounded and outnumbered, our soldiers will keep marching forward until they reach the other side of the enemy lines. The charge of our troops will be legendary!"
 smz_tanegashima: "Tanegashima Teppō"
 smz_tanegashima_desc: "The Westerners who first landed on Tanegashima brought with them new and interesting weapons. These arquebuses are becoming an increasingly common sight all over $japan_region$, but nowhere have they been available for as long as here."
 smz_early_westernization: "Early Westernization"
 smz_early_westernization_desc: "Thanks to frequent early contact with Western countries, we have learned a lot about foreign technology and other innovations. Using this knowledge, we can carry out reforms in economy, industry, and education that will help gain an edge over other clans."
 shn_vice_minister_of_dazaifu: "Vice-Minister of Dazaifu"
 shn_vice_minister_of_dazaifu_desc: "As the name of our clan shows, we come from the appointed vice minister of the Dazaifu in $chikuzen_province$ province. This institution has since antiquity been the diplomatic and military center of the region, and we traditionally govern Northern Kyūshū as representative of the Emperor."
 shn_defender_against_mongols: "Defender of $JAP$"
 shn_defender_against_mongols_desc: "As a prominent samurai family from Northern Kyūshū, we have bravely fought against both $MGE_ADJ$ invasions. Should the need arise, we will once again rise to defend both Kyūshū and the realm at large from outside invaders."
 shn_diplomacy_through_tsushima: "Diplomacy Through Tsushima"
 shn_diplomacy_through_tsushima_desc: "Thanks to our presence in $tsushima_province$, we have a wealth of experience in negotiating with $korea_region$. This way, we have always been able to keep a channel open to the outside world, even during times when official relations were forbidden."
 soo_tradition_of_wakou: "Wakō Tradition"
 soo_tradition_of_wakou_desc: "While we appreciate lawful and peaceful trade, we also need to be prepared for tense military situations. Fortunately, the local tradition of piracy could help us solve certain combat-related issues."
 soo_fight_for_tsushima: "Fight for Tsushima"
 soo_fight_for_tsushima_desc: "Lying between $asia$ and the islands of $japan_region$, our homeland of $tsushima_province$ and its surrounding waters are where countries clash and fight hard. May our own fleets be strong, so that we can not only defend our country, but also expand it!"
 soo_bahan_ship: "Bahan Ship"
 soo_bahan_ship_desc: "Our privateer ships fly the flag of Hachiman, spreading terror wherever they go. No one would dare attack a fleet protected by the god of war himself!"
 tkd_kai_shugo: "$kai_province$ Shugo"
 tkd_kai_shugo_desc: "We are descendants of the Genji of $kai_province$, and have been traditionally appointed as its #italic Shugo#!. As such, we are intrinsically associated with it, and the famous horses from the province are already synonymous with our cavalry."
 tkd_takeda_ryu: "Takeda-Ryū"
 tkd_takeda_ryu_desc: "Traditional forms of martial arts have been practiced in our family for generations. Among them, there is particular emphasis on horse riding and mounted archery, making our mounted troops much more effective soldiers than those from other clans."
 tkd_tiger_of_kai: "Tiger of Kai"
 tkd_tiger_of_kai_desc: "Strong leaders are better at safeguarding their domains than any number of imposing castles. Our generals must train hard, and earn the right to be called the 'Tiger of Kai'."
 tkd_fuurinkazan: "Fūrinkazan"
 tkd_fuurinkazan_desc: "'Swift like the wind, gentle like the forest, aggressive like fire, immovable like a mountain.' The words of the great war master Sun Tzu shall be permanently etched into our family's history, and shall serve as our motto."
 tki_genji_in_mino: "Genji of $mino_province$"
 tki_genji_in_mino_desc: "As the head of the Genji in $mino_province$ and its appointed #italic Shugo#!, we have led other local samurai for generations. Our domain occupies an advantageous position from which to control the neighboring regions."
 tki_banner_of_bellflower: "Bellflower Banner"
 tki_banner_of_bellflower_desc: "Having been its Shugo for generations, our emblem is already synonymous with $mino_province$. All who live there will fight under our banner."
 tki_flood_control_of_three_rivers: "Flood Control"
 tki_flood_control_of_three_rivers_desc: "In our home province, the three big rivers of Kiso, Nagara, and Ibi often cause serious flooding in our rice fields. We should control this overflow, and use it to increase the yield in all provinces under our rule."
 ues_strong_dynastic_ties: "Strong Dynastic Ties"
 ues_strong_dynastic_ties_desc: "Our family descends from the prestigious line of the $fujiwara_dynasty$, and we also have strong ties to the $ashikaga_dynasty$, as the mother of $ashikaga_dynasty$ Takauji was a member of our clan. These dynastic ties will prove invaluable for our prosperity."
 ues_double_shugo: "Double Shugo"
 ues_double_shugo_desc: "We have been appointed #italic Shugo#! of both $kouzuke_province$ and $tango_province$ Provinces. Their plentiful lands are the perfect starting point for our expansion."
 ues_eastern_power: "Eastern Power"
 ues_eastern_power_desc: "Although we have been granted territory in both eastern and western $japan_region$, it is in the east where we will truly be able to flourish. Our territories there are rich, and we can attract many skilled local warriors to fight for our cause."
 ues_dragon_of_echigo: "Dragon of Echigo"
 ues_dragon_of_echigo_desc: "Our clan has fostered such an extraordinary spirit of courage and justice that it intimidates our opponents on the battlefield. We will declare the strength of our leaders to all the world, and everyone will quake with terror at the thought of the Dragon of Echigo!"
 utn_fujiwara_descendant: "$fujiwara_dynasty$ Descendants"
 utn_fujiwara_descendant_desc: "Our genealogy shows that the ancestors of our clan were originally members of the $fujiwara_dynasty$ family from $kyoto$. This kinship to such an ancient and revered dynasty is very useful for making diplomatic connections to the Imperial Court and with the other clans."
 utn_legacy_of_nasu_no_yoichi: "Legacy of Nasu no Yoichi"
 utn_legacy_of_nasu_no_yoichi_desc: "$shimotsuke_province$ was once the home of Nasu no Yoichi, who was famous for his abilities as an archer during the Genpei War. To this day, the warriors of $shimotsuke_province$ hold him in high regard; we are proud to be called 'the best archers in Kantō' and to carry on Nasu no Yoichi's legacy."
 utn_mediator_of_kanto: "Mediator of Kantō"
 utn_mediator_of_kanto_desc: "As one of the oldest clans in Kantō, we have a keen insight into regional politics, and have worked as a mediator between different factions on many occasions. This same comprehensive understanding of our home region allows us to expand our territory effectively without provoking others."
 ymn_descendant_of_nitta: "Descendants of the $nitta_dynasty$"
 ymn_descendant_of_nitta_desc: "We are descendants of the $nitta_dynasty$ clan, ancient rivals of the $ashikaga_dynasty$ family. To some this is proof of the depths of our loyalty, while to others this makes us a natural enemy. We must cleverly utilize our lineage as a diplomatic weapon."
 ymn_mediate_succession_disputes: "Succession Dispute Mediation"
 ymn_mediate_succession_disputes_desc: "As many of the other clans squabble within themselves over who is the rightful heir to whom, they turn to us to mediate their disputes. Doing so puts us in a unique position of power and trust, making it easy for us to make new allies and contacts — and to destabilize our rivals."
 ymn_leader_of_western_army: "The Western Army"
 ymn_leader_of_western_army_desc: "Let us forge a great western army to unite the squabbling states of $japan_region$. Skillful generals, well-trained soldiers, and ironclad bravery will easily force the Easterners to their knees!"
 ymn_isolated_heartland: "Isolated Heartland"
 ymn_isolated_heartland_desc: "Our homeland is mountainous and isolated. Fortunately, this also means that any potential conquerors would find our territory almost impossible to reach! Let us build our defenses so that they complement the natural protective strength of our geography — any invader will bitterly regret the day they turned their greedy eyes to our possessions."
 
 #West Africa
 dahomey_amazons: "Dahomey Amazons"
 dahomey_amazons_desc: "A corp of female warriors, recruited from among the king's wives. They have earned their reputation as mythological Amazons due to their ferocity in battle and the fear they strike in the ranks of their opponents. These $dahomey_amazons$ are entirely devoted to $DAH$ and its interests."

 dah_children_of_the_panther: "Children of the Panther"
 dah_children_of_the_panther_desc: "Our ancient legends state that our royal line is descended from the union of a princess and a panther. This ancient and mystical tale will enhance our prestige and fame."

 dah_slave_hunts: "Slave Hunts"
 dah_slave_hunts_desc: "While raiding the surrounding territories, we obtain slaves who cannot only be employed economically or bartered to our neighbors, but who can serve in our armies. In this way, we will increase the number of fighters that can be called to arms."

 dah_migan_mehu: "Migan and Mehu"
 dah_migan_mehu_desc: "The Migan and the Mehu are the ruler's two chief ministers. One oversees the north, the other the south; one oversees justice, the other commerce. Together, they bring stability and prosperity."

 dah_lagredis: "Lagredis"
 dah_lagredis_desc: "By secretly placing male courtiers disguised as royal wives in the harem, they will be able to act unseen as the king's eyes and ears, especially in matters of palace intrigue."

 dah_yovogan: "The Yovogan"
 dah_yovogan_desc: "As more and more foreigners are coming to our shores, we should establish a new office in our government to study and learn from their ways, so that we may benefit from this exchange of cultures."

 dah_dahomey_palaces: "Palaces of Abomey"
 dah_dahomey_palaces_desc: "Building a sprawling palace complex in our capital would be an elegant, yet imposing demonstration of our power. Any who may consider taking up arms against us will surely be deterred by the sight of our sumptuous palaces."

 kbo_ribat_fortifications: "Ribāṭ Fortifications"
 kbo_ribat_fortifications_desc: "Used throughout the $muslim_ADJ$ world, these small fortifications have provided protections to caravans, commercial hubs, and isolated communities alike."
 
#Muslim
 people_of_allah: "People of $muslim_god_name$"
 people_of_allah_desc: "We are the followers of $muslim_god_name$, the only true God, and abide by His Word. All those who believe in Him are our brothers and sisters in His eyes."
 holy_revelation: "Holy Revelation"
 holy_revelation_desc: "The Word of $muslim_god_name$ was revealed to His Prophet Muḥammad, peace be upon him, and transcribed in the Holy $common_string_quran$. Through its verses, $muslim_god_name$'s will is passed to His faithful, and all $muslim_ADJ$ believers should be familiar with its passages."
 islamic_calligraphy: "Islamic Calligraphy"
 islamic_calligraphy_desc: "$muslim$ is not only a religion of peace, but of the arts. The calligraphy used to write the verses of the $common_string_quran$ and the names of the prophets often straddles the line between scripture and art."
 islamic_prayer: "Aṣ-Ṣalāh Farḍ"
 islamic_prayer_desc: "One of the Five Pillars of $muslim$, Aṣ-Ṣalāh is the obligation for a $muslim_ADJ$ faithful to perform daily prayers. Although the number of times one must pray every day and the specific movements when doing it may vary from school to school, the act of daily prayer is common among all $muslim$."
 zakah: "Al-Zakāh Wājib"
 zakah_desc: "One of the Five Pillars of $muslim$, Al-Zakāh is a form of almsgiving considered a religious obligation for any $muslim_ADJ$ faithful. Giving money to help the needy is a mandatory charity for everyone that can afford it, and it is considered a tax."
 muslim_lineage: "$muslim_ADJ$ Lineage"
 muslim_lineage_desc: "Ever since the times of Muḥammad, peace be upon him, $muslim$ has been intrinsically linked to rulership structures. As such, our dynastic line is also legitimized by the faith itself."
 muslim_caravans: "$muslim_ADJ$ Caravans"
 muslim_caravans_desc: "From the many paths of the Silk Road, to the salt routes across the Sahara, our people have a tradition of embarking on trade ventures to faraway lands, providing us and the rest of the $muslim_ADJ$ world with a wide selection of available goods."
 islamic_golden_age: "Islamic Golden Age"
 islamic_golden_age_desc: "The impact that the $islamic_golden_age$ had on the entire world, not only in $muslim_ADJ$ countries, is absolutely undeniable. Some of these infidel nations are only now emerging from their dark ages of ignorance, making their first attempts at artistic and scientific 'discoveries' that we invented — and perfected — long ago."
 ramadan: "Ramaḍān"
 ramadan_desc: "A commemoration of the first revelation to Prophet Muḥammad, peace be upon him, the month of $ramadan$ is the holiest month in $muslim$. During this month, all $muslim_ADJ$ faithful are expected to perform Ṣawm — fasting and abstinence — during the daylight hours, as well as prayer and reflection."
 sunnah: "Sunnah"
 sunnah_desc: "Consisting of the traditions and practices attributed to Muḥammad, peace be upon him, the $sunnah$ dictates how every $muslim_ADJ$ faithful should behave, and is also what gives $sunni$ its name. Although the different schools of jurisprudence may vary on the details, they all have their basis in the $sunnah$."
 imamate: "Imamate"
 imamate_desc: "The basis of $shia_ADJ$ faith is that Muḥammad, peace be upon him, designated 'Alī ibn Abī Ṭālib as his successor. As such, the figure of Imām is that of a spiritual leader coming from the line of Muḥammad, peace be upon him, to lead all $muslim_ADJ$ faithful."
 indian_sea_trade: "Indian Sea Trade"
 indian_sea_trade_desc: "$muslim_ADJ$ traders have sailed the waters of the $indian_ocean_region$ for generations, traveling impossibly far in search of rare and valuable goods. From the eastern coasts of $africa$, to the shores of $india$, and even as far as the spice islands of $indonesia_region$, the waters are crossed by vessels of the $muslim_ADJ$ faithful."
 muslim_trade_communities: "$muslim_ADJ$ Trade Communities"
 muslim_trade_communities_desc: "The presence of $muslim_ADJ$ traders in faraway lands puts them in contact with many different peoples and beliefs. The establishment of trade communities among them allows for a certain degree of blending and syncretism of their beliefs with the true Word of $muslim_god_name$."
 expansionist_faith: "Expansionist Faith"
 expansionist_faith_desc: "From its origins in $arabia_region$, $muslim$ has expanded far and fast. In a few generations, its believers spanned from $iberia_region$ to $india$, the most rapid religious expansion the world has ever seen. There are new lands waiting to be touched by our light, however — perhaps it is time for a second $muslim_ADJ$ expansion."
 blend_of_influences: "Blend of Influences"
 blend_of_influences_desc: "$muslim$ has expanded to many new places since its origins in $arabia_region$, and with this spread, it came into contact with many different peoples and ways of life. Many exchanges of influence happened during this process, to the point that many characteristics not originally part of $muslim$ have become intrinsically associated with the faith."
 islamic_schoolars: "Islamic Schools"
 islamic_schoolars_desc: "$muslim$ has always encouraged study and analysis of its scriptures, to the point where we have developed entirely different schools of thought on how to interpret them. Our scholars are therefore extremely learned in the $common_string_quran$ and our other holy texts, capable of having the most in-depth theological discussions."
 gunpowder_empires: "Gunpowder Empires"
 gunpowder_empires_desc: "Gunpowder may have been invented in the Far East, but it was through $muslim$ that it became widely used throughout the world. Gunpowder weapons have been a staple of our armies for generations, and its production and use is one of our defining characteristics."
 established_holy_sites: "Established Holy Sites"
 established_holy_sites_desc: "While other religions have somewhat lax and inconsistent views towards how their holy sites are used, the rules of $muslim$ about sacred places are quite clear. Our people will undoubtedly make their pilgrimages with the appropriate reverence and dignity."
 islamic_courts: "Islamic Courts"
 islamic_courts_desc: "The royal courts of $muslim_ADJ$ countries have always been among the most admired in the world. Praised for our refined culture and luxurious appointments, tales of the magnificence of our courts have spread far and wide, and our people take great pride in this reputation."
 schools_of_thought: "Schools of Thought"
 schools_of_thought_desc: "$muslim$ tradition has always emphasized the pursuit of knowledge and education. From schools of jurisprudence and theology to the great libraries and institutions of learning established by various rulers, $muslim_ADJ$ scholarship has earned admiration throughout the $muslim_ADJ$ world and well beyond."
 distant_trade_ventures: "Distant Trade Ventures"
 distant_trade_ventures_desc: "It is from the most distant places that the most lucrative trade goods come. For many years, $muslim_ADJ$ traders have traveled huge distances both on land and across the seas in search of profitable trade opportunities."
 resilient_merchants: "Resilient Traders"
 resilient_merchants_desc: "$muslim_ADJ$ traders endure the harshest of conditions during their expeditions. From crossing the scorching sands of the Sahara and Gobi Deserts, to braving the monsoon-plagued waters of the $indian_ocean_region$, they have proved time and again that they will undergo any hardship in order to bring about successful trade."
 jewels_of_the_desert: "Jewels of the Desert"
 jewels_of_the_desert_desc: "$muslim$ arose from the sands of $arabia_region$ and spread across a largely arid region. Yet some $muslim_ADJ$ cities became like prosperous jewels shining in the harsh desert, literal and figurative oasis made bountiful through trade, architecture, and irrigation. With wise investment and planning, any desert settlement can achieve a similar status."
 comprehensive_land_survey: "Comprehensive Land Survey"
 comprehensive_land_survey_desc: "In order to know who should pay taxes, we must first know who owns what. A comprehensive land survey, and regularly updating it, are therefore essential. We will always get what we are due!"
 counting_the_people: "Counting the People"
 counting_the_people_desc: "Now that we know who owns what, the logical follow-up is to get a clearer idea of who lives where. This will tell us where to look when we need fresh recruits for our armies."
 cosmopolitan_court: "Cosmopolitan Court"
 cosmopolitan_court_desc: "People from all over admire the beauty and sophistication of our $muslim_ADJ$ court. We have therefore become an appealing destination for talented luminaries of all kinds, which only adds to our overall court vibrancy and prestige."
 caliphate: "Ḵilāfa"
 caliphate_desc: "The #italic Ḵilāfa#!, or Caliphate, is the union of all $muslim_ADJ$ faithful under a single ruler in the form of the $rank_empire_muslim_ruler_male$, who is to be the political and spiritual successor of Muḥammad, peace be upon him. Although there are different ideas about who is eligible to be $rank_empire_muslim_ruler_male$, the idea of all $muslim$ united under a single banner has always been the primary focus of this process."
 ibadi_imamate: "$ibadi_ADJ$ Imamate"
 ibadi_imamate_desc: "Unlike the $caliphate$ or a divinely appointed $shia_ADJ$ Imām, an $ibadi_ADJ$ Imām does not rule over the entirety of the $muslim_ADJ$ world, but instead governs locally. Every community can be ruled independently by its own Imām."
 contacts_network: "Contacts Network"
 contacts_network_desc: "The extensive reach of $muslim$ has brought $muslim_ADJ$ countries in contact with many different foreign lands. Maintaining a rich network of international contacts such as ours is always beneficial for diplomacy."
 infiltration_tactics: "Infiltration Tactics"
 infiltration_tactics_desc: "Although the ancient $nizari_school$ $shia_ADJ$ order of the #italic Ḥashshāshīyīn#! has been largely mythicized beyond their original scope, their tactics of subterfuge and assassination were undeniably effective. If we employ such infiltration tactics ourselves, we should benefit from the same success."
 unified_armies: "Unified Armies"
 unified_armies_desc: "It cannot be denied that $muslim$ has spread to many different cultures and peoples since its emergence in $arabia_region$. As long as they believe in $muslim_god_name$, any person should be able to fight in His name, regardless of their origin."
 harsh_environments: "Harsh Environments"
 harsh_environments_desc: "$muslim$ has, since its inception, found its way to civilizations in some of the harshest environments of the world. If anyone from outside our region tries to invade our territories, they will find it fiendishly difficult — as they should!"

 #Buddhism
 four_noble_truths: "Four Noble Truths"
 four_noble_truths_desc: "The foundational teachings of the Buddha, the $four_noble_truths$ explain the reality of being. Nothing is permanent, which causes pain to the spirit, due to its attachment to this transient existence. This spiritual pain can only be eased by liberating oneself from desire and letting go of these attachments, which is achieved by following the $noble_eightfold_path$."
 noble_eightfold_path: "Noble Eightfold Path"
 noble_eightfold_path_desc: "The path to being liberated from Saṃsāra and achieving Nirvāṇa, the $noble_eightfold_path$ is the purest distillation of $buddhist_ADJ$ practices. Dictating both one's mental state and physical actions, it determines proper comportment for any follower of $buddhist$."
 middle_way: "Middle Way"
 middle_way_desc: "The Buddha teaches us that we should avoid extremes, as neither with sensual indulgence nor extreme asceticism can one achieve enlightenment."
 three_jewels: "Three Jewels"
 three_jewels_desc: "The $three_jewels$, or Three Refuges, are the three supports in which a follower of $buddhist$ takes refuge. These refuges are the #italic Buddha#!, the enlightened one; the #italic Dharma#!, the teachings of the Buddha; and the #italic Saṃgha#!, the monastic community that preserves the Dharma."
 buddhist_syncretism: "$buddhist_ADJ$ Syncretism"
 buddhist_syncretism_desc: "$buddhist$ has its origins in $india$, but it has since spread far and wide, coming in contact with many different beliefs. As such, it contains much syncretism not only with the previous $hindu_ADJ$ traditions, but with the many other deities it has been exposed to."
 sutra: "Sūtra"
 sutra_desc: "A type of sacred text in both $dharmic_ADJ$ and $buddhist_ADJ$ religions, they vary in format and content. Regardless, they are always considered to be valid sources of knowledge, and proper study of them is required if one is to develop their spirit."
 buddhist_councils: "$buddhist_ADJ$ Councils"
 buddhist_councils_desc: "Throughout $buddhist_ADJ$ history, monastic councils have discussed canonical texts across different schools. Although the specific form, outcomes, and records of the councils may vary from school to school, the unifying power of such councils — bringing diverse traditions into dialogue — should not be underestimated."
 buddhist_canon: "$buddhist_ADJ$ Canon"
 buddhist_canon_desc: "Called different names and even containing different texts, depending on the branch of $buddhist$, the $buddhist_canon$ is a collection of sacred $buddhist_ADJ$ texts. Containing everything from monastic rules to #italic Sūtra#!, or teachings of the Buddha, any person dedicated to $buddhist$ should be familiar with them."
 pali_canon: "$pali_language$ Canon"
 pali_canon_desc: "Although there are many different canons in $buddhist$, depending on the school, the $theravada_ADJ$ $pali_canon$ is the oldest and most prestigious. Other schools have created their canons from a mix of texts with various sources, but the $pali_canon$ has remained unchanged since the times of Ashoka 'the Great', and contains the words of the Buddha himself. It has also served as the foundation of many other schools."
 buddhist_universities: "$buddhist_ADJ$ Universities"
 buddhist_universities_desc: "Since antiquity, $buddhist_ADJ$ centers have also been hubs of learning and knowledge, attracting people from all over to study in our institutions. Nālandā was the biggest of these centers in the past, but many others have followed in its footsteps since."
 xuanzang_travels: "Xuánzàng Travels"
 xuanzang_travels_desc: "Xuánzàng, a $chinese_group$ $buddhist_ADJ$ monk who lived during the Táng dynasty in the 7th century, embarked on a seventeen-year overland trip to $india$ in order to visit it centers of learning and to gather a great number of $buddhist$ texts. Among other places he visited Nālandā, where he learned from the best masters, and on his return to $china$ he brought with him more than a thousand documents, which made a great contribution to $mahayana$. His trip and his records served as basis for the tale of #italic Journey to the West#!, in which a monk is tasked by the Buddha to travel to $india$ in search of some holy texts. accompanied among others by the Monkey King, Sūn Wùkōng."
 silk_road_transmission: "Silk Road Transmission"
 silk_road_transmission_desc: "It is undeniable the effect that the Silk Road has had on the spread of $buddhist$. Whether via land or sea, trade has allowed $buddhist$ to spread far from its origins in $india$."
 bodhisattva: "Bodhisattva"
 bodhisattva_desc: "Regardless of the school of $buddhist$ one adheres to, a $bodhisattva$ is an important figure, although their exact characteristics and importance vary between the different traditions. In all cases, however, they are deserving of reverence and admiration."
 avalokitesvara: "Avalokiteśvara"
 avalokitesvara_desc: "Also known as Guānyīn or Kannon, $avalokitesvara$ is one of the most revered Bodhisattvas. Represented as a male or female depending on the school, and even in some considered to be the origin of all $hindu_ADJ$ deities, $avalokitesvara$ is the $bodhisattva$ of compassion, and is associated with the mantra #italic Oṃ maṇi padme hūm̐#!."
 maitreya: "Maitreya"
 maitreya_desc: "$maitreya$ is currently a $bodhisattva$, prophesized to be the future and final Buddha of the current era. His destiny is to reestablish the teachings of the Dharma in the world after they have been forgotten by humanity, and as such he is the successor of Siddhārtha Gautama."
 mount_meru: "Mount Meru"
 mount_meru_desc: "$mount_meru$ is the sacred mountain at the center of the universe in both the physical and spiritual sense for $hindu$, $buddhist$, and $jain$. As it is the center around which everything else revolves, so does our entire country revolve around our ruler."
 naraka: "Naraka"
 naraka_desc: "Also called #italic Niraya#!, $naraka$ refers to the realms of suffering where one's bad karma is cleansed before being reincarnated. There are many $naraka$ realms, and both the time an individual must reside in them and the punishments they will receive while doing so depends on how much karma they need to gain before being reborn in one of the upper realms."
 four_heavenly_kings: "Four Heavenly Kings"
 four_heavenly_kings_desc: "Each presiding over one of the cardinal directions, the $four_heavenly_kings$ are in charge of protecting the Deva realm from the Asuras. They are also responsible for assessing the virtue and morality of mortals."
 vegetarianism: "Vegetarianism"
 vegetarianism_desc: "Although it depends on the school, there are some rules in the Dharma regarding abstinence from meat consumption. Each school has different views about the strictness of this abstinence, and also whether it should apply only to the monastic community or to the population in general."
 edicts_of_ashoka: "Edicts of Ashoka"
 edicts_of_ashoka_desc: "A legal code published by Emperor Ashoka 'the Great' in the 3rd century BCE, these edicts include strictures promoting for $buddhist$. Although this code is from many centuries ago, it still deserves respect and reverence from any member of the $buddhist_ADJ$ faithful."
 five_precepts: "Five Precepts"
 five_precepts_desc: "The foundational code of $buddhist_ADJ$ ethics and morality, the $five_precepts$ represent the most basic rules believers must follow in $buddhist$, whether part of the ordained monastic community or not. They instruct people to abstain from killing, stealing, sexual misconduct, lying, and intoxication."
 monastic_communities: "Monastic Communities"
 monastic_communities_desc: "$buddhist_ADJ$ life is centered around its communities of monks and nuns, called the #italic Saṃgha#!. They are governed by the #italic Vinaya#!, the rules and precepts that dictate the operations of any $buddhist_ADJ$ religious community."
 prestigious_schools: "Prestigious Schools"
 prestigious_schools_desc: "$buddhist$ has developed into a myriad of schools, each one centered around one type of monastic community and declaring a preference for certain texts. However, some of these schools have gained recognition, while others have been relegated to obscurity. Associating with the more prestigious schools gives those people a bit of prestige as well."
 offerings: "Offerings"
 offerings_desc: "It is a precept of $buddhist$ to make offerings to the $three_jewels$ in order to accumulate merit. These offerings may be material or non-material, and some monastic communities depend completely on food donated by their followers for their survival."
 incense_burning: "Incense Burning"
 incense_burning_desc: "The practice of burning incense is a staple of any $buddhist_ADJ$ ritual or offering. Varying in shapes and forms, it is common for both lay people and ordained monks and nuns alike to light incense before performing any ritual or meditation. As such, the smell of incense constantly permeates any $buddhist_ADJ$ temple."
 ascetic_practices: "Ascetic Practices"
 ascetic_practices_desc: "Although the Buddha warned us about the dangers of extreme asceticism, some among the monastic community still perform these strict practices. Limiting the type of cloth they can wear, the food they can eat, or where they can live are some of the restrictions adopted by those who wish to walk this path. Although such abstemious behavior is not a requirement for obtaining merit, it has its own benefits for the practitioner."
 mindfulness: "Mindfulness"
 mindfulness_desc: "An essential part of $buddhist_ADJ$ practice, $mindfulness$ means to be aware of the phenomena of both body and mind, while keeping the teachings of the Buddha always present in the mind. With this, one can avoid the arising of unwanted states, and develop into the wanted ones."
 dana: "Dāna"
 dana_desc: "Denoting generosity, $dana$ is defined as the act of giving without anything in return, and is a key virtue in all religions related to the Dharma. Helping others selflessly, whereas individually or communally, is one of the key ways of accumulating karma."
 ahimsa: "Ahiṃsā"
 ahimsa_desc: "The concept of $ahimsa$, or nonviolence, is a key virtue among all religions following the Dharma. Any conflict is encouraged to be resolved peacefully through dialogue, rather than the use of force. Unfortunately, that is not always possible, but violence should always be the last resort, and its use must be just."
 resistance_to_persecution: "Resistance to Persecution"
 resistance_to_persecution_desc: "Although it has spread widely throughout the world, $buddhist$ has also seen its fair share of persecution across the ages. Its temples and images may have been destroyed, its followers slaughtered or forced into hiding, but nonetheless its faithful have persevered."
 buddhist_meditation: "$buddhist_ADJ$ Meditation"
 buddhist_meditation_desc: "Meditation is a common practice among all $buddhist_ADJ$ followers, regardless of their school. The aim is to train the mind and the spirit to develop mindfulness, tranquility, and insight, and thus ultimately achieve enlightenment."

 #Hinduism
 sruti: "Śruti"
 sruti_desc: "Meaning 'that which is heard', $sruti$ are the holiest and most ancient texts of $hindu$. They are considered to be a divine revelation and thus not attributed to human authorship, although some deny their divine origin while still accepting their authority."
 vedah: "Vēdaḥ"
 vedah_desc: "The main texts among the $sruti$ are the $vedah$, which are the oldest $sanskrit_language$ texts. Their authorship is attributed to Brahmā in the $mahabarata$, and they are the Ṛgveda, the Yajurveda, the Sāmaveda, and the Atharvaveda."
 smrti: "Smṛti"
 smrti_desc: "Meaning 'that which is remembered', $smrti$ texts are inspired by or originated from the $vedah$, and thus are considered less authoritative than the $sruti$ due to being derived from them. However, unlike the $sruti$, the $smrti$ texts have attributed authorship and are transmitted through manuscripts."
 mahabarata: "Mahābhārata"
 mahabarata_desc: "One of the two major $smrti$ texts together with the $ramayana$, the $mahabarata$ is an epic of ancient $india$. It is the longest epic poem ever written, about ten times bigger than the $greek_language$ #italic Iliad#! and #italic Odyssey#! combined, and it narrates the story of a dynastic struggle for the throne of the ancient $indian_group$ kingdom of Kuru culminating in the Kurukshetra War, also called $mahabarata$ War. The story ends with the death of $krishna_avatar$ and the end of his dynasty."
 ramayana: "Rāmāyaṇa"
 ramayana_desc: "One of the two major $smrti$ texts together with the $mahabarata$, the $ramayana$ is an epic of ancient $india$. It narrates the life of $rama_avatar$, avatar of $vishnu_god$, as a prince of the kingdom of Kosala. It emphasizes the importance of virtue in all aspects of one's life."
 purana: "Purāṇa"
 purana_desc: "Considered part of the $smrti$, the $purana$ are texts with a variety of content. Cosmology, divine genealogies, astronomy, grammar, love stories... almost everything can be found within them. As such, even though they are not part of the $sruti$, their influence on $hindu_ADJ$ beliefs and society is strong, as they combine diverse local beliefs and traditions into the common narrative of the $vedah$."
 atman: "Ātman"
 atman_desc: "Referred to the true and eternal unchanging Self, it is the essence of each individual's consciousness. According to the $astika$ schools, this $atman$ is distinct from the mind and body, and it is also different from the Jivātman that persists across multiple lifetimes. In contrast, the $nastika$ schools interpret the concept differently, or reject it entirely."
 nastika_schools: "Nāstika Schools"
 nastika_schools_desc: "Some schools of thought in $hindu$ deviate from the mainstream, rejecting the authority of the $vedah$ and the existence of $atman$. These schools, like $jain$ and $buddhist$, are thus heterodox, although they still contain many of the shared core beliefs of $hindu$."
 astika_schools: "Āstika Schools"
 astika_schools_desc: "Called the orthodox schools of $hindu$, they accept the authority of the $vedah$ and the existence of $atman$. Although consisting of many different branches, this commonality of acceptance gives the $astika_schools$ a lot of common ground."
 diversity_of_beliefs: "Diversity of Beliefs"
 diversity_of_beliefs_desc: "The beliefs of the people of $india$ center around the concept of Dharma and the text of the $vedah$, but they are manifested in a myriad of forms and practices. Even the gods recognized and worshiped are not the same for everyone, but a common thread of concepts is present throughout."
 ishvara: "Īśvara"
 ishvara_desc: "Interpreted differently depending on the school or branch of $hindu$, $ishvara$ refers to the Supreme Being or God. Therefore, it can refer to $shiva_god$ for $shaivism$, to $vishnu_god$ for $vaishnavism$, or to any personal god of the individual."
 sanskritization: "Sanskritization"
 sanskritization_desc: "$hindu$ has spread much farther than its origins in $india$, and many other cultures and countries have adopted $sanskrit_language$ concepts and titles to refer to their own identity. As such, the concepts of $hindu$ have seamlessly permeated and blended into foreign beliefs."
 bhakti_movement: "Bhakti Movement"
 bhakti_movement_desc: "Having emerged in the 6th century, this movement promotes love and devotion to one's personal god or towards an enlightened individual. It appeals to the lay population by speaking to them directly on their own terms. A highly influential movement, it is changing how religion and belief themselves are understood by our people."
 yoga: "Yoga"
 yoga_desc: "A prominent $hindu_ADJ$ school and philosophy, $yoga$ is a set of practices both physical and spiritual, with the purpose of controlling the mind and body. Performed for millennia, it has almost become synonymous with the path of enlightenment."
 diwali: "Diwali"
 diwali_desc: "Called the festival of light, $diwali$ is when we celebrate the triumph of the Dharma; the victory of good over evil and light over darkness. We will light candles and lanterns to symbolize this victory, and we will honor our ancestors."
 holi: "Holi"
 holi_desc: "Held at the beginning of spring to celebrate its arrival, $holi$ is the festival of colors and love. We commemorate agriculture and good harvests, and at the same time enjoy the myriad of colors that spring offers. It is also the time to have fun and resolve conflicts, removing one's emotional impurities."
 holy_rivers: "Holy Rivers"
 holy_rivers_desc: "Rivers and their veneration have always been an important part of $hindu$. From the Indus to the Ganges, there are many rivers considered holy, on the shores of which many rituals are held. Their waters are considered sacred, and they are a common site for purification rituals."
 advaita_vedanta: "Advaita Vedānta"
 advaita_vedanta_desc: "Rejecting the dualism between consciousness and matter, $advaita_vedanta$ claims that the $atman$, or the innermost self or consciousness, is one and the same as the supreme reality or consciousness of the universe, Brahman. In this sense, the physical material world is just an illusion hiding the ultimate reality of the Brahman."
 hindu_muslim_relations: "$hindu_ADJ$-$muslim_ADJ$ Relations"
 hindu_muslim_relations_desc: "There has been a lot of interaction in the past between $hindu$ and $muslim$, and there will continue to be so. Our peoples have learned to live peacefully together and there has even been some degree of syncretism between the two faiths."
 hindu_unification: "$hindu_ADJ$ Unification"
 hindu_unification_desc: "Despite the differences in beliefs and practices throughout $hindu$, there are more commonalities between us than differences. A common unified view of $hindu$ has started to emerge, and our people can gain a great sense of unity through it."
 hindu_architecture: "$hindu_ADJ$ Architecture"
 hindu_architecture_desc: "Regardless of the style of construction, be it a Śikhara, Vimāna, or Prāṅg, $hindu_ADJ$ temples are recognizable everywhere for their tall, decorated towers. A representation of $mount_meru$, more or less emphasized depending on the region, these spires serve both as a signal of faith and a demonstration of power."
 varna_system: "Varṇa System"
 varna_system_desc: "Since the times of the $vedah$, there has existed the concept of one's Dharma being classified as one of the four possibles: #italic Brāhmaṇa#!, scholars or priests; #italic Kṣatriya#!, rulers or warriors; #italic Vaiśya#!, farmers or merchants; or #italic Śūdra#!, artisans or servants. These classifications are not rigid, but instead represent the ideal of an individual's calling, and they have been very influential in $hindu_ADJ$ society."
 extreme_pacifism: "Extreme Pacifism"
 extreme_pacifism_desc: "Based on the concept of $ahimsa$, $hindu$ always advocates for pacifism and nonviolence. However, our enemies should still be wary of provoking us, lest we end up exemplifying the complete opposite extreme when roused into war."
 hindu_empires: "$hindu_ADJ$ Empires"
 hindu_empires_desc: "There have been many empires in the past that followed $hindu$. From the Maurya and Gupta empires in $india$, to the Śrīvijaya Empire in $indonesia_region$, and the long-lasting Chola Dynasty, $hindu$ has always been the spirital force behind the throne of powerful rulers."
 sacred_cattle: "Sacred Cattle"
 sacred_cattle_desc: "As part of $ahimsa$, it is prohibited to slaughter cattle. They instead are respected and venerated as maternal figures, and are symbols of selfless provision and sacrifice. Having been worshiped since the time of the $vedah$, they still command enormous respect and attention."

 #Asia
 riches_of_asia: "Riches of $asia$"
 riches_of_asia_desc: "$asia$ is famous around the world for its riches. From the bountiful cities of $persia_region$ and $india$, to the highly-sought luxury items produced in $china$, to the almost mythical Spice Islands in $indonesia_region$, the luxurious goods coming from $asia$ are highly prized worldwide."
 silk_road: "Silk Road"
 silk_road_desc: "Be it the land route crossing the Gobi Desert and $persia_region$, or its ocean counterpart through the $indian_ocean_region$ and $indonesia_region$, the lands of $asia$ have been for centuries traversed by merchants seeking profit on the famous Silk Road."
 exchange_of_ideas: "Exchange of Ideas"
 exchange_of_ideas_desc: "Not only do coin and profit move along the $silk_road$, but ideas and knowledge also follow the ebb and flow of the merchants traveling along its path."
 legacy_of_great_empires: "Legacy of Great Empires"
 legacy_of_great_empires_desc: "From the Dragon Throne of $china$, to the various empires of $persia_region$, to the powerful $hindu_ADJ$ and $buddhist_ADJ$ dynasties of $india$ and $south_east_asia$, $asia$ has been home to many mighty empires throughout history."
 arduous_terrain: "Arduous Terrain"
 arduous_terrain_desc: "$asia$ is home to some very inhospitable lands, from the high peaks of the Himalaya, to the arid span of the Gobi Desert, to the dense jungles of $india$ and $south_east_asia$. And that does not even include the monsoon and typhoon seasons, and the almost constant present of earthquakes! Its people have learned to live in such an unwelcoming environment, but invaders will find it so easy."
 fertile_lands: "Fertile Lands"
 fertile_lands_desc: "In general, the lands of $asia$ are blessed with plentiful rain, and many rivers cross its territories even in areas with less precipitation. Except for some of the most arid areas of the desert, our land provides ample food to our population. Even in those regions where it does not, the people living there are able to do much with what they have."
 crossroads_of_religions: "Crossroads of Religions"
 crossroads_of_religions_desc: "$hindu$, $buddhist$, $muslim$, and even $tengri$ are religions that have expanded into parts of the world very far from their places of origin. $asia$ has witnessed this exchange of beliefs for centuries, and in many cases the blending and syncretism that has happened among them."
 religious_syncretism: "Religious Syncretism"
 religious_syncretism_desc: "Interaction between beliefs sometimes results in synthesis rather than rejection. Foreign thoughts and practices should therefore not be seen as hostile threats, but opportunities to learn, and possibly incorporate valuable elements into our own traditions."
 source_of_knowledge: "Source of Knowledge"
 source_of_knowledge_desc: "While foreign nations pride themselves on being at the forefront of knowledge and development, some of their recent 'inventions' have been known in $asia$ for centuries. From the technological prowess of $china$ to the ancient literature of $india$, there is nothing for the East to envy from the West."
 structured_society: "Structured Society"
 structured_society_desc: "Religious and philosophical traditions, particularly those of $hindu$ and $SECT_CONFUCIANISM_NAME$, have historically influenced social organization in parts of $asia$, emphasizing proscribed role fulfillments within social hierarchies. The rigidity of living within these systems is offset by the relative ease with which social order is maintained."
 incense_preeminence: "$incense$ Preeminence"
 incense_preeminence_desc: "$incense$ has been a staple of life in $asia$ for centuries, maybe more so than anywhere in the world. Although other religions also use it for their rituals, its near-ubiquity in $hindu_ADJ$ and $buddhist_ADJ$ ceremonies, as well as its everyday use by $muslim$ people, give it a constant presence anywhere in $asia$."
 incense_trade_route: "$incense$ Trade Route"
 incense_trade_route_desc: "The high demand for $incense$, not only in $asia$ but also beyond it, requires the establishment of many trade routes dedicated to its commerce. Akin to the more famous $silk_road$, this trade of $incense$ links the East with the West."
 wake_of_the_mongol_horde: "Wake of the $MGE_ADJ$ Horde"
 wake_of_the_mongol_horde_desc: "There is almost no place in $asia$ that has not felt the influence of the $MGE_ADJ$ conquests. After the fall of the once-great empire forged by $genghis_khan_name_no_tooltip$, the land is finally recovering from being trampled by his horses."
 cultural_melting_pot: "Cultural Melting Pot"
 cultural_melting_pot_desc: "$asia$ is a highly diverse region, home to a wide variety of cultures. This diversity, and the cultural exchange and blended influences that result from it, has empowered our countries and allowed them to flourish in every domain from architecture to music to horticulture, and beyond."
 rise_of_great_individuals: "Rise of Great Individuals"
 rise_of_great_individuals_desc: "History proves that the most extraordinary individuals are the ones who rise to prominence and achieve great things. Time and again, empires have been forged or destroyed by the hand of a single ruler, and such achievements are to be respected and admired."

 #Orthodox
 the_pentarchy: "The Pentarchy"
 the_pentarchy_desc: "The old structure of the Church formulated by Emperor Justinian is still in full effect in $orthodox$. Although the patriarch of $rome$ believes himself to be above all else, for the #italic authentic#! Church, the cities of $constantinople$, $alexandria$, $antioch$, and $jerusalem$ remain far more important."
 imperial_creed: "Imperial Creed"
 imperial_creed_desc: "$orthodox$ has been the official faith of the Roman Empire ever since its adoption of $christian$. The heresies of the West and their falsely proclaimed 'emperors' will not be able to discredit our legitimacy."
 filioque_issue: "Filioque Issue"
 filioque_issue_desc: "The heretical addition of the #italic Filioque#! clause, which states that the Holy Spirit proceeds from the Father 'and the Son', was done without calling the appropriate ecumenical council, and therefore it is illegitimate. We are the guardians of the true prayer, and $rome$ shall be damned for their heresy!"
 septuagint: "Septuagint"
 septuagint_desc: "Our Old Testament is encoded in $greek_language$, using the version known as the $septuagint$, which is a translation from $hebrew_language$ done in the 3rd century BC. It was written by seventy-two isolated translators, who all came up with the exact same translations independently. It is thus definitely divinely inspired, and the direct word of God."
 anagignoskomena: "Anagignoskomena"
 anagignoskomena_desc: "Our Bible contains all books worthy of veneration and study, even though some may have less importance than others. The $anagignoskomena$ are not present in the $hebrew_language$ Bible, so they receive less attention than other texts, but they are nonetheless worthy of being read and should not be disregarded."
 church_guidance: "Church Guidance"
 church_guidance_desc: "The Scriptures are the Word of God, but only the Church is able to interpret their correct meaning and to relate it accurately to the flock. Any independent reading or interpretation of the Scriptures outside of Church guidance would only lead to being lost in falsehoods and on the path to heresy."
 unchanging_tradition: "Unchanging Tradition"
 unchanging_tradition_desc: "The tradition passed down to us by Jesus Christ and the apostles is consistent, without any changes, additions, or subtractions whatsoever. Our faith is undeniable in its truths, and what is fundamentally true about this world cannot be changed by mortal hands."
 church_councils: "Church Councils"
 church_councils_desc: "As the Church must be united in its judgments, any matter too complex for a single bishop to resolve requires us to call a council, where the bishops will consult the mind of the Church itself. The council's decisions shall therefore reflect the consensus of the Church as a whole."
 greek_rite: "$greek_culture$ Rite"
 greek_rite_desc: "Our rites and canonical practices have been for centuries well-defined following the $greek_culture$ rites of $constantinople$. Although there may be some small variations in certain places, there is remarkable homogeneity in the rites performed throughout $orthodox$."
 physical_body_of_christ: "Physical Body of Christ"
 physical_body_of_christ_desc: "Our Church is the physical manifestation of the Body of Christ on Earth, having no difference from the one in Heaven. As such, the Church is the physical embodiment of the Lord Savior, sent for the benefit of His people."
 sight_veneration: "Icon Veneration"
 sight_veneration_desc: "The most important aspect of veneration is the faithful be reminded of great works, miracles, and figures through their natural sense. As such, our churches are adorned with vibrant images and colors, ringing with music and sweetly scented with our holy incense, so that the presence of Christ on Earth can be immediately felt by all inside."
 theotokos: "Theotokos"
 theotokos_desc: "The Virgin Mary is a key figure in our beliefs, as she fulfilled the Old Covenant by carrying within her the New Covenant in the figure of Christ. As such, being the bearer of Christ God-incarnate, she was literally the Mother of God, and has a place of prominence above all other saints."
 heavenly_architecture: "Heavenly Architecture"
 heavenly_architecture_desc: "$orthodox_ADJ$ religious buildings are designed in imitation of heaven. Their construction centralized around the basilica, the central dome that serves as a roof and symbolizes the heavens. Richly decorated in beautiful images and gleaming golden icons, they are a wonder to behold."
 iconostasis: "Iconostasis"
 iconostasis_desc: "One key feature of any $orthodox_ADJ$ church is that of the $iconostasis$, a wall of icons that separates the main body of the building from the altar. The icons it contains serve as a visualization of the link between the worshipers and the Holy of Holies, and thus the link between Heaven and the people, serving as a guide for the people towards Heaven."
 julian_calendar: "Julian Calendar"
 julian_calendar_desc: "The time of our country and our Church has been for centuries measured by the $julian_calendar$, promulgated by Julius Caesar in 46 BC. It not only unifies all eastern $christian_ADJ$ nations, but it also serves to dictate when the important feasts and celebrations are to be held."
 paschal_cycle: "Paschal Cycle"
 paschal_cycle_desc: "$orthodox$ contains some movable feasts around #italic Pascha#!, Easter, organized in the $paschal_cycle$. The ten weeks before Pascha are called #italic Triodion#!, while the fifty days after Pascha are called #italic Pentekostárion#!. This cycle marks the most important celebrations in the liturgical year."
 oktoechos: "Oktōēchos"
 oktoechos_desc: "An eight-mode system of writing music, the $oktoechos$ has been the system used for writing religious chants and music for the Church for centuries. It is the foundation of $orthodox_ADJ$ chant, although with some variations between cultures."
 prestigious_monasticism: "Prestigious Monasticism"
 prestigious_monasticism_desc: "In $orthodox$, monasticism and asceticism are highly valued and almost a requirement. Any bishop must be a monk first, and they must become a monk before being consecrated if they are not. As such, monasteries and monasticism centers have a big impact on our clerical life."
 national_rites: "National Rites"
 national_rites_desc: "The presence of different autocephalous patriarchates in our Church allows for certain variations between the national rites of each country. However, the unity of the message remains, and the Church as a single entity is not broken."
 heirs_of_rome: "Heirs of Rome"
 heirs_of_rome_desc: "Many have claimed to be the heirs of Rome and indeed the whole Roman Empire. However, only our religion is the true faith of the old Empire, and therefore only we can legitimately claim to be a direct descendant from it."
 legacy_of_saint_andrew: "Legacy of Saint Andrew"
 legacy_of_saint_andrew_desc: "According to legend, Saint Andrew himself visited Scythia and the northern shores of the $black_sea_area$, prophesying a great flourishing of $christian$ once he reached the future site of $kyiv$."
 christianization_of_the_slavs: "Christianization of the Slavs"
 christianization_of_the_slavs_desc: "The people of the Kievan Rus' were among the first of the Eastern $slavic_group$ people to accept the light of Christ and convert to $orthodox$. From there, the faith spread throughout the region."
 cyril_and_methodius: "Cyril and Methodius"
 cyril_and_methodius_desc: "Two $BYZ_ADJ$ theologians from the 9th century, these men were instrumental to the evangelization of the Slavs. They are credited for developing the Glagolitic alphabet, the first one to ever be used to transcribe $church_slavonic_language$, and their followers later developed the Cyrillic alphabet, naming it after Cyril in his honor."
 interaction_between_church_and_state: "Interaction Between Church and State"
 interaction_between_church_and_state_desc: "The patriarchates have absolute authority over their own jurisdictions and those who occupy them. By tying their authority to that of the ruler, we can take advantage of the resources of the Church, and use them to strengthen state authority."
 outwards_expansion: "Outwards Expansion"
 outwards_expansion_desc: "It is the holy duty of the Church to bring the light of Christ to the pagan and the infidels. We must go beyond our borders to carry salvation to every lost soul!"
 justified_holy_wars: "Justified Holy Wars"
 justified_holy_wars_desc: "We cannot allow heathens and heretics to dictate our actions. It is our holy duty to cleanse the land of their impurity so that the true realm of God can be manifested on Earth."
 resistance_to_the_infidels: "Resistance to the Infidels"
 resistance_to_the_infidels_desc: "Our $orthodox_ADJ$ brethren have seen themselves at times under the yoke of foreign infidels. However, we have learned to endure such oppression, and even live in peace alongside these infidels."
 eastern_ecumenism: "Eastern Ecumenism"
 eastern_ecumenism_desc: "$christian_ADJ$ denominations from the Oriental Orthodoxy are often confused with Eastern $orthodox$ by the uninitiated. Although they are different from us in many key issues, they are still $christian_ADJ$, and our many commonalities could be used to bring them back to the correct faith."
 structured_patriarchates: "Structured Patriarchates"
 structured_patriarchates_desc: "Our patriarchates have always been well organized and structured, each with its own attributions and delimitations. This allows for a better-functioning Church, which leads to a better-functioning state."

 #Miaphysitism
 second_council_of_ephesus: "Second Council of Ephesus"
 second_council_of_ephesus_desc: "The $second_council_of_ephesus$, convened in 449 at the instance of Pope Dioscorus of $alexandria$, was a legitimate $christian_ADJ$ council despite its denunciation by the $catholic_ADJ$ and $orthodox_ADJ$ Churches. At this council, the formula of Cyril of Alexandria — which states that Christ is a single incarnate nature, both human and divine — was officially accepted."
 rejection_of_chalcedon: "Rejection of Chalcedon"
 rejection_of_chalcedon_desc: "As they did not accept the $second_council_of_ephesus$, the Council of Chalcedon was called at the instance of Pope Leo I, who demanded the nullification of the $second_council_of_ephesus$. We reject this false council, and stand by the decisions made in the original one."
 monophysite_vs_miaphysite: "Monophysite vs $miaphysite_ADJ$"
 monophysite_vs_miaphysite_desc: "Although $miaphysite$ also proclaims that the figure of Christ has only a single nature, it differs substantially from the Eutychian Monophysite view which proclaims that the humanity of Christ was absorbed into his divinity. Though there may be some that also call us followers of Monophysitism, it is just an agreement in words, as in substance our views are clearly different."
 original_christianity: "Original $christian$"
 original_christianity_desc: "There have been many schisms and divisions in the $christian_ADJ$ world, but our creed traces its roots on the original true $christian$ formulated from the First Council of Nicaea. Every split from the main branch after this is mere heresy."
 beyond_the_borders: "Beyond the Borders"
 beyond_the_borders_desc: "$christian$ undoubtedly originated inside the cradle of the Roman Empire, and many of its branches have been content to stay in that region. $miaphysite$, however, was on the edges of the Empire after being denounced by the Chalcedonians, and has spread far beyond its birthplace, bringing the light of God to the most remote places."
 isolated_reaches: "Isolated Reaches"
 isolated_reaches_desc: "$miaphysite$ has managed to spread to very distant places. Even while surrounded by enemies and heretics, our faith has remained strong."
 independent_leaders: "Independent Leaders"
 independent_leaders_desc: "Due to the isolation of $miaphysite$, it has been difficult at times to contact other patriarchates. As such, our leaders have learned to act independently, while at the same time keeping in contact with the rest of the $christian_ADJ$ world as much as possible."
 jerusalem_focus: "$jerusalem$ Focus"
 jerusalem_focus_desc: "We always keep the holy city of $jerusalem$ in our minds, as not only it was the place where Jesus preached and died, but also where he will return to in his Second Coming. As such, we always pray facing in the direction of $jerusalem$, no matter where we are."
 acceptance_of_old_testament: "Acceptance of the Old Testament"
 acceptance_of_old_testament_desc: "Some $christian_ADJ$ denominations have decided to reduce the importance of the Old Testament, claiming that the arrival of Jesus completely supersedes it. We, however, maintain that it is still relevant, and that some instructions in it are as valid as they were when they were written."
 primacy_of_alexandria: "Primacy of $alexandria$"
 primacy_of_alexandria_desc: "Although $miaphysite$ has many branches and independent leaders, we recognize $alexandria$ and its seat as our spiritual leader. However, this is a sign of respect for the Apostolic Throne and a way to honor it, rather than a bestowal of any special prerogatives."
 school_of_alexandria: "School of $alexandria$"
 school_of_alexandria_desc: "The Catechetical $school_of_alexandria$, allegedly founded by the Apostle Mark himself, is the oldest school of catechism in the world. There, biblical and theological studies have been taught since the start of $christian$ itself. Although the school itself was destroyed when the Bishop of $rome$ was declared to be above the Patriarch of $alexandria$, its tradition has endured."
 preserving_of_local_languages: "Preservation of Local Languages"
 preserving_of_local_languages_desc: "Despite the importance of $greek_language$ and $latin_language$ in early $christian$, $miaphysite$ has preserved its liturgy in more local vernaculars, like $coptic_language$, $aramaic_language$, and $armenian_language$. Venerable languages in their own right, each $miaphysite_ADJ$ branch preserves its own historical tongue."
 double_patriarchate: "Double Patriarchate"
 double_patriarchate_desc: "Both $alexandria$ and $antioch$ see themselves as having two different patriarchates, one for $miaphysite$ and another for $orthodox$. Although they both may claim legitimacy, only $miaphysite$ preserves the true patriarchates."
 eastern_christianity: "Eastern $christian$"
 eastern_christianity_desc: "We are part of the branch of so-called $eastern_christianity$, which amalgamates many different denominations with different theological and liturgical traditions, but also with many common cultural aspects."
 life_among_infidels: "Life Among Heathens"
 life_among_infidels_desc: "The lands of the faithful have often been tainted by the presence of unbelievers, but this is why our clerics have ventured forth towards the unknown to bring the light of Jesus to distant lands. We have thus influenced these lost souls in more ways than what one might expect, even if we have not been able to make them see the error of their beliefs."
 gradual_departure: "Gradual Departure"
 gradual_departure_desc: "Although they were quick to brand us as heretics, $miaphysite$ did not cut ties with the rest of the $christian_ADJ$ world instantly. We kept in contact with the other patriarchates, and attended the councils, but it was gradually made clear that $miaphysite$ is too different from those heretical beliefs."
 thrive_under_persecution: "Thriving Under Persecution"
 thrive_under_persecution_desc: "Although our faithful have been persecuted by heretics for centuries, our beliefs have persevered. No matter how many times they bring us down, we will rise again!"
 preserver_of_national_identity: "Preserving National Identity"
 preserver_of_national_identity_desc: "It is because of our history of being persecuted and oppressed that our Church became responsible for preserving our identity. It is in the bosom of the Church where our languages and traditions have been kept safe, and therefore we have unshakeable faith in this institution."
 defense_against_heretics: "Defense Against Heretics"
 defense_against_heretics_desc: "Ever since our split from other $christian_ADJ$ faiths, the heretics have come to us with accusations and condemnations many times. They may call themselves $christian_ADJ$, but their views are obviously clouded, whereas our vision is made clear by the light of God."
 remote_patriarchates: "Remote Patriarchates"
 remote_patriarchates_desc: "Conquest and persecution have repeatedly forced our patriarchates to relocate after their seats have fallen under control of heathen conquerors. Though we now operate from new locations, the original seats remain spiritually revered in our tradition, albeit from a distance."
 further_reaches: "Further Reaches"
 further_reaches_desc: "Despite many attempts by nonbelievers to stop our faith from spreading, it has nevertheless made its way to many different peoples and cultures, bringing light wherever it goes."
 internal_communion: "Internal Communion"
 internal_communion_desc: "Despite having independent patriarchs, all branches of $miaphysite$ maintain mutual communion. This helps them build relationships with each other, and promotes unity in the Church."
 cradle_of_monasticism: "Cradle of Monasticism"
 cradle_of_monasticism_desc: "Monasticism in $christian$ was born in $egypt_region$, when the $christian_ADJ$ faithful retreated to the desert to pray and dedicate their lives to God. $miaphysite$ can therefore claim this history as their own through the Alexandrine tradition."
 unique_architecture: "Unique Architecture"
 unique_architecture_desc: "The relative isolation of our patriarchates have resulted in the development of unique architectural styles for our holy places. Although other $christian_ADJ$ denominations may be more prominent, our captivating architecture is an inspiration to the faithful."

 #America
 #North American
 medicinal_infusions: "Medicinal Infusions"
 medicinal_infusions_desc: "The healing properties of certain plants have helped our people overcome different diseases for centuries. Infusions of certain leaves have even been said to lengthen the lives of our people."
 canoe_travels: "Canoes"
 canoe_travels_desc: "Lightweight canoes are perfectly adapted to the waterways of $north_america$. These vessels can navigate shallow rivers and are light enough to portage — carry overland— when necessary. In this way, we can turn disconnected waterways into full trade routes, making it much easier to direct the flow of commerce and people."
 seasonal_economy: "Seasonal Economy"
 seasonal_economy_desc: "In troubled times, we must learn to endure life, and life is synonymous with nature. The change of seasons necessitates a change in our lifestyles; villages must be adaptable and mobile."
 fishing_habits: "Fishing Habits"
 fishing_habits_desc: "Sometimes it is difficult to believe that some of our people were born on land and not in the water, for their bodies swim with such agility that it is nearly impossible to distinguish them from the current of the river. As a result, we are experts at fishing."
 whale_hunters: "Whale Hunters"
 whale_hunters_desc: "Whales, porpoises, walruses, seals... everything the sea gives us, we hunt."
 moundbuilding_advance: "Mound Builders"
 moundbuilding_advance_desc: "The ceremonial mounds built by our ancestors are monuments to their sophisticated earthwork engineering skills. By incorporating these mounds into the planning of our infrastructure, we will preserve a defining tradition of our civilization."
 bison_hunters: "Bison Hunters"
 bison_hunters_desc: "Bison are a crucial resource for our people. We use every part of the animal as a tribute to its sacrifice. We feed our people with its flesh, we use its bones for tools; we use its fur to protect ourselves against the cold and its hides for our clothes. Even the animal's soul has symbolic meaning for us. Such is the importance of the bison to our culture that we would feel lost without them."
 federal_constitution: "Federation Builders"
 federal_constitution_desc: "We should unite with other groups of our kin to form a federation, which will put mutual trust and development as its first priority."
 shared_knowledge: "Shared Knowledge"
 shared_knowledge_desc: "Innovation can come in many forms and if we want to stay ahead of rival tribes, we will need to explore every advantage we can get."
 slash_and_burn: "Slash and Burn Agriculture"
 slash_and_burn_desc: "An agricultural technique that involves strategically cutting and burning the vegetation to obtain a nutrient-rich layer of ash that fertilizes underlying soil, making it excellent land for planting crops. We have learned that the land becomes stronger after this method, as a bone becomes stronger after being broken."
 council_of_elders: "Council of Elders"
 council_of_elders_desc: "Our tribal government ensures that everyone in it has a voice and an equal say in crucial decisions. This collaborative administration encourages us to consider new perspectives."
 experienced_fur_hunters: "$fur$ Trade"
 experienced_fur_hunters_desc: "Trading $fur$ with other tribes and foreigners is an essential part of our economy. We take great pride in our hunting abilities, and therefore are able to provide the best quality pelts."
 #Mesoamerica
 pyramid_architecture: "Pyramid Architecture"
 pyramid_architecture_desc: "Our ancestors constructed massive stone pyramids in the far-gone days of Teōtīhuacān, Tik'al, Copan, and Palenque. We have not forgotten the art of pyramid building, and can carry on this tradition."
 ball_game: "Tlachtli"
 ball_game_desc: "The heart of social life in our society is the ball game, where players strive to keep the ball inside the playing court by striking it with their hips. It is both a ritual alternative to warfare and a large part of religious life."
 war_bonfires: "War Bonfires"
 war_bonfires_desc: "A network of frontier settlements linked together by immense bonfires, which can be seen from a huge distance when lit, will allow us to quickly alert multiple settlements at once to threats, and therefore respond far faster."
 merchant_officials: "Merchant-Officials"
 merchant_officials_desc: "Merchants and their trading contribute substantially to our national income. However, merchants are also excellent sources of information, as they are often in the position to observe first-hand what circumstances our neighbors are in. By giving them official roles in the government, we can exploit their knowledge and mobility to our own ends."
 copperworking: "Copperworking"
 copperworking_desc: "Our artisans have begun to craft tools out of $copper$, a precious metal found throughout our territory. If we were to master this art, it would give us a tremendous advantage over our neighbors."
 system_of_tributaries: "Tributary System"
 system_of_tributaries_desc: "Direct rule comes at the cost of extensive investment in subjugating and pacifying rival groups. By instead installing a loyal official to rule locally and demanding they pay an annual tribute, we eliminate threats from any rival $altepetl$ while filling our treasury at the same time."
 refined_obsidian_weaponry: "Obsidian Weaponry"
 refined_obsidian_weaponry_desc: "Obsidian is an excellent material for making all kinds of tools and weapons. The hard, glasslike rock holds a sharp edge beautifully, making it an easy task to create blades, spearheads, or arrowheads which leave deadly wounds on any foe."
 precious_stones_art: "Precious Stone Carving"
 precious_stones_art_desc: "Our area is rich in precious stones, which are excellent for adding color, detail, and sparkle to artistic pieces and mundanities alike. Our craftsmen will immortalize themselves through these glittering jewels, and create great monuments to our culture."
 cultivate_the_land: "Cultivate the Land"
 cultivate_the_land_desc: "The jungle is a harsh environment in which to live, especially for farming cultures. Clearing portions of the jungle to create arable land is therefore one of our most vital tasks. We must organize our people in such a way that we can employ large labor forces to carry out these works whenever the need arises."
 feathered_serpent: "The Feathered Serpent"
 feathered_serpent_desc: "The legend of the Feathered Serpent is well-known across our lands. Although this figure represents many things to many people, such as Quetzalcōātl among the $nahua_group$, K'uk'ulkan among the $maya_language$ or Q'uq'umatz among the $kiche_culture$, he is a unifying figure for all of them."
 ritual_bloodletting: "Ritual Bloodletting"
 ritual_bloodletting_desc: "Many cultures in this region consider ritual sacrifice and bloodletting by the ruler as a way of paying homage to the gods. Maintaining this tradition pleases the gods and affirms our right to rule through divine tribute."

 #South America
 valley_irrigation: "Inter-Valley Irrigation"
 valley_irrigation_desc: "By building extensive networks of canals and connecting the waterways of our homeland's valleys, we can greatly improve our irrigation techniques and the productivity of our farmlands."
 artisan_migration: "Relocating Artisans"
 artisan_migration_desc: "It is not fitting that territories we have conquered should have better artisans and wiser advisors than in our capital. The greatest hands and minds of the empire must be brought to the capital to serve us directly."
 terrace_farming: "Terrace Farming"
 terrace_farming_desc: "To take maximum advantage of the limited space in our highlands, we have developed terrace farming, a series of step-like platform fields on the sides of the mountains, as well as better irrigation techniques."
 mountain_cities: "Summit Fortresses"
 mountain_cities_desc: "Our cities and fortresses occupy the tops of immense mountains, well past the clouds. They present a formidable obstacle to anyone who might attempt to invade us."
 river_trade: "River Trade"
 river_trade_desc: "The bounty of our great rivers and seas has always fed our people. Let us embrace the river trade, and do what we can to protect the many merchants that travel along the coast to the mouth of the mighty river, so that we may never lack for the fine goods they bring us."
 rainforests_and_mountaintops: "Rainforests and Mountaintops"
 rainforests_and_mountaintops_desc: "The rainforests and mountains of our land are teeming with life. Apart from the spirits of the forests, jaguars, anacondas, tarantulas, and a myriad of other animals live among us, and for someone who knows them, they offer little direct danger. To an invading enemy, however, these lands might seem like a fortress and the wild animals as its defenders."
 knot_system: "Talking Knots"
 knot_system_desc: "By using arrangements of cords and knots to record information, we can greatly facilitate administration of our lands and keeping accurate records of vital information."
 llama_farming: "Llama Rearing"
 llama_farming_desc: "Our vast herds of llamas provide us with fabrics to clothe ourselves, meat to feed ourselves, and pack animals to carry our burdens. They are truly invaluable."
 mountain_roads: "Mountain Roads Network"
 mountain_roads_desc: "To facilitate easier distribution of goods, a great network of mountain roads connecting far-off valleys together and crossing deep gorges is required. Let us build it."

 tears_of_the_sun: "Tears of the Sun"
 tears_of_the_sun_desc: "Though adventurers from far-off lands dream of finding secret gold on mountain trails high in the Andes, to us the yellow metal has more artistic and sacred importance than simple economic value."
 hidden_cities: "Hidden Cities"
 hidden_cities_desc: "In a land of immense peaks and impenetrable rainforests, many of our cities are nearly inaccessible to outsiders. They could easily remain hidden for centuries, forgotten by the world."
 potato_production: "Potato Production"
 potato_production_desc: "Since maize grows poorly in the high plateaus of our land, we have learned to rely instead on the highly nutritious roots of a local plant. With increased production, we can feed our people and our warriors with this easily maintained crop."
 head_hunters: "Head Hunters"
 head_hunters_desc: "Conquering territory from weaker peoples is a necessary evil in our state. These circumstances have created a unique warrior code, according to which capturing and not killing the enemy is the highest display of bravery and valor. This has made our people famous for their mastery in capturing people alive."
 border_raiders: "Skilled Raiders"
 border_raiders_desc: "Our raiders are famous for their ability to carry out lightning-fast attacks against unaware enemies. Their speed and ability to evade enemy retaliation should be studied and employed by our regular troops as well."

 lva_baltic_forestry: "Baltic Forestry"
 lva_baltic_forestry_desc: "Our forests are a vital resource, providing timber for construction and fuel for our fires. We must manage them wisely to ensure their continued abundance."

 lva_baltic_forts: "Baltic Forts"
 lva_baltic_forts_desc: "Our network of forts and castles scattered across the landscape provides a first line of defense against invaders. These strongholds allow us to monitor and control key routes through the Baltic."
 
 irish_travelling_bards_advance: "Traveling Bards"
 irish_travelling_bards_advance_desc: "Traditional poets trained in courtly ways crisscross our lands looking for some likely lord to hire them."

 irish_booleying_advance: "Cattle Booleying"
 irish_booleying_advance_desc: "In $IRE$, cattle-rearing is our way of life. The noble bovine is not only a source of food, but a symbol of wealth. By #italic booleying#!, a system of moving our herds from one distant pasture to another, we can grow that wealth."

 irish_monastacism_advance: "Insular Monasticism"
 irish_monastacism_advance_desc: "Although we are now aligned with Roman $catholic_ADJ$ practices in principle, religious life in our islands still puts a great focus on lay clergy."

 guards_of_the_shannon_advance: "Guards of the Shannon"
 guards_of_the_shannon_advance_desc: "The fortress of Athlone, standing astride the mighty river Shannon, is the key to controlling the heart of $IRE$. The O'Kellys of $HYM$, long-standing lords of these lands, have fought fiercely to defend their holdings against $norman$ incursions."
 
 hiberno_norman_keeps_advance: "Hiberno-Norman Keeps"
 hiberno_norman_keeps_advance_desc: "Our $norman$ forebears built splendid towers to maintain their grip on the hostile interior of $IRE$."

 irish_frontier_settlement_advance: "$IRE_ADJ$ Frontier Settlements"
 irish_frontier_settlement_advance_desc: "The land we have seized from the $IRE_ADJ$ is ripe for exploitation. We just need to ensure that only the right sort of people migrate here to settle these cheap crofts."

 celtic_raiders_advance: "Furor Celtica"
 celtic_raiders_advance_desc: "For millennia, our ferocious and agile guerilla warfare has harried our foes, besting them with a devastating succession of evasive skirmishing and blood-curdling charges."
 
 ple_pale_defenseworks_advance: "Pale Works"
 ple_pale_defenseworks_advance_desc: "Our boundary is defined by light defensive works of dykes and palisades designed to deter our unruly neighbors from launching their irritating raids."
 
 ple_irish_viking_towns_advance: "Old Viking Towns"
 ple_irish_viking_towns_advance_desc: "The ancient trading ports founded by the Ostmen are still bustling hives of mercantile activity where the canny can get rich."
 
 cel_defensive: "The Hills Speak Celtic"
 cel_defensive_desc: "Centuries of living under the shadow of conquest have taught our warriors the art of patience and resilience. We can rush headlong into danger, but we can also endure, defend, and strike only when the moment is right."

 cel_western_shore: "The Western Shore"
 cel_western_shore_desc: "For millennia we have fished, traded, and fought along the wild Atlantic coasts. From these harsh waters, we have learned seamanship unmatched by any rival."

 cel_the_wests_awake: "The West's Awake"
 cel_the_wests_awake_desc: "After long centuries of silence, the ancient spirit of the Celtic peoples stirs once more, ready to reclaim its place amongst the great civilizations of the world."

 cel_celtic_nations: "Celtic Nations"
 cel_celtic_nations_desc: "Our union is founded on the ideal of uniting the diverse peoples of the Celtic world under a shared banner. Through cooperation, we aim to preserve our heritage, promote our values, and ensure that the Celtic nations thrive together in the face of external pressures and changing times."

 cel_celtic_diaspora: "Celtic Diaspora"
 cel_celtic_diaspora_desc: "From crofter to chieftain, many have left our shores through hardship or hope, weaving a far-flung web of kinship that carries our language, customs, and pride to distant lands."

 cel_pan_celtic_nationalism: "Pan-Celticism"
 cel_pan_celtic_nationalism_desc: "Our vision of a united Celtic world is more than an ideal - it is a rallying call to all who share our heritage. Together, we forge bonds that reach beyond borders, making our identity as enduring as the hills and seas we call home."
 
 ire_grand_jury_system: "Grand Jury System"
 ire_grand_jury_system_desc: "County grand juries levy the cess for roads, bridges, and courthouses. With judges riding the assizes, oversight tightens in every county."

 ire_irish_establishment: "$IRE_ADJ$ Establishment"
 ire_irish_establishment_desc: "A permanent army in $IRE$ — and controlled #italic from#! Ireland — keeps garrisons ready and costs down. For our regular soldiery, this means regular pay. For our logisticians and quartermasters, it means a growing network of barracks that keeps the costs in hand."

 ire_irish_volunteers: "$IRE_ADJ$ Volunteers"
 ire_irish_volunteers_desc: "Citizen corps are raised for home defense and coastal watch. Drilling at their own expense, they rouse public spirit and stiffen the line."
 
 legacy_of_the_normans: "$norman$ Legacy"
 legacy_of_the_normans_desc: "Forged in the crucible of conquest, the $SIC_ADJ$ $norman$ army blended the unstoppable charge of $norman$ knights with the strategic sophistication of $BYZ_ADJ$, Arab, and $lombard$ warfare. Masters of both battlefield ferocity and tactical flexibility, they carved a kingdom at the crossroads of civilizations."
 sic_constitions_of_melfi: "Constitutions of Melfi"
 sic_constitions_of_melfi_desc: "Emperor Frederick II, the Hohenstaufen King of $SIC$, drafted a legal code for $SIC$ known as the Constitutions of Melfi, or #italic Liber Augustalis#!. Still in use centuries later, it represents a solid foundation for the governance of our state, regulating public law, judicial procedure and feudal, private and penal law."
 sic_studium_generale: "Studium Generale"
 sic_studium_generale_desc: "Founded by King Alfonso V of $ARA$, the University of $catania$ was the oldest in $SIC$ and one of the few southern institutions granted full #italic Studium Generale#! status. Unique for its royal charter and blend of scholastic and legal education, it produced jurists, theologians, and scientists who served both Church and Crown in a culturally diverse region."
 sic_naval_vigilance: "Naval Vigilance"
 sic_naval_vigilance_desc: "Constant raids from Barbary pirates and $TUR_ADJ$ ships have forced $SIC$ to maintain a vigilant coastal defense. Its galleys and forts became critical for protecting southern $europe$."
 sic_sicilian_silk: "$SIC_ADJ$ $silk$"
 sic_sicilian_silk_desc: "In the time of Frederick II, $silk$ was $SIC$'s major export. Although our $silk$ industry has declined in the intervening centuries, $SIC$'s productions having been outstripped by that of the northern $ITA_ADJ$ states, there is no reason why it should not rise again. By investing in our $silk$ production, we can see our weavers and craftsmen flourish anew."
 sic_sicilian_enlightenment: "$SIC_ADJ$ Enlightenment"
 sic_sicilian_enlightenment_desc: "Though distant from the great salons of $paris$ or $vienna$, $SIC$ has fostered its own Enlightenment. Intellectuals challenged feudal privileges, promoted science, and advocated legal reforms, often within the framework of $catholic_ADJ$ humanism. These ideas laid the groundwork for modernity in the shadow of monarchy and tradition."
 sic_sicilian_reforms: "$SIC_ADJ$ Reforms"
 sic_sicilian_reforms_desc: "As time passes, our institutions become obsolete or just inefficient. Reforms are necessary if we want our nation to prosper and thrive. Our best minds will work hard to ensure that no waste happens, and that our processes are as efficient as possible."
 

 #Sub Saharan Africa
 nomadic_tendencies: "Nomadic Tendencies"
 nomadic_tendencies_desc: "Many of our people have lived their lives as nomads, as our custom has been to travel from one habitable place to the next. Even now, as everything changes and we build a city for our people, some retain their nomadic traditions, and continue to wander."
 skilled_cavalry_raids: "Cavalry Raids"
 skilled_cavalry_raids_desc: "From the time of our ancestors, horsemen have been the agents of our conquests. The thunder of their hooves ringing across the grasslands of the $sahel_region$ spread fear in our enemies, and have brought us many victories."
 land_of_the_ancestors: "Land of the Ancestors"
 land_of_the_ancestors_desc: "Land is not property, nor is it mere dust; it is our connection to our great forebears. From the better lands beyond, they watch over us. We must never let the connection between us be severed, and we must care for these lands in honor of those who first settled them."
 wandering_scholars: "Wandering Scholars"
 wandering_scholars_desc: "Communities of learned scholars of many faiths live in our lands, offering religious instruction to all who will listen."
 community_of_the_faithful: "Domain of Many Tongues"
 community_of_the_faithful_desc: "Our Empire is home to people from hundreds of different backgrounds. They speak a multitude of tongues, and come from all the directions of the horizon, but each in their own tongue pays homage to our ruler, binding us together."
 bound_by_service: "Bound by Service"
 bound_by_service_desc: "We are one people, and we have one army. By bringing troops from across all of our territories together, and pressing conquered peoples into military service, we can better integrate them into our society, and also increase their acceptance of our rule."
 regnal_chronicles: "Regnal Chronicles"
 regnal_chronicles_desc: "We should record the history of our splendid rulers and their illustrious deeds in great chronicles, so that they may be passed down across the generations and always remembered."

 expanded_slave_trade: "Control the Slave Trade"
 expanded_slave_trade_desc: "The demand for $slaves_goods$ from external traders grows greater by the day. Our position in $africa$ makes us the ideal middlemen for this trade. Let us encourage those that seek slave markets to do so in our lands, and to make their business in our marketplaces."
 gifts_and_hostages: "Gifts and Hostages"
 gifts_and_hostages_desc: "While our people are now united, the act of bending the knee to a common overlord has not come easy to them. By summoning all subjugated rulers to the capital, we can employ them as prestigious royal envoys. Some would call this a policy of hostage-taking; we simply see it as a way to remind our more independent-minded subjects of their loyalties."
 people_of_ornaments: "People of Ornamentation"
 people_of_ornaments_desc: "Our artisans are renowned far and wide, and it is said that they cannot leave a surface undecorated. Let us make the most of this reputation, and promote their creations as much as possible."
 courtly_competition: "Courtly Competition"
 courtly_competition_desc: "A preoccupied noble is a well-behaved noble. There are so many courtly titles in our realms that some say half of our men have one. Let us make sure our courtiers spend their time competing with one another for attention and visibility; they will be too busy to plot against our rule."
 overnight_army: "An Army Overnight"
 overnight_army_desc: "Our capital and other cities are built using army camps as a model. They have wings, vanguards, and fronts. In ensuring that military thinking permeates daily life, we will improve our overall combat readiness."
 mining_tradition: "Mining Tradition"
 mining_tradition_desc: "Our land is rich in rare materials, ready to be ripped from the earth and sold to foreign merchants for large profits. We would be foolish not to exploit this."
 intercontinental_trade: "Far-Reaching Trade"
 intercontinental_trade_desc: "Our merchants frequently bring back fascinating things from the courts of faraway countries. Perhaps it would be possible to reach even further shores?"
 expanded_grazing_grounds: "Expanded Grazing Grounds"
 expanded_grazing_grounds_desc: "Our territory has plenty of land which is well-suited for grazing animal herds, making it easy for us to expand our output of $livestock$."
 african_sturdy_grains_advance: "Sturdy Grains Agriculture"
 african_sturdy_grains_advance_desc: "A stronger focus on agricultural production will help our people thrive. Thankfully, we have the ample space and fertile soil necessary to grow a number of crops."

#Bulgaria 
 legacy_of_ivan_asen_ii: "Legacy of Ivan Asen II"
 legacy_of_ivan_asen_ii_desc: "The reign of Ivan Asen II marked a new height of $BUL_ADJ$ power, diplomacy, and economic expansion. His legacy endures as a foundation for a strong and centralized state."

 bulgarian_orthodox_patriarchate: "$BUL_ADJ$ $orthodox_ADJ$ Patriarchate"
 bulgarian_orthodox_patriarchate_desc: "The elevation of the $BUL_ADJ$ Church to a patriarchate has reaffirmed $tarnovo$ as a spiritual rival to $constantinople$, strengthening our national unity through faith."

 expansionist_ambitions: "Expansionist Ambitions"
 expansionist_ambitions_desc: "As the Balkans fractured, many rising powers looked outward. Ambitious rulers pursued integration of diverse lands under a single, stronger crown, taking advantage of $BYZ_ADJ$ weakness."

 fortress_of_the_balkans: "Fortress of the Balkans"
 fortress_of_the_balkans_desc: "Facing constant threats from crusaders, $BYZ$, and the Mongols, $BUL$ developed an extensive network of fortified cities and mountain defenses."

 revival_of_the_literary_schools: "Revival of the Literary Schools"
 revival_of_the_literary_schools_desc: "Inspired by the cultural renaissance under Ivan Alexander, $BUL_ADJ$ scriptoria and schools became guardians of $slavic_group$ $orthodox_ADJ$ identity."

 reformation_of_the_bulgarian_patriarchate: "Reformation of the $BUL_ADJ$ Patriarchate"
 reformation_of_the_bulgarian_patriarchate_desc: "Reviving the independence of the $BUL_ADJ$ Patriarchate strengthened both religious influence and the moral authority of the state."

#Burgundy
 promote_estates_general: "Promote the États Généraux"
 promote_estates_general_desc: "$BUR$ is a feudal creation with various parts conjoined under different conditions, which has created strong local identities. By promoting a central assembly, we give a forum for these interests, promoting a smooth and uncontested rule."

 reform_the_feudal_army: "Reform the Feudal Army"
 reform_the_feudal_army_desc: "The feudal levy system has proven slow and unreliable in this new age of professional warfare. Inspired by the $FRA_ADJ$ model, we will replace our scattered vassal hosts with salaried companies, skilled officers, and integrated armies. A disciplined core of professional soldiers will form the backbone of a modern and adaptable army."

 influence_of_the_burgundian_towns: "Influence of the $BUR_ADJ$ Towns"
 influence_of_the_burgundian_towns_desc: "The traditional Estates General favors the clergy and nobility, but the rising wealth and political importance of towns can no longer be ignored. By refining its structure to reflect the growing strength of the merchant class, we ensure more balanced governance while preserving the privileges of the other estates. A stronger urban voice will also enhance our administrative capacities and speed up the rate of urbanization."

 compagnie_d_ordonnance: "Compagnies d'Ordonnance"
 compagnie_d_ordonnance_desc: "Our reliance on feudal levies has proven inadequate for the demands of modern warfare. The creation of permanently contracted cavalry units, the #italic $compagnie_d_ordonnance$#!, provides us with a reliable and professional military force directly loyal to the Crown."

 create_the_regimental_system: "Create the Regimental System"
 create_the_regimental_system_desc: "To ensure consistent recruitment and sufficient supply of fighters, we must establish a formal regimental system. This reform will allow us to organize manpower more effectively, centralize command structures, and reduce dependence on local nobles and foreign mercenaries."

#Normandy

 heirs_of_rollo: "Heirs of Rollo"
 heirs_of_rollo_desc: "The legacy of Rollo, the Viking founder of $NRM$, continues to define our ruling house. Such a prestigious line has led to strengthened legitimacy and respect from our peers."

 trade_ports_in_the_channel: "Channel Trade Ports"
 trade_ports_in_the_channel_desc: "Our position along the English Channel allows us to flourish as a commercial gateway. By investing in our port towns and merchant infrastructure, we can dominate regional trade while minimizing the cost of overseas operations."

 norman_law: "$NRM_ADJ$ Law"
 norman_law_desc: "Our state is governed by its own customary legal code, the $couteume_de_normaundie$. By enshrining noble privilege, decentralized power, and property rights, this legal tradition ensures local stability while asserting our distinct identity."

 the_exchequer: "The Exchequer"
 the_exchequer_desc: "Our legislative body must remain distinct from any outside influences, in an effort to preserve our cultural identity and independence. Inspired by Anglo-Norman fiscal institutions, our parliamentary procedures will surely bolster crown revenue and improve administrative oversight."

 frontline_in_the_caroline_war: "Frontline of the Caroline War"
 frontline_in_the_caroline_war_desc: "During the long conflicts between $FRA$ and $ENG$, we stood as a strategic battleground. The pressures of war forged a hardened officer corps and traditions of battlefield excellence that endure to this day."

#Tunis

 tunisian_corsairs: "$TUN_ADJ$ Corsairs"
 tunisian_corsairs_desc: "From their strongholds in $TUN$ and La Goulette, our corsairs dominate the Mediterranean. With swift galleys and the power of state sponsorship behind them, they strike fear into foreign merchants and bolster our naval strength with ruthless efficiency."

 tamazight: "Tamazight"
 tamazight_desc: "The Berber-speaking people of the interior are a vital part of our society. By recognizing their cultural identity and fostering literacy, we expand our ability to govern diverse regions without losing cohesion or a firm hold on power."

 guardians_of_ifriqiya: "Guardians of Ifrīqya"
 guardians_of_ifriqiya_desc: "As successors to the ancient cities of Carthage and Kairouan, we bear the mantle of guardianship over the heart of the $maghreb_region$. Our rule brings stability, and shall be welcomed by all in a once-contested region."

 saharan_trade: "Saharan Trade"
 saharan_trade_desc: "From the oases of $ghadames$ to the caravans of the $sahel_region$, our merchants secure and collect revenue from the trans-Saharan routes that connect us to the riches of the interior. $goods_gold$, $salt$, and $slaves_goods$ flow northward under our protection and oversight."

 al_caid: "Al-Qā'id"
 al_caid_desc: "By appointing a loyal #italic Qā'id#! to oversee provinces and regulate trade on behalf of the state, we empower urban merchants while ensuring provincial governance. Ensuring fair dealings and regulated markets will greatly strengthen our economic base."

 connections_with_the_christian_world: "Connections with the $christian_ADJ$ World"
 connections_with_the_christian_world_desc: "Treaties and trade agreements with $christian_ADJ$ states ensure that diplomacy and pragmatism serve our long-term interests. Though our faith differs from theirs, we should not close the door to opportunity."

 attract_foreign_pirates: "Attract Foreign Pirates"
 attract_foreign_pirates_desc: "Our ports have long been a haven for those who seek fortune on the high seas. By welcoming these skilled seamen regardless of their faith or origins, we may further strengthen our corsair fleets and expand our maritime manpower."

 rais_of_the_navy: "Ra'īs of the Navy"
 rais_of_the_navy_desc: "Our corsair captains, the #italic Ra'īs#!, are more than just pirates. Truly, they are seasoned naval commanders, and their experience at sea feeds a deep well of maritime tradition that strengthens our navy's proud heritage."

 export_monopolies: "Export Monopolies"
 export_monopolies_desc: "By controlling key exports such as olive oil, textiles, and $dyes$, we ensure both domestic prosperity and leverage abroad. Such protectionist practices allow us to project power through commerce as much as conquest, ensuring our own merchants maintain dominance over foreigners in our markets."

#Tlemcen

 beacon_of_maghrebi_trade: "Beacon of Maghrebi Trade"
 beacon_of_maghrebi_trade_desc: "$TLE$ lies at the crossroads of Saharan caravans, Mediterranean commerce, and Andalusian eminence. As trade flourishes through its markets and ports, we must strive to continue expanding our merchant networks, asserting our influence over regional commerce."

 qalat_al_mashwar_advance: "$qalat_al_mashwar$"
 qalat_al_mashwar_advance_desc: "The fortified complex of $qalat_al_mashwar$ stands as both a military bastion and a symbol of dynastic authority. Having invested in its expansion, the defense of $TLE$ is strengthened while ensuring administrative control over the surrounding lands."

 hispano_moresque_style: "Hispano-Moresque Style"
 hispano_moresque_style_desc: "Our cities reflect a unique blend of Andalusian elegance and Maghrebi architecture. The Hispano-Moresque style, passed down from foreign artisans and nobles, inspires a new cultural flowering and elevates the prestige of our court."

 city_of_scholars: "City of Scholars"
 city_of_scholars_desc: "$TLE$ has long been a center of Islamic learning and intellectual exchange. Our madrasas attract scholars from across the $maghreb_region$ and Al-'Andalus, fostering scientific and theological progress for generations to come."

 entrepot_connections: "Entrepôt Connections"
 entrepot_connections_desc: "To thrive as a trade hub, our cities must be connected by solid infrastructure. By empowering the noble class to build and maintain strategic roads, we improve internal trade and strengthen the arteries of our realm."

#Verona

 perpetual_general_captain_of_the_people: "Perpetual General Captain of the People"
 perpetual_general_captain_of_the_people_desc: "In the shifting politics of medieval $VER$, the title of 'Capitano del Popolo' came to embody more than a ceremonial office — it became a lasting claim to leadership. Rooted in civic tradition and claimed by the Scaligeri to legitimize their power, it gave permanence to their rule in a city where loyalty was hard-won."

 scaligers_military_ambitions: "Scaligeri Military Ambitions"
 scaligers_military_ambitions_desc: "The Scaligeri dreamed not only of ruling $VER$, but of transforming it into a $lombard$ power. Their campaigns pushed across the Po Valley, clashing with $ML$, $VEN$, and Padua. This ambition left its mark in the form of fortified towns, hardened levies, and a court that breathed military reform."

 court_of_great_refugees: "Court of Great Refugees"
 court_of_great_refugees_desc: "Our great capital has become a haven for artists, exiles, and thinkers — displaced by war, faith, or politics elsewhere in $ITA$. These refugees are destined to enrich the city's courts with new techniques, bold ideas, and cultural crosscurrents, making $VER$ a rare sanctuary of innovation in turbulent times."

 consolidate_italian_holdings: "Consolidate $ITA_ADJ$ Holdings"
 consolidate_italian_holdings_desc: "The Scaligeri ruled not just $VER$, but a growing web of cities across northern $italy_region$. Holding such a realm together demands careful diplomacy, clever delegation, and well-paid professional armies. Only through consolidation can $VER$ stand as a true rival to the other great powers of the peninsula."

 the_adige: "The Adige"
 the_adige_desc: "The Adige River is $VER$'s lifeline — a channel for trade, agriculture, and prosperity. As its waters flow from the Alps to the Adriatic, so too does wealth flow through our markets and fields, nourishing both town and countryside alike."

 marmorina: "Marmorina"
 marmorina_desc: "In these times of peace, $VER$ has flourished under rulers who value beauty as much as power. The city shall earn the name 'Marmorina' for its abundance of Roman marble, statues, and graceful architecture. A new bridge over the Adige, the Ponte Navi, stands as a feat of engineering, while the Gardello tower — the first water-driven clock in $ITA$ — marked the hours in quiet ascendancy. This legacy of refinement will undoubtedly shape not only our skyline, but how we shall be remembered in the annals of history."

#Smolensk
 diocese_of_smolensk: "Diocese of $SMO$"
 diocese_of_smolensk_desc: "Once a spiritual stronghold of $orthodox_ADJ$ $christian$ and home to one of the oldest bishoprics in the region, the Diocese of $SMO$ embodies our people's unshakable faith."

 smolenskian_resolve: "$SMO_ADJ$ Resolve"
 smolenskian_resolve_desc: "For centuries, $SMO$ has been a land carved up by outsiders — $LIT_ADJ$ dukes, $POL_ADJ$ kings, and $MOS_ADJ$ princes. To survive, we clung to what united us: our faith and our fortitude. If we are ever to rise again, we must cast off divisions and rally around the sacred idea that, above all, there is only $SMO$."

 link_the_steppes_trade: "Link the Steppes Trade"
 link_the_steppes_trade_desc: "Positioned between forest and steppe, $SMO$ has long been a crossroads of war and commerce. By improving overland infrastructure and securing the arteries of caravan travel, we can reforge our role as the vital hinge between northern Rus', the Baltic, and the southern trade routes of the steppes."

 hub_of_militarism: "Hub of Militarism"
 hub_of_militarism_desc: "Long has war defined our fate, but now it shall define our strength. From the ruinous embrace of warfare and siege, $SMO$ rises as a center of military production — cannons, firearms, powder and doctrine flow outward from our armories. Let the world see us not as a prize to be taken, but as a hammer to be feared, ready to strike the anvil of foreign conquerors."

 armories_of_smolensk: "The Armories of $SMO$"
 armories_of_smolensk_desc: "After decades of warfare on every border, we learned to fight with weapons of both east and west. Blending $MOS_ADJ$ grit with western precision, our armories now produce elite artillery and tactics unmatched by our rivals. From our forges comes firepower — and from firepower, domination and perseverance."

#Provence
 capetian_house_of_anjou: "Capetian House of $ANJ$"
 capetian_house_of_anjou_desc: "A potent mix of Capetian dignity and Angevin ambition courses through our blood. Though we no longer wear the crown of Jerusalem, we remain heirs to a legacy of kingship that once stretched from $ANJ$ to $ALB$. With careful diplomacy and planning, we may yet revive the grandeur of our forefathers and claim what was unjustly taken from us."

 lords_of_the_rhone_corridor: "Lords of the Rhône Corridor"
 lords_of_the_rhone_corridor_desc: "The Rhône Valley has always been our artery of power, and our castles stand watch over it like sentinels of stone. These fortifications are some of the sturdiest in all of $europe$, a steadfast sign of our military and engineering prowess, forever watching over our domain."

 angevin_heraldry: "Angevin Heraldry"
 angevin_heraldry_desc: "The golden lilies and double-headed eagles of our banners speak to ancient rights and royal ambitions. Claims that stretch across $italy_region$, reaching as far as $ALB$ and $jerusalem$, still echo in our hearts. Let the House of Valois-Anjou rise higher than ever before!"

 le_livre_des_tournois: "Le Livre des Tournois"
 le_livre_des_tournois_desc: "Penned by royalty, the 'Book of Tournaments' is more than a manual — it is a statement of courtly pride and chivalric identity. Our nobility trains not only for war but for spectacle, and in doing so preserves martial discipline and prestige across the realm."

 statutes_of_aix: "Statutes of Aix"
 statutes_of_aix_desc: "A series of loosely consolidated laws and statutes form the legal backbone of our governance. These statutes blend Roman jurisprudence with local customs and Angevin tradition, allowing us to manage a patchwork of regions as one cohesive domain: a true composite monarchy, where the parts are diverse, but the crown is indivisible."

 rade_of_toulon: "Rade of $toulon$"
 rade_of_toulon_desc: "$toulon$'s natural harbor offers the ideal staging ground for our naval ambitions. While $marseille$ thrives as our commercial jewel, $toulon$ shall be the armory of $PRO$, and the launching point of a future maritime power."

 piqure_de_marseilles: "Piqûre de $marseille$"
 piqure_de_marseilles_desc: "Across the workshops of $marseille$, artisans stitch delicate #italic boutis#! quilts in the $PRO_ADJ$ style — treasured across $europe$ for their quality and charm. Much like our duchy, works of art created in our realm are composed of many parts stitched into a unified whole: a quilted land, rich in texture and culture."

#Hormuz

 orm_a_vast_emporium: "A Vast Emporium"
 orm_a_vast_emporium_desc: "It has been said that $ORM$ is 'a vast emporium where there were peoples and goods of every description from all parts of the world' or that 'If all the world were a golden ring, $ORM$ would be the jewel in it'. Our realm's identity is inseparable from commerce. Indeed, ships from $gujarat_area$, $arabia_region$, and even $CHI$ anchor in our ports, exchanging spices, $gems$, $silk$, and stories."

 hormuz_toll: "$ORM$ Toll"
 hormuz_toll_desc: "At the narrowest point of the $persian_gulf$ stands $ORM$, the gatekeeper of east-west maritime trade. No vessel passes without our knowledge — or without paying our fee. For centuries, this toll has not just made us richer, but shaped our diplomacy and how we project power across the vast seas."

 gate_of_the_persian_gulf: "Gate of the $persian_gulf$"
 gate_of_the_persian_gulf_desc: "$ORM$ controls the strait that links the $indian_ocean_continent$ to the interior of $asia$. Whoever holds this vital passage dictates the rhythm of maritime traffic. Our command of these waters must be absolute, lest our influence be diminished."

 moqarrariya: "Institutionalize the Moqarrariya"
 moqarrariya_desc: "For generations, our realm maintained peace with the mainland through the ancient tribute system known as #italic Moqarrariya#!. Rather than depending on custom and negotiation, let us codify these tributes into formal pacts — securing fresh water, overland safety, and long-term stability through reliable diplomacy."

 develop_qeshm_and_ormuz: "Invest in Qeshm and $ORM$"
 develop_qeshm_and_ormuz_desc: "Though dry and rocky, the islands of Qeshm and $ORM$ have sustained urban life thanks to careful provisioning and rich trade. With proper investment, their ports and workshops can flourish further, turning them from logistical hubs into centers of innovation and productivity."

 ormuzi_navy: "The $ORM_ADJ$ Navy"
 ormuzi_navy_desc: "The $persian_gulf$ is crossed daily by our fleets — be they traders, patrols, or armed escorts. But to match the ambitions of those who envy our position, we must expand and modernize. Let $ORM$ become more than just a trading post: a maritime arsenal."

 mint_of_the_gulf: "Mint of the Gulf"
 mint_of_the_gulf_desc: "Ormuzi coinage circulates from $basra_al_hamra$ to $bengal_area$, trusted for its purity and weight. By institutionalizing our mint and expanding our issuance, we reinforce our financial sovereignty — and claim fiscal supremacy over the $indian_ocean_region$."
 #Savoy
 sav_savoyard_flexibility: "$SAV_ADJ$ Diplomacy"
 sav_savoyard_flexibility_desc: "Due to our precarious location between greater powers, we must rely on our diplomatic skills for survival. By maintaining diplomatic relations even with our most dangerous foes, we will be able to shift our alliances to ensure the endurance of our country."

 sav_house_of_savoy: "A Unified House"
 sav_house_of_savoy_desc: "$SAV$ has been ruled by a stable line of dynastic counts ever since its creation. By ensuring the unity of our ruling family and maintaining a strong connection to local representatives, we keep our land from being fractured."

 sav_fight_the_vaudois: "Stand against Heresy"
 sav_fight_the_vaudois_desc: "Our lands have long suffered under the heretical preaching of the Waldensians. By the force of our will and with the support of the divine, we have been able to contain their influence, and we shall continue to defend the one true faith from these dangerous ideas."

 sav_embrace_the_vaudois: "A Light in the Darkness"
 sav_embrace_the_vaudois_desc: "We have embraced the teachings of the Waldensian movement and are dedicated to protecting this faith from the vicious $catholic_ADJ$ Church, which seeks to eradicate its ideas."

 sav_alpine_pass_control: "Control Over the Passes"
 sav_alpine_pass_control_desc: "The passage over the Alps is troublesome at the best of times, and can be outright impossible with carriages or a larger entourage. By maintaining good pathways, shelters, and waystations, we will be able to dominate the difficult terrain and ensure a steady exchange of merchants throughout our territory."

 sav_the_shroud_of_turin: "Holy Shroud Pilgrimage"
 sav_the_shroud_of_turin_desc: "Our realm is in the possession of a most holy artifact, a piece of cloth that bears the face of Jesus of Nazareth. Naturally, it has attracted numerous pilgrims, all clamoring to see and venerate this extraordinary relic. This constant stream of pilgrimage brings a great deal of wealth into our territory — which is all very much to our advantage."

 sav_repopulate_the_valleys: "Populate Alpine Valleys"
 sav_repopulate_the_valleys_desc: "Many people in our realm leave the alpine valleys they were born into to settle in the urban areas on either side of the mountain range. This depopulation leaves the small villages of lesser valleys in a precarious, politically unstable position. We must ensure that the valley lands are sufficiently populated and can be adequately maintained."

 #Mainz
 mai_diadema_regni: "Diadema Regni"
 mai_diadema_regni_desc: "Our beloved city has been described as 'Diadema Regni', the Crown of the Empire, a moniker we strive mightily to maintain. Maintaining this distinction will help us remain above other Imperial cities in terms of our prestige and political influence."

 mai_city_and_archbishop: "Rights of the City"
 mai_city_and_archbishop_desc: "The citizens of $MAI$ have prospered under the extensive rights granted to them by Adalbert of $MAI$ in the early 12th century. These rights, carved into the bronze door of the Cathedral, will serve as a reminder of cooperation between the separate powers within the city, both the clergy and the citizenry."

 mai_leader_rheinish_league: "Rheinish League"
 mai_leader_rheinish_league_desc: "When the Rheinish League was active, we naturally assumed a position of leadership and guidance for the other members. Although the League itself has disbanded, we must do everything we can to maintain our influence over our former associates."

 mai_zealous_fight_against_heretics: "Protect Our Faith"
 mai_zealous_fight_against_heretics_desc: "Our country's religious unity must be defended against any threat. If we provide our armies with moral guidance in the form of military chaplains, they will be much more motivated to defend our beliefs."

 mai_vicar_of_mainz: "Governance of the Vicar"
 mai_vicar_of_mainz_desc: "To ensure our lands are governed reliably, even in the absence of our ruler, we should instate a vicar. Empowered with extensive rights, the vicar can rule with our best intentions and remind the common folk of our presence at all times."

 mai_mainz_kingdom: "Mainzer Königreich"
 mai_mainz_kingdom_desc: "While celebrations on Ash Wednesday are a common occurrence, they hold especially deep roots in our country. While the public celebrates the #italic Fastnacht#!, or carnival, with masquerade and excessive feasts, our court will engage in a special event. During the carnival celebrations, we will redistribute the roles of our court per lottery, with even the ruler having to participate. This custom of swapping roles, called #italic Mainzer Königreich#!, will spread far beyond our borders and help expand our cultural legacy."

 mai_center_of_printing: "Printing Shops of $mainz$"
 mai_center_of_printing_desc: "By expanding our already-growing printing industry, we can become the leading producer of books in $europe$."

 mai_garrison_of_the_rhine: "Garrison of the Rhine"
 mai_garrison_of_the_rhine_desc: "Defending our borders can be a difficult task, especially considering the river splitting our land in two. We must build an extensive network of garrisons and fortifications that can withstand our enemies."

 #Croatia
 cro_maritime_connections: "Maritime Travels"
 cro_maritime_connections_desc: "Due to our fragmentary coastline, connecting our coastal settlements by road is almost impossible. For this reason, we will have to establish permanent connections by boat, ensuring both goods and people will not have to suffer through longer journeys overland."

 cro_reliance_on_adriatic: "Bounties of the Adriatic"
 cro_reliance_on_adriatic_desc: "The abundant seas give us access to plenty of $fish$ and $salt$, which can feed our people, sustain our local economy, and provide us with ample export goods."

 cro_trade_posts: "Croatian Trading Posts"
 cro_trade_posts_desc: "Our land is situated between many attractive destinations for merchants. Instead of letting them pass through and only hosting them as intermediaries, we should sponsor some of this business ourselves, and take our fair share of the Mediterranean trade."

 cro_influx_of_foreign_knowledge: "Influx of Foreign Knowledge"
 cro_influx_of_foreign_knowledge_desc: "Many foreign artists and scholars have passed through our lands, but we should give them incentive to stay. Building a domestic community of talented creatives will decidedly further our cultural achievements."

 cro_antemurale_christianitatis: "Antemurale Christianitatis"
 cro_antemurale_christianitatis_desc: "We see ourselves as defenders of $christian$ and as a bulwark against heretics and heathens alike."

 cro_pandurs_recruitment: "Pandur Conscription"
 cro_pandurs_recruitment_desc: "We will establish regiments of light infantry, who will serve as law enforcement and protection against raiders during times of peace. These men will also easily fill our army, reinforcing our military when the need arises."

#Yemen

 arabia_felix: "Arabia Felix"
 arabia_felix_desc: "Ever since antiquity, $YEM$ has been known as 'Arabia Felix', the Fortunate Arabia. Blessed with a temperate highland climate and fertile soil in a sea of desert, it remains one of the most naturally prosperous regions of the peninsula. Let us nurture that prosperity and use it as the foundation of a thriving realm."

 coffea_arabica: "Coffea Arabica"
 coffea_arabica_desc: "Though others have attempted to transplant our beloved bean, the $coffee$ of $arabia_region$ remains unmatched in flavor and fame. From the bustling port of Mocha to the courts of faraway rulers, the world's desire for our drink is insatiable."

 zaydi_scholarly_traditions: "$zaidi_school$ Scholarly Traditions"
 zaydi_scholarly_traditions_desc: "The highlands of $YEM$ have long been home to the $zaidi_school$ imamate, a center of learning and piety. Rooted in Islamic jurisprudence, theology, and rationalism, our scholars have ensured the rule of law and the moral integrity of our governance for centuries."

 rasulid_bureaucracy: "$rasulid_dynasty$ Bureaucracy"
 rasulid_bureaucracy_desc: "The $rasulid_dynasty$ dynasty brought unprecedented administrative order to our lands. With census records, tax systems, and a robust cabinet structure, they transformed Yemen into one of the most efficiently governed realms in the region."

 control_of_the_red_sea: "Red Sea Control"
 control_of_the_red_sea_desc: "Any and all trade from $india$ and $africa$ must pass through the strait called Gate of Grief. Let us enforce our dominion over this maritime chokepoint and turn every passing ship into an opportunity."

 yem_unite_the_tribes: "Unite the $YEM_ADJ$ Tribes"
 yem_unite_the_tribes_desc: "From the Tihāmah coast to the Ḥarāz mountains, our realm is home to countless fiercely independent tribes. While they have long resisted centralized authority, they are also our strength. By uniting them under a single cause, we can better utilize them as a workforce."

 port_of_aden: "Port of Aden"
 port_of_aden_desc: "The port of Aden has been a nexus of trade for millennia — its natural harbor welcoming ships from $india$, $egypt_region$, and $east_africa$. If properly supported, it can once again become the cornerstone of our maritime economy and the pride of the Red Sea."

#Karaman

 sons_of_the_salur_tribe: "Sons of the Salur Tribe"
 sons_of_the_salur_tribe_desc: "The $KAR$ trace their ancestry to the Salur, one of the major Oghuz tribes. Known for both their leadership and valor, the Salur legacy shapes our state's identity and our claim to represent the $turkmen_culture$ of $anatolia_region$."

 mehmed_beys_firman: "Meḥmed Bey's Firman"
 mehmed_beys_firman_desc: "Meḥmed I issued a decree demanding that only Turkish be spoken in courts, dervish lodges, assemblies, and public squares. This act rejected $persian_language$ and $arabic_language$ dominance in elite circles and laid the groundwork for a uniquely $turkmen_culture$ cultural policy."

 karamanid_cavalry: "$KAR$ Cavalry"
 karamanid_cavalry_desc: "Cavalry has always been the cornerstone of $turkmen_culture$ warfare. Our riders, trained from a young age and mounted on hardy Anatolian horses, uphold the proud traditions of steppe warfare with discipline and striking force."

 home_of_the_whirling_dervishes: "Home of the Whirling Dervishes"
 home_of_the_whirling_dervishes_desc: "$konya$, our spiritual center, is home to the followers of Mevlânâ Jalāl al-Dīn Muḥammad Rūmī. Their sacred practice — the #italic sema#! — symbolizes the soul's journey toward divine truth. Their presence deepens the mystic traditions of our realm and reinforces our Sufi roots."

#Tibet 

 sakya_hegemony: "Sakya Hegemony"
 sakya_hegemony_desc: "For the last century, the Sakya school has held temporal authority over $TIB$, acting as spiritual and political stewards under $MGE_ADJ$ patronage. Their dominance ushered in an age of centralized governance and scholastic consolidation. Though their rule has waned, their legacy continues to shape our approach to authority and order."

 monastic_dominance: "Monastic Dominance"
 monastic_dominance_desc: "A fusion of spiritual and temporal rule defines our political landscape. From the smallest village to the halls of power in Sakya, monastic institutions are central to every sphere of life. Their moral authority and organizational prowess ensure loyalty, unity, and cultural resilience."

 the_yak: "The Yak"
 the_yak_desc: "Domesticated for centuries, the yak is the backbone of $TIB_ADJ$ pastoral life. It provides meat, milk, wool, transport, and fuel — even its dried dung is a vital source of fuel on the treeless plateau. In times of need or celebration, yak butter fills our lamps and cups."

 drokpa: "Drokpa"
 drokpa_desc: "The Drokpa nomads often operate as herders and traders, porters that connect distant settlements. Through their traditions and unparalleled knowledge of the terrain, they traverse the high-altitude routes between $TIB$, Bhutan, Ladakh, and $NPL$. Their seasonal caravans carry $salt$, $wool$, and dried meat in exchange for grain and manufactured goods. These networks knit our mountains into a vibrant lattice of commerce and diplomacy."

 tibetan_monastic_education: "Monastic Education System"
 tibetan_monastic_education_desc: "Our monastic institutions have long served as centers of learning, debate, and spiritual discipline. Through rigorous training and a structured approach to education, our clerics maintain a high standard of intellectual and moral integrity. These foundations will support wise governance and cultural flourishing across our enlightened realm."


 tanye_guanxi: "Tányuè Guānxì"
 tanye_guanxi_desc: "For centuries, our spiritual influence in $CHI$ has formed the bedrock of our diplomatic relations. Imperial patronage, tribute exchanges, and sacred rituals like #italic Tányuè#! secure both respect and material gain."

 great_three: "The Three Great Seats"
 great_three_desc: "Sera, Ganden, and Drepung, these towering monastic universities form the intellectual heart of $TIB$. Their scholars train one generation after another of monks, diplomats, and rulers. With their rise, our realm became not only a bastion of faith but a cradle of rigorous thought and institutional progress."

#Dai Viet

 dai_lang: "Viet Autonomous Villages"
 dai_lang_desc: "The Vietnamese countryside is built upon the enduring strength of the #italic làng#!, autonomous villages that embody the principle: 'customs of the village outweigh the laws of the king.' In a land of rugged mountains and winding rivers, these communities govern themselves, raise local militias, collect taxes efficiently, and uphold royal authority at the grassroots."


 nghia_quan: "The Nghĩa Quân"
 nghia_quan_desc: "Throughout our history, the #italic Nghĩa Quân#! — 'righteous militias' — have risen in defense of our land during times of great peril. Composed of farmers, scholars, and local patriots, they stood against foreign invaders and internal tyranny alike. Though irregular in nature, their valor and devotion to the country have made them a formidable force when mobilized."

#Champa

 cha_go_tram_huong: "Gỗ Trầm Hương"
 cha_go_tram_huong_desc: "The resinous heartwood of our native trees, known as agarwood or #italic Trầm Hương#!, is treasured not only for its enchanting aroma but also for its spiritual and medicinal properties. Across the seas, nobles and monks alike covet it for incense, perfumes, and offerings. By protecting our forests and refining our harvesting methods, we can turn this rare natural gift into one of our most prized exports."

 my_son_sanctuary: "Mỹ Sơn Sanctuary"
 my_son_sanctuary_desc: "Within the lush valleys of central $CHA$ lies the sacred temple complex of Mỹ Sơn, where for generations our kings and priests have performed solemn rites to $shiva_god$, protector of our realm. These towers are carved with devotion and adorned with sacred symbols, connecting us to our ancestors and the divine. As long as incense burns in their sanctuaries, the soul of $CHA$ shall endure."

 #Lorraine
 lor_mining_tradition: "Mines of $LOR$"
 lor_mining_tradition_desc: "Our lands are rich in ore and coal. Extracting these resources could make us a rich country and lay the groundwork for our grand ambitions."

 lor_cultural_diversity: "Land of Many Cultures"
 lor_cultural_diversity_desc: "Our territory is home to many different peoples and cultures. Establishing a single state to govern this diverse population will not be easy, but we must. Only then will we be worthy successors to the $LOR_ADJ$ state from which we descend."

 lor_three_bishoprics: "Land of Bishops"
 lor_three_bishoprics_desc: "$LOR$ is home to many bishops with powerful supporters abroad and within the Church itself. Cooperating with them will be useful when making our voice heard within the broader Church. Having the support of the bishops will also help us to pacify the population more easily."

 lor_between_great_powers: "Legacy of Old Kings"
 lor_between_great_powers_desc: "Our lands were once an important part of Lotharingia, one of the Frankish kingdoms. If we do not want to fall into irrelevance, we will need to secure our diplomatic position and establish lasting alliances."

 lor_fortified_cities: "Fortified Cities of $LOR$"
 lor_fortified_cities_desc: "We occupy vital crossing points on several rivers, which we must defend at all costs if we want to secure our independence. To this effect, we must modernize the large bridge castles of our cities, and construct large citadels at strategic points."

 #Bosnia
 bos_land_of_many_churches: "Many Churches of $BOS$"
 bos_land_of_many_churches_desc: "$BOS$ is home to several faiths. Not only is our land shared between the $orthodox_ADJ$ and $catholic_ADJ$ Churches, but it is also home to the $south_slavic_group$ $christian_ADJ$ faithful, the #italic Krstjani#!. Isolated from central supervision, we will have to foster a local understanding and harmony between these different groups to maintain our stability."

 bos_cultural_customs: "Stećci of $BOS$"
 bos_cultural_customs_desc: "Our people practice unique customs that transcend religious differences. The construction of #italic stećci#!, elaborately decorated tombstones, is a tradition shared by all of us, regardless of faith. These distinctive monuments mark our lands as uniquely Bosnian."

 bos_katun_communities: "Vlach Katuns"
 bos_katun_communities_desc: "Parts of our population are organized into self-governing, pastoralist communities. Instead of bending them to a central government's will, we should cooperate with them, and in doing so try to extract more resources from our more remote areas."

 bos_influence_of_the_stanak: "Stanak Meetings"
 bos_influence_of_the_stanak_desc: "Our nobility regularly gathers together to discuss the most pressing issues for our country. These meetings ensure our noble lords are aligned in their policies and show unity during our parliament sessions."

 bos_defiant_terrain: "Defiant Terrain"
 bos_defiant_terrain_desc: "$BOS$ is a land of forested hills and mountains, cut through by river valleys. This terrain lends itself naturally to delaying and tiring invading armies, and we should use this to our advantage. Engaging our enemy only when it benefits us and letting the hostile terrain itself claim both their supplies and troops will preserve our strength."

 bos_kingly_ambitions: "Kingly Ambitions"
 bos_kingly_ambitions_desc: "The achievements and hard work of our people deserve recognition and protection. We will establish a prestigious title for ourselves and thereby secure that recognition from neighboring rulers, formalizing our status through diplomatic bonds."

 #Circassia
 cir_tribal_elections: "Tribal Elections"
 cir_tribal_elections_desc: "We will elect a nominal leader of our people, who will act as our representative but will not meddle with the oversight of local lords."

 cir_mercenary_employment: "$CIR_ADJ$ Mercenaries"
 cir_mercenary_employment_desc: "Our lands have again and again been raided by foreign powers, and our people enslaved. Some of these slaves, used as soldiers, have advanced in their new lives, accumulating power and wealth of their own. With some convincing, we could convince them to return to our lands, and protect it from future invasions."

 cir_horsemen_of_the_steppe: "Skilled Horsemen"
 cir_horsemen_of_the_steppe_desc: "Our position at the edge of the steppes has resulted in multiple mounted invasions of our homelands. If we want to ensure our independence, we will need to raise a great host ourselves, and expand our influence over the steppes, securing our heartland."

 cir_city_and_fortress: "Fortified Towns"
 cir_city_and_fortress_desc: "Our settlements lie unprotected, and are easy prey to any invader. As these settlements grow, however, we can directly incorporate the hilly terrain into our defensive lines, enhancing their protection. If necessary, we can even create the elevated terrain required ourselves."

 cir_grand_prince_of_circassia: "Grand Princedom"
 cir_grand_prince_of_circassia_desc: "To unify our people, we shall elect the greatest of our lords as the Grand Prince, who will serve as an inspiring leader for our troops."

 cir_multireligious_society: "Religious Coexistence"
 cir_multireligious_society_desc: "Our lands are frequented by many $catholic_ADJ$, $muslim_ADJ$, and $orthodox_ADJ$ people, who frequently engage in trade with our population. We should foster a collective tolerance between all our subjects, to promote peace and stability."
 
#Sunda

 seren_taun: "Sérén Taun"
 seren_taun_desc: "Held after the harvest, the #italic Sérén Taun#! festival is an annual thanksgiving ceremony celebrating agricultural abundance. Marked by rituals, offerings, and music, it strengthens the communal bonds of our #italic kampung-kampung#! and reminds all of the sacred balance between people, rice, and nature."
 
 pepper_of_the_parahyangan: "Pepper of the Parahyangan"
 pepper_of_the_parahyangan_desc: "The fertile volcanic soil of the Sundanese highlands is perfect for growing the prized spice, black pepper. Traders from across the world seek our peppercorns for their potency and aroma. We must capitalize on this natural treasure to expand our influence through spice."

 pan_asian_trade: "Pan-Asian Trade"
 pan_asian_trade_desc: "Sunda lies at the crossroads of great empires: $india$, $CHI$, and the Islamic world. By positioning ourselves as an indispensable node in this network, we secure access to goods, ideas, and partners across $asia$ turning our harbors into gateways of prosperity."

 extend_kampung_kampung: "Extend the Kampung-Kampung"
 extend_kampung_kampung_desc: "The foundation of $SUN_ADJ$ society lies in every #italic kampung#!, rural communities that dot the landscape. Investing in the infrastructure of these villages ensures sustainable growth, strong local leadership, and resilience against both famine and invasion."

#Scandinavia

 sca_unified_scandinavia: "Unified $SCA$"
 sca_unified_scandinavia_desc: "The union of $DAN$, $NOR$, $SWE$, and $FIN$ under one crown has turned the North from a battleground of competing kings into a centralized power. With unified administration and increased cooperation among the estates, we can assert stronger control over the realm."

 sca_legacy_kalmar_union: "Legacy of the Kalmar Union"
 sca_legacy_kalmar_union_desc: "Though the Kalmar Union dissolved in conflict, it established a precedent for shared Nordic sovereignty. Drawing upon this legacy, we reaffirm our authority and remind our subjects that unity brings strength, not subjugation."

 sca_sound_toll: "The Sound Toll"
 sca_sound_toll_desc: "Control over the Øresund grants us the right to impose the Sound Toll on all foreign ships passing through the $DAN_ADJ$ straits. This ancient privilege turns geographic advantage into tangible wealth, strengthening our dominance over northern trade."

 norwegian_heritage: "$NOR_ADJ$ Maritime Heritage"
 norwegian_heritage_desc: "$NOR$'s rugged coastlines and maritime traditions have shaped a people skilled in seafaring, fishing, and navigation. The legacy of $NOR_ADJ$ fishermen and shipbuilders fuels our naval endeavors and bolsters the lifeblood of our coastal communities."

 danish_heritage: "$DAN_ADJ$ Dockyard Legacy"
 danish_heritage_desc: "$DAN$'s long naval traditions and its mastery of maritime logistics culminated in major dockyards like those in $kobenhavn$. As $SCA$, we inherit these powerful infrastructures and traditions, boosting our diplomatic standing and naval readiness."

 swedish_roots: "$SWE_ADJ$ Military Roots"
 swedish_roots_desc: "From the disciplined Carolean ranks to the strong freeholding peasantry, $SWE$'s military prowess is an essential pillar of Scandinavia. By integrating $SWE_ADJ$ institutions and recruitment systems, we reinforce the manpower and strength of our empire."

 finnish_heritage: "$FIN_ADJ$ Frontier Cavalry"
 finnish_heritage_desc: "The $FIN_ADJ$ cavalry — #italic Hakkapeliitta#! — gained a fearsome reputation in wars in $europe$ These riders, raised in the wild forests and plains of $finland_area$, bring experience, adaptability, and toughness to our ranks. By formalizing their role, we will create a permanent elite force within our armies."

#Jerusalem

 symbol_of_catholicism: "Symbol of $catholic$"
 symbol_of_catholicism_desc: "$jerusalem$ is the holiest city in Christendom, the very place of Christ's Passion and Resurrection. By asserting $catholic_ADJ$ supremacy over these sacred grounds, we become the spiritual beacon of the Latin world and a pillar of the true faith."

 protectors_of_jerusalem: "Protectors of $KOJ$"
 protectors_of_jerusalem_desc: "We stand on the frontlines of Christendom, surrounded by unbelief. It is our sacred duty to shield the Holy City and strike fear into the hearts of heathens who would dare usurp it."

 latin_patriarch: "Latin Patriarch"
 latin_patriarch_desc: "$PAP$ has reinstated the Latin Patriarch of $KOJ$, once exiled and forgotten. Now restored, the Patriarch shall strengthen our influence in 4rome$ and reinforce our role as guardian of the Church's interests in the East."

 rites_holy_sepulchre: "Rites of the Holy Sepulchre"
 rites_holy_sepulchre_desc: "In the Church of the Holy Sepulchre, the ancient Latin rites are once more performed in full splendor. These solemn rituals, honoring the death and resurrection of Christ, reinforce our divine mandate to rule this land and spread the teachings of our faith."

 latinate_integration: "Latinate Integration"
 latinate_integration_desc: "Our realm is a crucible of noble blood from around $europe$, zealous pilgrims, and old Levantine stock. Through careful governance, we shall weave together this diverse heritage into a Latin $christian_ADJ$ society, where faith and culture go hand in hand."
 
 
 #Chinese Culture and tag
 chinese_siege_engineers: "Planned Sieges"
 chinese_siege_engineers_desc: "Our thick, sturdy fortifications represent generations of defensive engineering expertise. Conversely, our thorough understanding of fortification weaknesses, learned from building impregnable walls, helps us to develop particularly effective siege tactics and strategies."

 chi_legitimate_claimant: "Claim to the Mandate"
 chi_legitimate_claimant_desc: "Our origins may be humble, but we have proven our ability to lead, and have inspired and won the loyalty of many faithful subjects. We are now seen as worthy claimants to the Mandate of Heaven and the Middle Kingdom."

 chi_great_rivers_of_china: "Fertile Rivers"
 chi_great_rivers_of_china_desc: "While the great rivers flowing through our lands do have some associated risks for nearby settlements, they are also an invaluable tool for crop production."

 #Arabian
 arabian_horsemanship: "$AIA_ADJ$ Horsemanship"
 arabian_horsemanship_desc: "The $horses$ we raise are desired in many foreign lands for their beauty and strength. With our focus set on raising and exporting them, we will benefit greatly from their renown."

 arabian_desert_warfare: "Strength of the Desert"
 arabian_desert_warfare_desc: "The inhospitable deserts of $AIA$ have made our warriors stronger, able to wear down the enemy before moving in for the killing blow."

 arabia_cradle_of_islam: "Cradle of $muslim$"
 arabia_cradle_of_islam_desc: "Our lands are host to some of the most holy sites in our faith. This divine proximity makes our people connect deeply with their beliefs, inspiring them to further and further greatness."

 arabia_red_sea_trade: "Red Sea Trade"
 arabia_red_sea_trade_desc: "There are many trade outposts along our coastline, dealing in precious goods both from our own lands and foreign shores. It is time that we claim our fair share of this wealth."

 #Indonesia Region
 indonesia_outer_islands_archipelago: "Indonesian Archipelago"
 indonesia_outer_islands_archipelago_desc: "Maritime connections naturally play a huge role within our society, as we are surrounded by waters. Our reliance on maritime trade and transport makes traversal of the seas a trivial task for our people."

 indonesia_naval_supremacy: "Naval Prowess"
 indonesia_naval_supremacy_desc: "Our political relevance within the archipelago almost solely relies on the strength of our naval forces. By improving our shipwrighting techniques and crew training, we will ensure our domination over the lesser states of $indonesia_region$."

 indonesia_trading_hub_of_the_east: "Trade Hub of the East"
 indonesia_trading_hub_of_the_east_desc: "No matter their origin or destination, every trader in $asia$ will eventually have to cross our lands, bringing both precious goods and tales of their travels with them."

 indonesia_archipelago_of_many_faiths: "Land of Many People"
 indonesia_archipelago_of_many_faiths_desc: "Our islands are home to many different people, speaking different languages and believing in many different gods. Only if we establish a common understanding and tolerance between them can we secure a prosperous country."

 #Italy Region
 italian_universities: "Universities of the Peninsula"
 italian_universities_desc: "$ITA$ is home to many great universities and scholars. If we want to keep the flame of the $renaissance$ alive, we must continue to support these great institutions."

 italy_great_families: "Great Families of $ITA$"
 italy_great_families_desc: "After the foundation of our unified $ITA_ADJ$ state, we have absorbed many great noble families into our country. We should utilize their prestige and reputation to improve our own, while keeping those capable people busy."

 italian_innovativeness: "$ITA_ADJ$ Adaptiveness"
 italian_innovativeness_desc: "With the flourishing of the $renaissance$ came a deeper understanding of what great strides human achievement can take. If we wish to truly be a nation of progress, we must adapt to these new ideas without fear, and never allow innovation to be obstructed."

 italian_condottieri: "Great Condottieri Captains"
 italian_condottieri_desc: "Our nation is renowned for producing great military minds, whether they serve their own interests or are sworn in loyalty to the state. We should ensure that these adept intellects are willing to serve us first and foremost."

#United States of America

 usa_mayflower_compact: "Mayflower Compact"
 usa_mayflower_compact_desc: "Bound together by shared peril and purpose, the early settlers drafted a pact of self-governance. Even in the wilderness, the seeds of society and compromise found soil."

 usa_empowered_assemblies: "Empowered Assemblies"
 usa_empowered_assemblies_desc: "Elected assemblies emerged throughout the colonies, empowering landowners to govern themselves. The humble origins of liberty lie in the halls of these institutions."

 usa_great_awakening: "Great Awakening"
 usa_great_awakening_desc: "A wave of religious revival sweeps the land, challenging old authorities and stirring the moral conscience of a rising people."

 usa_declaration_of_independence: "Declaration of Independence"
 usa_declaration_of_independence_desc: "#italic We hold these truths to be self-evident, that all men are created equal.#!\n\nWith this bold declaration, we shall break the chains of subjugation, and embraced our shared destiny!"

 usa_bill_of_rights: "Bill of Rights"
 usa_bill_of_rights_desc: "#italic ...or abridging the freedom of speech, or of the press; or the right of the people peaceably to assemble, and to petition the Government for a redress of grievances.#!"

 usa_recognized_sovereignty: "Recognized Sovereignty"
 usa_recognized_sovereignty_desc: "Treaties and diplomacy affirmed what our struggles have earned. Our place on the stage of diplomacy is no longer questioned, but respected."

 usa_era_good_feelings: "Era of Good Feelings"
 usa_era_good_feelings_desc: "In the wake of hardship, peace and unity have brought a rare moment of national harmony. The people flourish with optimism and order."

#Kongo

 kon_bakongo_confederation: "Bakongo Confederation"
 kon_bakongo_confederation_desc: "Before the rise of our realm, the people of this region governed themselves through clan councils and provincial alliances. What we now call $KON$ emerged from centuries of interwoven relationships, where loyalty to the land and kin outweighed loyalty to borders. Uniting this patchwork into a centralized realm was no small feat, but we did it and we will keep it together yet."

 kon_lineage_lukeni_lua_nimi: "Lineage of Lukeni lua Nimi"
 kon_lineage_lukeni_lua_nimi_desc: "All things must begin somewhere, and for our kingdom, that beginning lies with Lukeni lua Nimi. He was more than a conqueror. Indeed, he was a founder, the father of our realm. His bloodline commanded respect, not just for its ancestry, but because it reminds the people who first dared to dream of a unified $KON$."

 kon_european_contact: "Contact with $europe$"
 kon_european_contact_desc: "The strangers came from the sea with beards, books, and barrels of wine. They brought with them strange gods, stranger languages, and an entire ocean of opportunity. Our emissaries have learned their customs, their intentions, and — most importantly — how to turn their need for allies into our advantage."

 kon_cultural_syncreticism: "Cultural Syncretism"
 kon_cultural_syncreticism_desc: "The influx of foreigners and cultural exchanges have made an impact on our society. However, we have not abandoned our own ways. We call upon deities by Kikongo names, we proudly wear our religious insignia, and our ceremonies echo with both drums and hymns. This is a vibrant example of our clarity, and the gods seem to agree."

 kon_study_european_firearms: "Study European Firearms"
 kon_study_european_firearms_desc: "The musket may not make a man brave, but it certainly makes him fearsome. Let those in $europe$ boast of their superiority; we will buy their weapons, master their drills, and soon enough the only thing distinguishing our soldiers from theirs will be the color of their flags."

 kon_transatlantic_slave_trade: "Transatlantic $slaves_goods$ Trade"
 kon_transatlantic_slave_trade_desc: "Prisoners and laborers are needed overseas to operate our many worksites, plantations, and mines. While this is far from a noble endeavor, none can deny the profitable nature of these exploits."


#Ilkanate

 ilk_restore_yam: "Restore the Yäm"
 ilk_restore_yam_desc: "The Yäm, our ancient system of relay stations and messengers, once connected the furthest corners of the $MGE_ADJ$ world. By restoring this vast network across $persia_region$ and beyond, we ensure that our orders are swift, our envoys safe, and our dominion responsive, just as it was in the golden days of the Khans."

 ilk_ilkhanate_resurgent: "$ILK$ Resurgent"
 ilk_ilkhanate_resurgent_desc: "What was once broken is now reborn. Our banners fly once more across $persia_region$, invoking awe and fear in equal measure. As word of our rising power spreads, the world will remember what it means to be ruled by a true $ILKHANATE_LEADER_MALE$."

 ilk_persian_arts_and_architecture: "Persian Arts and Architecture"
 ilk_persian_arts_and_architecture_desc: "Our ancestors ruled with the sword, but their greatness was measured in palaces, libraries, and minarets. Let us follow their example and fund not only walls and roads, but mosques, gardens, and schools as testaments to $ilkhanate$ grandeur."

 ilk_descendants_of_genghis_khan: "Descendants of $genghis_khan_name_no_tooltip$"
 ilk_descendants_of_genghis_khan_desc: "The blood of the $rank_empire_horde_ruler_suffix_male$ runs through our veins. Let no man forget that our rule was ordained on the steppes and sealed by conquest. Our horsemen remain unmatched, and our banners bear not just a name, but a birthright."

 ilk_new_roots: "New Roots"
 ilk_new_roots_desc: "The days of pure steppe conquest lie behind us. We have sown ourselves into the soil of progress and reformation. From that soil, a more stable, sophisticated state shall grow. Though our hearts may still beat to the rhythm of the open fields, our future lies in lasting institutions, not fleeting raids."

 #Hindustan
 hin_sepahi: "Sipâhi"
 hin_sepahi_desc: "Neglecting the importance of the infantry has been the downfall of many would-be conquerors. We must ensure that our troops are equipped with the most effective firearms and drilled in tactics that can adapt to any foe."

 hin_united_india: "United $india$"
 hin_united_india_desc: "The many people, cultures, languages, and nations that make up $india$ shall be finally united under a single banner. Only with common understanding and a carefully fostered unity among all our people can we strive towards greater ambitions."

 hin_ganga: "Gaṅgā"
 hin_ganga_desc: "Many $hindu_ADJ$ faithful worship the river Ganges as a goddess that brings purity and redemption to the faithful. We implore pilgrims to visit the river banks to bathe in the sacred waters. Through Gaṅgā, our nation is made pure."

 hin_persianate_court: "Persianate Courtly Culture"
 hin_persianate_court_desc: "Foreign languages and noble customs have richly influenced the courts of $india$ for a long time. We should utilize these connections to invite the most capable advisors to serve under our guidance."

 hin_gunpowder_empire: "Gunpowder Empire"
 hin_gunpowder_empire_desc: "Our mastery of gunpowder warfare has brought us glory and helped us found our great state. This dominance would be impossible without fostering firearms production for our troops."

 hin_sufism: "Attract Sufi Missionaries"
 hin_sufism_desc: "$muslim_ADJ$ princes across the world compete to attract the wisest Sufi teachers. As our renown has grown, more of these Sufis have joined us. Towns are founded wherever they settle, often in previously inhospitable regions, and the local people are inspired to convert through the wisdom of the Sufis."

 hin_administration_of_india: "Indian Administration"
 hin_administration_of_india_desc: "Governing a state as large as an entire subcontinent is no easy task. We will need to develop a robust system of administration in cooperation with local princes to get the most out of our production and to ensure widespread stability."

 hin_indian_empire: "Imperial $india$"
 hin_indian_empire_desc: "No ruler, be they $muslim_ADJ$, $hindu_ADJ$, $buddhist_ADJ$, or $jain_ADJ$, has ever succeeded in conquering the entirety of the subcontinent. We shall be the first universal rulers of $india$!"

 hin_rocketry: "Develop Rocket Technology"
 hin_rocketry_desc: "Iron-cased rockets have yet to be widely adapted for military purposes, yet their explosive power surely has tactical applications. We should experiment with this technology and test it on the battlefield."

 hin_industrialization: "Industrialization of $india$"
 hin_industrialization_desc: "Conditions in our economy are ideal for rapid industrial growth. With new technology we can ensure better conditions for our local production, particularly in the textile industry. Our focus on new methods means that our state can ensure steady industrial expansion."

 #Carthage
 cth_merchant_legacy: "Merchant Legacy"
 cth_merchant_legacy_desc: "Phoenician trade fleets traveled through the Mediterranean for centuries. This economic legacy means that we are more efficient — and ruthless — when it comes to trade. We shall once again preside over the ebb and flow of goods!"

 cth_breadbasket_of_rome: "Breadbasket of Rome"
 cth_breadbasket_of_rome_desc: "Centuries ago, our advances in irrigation and olive cultivation earned $CTH$ the nickname of 'the breadbasket of Rome.' We will now consult our ancient agricultural knowledge, and once again do battle with the desert to plant our olive groves, just like in antiquity."

 cth_mercenary_army: "Army of Mercenaries"
 cth_mercenary_army_desc: "Our ancestral empire did not have a massive population, so for centuries, we relied on mercenaries during war. Since the reformation of $CTH$ we have continued that tradition to save our population from dangers of the battlefield."

 cth_cothons: "Cothon"
 cth_cothons_desc: "The ancient Carthaginian #italic cothon#! was a technological marvel that helped facilitate efficient ship construction. Now, this great legacy will serve as a blueprint for our whole country. Studying ancient shipbuilding techniques allows us to excel in this area once again, and the $CTH_ADJ$ navy will soon dominate the Mediterranean."

 cth_phoenician_sailors: "Phoenician Sailors"
 cth_phoenician_sailors_desc: "After restoring our ancient kingdom, we started reaching out to our Phoenician brothers in Libya. As a result, we have a steady influx of volunteers that want to join the restoration of the ancient Phoenician kingdom of $CTH$. It seems we can maintain a much bigger navy now..."

 cth_legacy_of_hannon: "Legacy of Hannon"
 cth_legacy_of_hannon_desc: "Hannon the Sailor was a legendary ancient explorer who ventured far into the south of the African coast. We shall follow his example, and mount exploration voyages in order to restore our lost trading empire. This time, we will push our expeditions even further, seeking out fresh trading opportunities across the entire world."

 cth_beyond_the_pillars: "Beyond the Pillars"
 cth_beyond_the_pillars_desc: "It is time for our trade factories to reach beyond the mythical pillars of Hercules. Combining ancient colonization knowledge with modern discoveries allows us to settle more efficiently than other younger nations, those who are fairly new to this experience. $CTH_ADJ$ colonies shall soon be found all around the world!"

 cth_wine_traders: "Punic $wine$ Trade"
 cth_wine_traders_desc: "In ancient times, we created a $wine$ trading pipeline by producing large amounts of low-quality $wine$ to trade, and importing the good stuff for ourselves. Building on that tradition, we are looking into expanding our $wine$ production capabilities — we #italic will#! dominate the $wine$ trade in the Mediterranean!"

 cth_punic_global_trade: "Punic Global Trade"
 cth_punic_global_trade_desc: "For centuries, our nation dominated the Mediterranean trade. Now, with all the new discoveries made in the centuries since, we stand poised to dominate the globe. Soon, there will be a $CTH_ADJ$ trading vessel in every port in this world!"

 cth_sufet_rule: "Rule of Šūfeṭ"
 cth_sufet_rule_desc: "Our ancient kingdom was headed by an elected head of state called the #italic Šūfeṭ#!. In this new modern age, we shall reorganize our government, taking experience from antiquity and combining it with modern theories to create a powerful Republican system, one that will outshine every Republic created up to this date!"

#Aztec Formable Advances

 network_of_cities: "Network of Cities"
 network_of_cities_desc: "Across lakes and valleys, our cities bind themselves through roads, markets, and shared purpose, strengthening our reach."

 status_by_merit: "Status by Merit"
 status_by_merit_desc: "Warriors and nobles rise through valor and service, ensuring authority belongs to those who have truly earned it."

 expansion_merchant_guilds: "Expansion of Merchant Guilds"
 expansion_merchant_guilds_desc: "Pochtēcah merchants extend their routes far beyond our lands, enriching every marketplace loyal to the Mexihcah."

 centralized_city_governance: "Centralized City Governance"
 centralized_city_governance_desc: "The refomation of our government, in an attempt to support the sprawl of our newly-attained urban territories, shall be united under firm oversight, creating a more orderly and dependable administration."

 wealth_of_mesoamerica: "Wealth of Mesoamerica"
 wealth_of_mesoamerica_desc: "The fertile soils, forests, and mines of Ānāhuac yield immense riches, sustaining our growth and imperial ambitions. Properly utilizing these resources will bolster our affluence."

 study_european_colonizers: "Study the European Colonizers"
 study_european_colonizers_desc: "Strangers have made contact with our people. Their unfamiliar ships and weapons instill awe and fear. Understanding their methods may be the key to survival."

 new_fire_ceremonies: "New Fire Ceremonies"
 new_fire_ceremonies_desc: "Once every fifty-two years, the world is renewed by flame, uniting the people in faith and cosmic balance."

 sun_must_rise: "The Sun Must Rise"
 sun_must_rise_desc: "Through devotion and ritual, we keep the sun's journey alive, easing the hearts and strengthening the spirit of our people. The preservation of equilibrium, and even the world, rests upon our shoulders."

 #Kurdistan Formable
 krs_kurdish_tribes: "Tribal Loyalty"
 krs_kurdish_tribes_desc: "Having asserted our authority over all $kurdish_culture$ tribes, we will be able to call upon their experienced, hardened warriors to defend our country."

 krs_legacy_of_the_kurdish_dynasties: "Legacy of the $kurdish_culture$ Dynasties"
 krs_legacy_of_the_kurdish_dynasties_desc: "Our people have established several great dynasties, ruling territories from $egypt_region$ to Iran. Tying our own state to the glory of past rulers will allow us to be a unifying symbol for the $kurdish_culture$ people, and make our rule seem more legitimate in the eyes of our subjects."

 krs_kurdish_quarters: "Prospering $kurdish_culture$ Quarters"
 krs_kurdish_quarters_desc: "In the times of foreign rule, many of our people established predominantly $kurdish_culture$ quarters in cities. While these areas prospered even under distant rulers, we can now utilize their wealth directly, and better guarantee a prosperous future for our people."

 krs_kurdish_horses: "Adaptable Cavalry"
 krs_kurdish_horses_desc: "Our homelands are surrounded by many would-be conquerors, hungry to subjugate our people. While our native terrain can slow down hostile armies, it also makes it difficult for our own troops to respond to threats swiftly. A strong cavalry, however, will allow us to quickly react to any threats, no matter how many there might be."

 krs_kurdish_mercenaries: "Mercenary Experience"
 krs_kurdish_mercenaries_desc: "Our people have long served as hired swords for foreign lords, gaining valuable combat experience in their service. With our own country now established, it is time to call those experienced fighters under our banner."

 krs_kurdish_warrior_poets: "Warrior Poets"
 krs_kurdish_warrior_poets_desc: "Our rulers must not just be capable warriors; they must also be educated in the matters of fine art and effective administration. By writing texts and documenting their reigns, our leaders will pass the knowledge and history of our people down through generations, ensuring no valuable insight is lost."

#Manchu Formable Advances

 mohe_ancestry: "Mohe Ancestry"
 mohe_ancestry_desc: "Our people descend from the Mohe tribes of the Amur forests. Their traditions of hunting, herding, and hardy frontier life shape our society."

 warka_ties: "Warka Ties"
 warka_ties_desc: "Our ties with the Warka have given us great knowledge in hunting and gathering food. Through these practices, we ensure our people stay fed, even during long winters."

 shadow_of_ambition: "Shadow of Ambition"
 shadow_of_ambition_desc: "The unification of the Jurchen tribes is but the first step in our ambitious rise to power. Soon, our name will strike fear and awe across the entire continent."

 niyamniyan: "Niyamniyan"
 niyamniyan_desc: "The tradition of the Five Noble Talents involves riding, archery, military command, loyalty, and discipline. These aspects of our martial society form the backbone of our proud culture."

 southern_campaigns: "Southern Campaigns"
 southern_campaigns_desc: "$CHI$ is home to immeasurable wealth, prestige, and knowledge. Under the rule of a weak dynasty, it falls upon our shoulders to seize power and return the prosperity and splendor of these lands."

 foreign_learning: "Foreign Learning"
 foreign_learning_desc: "From foreign scholars and texts, we shall adopt new administrative, military, and scholarly practices, accelerating the pace of our technological development."

#Malacca Formable

 melaka_tree: "The Melaka Tree"
 melaka_tree_desc: "As legend goes, the timid mouse deer sought refuge in what would later become our domain. Our beggining is humble, as little more than a fishing village clustered beneath the shade of the Melaka tree. From these roots shall grow a people that will one day shape the entire region."

 orang_laut: "Orang Laut"
 orang_laut_desc: "Long before our rise, the Orang Laut roamed the straits as masters of wind and tide. Now, by learning their ways and employing a select few, we guide traders through the narrow waters and shield our coast from pirates. Such vigilance ensures that all who sail to $malacca$ arrive safely."

 congregation_of_merchants: "Congregation of Merchants"
 congregation_of_merchants_desc: "From $arabia_region$ to China and the coasts of $south_asia$, merchants of every shore converge upon $malacca$. Drawn by fair laws, secure waters, and bustling markets, they will form a great congregation that enriches our ports and carries our name across the seas."

 connections_with_china: "Connections with China"
 connections_with_china_desc: "Our envoys have secured recognition from China's most prestigious sovereigns. Tribute and goodwill flow between us, granting us prestige, protection, and a privileged place in the vast network of their trade."

 control_the_malacca_strait: "Control the Malacca Strait"
 control_the_malacca_strait_desc: "The narrow $inner_strait_malacca$ is the backbone of our maritime commerce. By controlling this vital strait, we channel the wealth of nations into our harbors and establish ourselves as the unrivaled gatekeepers of the east-west trade."

 shahbandar: "The Shāhbandar System"
 shahbandar_desc: "To manage the vast tide of merchants arriving at our ports, we appoint a Shāhbandar as the authority to oversee customs, resolve disputes, and organize the foreign quarters. This office brings order to our bustling entrepôt and will strengthen our role as the crossroads of the seas."

#Malaya Formable
 
 settle_the_islands: "Settle the Islands"
 settle_the_islands_desc: "Across the scattered isles of our homeland lie countless shores awaiting our touch. By strengthening our presence among these islands, we secure the wealth of our people: new trade posts, new harvests, and new communities bound by the waves that unite us."


 people_of_the_sea: "People of the Sea"
 people_of_the_sea_desc: "We are a people shaped by wind and tide. From childhood, we learn the ways of the monsoon, the pulse of the straits, and the call of the open ocean. Our sailors carry this knowledge into every voyage, earning renown across the archipelago for their courage and mastery."

 expert_hagglers: "Expert Hagglers"
 expert_hagglers_desc: "Wherever our traders land, be it the coasts of $south_asia$ or the markets of distant China, they are respected for their sharp tongues and keen judgement. Navigating both seas and bargains with equal finesse, they ensure that our trades are never at a disadvantage."

 malay_merchants_in_every_port: "Malay Merchants in Every Port"
 malay_merchants_in_every_port_desc: "From the bazaars of $arabia_region$ to the harbors of $east_asia$, our merchants are a familiar sight. Their presence forms a vast network of cooperation, easing the establishment of our enclaves abroad and extending our reach into every great entrepôt of the world."

 agreements_sea_nomads: "Agreements with the Sea Nomads"
 agreements_sea_nomads_desc: "The $sama_culture$ and other sea-wandering peoples have long lived upon the water itself, drifting between islands with unmatched skill. Through knowledge-sharing or agreements of mutual respect and shared opportunity, we shall ensure safe passage and swift repairs."

 masters_of_spice: "Masters of Spice"
 masters_of_spice_desc: "Trading in cloves holds much wealth for us and our people. By securing the lands and seas from which these spices flow, we stand at the center of a trade that spans the world, and no merchant can ignore the allure of these goods."

#Sokoto Formable
 sko_fulani_expansion: "Expansion of Sokoto"
 sko_fulani_expansion_desc: "For too long the people of $west_africa$ have labored under rulers that, while professing to be righteous, indulged in syncretism. No more! Our flag shall always fly above that of worldly kingdoms!"

 sko_recruit_the_faithful: "Recruit the Faithful"
 sko_recruit_the_faithful_desc: "Everyone who is ready to serve under our righteous leaders must be welcome, regardless of their heritage."

 sko_education_for_all: "Learned Scholars"
 sko_education_for_all_desc: "By encouraging the spread of literacy and scholarship among men and women alike, we can advance our society and further our hold over our lands. The family of our rulers must have a special place in these efforts, serving as an ideal to emulate."

 sko_religious_court: "Most Religious Court"
 sko_religious_court_desc: "Instead of displaying the worldly pomp of our rule, our court should focus on spiritual matters. By inviting learned religious figures to teach in our capital, we can show our true commitment to our faith."

 sko_recruit_fulani_generals: "Recruit $fulbe$ Commanders"
 sko_recruit_fulani_generals_desc: "The $fulbe$ people are distinguished warriors, serving as leaders in all corners of $west_africa$. We should establish ourselves as a permanent employer for their most capable commanders."

 sko_one_people_in_faith: "Unification in Faith"
 sko_one_people_in_faith_desc: "Our lands are home to many people of different cultures and languages. We must emphasize our faith as the unifying force, joining all people under one banner."
 
 #Italy Formable Advances
 ita_birthplace_of_the_renaissance: "Continuation of the Renaissance"
 ita_birthplace_of_the_renaissance_desc: "$italy_region$ has seen a great influx of bright minds. Be it traveling artists coming here to make their fortunes, or our own people inspired to participate in this great rebirth of the arts, our cities seem to be bursting with capable intellects. With our sponsorship, we will surely continue attracting talented people to our culture.."

 ita_connect_the_interior: "Connect the Interior"
 ita_connect_the_interior_desc: "While the terrain of our lands allows for swift transportation and travel along the coastline, the interior of the Italian peninsula is much harder to traverse in many places. Connecting not only interior locales, but also coast with coast, will ensure easier mercantile operations and improved maneuverability of our troops."

 ita_increased_recruitment: "A Prized Possession"
 ita_increased_recruitment_desc: "$italy_region$ is a desired possession for many foreign rulers. If we want to defend our country, we must expand recruitment for both our land and sea forces. Since $italy_region$ is vulnerable to invasions both from across the alpine passes and our vast coastline, we must ensure the army and navy are well-prepared to face any conqueror looking to disrupt the peace of the peninsula."

 ita_influence_over_the_clergy: "Influential Clergy"
 ita_influence_over_the_clergy_desc: "With its close proximity to the $papacy_reform$, $italy_region$ has a long tradition of powerful and talented clergy in the service of the faith. Regardless where our religious matters will take us, we should maintain good relations with our clergy."

 ita_enduring_hardship: "Hardships of War"
 ita_enduring_hardship_desc: "The foreign interests in $italy_region$ have many times turned our lands into the battlefield of stronger countries. Sustaining our people during these times of need is a difficult task. Establishing secure locations to shelter our population during conflict will ensure their support during even the most dire wars."

 ita_flourishing_urban_centers: "Flourishing Cities"
 ita_flourishing_urban_centers_desc: "Our lands are blessed with many highly urbanized areas. This not only offers us ample opportunity to manufacture goods, but their mercantile connections also enable us to ship them to foreign markets for our profit. Clearing any obstruction to expanding these industries will guarantee their continued success."

 ita_attractive_migration: "Appealing Landscape"
 ita_attractive_migration_desc: "The fertile, mild land of our peninsula is a popular place for people from bordering countries to seek their fortunes. While many of our cities already rely on labor from seasonal migrants, we should increase our efforts to settle these people into our lands permanently."

 #Cologne
 kol_peace_in_the_city: "Peace in the City"
 kol_peace_in_the_city_desc: "Not so long ago, our city was nearly torn apart in the struggle between our burghers and our clergy. We must ensure that this conflict cannot repeat itself, and that every member of both our court and the city council cooperate in preserving Cologne as a central hub on the Rhine."

 kol_school_of_painting: "Cologne School of Painting"
 kol_school_of_painting_desc: "Our city is home to many capable painters and craftsmen skilled in the art of bringing images to life through the media of wood, stone, and especially glass. With the support of a strongly established artists' guild, they will thrive under our sponsorship and illuminate our city to new glory."

 #Trier
 tri_balance_the_landstande: "Balance the Landstände"
 tri_balance_the_landstande_desc: "Our territory is both home to many urban areas and castles of many imperial knights. Balancing them and their often opposing interests is no easy task. Only if they cooperate with us and the cathedral chapter, we can ensure the functionality of our government."

 #Hesse
 hes_form_the_militia_army: "Professional Army Core"
 hes_form_the_militia_army_desc: "Our strategic position within the Empire makes us an attractive staging ground for other princes' armies whenever outside threats arise. However, hosting foreign troops hurts our finances. To prevent this costly burden, we must raise our own troops and put them into service of the Empire."

 #Noble Societies Germany
 noble_society_baden_palatine: "Society with the Donkey"
 noble_society_baden_palatine_desc: "Founded to protect knightly interests within the Empire, the #italic Gesellschaft mit dem Esel#! has entrenched itself in the lands surrounding $heidelberg$. Their expertise in governance, as well as their ability to sponsor tourneys, will improve our cultural standing."

 noble_society_nassau: "Society with the Lion"
 noble_society_nassau_desc: "Founded in the woes of the $western_schism$, the #italic Löwenbund#! is sworn to protect our lands from heretical revolts. We should grant them our official sponsorship and incorporate them into our court to further our cause."

 noble_society_mainz: "Bengler Society"
 noble_society_mainz_desc: "The #italic Klüppelgesellschaft#! has been founded by a group of knights concerned about the erosion of our power within the Holy Roman Empire. It would be wise of us to sponsor those willing to fight for our status."

 noble_society_franconia: "Fürspang Society"
 noble_society_franconia_desc: "The #italic Gesellschaft mit dem Fürspang#! is an order of knights formed to defend their interests and provide assistance to those who sponsor them. Providing them with extensive funds will grant us significantly more political prowess within our region and within the Holy Roman Empire."

 noble_society_tyrol: "Elefantenbund"
 noble_society_tyrol_desc: "Our lands are at risk of invasion from hostile neighbors, who desire the riches of our valleys. Creating and funding an order of knights, ready to defend our lands, allows us to draw on greater forces if the need ever arises."

 noble_society_cologne: "Order of Saint Hubert"
 noble_society_cologne_desc: "The #italic Hubertusorden#! will serve as a glorious reminder of our knights prowess in combat! The order will be a reward for our loyal knights, and its members will show our glory for all to see."

 saxon_defensioner: "$a_saxon_defensioner$"
 saxon_defensioner_desc: "$a_saxon_defensioner_desc$"

 prussian_grenadiers: "$a_prussian_grenadiers$"
 prussian_grenadiers_desc: "$a_prussian_grenadiers_desc$"

 bavarian_jager: "$a_bavarian_jager$"
 bavarian_jager_desc: "$a_bavarian_jager_desc$"

 hesse_jager: "$a_hesse_jager$"
 hesse_jager_desc: "$a_hesse_jager_desc$"

