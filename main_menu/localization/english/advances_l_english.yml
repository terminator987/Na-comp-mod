 increase_control_area_advance: "Increase Control Widely"
 increase_control_area_advance_desc: "As our mighty country grows, we will need to keep a tight grip on our population."
 improved_supply_lines: "Improved Supply Lines"
 improved_supply_lines_desc: "Modern warfare demands more and more resources for our armies, especially since the development of salvo fire and the widespread use of artillery on the battlefield."
 supply_lines: "Supply Lines"
 supply_lines_desc: "The development of professional armies has changed the way war is waged. Logistics are now essential, and supply lines are absolutely necessary to keep armies fed and supplied with ammunition."
 improved_logistics: "Improved Logistics"
 improved_logistics_desc: "The modern art of war nowadays clearly differentiates between amateur officers who talk about tactics, and professional officers who actually study logistics."
 mining_advance: "Quarrying"
 mining_advance_desc: "Quarrying has been a basic economic activity since the dawn of humanity. The widespread use of metalworking only increased the importance of prospecting and mining different types of minerals and metals for the development of complex societies." 
 bronze_working: "Bronze Working" 
 bronze_working_desc: "Bronze is an alloy of $copper$ and $tin$, discovered and developed to make much more durable tools and weapons, as it also more ductile and easier to work with than $copper$." 
 iron_working: "$iron$ Working" 
 iron_working_desc: "$iron$ is a key material for the production of different types of tools and weapons, making it vital for village blacksmiths as well as large manufacturing chains." 
 advanced_mining: "Advanced Mining" 
 advanced_mining_desc: "The development of more advanced and durable tools has made possible to further expand mining operations for new minerals and metals." 
 fine_metals_mining: "Fine-Metals Mining" 
 fine_metals_mining_desc: "The discovery and development of new metal alloys has made it possible to extract and exploit new fine metals on a larger scale, making the process highly profitable compared to other types of mining." 
 ranching: "Ranching" 
 ranching_desc: "Cattle breeding led to the ability to raise entire herds of horses, which in turn has made it possible to breed the best animals for travel, war, and many other tasks." 
 mining_law_advance: "$mining_law$"
 mining_law_advance_desc: "$mining_law_desc$"
 
 
 fort_limit_1_advance: "Castellany System"
 fort_limit_1_advance_desc: "Official castellans are appointed to manage local strongholds and their garrisons, marking the first organized framework for the administration and maintenance of fortresses."
 fort_limit_2_advance: "Border Wardens"
 fort_limit_2_advance_desc: "Regional wardens coordinate multiple castles along frontier marches, establishing supply routes, reporting chains, and mutual defense between neighboring strongholds."
 fort_limit_3_advance: "Defense Bureau"
 fort_limit_3_advance_desc: "The $crown_estate$ centralizes oversight of fortifications under a formal bureau in the capital, consolidating records, funds, and maintenance orders into a single administrative authority."
 fort_limit_4_advance: "Inspectors General"
 fort_limit_4_advance_desc: "Professional inspectors travel the realm to evaluate garrisons, stores, and walls, enforcing consistent standards and ensuring the reliability of each fortified place."
 fort_limit_5_advance: "Standardized Engineering"
 fort_limit_5_advance_desc: "National standards for construction and repair are introduced, enabling efficient planning, shared designs, and predictable maintenance across our network of fortresses."
 fort_limit_6_advance: "Ordnance Surveys"
 fort_limit_6_advance_desc: "Comprehensive mapping and logistical integration link every fortress into a coherent defensive system; an achievement of bureaucracy, science, and state power working in unison."
 
 chancery_advance: "Chancery"
 chancery_advance_desc: "A chancery is a bureaucratic office that medieval rulers developed for governing their domains as societal changes made them more complex and increasingly difficult to manage. The main function of a chancery is to write, send, and receive documents related to the management of these domains."
 chancery_records: "Chancery Records"
 chancery_records_desc: "The growing apparatus of chanceries requires another level of administration, since their bureaucracy is becoming even more complex to manage. This comes in the form of chancery records, an office established to keep all letters received at the chancery, as well as a copy of all the documents issued by its scribes and notaries."
 lieutenancy_advance: "Lieutenancy"
 lieutenancy_advance_desc: "As the Crown's patrimony grows, the monarch's extended absences from the various kingdoms weaken the Crown and strain relations with subjects. To address this, the position of lieutenant emerges, acting as the monarch's temporary representative during their absences, which are not meant to be permanent. These lieutenants are not only from the royal bloodline but also from the domestic circle connected to the king's family."
 viceroyalty_advance: "Viceroyalty"
 viceroyalty_advance_desc: "A viceroyalty refers to a distinct and semi-autonomous territorial unit within a kingdom, characterized as a monarchical state governed by a designated viceroy. These administrative entities are entrusted to a viceroy, appointed by the monarch, with the crucial responsibility of managing and governing a specific country or province. Typically situated apart from the central core of the kingdom, the viceroyalty operates as a separate entity, exhibiting a degree of self-governance while ultimately being answerable to the reigning monarch. The viceroy's role encompasses a wide range of duties, including the implementation of policies, the maintenance of order, and the representation of the king's authority in the designated region."


 tolerance_idea: "Ideas of Tolerance" 
 tolerance_idea_desc: "Every human was created equal to the Creator, and therefore we understand that their beliefs, even if wrong, can be accepted as a means to eventual conversion to the one true faith."
 empiricism: "Empiricism"
 empiricism_desc: "Things are what they are because we can feel them, see them, and overall experience them with our senses. It is by using this empirical evidence that we come up with newer ideas."
 print_culture: "Print Culture"
 print_culture_desc: "With the invention of the printing press, the spread of knowledge has never been easier. New techniques and advances will reach every corner of our nation and make it grow stronger and richer."
 religious_unification: "Religious Unification"
 religious_unification_desc: "There is only one religion that is true, and thus it is our duty to unite all the faithful under the sole guidance of God."
 humanism: "Humanism"
 humanism_desc: "Mankind is the highest creation of our Lord, and thus it is natural to place it in the center of Creation. Every aspect of human nature has to be preserved and encouraged, from its well-being to its propensity for free will and exploration."
 merchant_traditions: "Merchant Traditions"
 merchant_traditions_desc: "A steady flow of trade and commerce is a sure sign of a healthy economy. With our merchants focusing on keeping the trade flowing, we can establish a tradition of and reputation for lively commerce, making it easier to attract foreign trade to our nation."
 benign_diplomats: "Benign Diplomats"
 benign_diplomats_desc: "The art of diplomacy is an intricate one. Being good with words is not enough, as one's overall presence and demeanor are crucial to how the words themselves are interpreted. By having our diplomats focus on making a good impression, we will be seen more favorably by other countries."
 grand_banquets: "Grand Banquets"
 grand_banquets_desc: "No important matter can be discussed without an accompanying meal, and the more important the matter is, the more indulgent the meal should be. Having regular grand banquets allows us to constantly and properly discuss all matters that need consideration."
 buffer_states: "Buffer States"
 buffer_states_desc: "There is nothing worse than arguing with one's neighbor. If we want to avoid border tensions, having other states act as a buffer between us and our potential enemies will allow us some breathing room."
 camp_followers: "Camp Followers"
 camp_followers_desc: "Warriors obviously make up the bulk of our armies, but no army can consist of fighters alone. Without the extra entourage of people transporting food and equipment for the army, it would not be able to feasibly go anywhere. By organizing and structuring these camp followers, we can greatly increase their usefulness and efficiency."

 

 #Sweden
 swedish_tradition: "Always Attack"
 swedish_tradition_desc: "Forming our marching troops into a #italic Svinfylking#! and charging is enough force to shatter any opponent! Mounted troops are not superior; other than being ridden to the battle itself, horses have no place on the battlefield."
 swedish_heritage: "Free Farmers"
 swedish_heritage_desc: "$SWE_ADJ$ peasants have always made significant contributions to our country; the differences between a noble and a free farmer have never been big."
 kung_och_riksdag: "Kung och Riksdag"
 kung_och_riksdag_desc: "$SWE_ADJ$ rulers often depended on cooperation with the estates, especially with such a large peasant class compared to that of the nobility. During the reign of Gustavus Adolphus, however, a historic compromise was made with the aristocrats, who loyally pledged their resources to the disposal of the nation in return for new privileges."
 swedish_steel: "$SWE_ADJ$ Steel"
 swedish_steel_desc: "While other armies may be content to wildly fire inaccurate volleys at their enemies, we shall march at them in disciplined ranks, deliver a single volley at close range, and then feed them cold steel."
 hakkapelitta: "Hakkapeliitta"
 hakkapelitta_desc: "$FIN$ is considered a rather poor and backwards region, but service in the $SWE_ADJ$ cavalry offers skilled $FIN_ADJ$ horsemen ample opportunities for glory and plunder. Superior horsemanship and high-quality mounts allow us to raise the feared #italic Hakkapeliitta#! — cavalry so effective in battle that our enemies whisper they must be protected by witchcraft."
 indelningsverket: "Indelningsverket"
 indelningsverket_desc: "The $SWE_ADJ$ allotment system divides the peasantry into groups of ten for recruitment purposes. This system made it easier to find people to serve in the army and organize them into units."
 swedish_absolutism: "$SWE_ADJ$ Absolutism"
 swedish_absolutism_desc: "Absolutism is the theory that one person should be in charge, that this person is the monarch, and that said monarch shall run the government unfettered by the Privy Council."
 produktplakatet: "Produktplakatet"
 produktplakatet_desc: "The decree forbids foreign ships arriving in $SWE$ to bring goods from countries other than their own or their colonies."
 mulltimmer_masugn: "Mulltimmer Masugn"
 mulltimmer_masugn_desc: "$SWE_ADJ$ $iron$, prized for its purity and strength, supplies not only our domestic needs but also the foundries and armories of nations across the continent. The #italic Mulltimmer Masugn#! was not built just with stone, but also with wood isolated with sand, gravel and dirt."
 swedish_royal_post_office: "Kungliga Postverket"
 swedish_royal_post_office_desc: "The #italic Kungliga Postverket#!, or Royal Postal Agency, was created to improve state administration and communication across the expanse of $SWE$. It establishes a reliable network of couriers and waystations, and has become crucial for our military coordination, diplomacy, and governance."
 polhem_machina_nova: "Machina Nova"
 polhem_machina_nova_desc: "Christopher Polhem, dubbed the 'father of $SWE_ADJ$ engineering, has transformed $SWE_ADJ$ industry with his #italic Machina Nova#!, an innovative array of mechanical systems designed to streamline and boost production. Using intricate systems of gears, cams, and water power, Polhem has developed several machines capable of performing tasks previously done by hand, from ore-crushing in mines to textile weaving and sawmilling."
 swedish_copper_coins: "Swedish Copper Coins"
 swedish_copper_coins_desc: "The abundance of copper in $SWE$, primarily from the Stora Kopparberget mine in Falun, has prompted the country to use it as the main metal for minting a new national currency, the #italic daler#!. This is issued as a large money plate, called #italic plåtmynt#!, which can weigh up to 20 kilograms. Some argue that this might not be very practical and that the volume of money in circulation could exceed copper reserves, but they seem narrow-minded."
 
 
 combined_arms_advance_reformation: "Combined Arms"
 combined_arms_advance_reformation_desc: "Warfare is becoming increasingly complex, driven by the widespread adoption of standing armies composed of soldiers hired for permanent service. The introduction of new weapons, such as firearms and cannons, encourages an approach that balances and combines light and heavy infantry, cavalry, and artillery, supported by auxiliary units."
 combined_arms_advance_revolutions: "Advanced Combined Arms"
 combined_arms_advance_revolutions_desc: "The regular use of combined arms over several centuries has led to the dominance of this type of warfare. Light infantry and cavalry have the role of weakening and disorganizing enemy forces, while simultaneously screening and protecting their own. Heavy infantry and cavalry bear the brunt of the fighting, seeking decisive charges to rout the enemy, while artillery and auxiliary forces support them from a distance at the rear."


 
 #Hungary
 hun_composite_light_cavalry: "Composite Light Cavalry"
 hun_composite_light_cavalry_desc: "Made up of horse archers as well as swift horsemen, our light cavalry is the backbone of our military force. Our mounted forces have shown their mettle time and time again, and will inevitably lead our forces to glory once more."
 hun_castle_warriors: "Castle Warriors"
 hun_castle_warriors_desc: "The Castle Warriors, one of the most select classes in our society, are duty-bound to provide military service to their local #italic ispáns#! in royal castle districts. Stalwarts from the earliest days of our nation, these privileged landholders hold a unique position, actively defending their realm while cherishing their hereditary rights."
 hun_renaissance_knowledge: "A $renaissance$ Prince"
 hun_renaissance_knowledge_desc: "The peasants consider their ruler a just one because they are officially protected from having excessive demands and other abuses heaped upon them by magnates. The ruler of $HUN$ is a true $renaissance$ prince — a successful military leader and administrator, an outstanding linguist, and an enlightened patron of the arts."
 hun_bulwark_of_christianity: "Bulwark of $christian$"
 hun_bulwark_of_christianity_desc: "With $turkish_culture$ power rising in the south, it falls to the people of $HUN$ to defend faithful kingdoms from the $turkish_culture$ threat. Let it be known that we will not flinch from our sacred duty!"
 hun_found_the_black_army: "Found the Black Army"
 hun_found_the_black_army_desc: "Inspired by the writings of Julius Caesar, $HUN$ shall maintain a corps of professional soldiers. These warriors will be so fierce that our enemies shall whisper terrified tales of 'The Black Army' to their children at night!"
 hun_reformed_coinage: "Reformed Coinage"
 hun_reformed_coinage_desc: "To pay for our new professional army, we will need a steady stream of revenue. Reforming the coinage to standardize weights will make this much easier, because we shall know exactly how much people need to pay."
 hun_curtailed_peasantry: "Curtail Peasant Liberties"
 hun_curtailed_peasantry_desc: "$HUN$ is not blessed with protective natural frontiers. The wild plains that first brought our ancestors here were perfect for launching raids into the West, not for defense. If $HUN$ is to defend itself, we will need resources. The best solution is to allow our magnates to bind the peasants more closely to the land, ensuring greater productivity."
 hun_strengthened_towns: "Strengthen the Towns"
 hun_strengthened_towns_desc: "Towns are key factors in producing the wealth $HUN$ needs to grow and prosper. If we ensure the operations of our townships are protected from the power-hungry machinations of the nobility, they will continue to bring in trade, which we can tax."
 hun_hungarian_reformation_intro: "The ideas of the Reformation spread through $europe$ like wildfire, and as such were bound to find their way to our lands eventually."
 hun_hungarian_reformation: "$HUN_ADJ$ Reformation"
 hun_hungarian_reformation_desc: "$hun_hungarian_reformation_intro$ Our realm has been threatened by outside powers for long enough. By joining the Reformation and abandoning the duty of following the Pope like a lapdog, we can break at least one of the shackles oppressing us!"
 hun_the_catholic_shield: "The $catholic_ADJ$ Shield"
 hun_the_catholic_shield_desc: "$hun_hungarian_reformation_intro$ Yet, the hearts of the faithful remain strong. God and his loyal servants will withstand this heretical madness."
 hun_realm_of_many_religions: "Realm of Many Religions"
 hun_realm_of_many_religions_desc: "$hun_hungarian_reformation_intro$ Alas, the Reformation has split families apart, made former friends into enemies, and threatened the very stability of many nations. However, our realm knows better than to fall victim to this theological quarreling. We are a people and a realm of many religions, after all."
 hun_multi_culturalism: "Realm of Many Cultures"
 hun_multi_culturalism_desc: "The Carpathian Basin is home to more than just $HUN_ADJ$ people. $slovak$, $ruthenian$,$cuman_culture$, and $german_carpathian$ people, among many other different minorities, call our realm their home. Given this diversity, it is only natural that our government proficiently absorbs and adopts these different cultures into our state."
 hun_revolutionized_military_tactics: "Revolutionary Military Tactics"
 hun_revolutionized_military_tactics_desc: "As military technology advances, so do battlefield tactics. It is imperative to the survival of our state that we keep pace with the ever-evolving nature of land warfare."
 hun_hungarian_unity: "$HUN_ADJ$ Unity"
 hun_hungarian_unity_desc: "Although our subjects have faced many external threats over the years, the spirit and will of the $HUN_ADJ$ people remains unbroken. Unifying $HUN_ADJ$ hearts is greatly inspiring to our patriotic soldiers, who will defend our homelands to the last man."
 hun_hungarian_hussars: "$a_hungarian_hussars$"
 hun_hungarian_hussars_desc: "$a_hungarian_hussars_desc$"
 #
 salic_law_advance: "Salic Law"
 salic_law_advance_desc: "The rulership of women is not always respected — nor even permitted. As such, it is not uncommon for governments to pass laws directly barring women from inheritance, rejecting them in favor of their male siblings or cousins."
 partition_inheritance_advance: "Partition Inheritance"
 partition_inheritance_advance_desc: "Rivalries among royal offspring are not uncommon, as each one would like to be the ruler one day. To avoid such in-fighting, some monarchs choose to divide their territories and titles among all their sons, so that all of them are satisfied with a more or less equal share of the inheritance."
 
 national_assemblies_advance: "National Assemblies"
 national_assemblies_advance_desc: "$national_assemblies_desc$"
 enlightenment_advance: "Enlightenment"
 enlightenment_advance_desc: "The last century has seen Rationalism and Empiricism gain ever-increasing popularity among the greatest minds of the age. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth."
 distribution_of_power_advance: "$distribution_of_power_law$"
 distribution_of_power_advance_desc: "$distribution_of_power_law_desc$"
 industrialization_advance: "Industrialization"
 industrialization_advance_desc: "The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet."
 levee_en_masse_advance: "Levée en Masse"
 levee_en_masse_advance_desc: "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, unmarried recruits, the size of which will leave an indelible mark upon history."
 griot_advance: "Griots"
 griot_advance_desc: "The #italic griots#! are storytellers, historians, counselors, musicians, and poets all at once. They safeguard the stories and legends of past generations, mediate between warring parties, and serve both their rulers and local people as advisors."
 west_african_caravan_stop_advance: "Saharan $caravan_stop$"
 west_african_caravan_stop_advance_desc: "Trade between sub-Saharan $africa$ and $north_africa$ has been part of our identity for centuries. The journey across the vast desert, even with the many years of accumulated experience, is always taxing and dangerous. The key to securing trade in this region is the $caravan_stop$, a place where merchants and their caravans can rest and refresh themselves on their way through the desert."
 #Sunday Schools Generic
 sunday_schools_advance: "Sunday Schools"
 sunday_schools_advance_desc: "Educating the people is an important part of our religious duties. We should establish schools, closely tied to our normal worship services, to provide basic education to our flock."
 #catholic advances
 res_publica_christiana: "Universal $christian$"
 res_publica_christiana_desc: "We must pursue good relations with our fellow $christian_ADJ$ faithful of all denomination, even if we consider some of their practices to be heresy."
 roman_orthodoxy: "Roman Orthodoxy"
 roman_orthodoxy_desc: "The righteousness of the Roman $catholic_ADJ$ faith and its doctrines must remain unquestioned, in order to entrench its authority in the minds of our people."
 marian_devotion: "Devotion to the Virgin Mary"
 marian_devotion_desc: "Our dedication to the Virgin Mary must remain a central pillar of our worship."
 crusading_knights: "Baltic Crusades Experience"
 crusading_knights_desc: "In this country, we have a long tradition of sending our finest knights and aristocrats to spread the true faith to heathens in the $baltic_region$ and Mediterranean regions. We will fulfill our $christian_ADJ$ mission by bringing the faith to the unenlightened, while also acquiring experienced commanders for our armies."
 catholic_pilgrimages: "$catholic_ADJ$ Pilgrims"
 catholic_pilgrimages_desc: "The holy sites of our faith should be seen by every follower. Encouraging pilgrimages, and elevating those who have undergone the process, should be a priority of our administration."
 inquisition_advance: "Inquisition"
 inquisition_advance_desc: "The Inquisition was created in the 12th century as a means to combat the Cathar heresy, but its reach grew significantly in the Late Middle Ages as the main tool of the $catholic_ADJ$ Church to counter the spread of dissident doctrines."
 preaching_friars: "Itinerant Preaching Friars"
 preaching_friars_desc: "Preaching friars — members of $mendicant_orders$ like the Dominicans and Franciscans — have taken their ministry beyond the monastery walls to preach directly among the people. By supporting and praising them openly for these acts of devotion, we can strengthen religious conviction throughout the realm, even among the most remote peasants."
 devotio_moderna: "Devotio Moderna"
 devotio_moderna_desc: "The #italic Devotio Moderna#!, or modern devotional movement, is rapidly gaining popularity among members of our faith. We should implement some of their teachings into our court, so as to make ourselves appear particularly devout."
 denounce_heretics: "Denunciation of Heretics"
 denounce_heretics_desc: "We must ensure the supremacy of the one true faith, and denounce all criticisms of it as the bitterest of heresy."
 beguins_and_beghards: "Lay Religious Orders"
 beguins_and_beghards_desc: "Many of the faithful have devoted themselves to a life of prayer and good works, which usually comes with taking the veil or becoming a monk. However, they have not taken formal vows, and act without official $PAP_ADJ$ approval. Nevertheless, we should support these popular efforts to do good deeds and help our people."
 conquistador_advance: "Conquistadors"
 conquistador_advance_desc: "The discovery of the New World attracts adventurers of all stripes to risk their fortunes and lives on uncertain expeditions, with the promise of unparalleled wealth, fame, and power. These expeditions are formalized through agreements between expedition leaders and the government, legally manifested as 'capitulations of conquest'."
 grand_display_of_faith: "Grand Displays of Faith"
 grand_display_of_faith_desc: "To honor God, we need to construct great monuments in His name. Not only will this display our devotion to our faith, but it will also demonstrate the magnificent skills of our sculptors and architects."
 monastery_productions: "Monastic Frugality"
 monastery_productions_desc: "The holy occupants of our monasteries are bastions of sensible, frugal living. Our clergy should consider adapting their own lifestyles to more closely resemble those of these monks and nuns."
 reform_church_music: "Reformed Church Music"
 reform_church_music_desc: "We must accept the proposed reforms to our liturgical music. The diluted, soulless tunes currently in fashion can no longer be considered acceptable ways to express the glory of the divine."
 frequent_councils: "Frequent Councils"
 frequent_councils_desc: "It has been proposed that holding religious councils more frequently would prevent theological disputes and criticisms from festering unchecked. While we may not have full control over the curia, we can at least use our influence to encourage regular synods that address relevant issues before they can become crises."
 mendicant_orders: "Mendicant Orders"
 mendicant_orders_desc: "The orders of our faith, who have taken vows of poverty and live itinerant lives, have brought assistance to many remote parts of our country. We should support their efforts as much as we can without disrupting their holy missions."
 exsurge_domine: "Exsurge Domine"
 exsurge_domine_desc: "To eradicate the evil of heresy, the Lord Himself will arise and purge them from our lands!"
 confutatio_augustana: "Refute False Confessions"
 confutatio_augustana_desc: "In these turbulent times, we must clearly define orthodox $christian_ADJ$ doctrine, while systematically refuting the false beliefs that endanger the very souls of our people."
 roman_catechism: "Roman Catechism"
 roman_catechism_desc: "Our clergy must adopt the official Roman Catechism as their guide for instruction. This text will improve priestly education and ensure only consistent, orthodox teachings are transmitted to the populace."
 oversea_missions: "Overseas Missions"
 oversea_missions_desc: "Our clergy is ready and willing to spread our faith into new territories overseas. With their contribution, settling new lands will be made easier and cheaper."
 baptism_books: "Baptism Records"
 baptism_books_desc: "We must confirm baptism as an important cornerstone of our faith by keeping meticulous records of who in our population has or has not yet been baptized."
 second_scholasticism: "Second $scholasticism$"
 second_scholasticism_desc: "We will need to revive and refine the philosophical movement of medieval scholasticism."
 catholic_sunday_schools: "$sunday_schools_advance$"
 catholic_sunday_schools_desc: "$sunday_schools_advance_desc$"
 index_librorum_prohibitorum: "Index of Forbidden Books"
 index_librorum_prohibitorum_desc: "The dangerous ideas of the Reformation will spread like a toxic fungus in the minds of our subjects if they have access to written works propagating these silly thoughts! We must forbid certain dangerous texts, and keep a comprehensive list of which books are not allowed."
 catholic_cuius_regio_eius_religio: "Cuius Regio, Eius Religio"
 catholic_cuius_regio_eius_religio_desc: "#italic Whose realm, his religion.#! We will have to accept that other countries follow other faiths, and that this will sometimes be a crucial factor in diplomacy."
 embellish_baroque_art: "Promote Baroque Art"
 embellish_baroque_art_desc: "Our faith has a long tradition of sponsoring and promoting great works of art. The development of the splendid new Baroque style reflects the pathos and glory of our theology beautifully, and should receive particular sponsorship."
 national_churches: "National Church"
 national_churches_desc: "The State must take greater control over the Church in our land. We cannot allow foreign entities to exercise undue influence over our ecclesiastical administration; our Church must serve our realm first."
 entrenched_church: "Entrenched Church"
 entrenched_church_desc: "No matter which people we rule over, the Church provides a way to give them a unified structure."
 catholic_enlightenment: "$catholic_ADJ$ Enlightenment"
 catholic_enlightenment_desc: "For our faith to withstand the attacks of the Enlightenment, we must adapt, and present new perspectives in and about the Church."
 divine_church_music: "Divine Church Music"
 divine_church_music_desc: "Many of our composers have created their greatest works thanks to the inspiration provided by their faith. We should actively seek out the most talented artists and hire them immediately so as to never let our churches and cathedrals suffer from inferior music."
 continue_missionary_works: "Missionary Works"
 continue_missionary_works_desc: "Missionary efforts to carry our faith to the far corners of the world can never be considered finished. We need to sponsor more missions to further bring the light of $catholic$ to these unilluminated souls."
 #protestant advances
 protestant_invite_persecuted: "Welcome the Unwelcome"
 protestant_invite_persecuted_desc: "While we have seen the light of the true faith, many of our brethren suffer under the oppressive rule of misguided heathens. We should invite these people to settle in our lands, where they can process their faith without repercussions and, more importantly, contribute to our treasury."
 protestant_administration_tax: "Efficient Tax Collectors"
 protestant_administration_tax_desc: "Previously, the clerics shouldered a significant portion of the tax burden. While some of these structures have been dismantled in the wake of the Reformation, the capable common people are still around, and thus must help make up for that missing clerical revenue."
 confessio_augustana: "A New Confession"
 confessio_augustana_desc: "The Reformation gives us the opportunity to define a new creed for our people and, more importantly, to accept critique and make adjustments accordingly."
 devotionalism: "Devotionalism"
 devotionalism_desc: "We must revive Augustinian theology, and recognize that our beliefs are built on the emotions and fervor of the faithful."
 protect_the_new_faith: "Shield of the Faith"
 protect_the_new_faith_desc: "Our religion is beset on all sides by enemies. We will have to defend our rights to our own confession against the $catholic_ADJ$ oppressors."
 expulsion_of_heretics: "Expulsion of Heretics"
 expulsion_of_heretics_desc: "The troublesome heretics in our domain could easily foment rebellion against our ruler. It would be better if we redirected them to our overseas colonies instead, where they can cause less trouble."
 repurposed_monasteries: "Repurposed Monasteries"
 repurposed_monasteries_desc: "Former religious properties seized by the state during our national conversion process can serve us now in new ways, such as centers for production or administration."
 involved_laity: "Involved Laity"
 involved_laity_desc: "With the increased involvement of the laity in the day-to-day administration of our Church, our people have found a more personal connection to the faith itself."
 protestant_cuius_regio_eius_religio: "$catholic_cuius_regio_eius_religio$"
 protestant_cuius_regio_eius_religio_desc: "$catholic_cuius_regio_eius_religio_desc$"
 protestant_painters: "Protestant Art"
 protestant_painters_desc: "The Reformation has given our artists the opportunity to explore new themes, finally freed from the obligatory glorification of God. Hiring more of these artists will reflect well on us, and give us the reputation of being a great patron of the arts."
 protestant_sunday_schools: "$sunday_schools_advance$"
 protestant_sunday_schools_desc: "$sunday_schools_advance_desc$"
 protestant_work_ethic: "Diligent Workers"
 protestant_work_ethic_desc: "The influence of Puritan and Pietist preachers on the Reformation is undeniable. Their emphasis on virtues like diligence and frugality will help us to foster an industrious and dedicated workforce."
 embrace_romanticism: "Embrace Romanticism"
 embrace_romanticism_desc: "In the wake of the Enlightenment's emphasis on reason, we must not forget the power of emotion and imagination. By embracing Romanticism, which celebrates nature, folklore, and national character, our artists will produce works that stir the soul."
 wary_of_heretic_preachers: "Defense Against Heretics"
 wary_of_heretic_preachers_desc: "We will need to be wary of forces trying to convert our people, or seduce them back to our previous faith. By publicly declaring these preachers to be malicious and hostile, we can prepare our people for these interactions and more easily reinforce religious orthodoxy."
 protestant_innovation: "Protestant Innovations"
 protestant_innovation_desc: "Since the founding days of our faith, we have emphasized the inherent value of questioning established doctrines and beliefs. We should apply these same ethics to other fields of study."
