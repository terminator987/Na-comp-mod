 age_1_traditions: "Traditions"
 age_1_traditions_desc: "Different societies have been established all over the world for thousands of years, and their foundations can be framed in traditions such as $legalism$, $meritocracy$, or $feudalism$."
 age_2_renaissance: "Renaissance"
 age_2_renaissance_desc: "Societies affected by the $mge_pax_mongolica$, $islamic_golden_age$, and $renaissance$ in $europe$ are witnessing the emergence of a new era of knowledge, art, and innovation as a result of increased foreign interactions and the establishment of new institutions."
 age_3_discovery: "Discovery"
 age_3_discovery_desc: "As the Early Modern Era dawns, new continents are being mapped, while feudal society is slowly giving way to centralized states.\nFor an enterprising leader, this age is the perfect time to build the foundations of a globe-spanning empire..."
 age_4_reformation: "Reformation"
 age_4_reformation_desc: "From East to West, this is the age of religious conviction, debate, and mass movements. $protestant$ churches are entrenched in $europe$, millenarianism has taken hold of Iran, and $religious_syncretism$ shapes society in $india$."
 age_5_absolutism: "Absolutism"
 age_5_absolutism_desc: "As governments seize absolute authority over their countries, their devotion turns from amassing power to building empires. This is the age of the state; of rulers and their armies."
 age_6_revolutions: "Revolutions"
 age_6_revolutions_desc: "The Enlightenment's interrogation of rights, authority, and the nature of our world itself has led to widespread rejection of the old hierarchies. As absolutism crumbles before revolution, so too are kingdoms brought down to make way for republics..."
