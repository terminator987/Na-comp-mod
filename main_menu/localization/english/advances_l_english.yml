 #
 # Institutions
 feudalism: "Feudalism"
 feudalism_desc: "Over time, many societies develop stronger and more permanent institutions of government. After the fall of the Roman Empire, much of $europe$ gradually developed into a feudal system, a structure in which $peasants_estate$ performed labor on properties owned by wealthy $nobles_estate$ in exchange for protection and the right to use that land for their own purposes.\n\nFor similar reasons, parallel systems of land tenure and reciprocal obligation have formed across the world, some with roots that go even further back than European feudalism."
 legalism: "Legalism"
 legalism_desc: "The theories behind Legalism have been integral to $CHI_ADJ$ society for hundreds of years. The concept that strict laws, centralized authority, and bureaucratic efficiency lead to a stable, prosperous state with a powerful army is deeply rooted in many ideologies throughout $east_asia$.\n\nAs merchants and migrants facilitated the exchange of ideas across the world, Legalism entered the vast $muslim_ADJ$ sphere, where it became part of the symbiotic relationship between believers and non-$muslim_ADJ$ subjects.\n\nIn $europe$, Legalism emerged from the dying gasps of the Roman Empire. After its decline, its systematic legal codes were adapted and transformed into the foundational jurisprudence for many nations on the continent."
 meritocracy: "Meritocracy"
 meritocracy_desc: "Individuals of great prestige and power often appoint those closest to them to particularly influential positions.\n\nThe advent of Meritocracy as an institution and thought movement was largely popular in the courts of $CHI$. There, Confucius himself supported the notion that those who govern should do so on the basis of merit, not due to inherited status. This led to the replacement of the traditional $CHI_ADJ$ aristocracy with one based solely on merit.\n\nThe development of this institution would cause ripples across and beyond the borders of $asia$, eventually reaching the royal courts of $europe$, even those whose nobles had a crushing grasp on the mechanisms of power and authority."
 #
 renaissance: "Renaissance"
 renaissance_desc: "The wealthiest and most powerful citizens in the $ITA_ADJ$ city-states have been patronizing artists and scholars who are breathing new life into the classical ideals and aesthetics of their Greek and Roman forebears. As a cultural movement, the Renaissance has already had a profound impact on the literature, art, philosophy, and music of our region. Renaissance Humanism has developed into a fully-formed intellectual tradition ready to permeate all aspects of society; A true Renaissance Humanist is an expert in everything from politics and philosophy to art, textual analysis, music, and architecture.\n\nNew ideals for rulers — as well as those who are ruled — are spreading as quickly as printing presses can distribute copies.\n\nRenaissance ideals are now poised to reshape the world according to these sophisticated classical principles."
 banking: "Banking"
 banking_desc: "Moneylending has existed since metal-based coins first appeared in Antiquity. However, its availability is heavily dependent on the dominant people, culture, or religion of a given state.\n\nA shift occurred in the Middle Ages, encouraged by the renewed growth of long-range commercial activities on the Eurasian continent and its peripheries. Specialized moneylenders began to organize when $judaism_ADJ$ communities started operating between the $christian_ADJ$ and $muslim_ADJ$ worlds. However, the boom of credit demand that followed the Crusades in the 12th century encouraged merchants in the $ITA_ADJ$ city-states to create larger structures for moneylending, effectively founding the first banking institutions, such as the Peruzzi and Bardi houses.\n\nMore instruments were developed, like bills of exchange and debt bonds, and banking dynasties such as the $medici_dynasty$, $fugger_dynasty$, or $welser_dynasty$ soon became as powerful as states."
 professional_armies: "Professional Armies"
 professional_armies_desc: "Armies have existed since war was invented, many thousands of years ago. However, their form has changed over the centuries, and different types of recruitment and organization have developed in different cultures and periods.\n\nIn the Late Middle Ages, armies in many societies relied on levy systems, with knights and footmen forming a core that was levied seasonally. Some states, however, were powerful enough to finance standing armies, staffed by professional soldiers who would be available for duty throughout the year.\n\nThis system also developed in $europe$ after the outbreak of the Hundred Years War, being one of the main changes that promoted a military revolution in the Early Modern Age. Increasing the size and quality of professional armies, while finding new sources of revenue to finance them, soon became one of the main challenges for rulers around the world."
 #
 new_world: "New World"
 new_world_desc: "The discovery of the New World has ushered in a new era — not only for the colonizers and the colonized, but for many nations in the Old World, as colonial expansion has led to widespread availability of new resources and innovations, as well as a fuller realization of our vast world. As new animals, crops, precious metals, and diseases spread across the $atlantic_ocean_continent$, the first steps have been taken towards a truly global economy.\n\nWith foreign lands and peoples being mapped and documented, ideas as well as religious and philosophical debate are increasingly being colored by what we have found in overseas societies. Great minds feel the need to question what was once accepted as truth, and from $valladolid$ to Fatehpur Sikri, the nature of the world is now up for debate."
 printing_press: "Printing Press"
 printing_press_desc: "The ability to mass-produce the written word would revolutionize the spread of information and, in many ways, society as a whole. Pioneered by talented individuals, such as $VEN_ADJ$ printer Aldus Manutius, this new art helped fuel the $renaissance$ by making the translated classics more widely available. Later, the Reformation benefitted greatly from the ability to spread critical publications and translations of the Holy Scriptures.\n\nNow that printing has matured as a technique and spread throughout $europe$, hundreds of thousands of copies of everything from religious and political pamphlets, to scientific treatises, to etiquette guides are circulating the continent. With print shops growing ever more commonplace, rulers have found it hard to contain the new technique, as the comparatively easy means of production means censorship can be sidestepped by moving one's business across a border — or even just changing the name on a title page."
 pike_and_shot: "Pike and Shot"
 pike_and_shot_desc: "A new type of warfare began to develop at the end of the 15th Century, in the midst of the $ITA_ADJ$ Wars. The generalization of pikemen in the Late Middle Ages as an alternative to men-at-arms who could successfully face heavy cavalry charges was accompanied by the development of portable firearms, mainly matchlock arquebuses and muskets. The soldiers now adopt a new formation, in which the pikemen form a square, while the arquebusiers fan out to the sides and front, and seek cover behind or inside the square in case the formation enters close combat. This new type of formation, called Pike and Shot, was favored by $GER_ADJ$ #italic Landsknechts#! and $SPA_ADJ$ #italic Tercios#!, and was soon adopted by other armies, reigning supreme on the battlefields of $europe$ for nearly two centuries, until superseded in the early 18th Century by line infantry formations armed with new flintlock muskets mounting bayonets."
 #
 confessionalism: "Confessionalism"
 confessionalism_desc: "$catholic$ has been regarded as a unitary entity for a long time, but the advent of the various $protestant_ADJ$ faiths has put an end to that. Given the myriad of different interpretations of what the faith should be, $christian$ is anything but united. But whereas before any deviance from mainstream Church teachings could be easily labeled as heresy, the lines between the different sects have mercifully become blurrier.\n\nAs such, there has been an increasing interest both for religious and secular authorities alike to clearly define the shape of their specific doctrines, enforcing their particular rules and views on all aspects of faith and life. This allows them a more firm grip on the faith of their population, but also increases the differentiation, and thus animosity with all other forms of belief."
 global_trade: "Global Trade"
 global_trade_desc: "Goods have been moved across continents since antiquity. But where this was previously limited to a set number of routes and and specific goods, such as the manufactured products from $india$ and $CHI$ finding their way across the $indian_ocean_continent$ and along the Silk Road, trade is now increasingly becoming part of a greater world network. With the discovery of the Americas, establishment of sea routes around $africa$, and the crossing of the $pacific_ocean_continent$, local trade networks are being woven into a single, interconnected, world-spanning web.\n\n$silver$ mined in the $andes_region$ is now being shipped via $europe$ all the way to $CHHI$ and $india$, $iron$ mined and wrought in $scandinavian_region$ is being sold in $west_africa$ by $ENG_ADJ$ merchants, and others are making a fortune just by distributing $cloth$ and spices to traders from $south_east_asia$. Merchants in $india$ are even investing in future European trade ventures! It may still be early to speak of a truly global economy, but surely the first seeds have been sown."
 artillery_institution: "Artillery"
 artillery_institution_desc: "The invention of gunpowder in $CHI$ led to the development of a device that would employ its firepower in warfare: the artillery. Although artillery spread throughout $europe$ AND $asia$ in the 13th century, its widespread adoption as a weapon system did not happen until the 15th century, when improvements in cannon length and gunpowder composition made artillery powerful enough to pose a threat to the stone-built castles and fortifications common in $europe$. Soon artillery would be used not only in sieges, but also on battlefields, as smaller-caliber guns were mobile enough to be quickly deployed and used. Its final evolution as a key warfare system would come in the 18th century, especially after Napoleon perfected its use at crucial points during battles."
 #
 manufactories: "Manufactories"
 manufactories_desc: "While a number of technical innovations during the 16th and 17th centuries increased production output for some goods, such as $iron$ or $cloth$, the biggest industrial improvement came in the form of optimized organization. By creating manufactories, often outside city limits, merchant capitalists could both bypass the ancient guild laws that inhibited mass production and pioneer ways to increase output through the organization and specialization of centralized labor. The forerunners of later Industrialization were able to increase production by facilitating access to raw materials and organizing labor on a mass scale, rather than by investing in expensive new machinery. This was in itself a huge change from the often heavily regulated methods of old, and together with later technical advances, this new mode of production would come to revolutionize society."
 scientific_revolution: "Scientific Revolution"
 scientific_revolution_desc: "The world is smaller now than ever before. The rise of global trade and expansion of the printing industry have led to an increased flow of ideas, allowing for a more widespread dissemination of knowledge. This, in turn, resulted in a more thorough questioning and analysis of the reality of the world. What was once just accepted as fact is now questioned, what was only poorly understood is now observed, and what was only supposed has been tested.\n\nThe recent advancements in areas such as mathematics, physics, and biology are undeniable, but the real revolution is the change in the perception and approach towards science itself, and our way of understanding it. Systematic experimentation is the true scientific revolution, and it will completely change our conception of the world."
 military_revolution: "Military Revolution"
 military_revolution_desc: "The continuous state of war affecting $europe$ in the 16th and 17th centuries led to a sharp increase in the size of armies, a necessity born of the growing authority of competing absolutist regimes. The infantry is now armed en masse with flintlock muskets, greatly increasing their firepower and performance in battle by being deployed in the innovative line formation, which replaces the old $pike_and_shot$.\n\nOur military needs affect the capabilities of the state administration; it continues to expand to handle the manpower and finances required by this increase in the size of the military. This pressure has also led to the development of supply chains to feed and sustain armies, as well as intermediate depots that support the operational forces. The ultimate result of these advances would be a surge of wars between increasingly militarized countries throughout the 18th century."
 #
 enlightenment: "Enlightenment"
 enlightenment_desc: "Rationalism and Empiricism have gained incredible popularity among the greatest minds of the age. In letters, publications, and coffeehouses, intellectual giants from kings to scientists debate the merits of tolerance, advanced scientific methodology, and the spread of Enlightenment ideals to all of humanity. From universities and the courts of enlightened monarchs, expeditions are being sent to measure, catalog, and map the world so that we can better understand the laws governing everything around us. Other thinkers are more interested in the laws of society and try to better understand the Rights of Man.\n\nColossal undertakings, such as creating a complete encyclopedia of all knowledge or a complete index of all plants, animals, and fungi in the world, are being pursued for the greater good of humanity. The Light of Reason has been lit, and many will not rest until it has been brought to all corners of the earth."
 industrialization: "Industrialization"
 industrialization_desc: "The dawn of the 18th century has given rise to many new institutions as humanity's thirst for progress grows. Advances in the field of production and manufacturing, as well as the introduction of complicated machinery, will change the world as we know it on a global scale. The Industrial Revolution has brought about permanent change — not just to commerce and business, but to the social fabric of many nations. Inventions such as the power loom and steam engine shall push the capabilities of mankind to its highest zenith yet."
 levee_en_masse: "Levée en Masse"
 levee_en_masse_desc: "Warfare is an ever-evolving concept, having been studied and improved upon for generations and generations. We have witnessed the rise of powerful empires, each with its own ambitions. To satisfy the need for expansion and provide the fuel necessary to fulfill these ambitions, new nationwide conscription laws will be drafted. We shall raise armies of young, eager recruits, the size of which will leave an indelible mark upon history."
 #
 # Advances
 local_governor_advance: "$local_governor$"
 local_governor_advance_desc: "$local_governor_desc$"
 
 colonies: "Colonies"
 colonies_desc: "Be it by sending our own people to settle in new lands, by imposing our rule over the natives in our overseas holdings, or through a mix of both, establishing a colony creates a foothold for our power that will let us further expand our control — and borders — in these unclaimed territories."
 feudalism_advance: "Feudalism"
 feudalism_advance_desc: "Feudalism is a political system that is based on service or labor in exchange for holding and working land. It is a collection of rights and obligations to which each member of a structured societal model is bonded."
 horse_riding_advance: "Horse-Riding"
 horse_riding_advance_desc: "The domestication of horses has revolutionized the way people move and transport goods. Additionally, the use of horses in combat provides mounted warriors not only with a faster way of moving, but also a higher ground from which to attack their enemies — or even to crush them under the weight of their mounts."
 rights_of_man: "Rights of Man"
 rights_of_man_desc: "At the forefront of current revolutionary thought is the radical notion of equality for all. Philosophers from around the world have collaborated to create a document entitled the 'Declaration of the Rights of Man and of the Citizen', proclaiming that these rights are universal and should be enforced by law. It is likely that this will be ample fuel for popularizing the concepts of freedom and democracy, and we would do well not to lag behind other nations."
 rotherham_plough: "Rotherham Plough"
 rotherham_plough_desc: "The basic plow in use in $europe$ has been unchanged since Roman times. Now, thanks to an improved design, the same plow can be made much lighter, reducing the strain on draft animals and thereby getting more work out of them."
 modern_bureaucracy: "Modern Bureaucracy"
 modern_bureaucracy_desc: "In order to best utilize the lands and subjects we control, we must enlarge, reorganize, and professionalize our bureaucracy. We shall create organizations dedicated to administering specific aspects of the state, and thus eliminate the need for ad hoc solutions.\n\nLet us consult with our universities to determine how to most efficiently rule and govern. Meanwhile, we shall encourage our young nobles to serve the state with a pen rather than a sword in hand."
 separation_of_powers: "Separation of Powers"
 separation_of_powers_desc: "An incendiary, anonymous treatise on political theory has emerged. Despite efforts to suppress the text, it is spreading quickly across the world. It analyzes the nature of various forms of government, be they monarchies, despotisms, or democracies, and argues for a strict separation of the executive, legislative, and judiciary branches.\n\nThis separation would protect the people and limit monarchical, which is understandably a very popular prospect for many of our subjects. Despite the unfortunate implications for the ruler's authority, these ideas may well benefit our nation greatly."
 measuring_the_world: "Measuring the World"
 measuring_the_world_desc: "The new sciences have given us a number of different ways to describe and measure the world around us. However, we cannot know all of the resources that could be at our disposal until we have thoroughly searched all our lands for minerals, counted every last subject, and assessed every last enterprise. Let us command out scholarly experts to conduct a thorough survey — first of our nation, then of the entire world!"
 the_constitution: "The Constitution"
 the_constitution_desc: "A new philosophical concept called constitutionalism has been developed, wherein the government accepts legal limits to its power through established law rather than ruling by arbitrary decree. While some may find this idea intriguing, it is obviously not popular with monarchs..."
 absolute_rulership: "Absolute Rulership"
 absolute_rulership_desc: "Many people demand to be given a role in the government, but mostly because they want to be rewarded without expending much effort. The idea of absolutism has recently piqued our interest, as adopting it would empower us to dispose of those self-serving parasites and rule alone..."
 national_sovereignty: "National Sovereignty"
 national_sovereignty_desc: "The many long wars in the first half of the 17th century have led to an international diplomatic system for which the territorial integrity of states is a cornerstone. States, rather than individual rulers or supra-national groupings, are the actors in the international arena, and no state has the right to intervene in the internal affairs of another."
 military_administration: "Military Administration"
 military_administration_desc: "The ever-increasing armies of the 16th century have imposed equally heightened demands on national administrations. By creating a permanent organization charged with military supply strategy and operation, and by keeping more troops on the rolls even during winter or peacetime, we will ultimately be able to field large armies more cheaply and to support those armies more efficiently."
 early_modern_administation: "Early Modern Administration"
 early_modern_administation_desc: "Over time, it became apparent that a more centralized bureaucracy, with administrative bodies run by educated officials employed directly by the state, was a necessity to complete the ambitious projects of the Early Modern rulers."
 renaissance_thought: "$renaissance$ Thought"
 renaissance_thought_desc: "The notion of a noble oligarchy ruling over society is hardly new, having existed since at least Roman times. This system remains entrenched in the structure of many nations, and the idea is regaining popularity among those who matter..."
 medieval_administration: "Medieval Administration"
 medieval_administration_desc: "With a military elite in place to govern our society, the next stage of development is to build a literate class of administrators. Typically, these roles will be filled by drawing from the clergy."
 impulse_warfare: "Impulse Warfare"
 impulse_warfare_desc: "The introduction of light infantry troops has led to a significant change in warfare. Skirmishers are deployed forward in loose order to distract and harass the enemy before the main infantry attack, which is typically delivered in either a line or a column formation."
 line_infantry: "Line Infantry"
 line_infantry_desc: "With the invention of bayonets, each musketeer could also function as a pikeman. This allowed pikes to be removed from infantry equipment, and provided infantry formations with more firepower."
 gustavian_infantry: "Gustavian Infantry"
 gustavian_infantry_desc: "Gustavus Adolphus, ruler of $SWE$, made several innovations to his infantry that improved their performance. His formations were narrowed and made rectangular to increase the number of muskets that could fire in each volley, and the attachment of small artillery pieces further increased their firepower."
 standardisation_of_calibre: "Caliber Standardization"
 standardisation_of_calibre_desc: "With artillery's growing importance on the battlefield, the number of firearms kept increasing. But because each gun was made separately, it also required great effort to resupply. In 1544, in an effort to mitigate this, Emperor Charles V declared that there would be only five calibers of guns, while King Henry II of $FRA$ set the standard of calibers at six."
 maurician_infantry: "Maurician Infantry"
 maurician_infantry_desc: "The size and depth of the $spanish_square$ gave it staying power, but made it slow and cumbersome to maneuver on the battlefield. It also led to a large percentage of troops being inactive during battles. Maurice of Nassau, the Stadtholder of the $NED$, reduced the total number of men in the formation to make it more mobile and reduced its depth, so it maintained the same firepower and shock value."
 spanish_square: "Spanish Square"
 spanish_square_desc: "The Spanish Square evolved organically from the $pike_and_shot$ formation. At its core was a traditional pike square, and at each corner, it had a group of arquebusiers. This way, they maintained the staying power of the traditional pike square and enhanced it with the firepower of the arquebus."
 standardized_pikes: "Standardized Pikes"
 standardized_pikes_desc: "A pike is a remarkably simple weapon to make, but to get the full benefit from their use, the entire formation must be wielding weapons of similar length and blade."
 pike_square: "Pike Square"
 pike_square_desc: "Throughout the Middle Ages, the dominance of cavalry was challenged by disciplined pikemen. In battles such as Bannockburn or the Golden Spurs, the pikemen decimated the cavalry. A combination of improved training and discipline, and the addition of swordsmen to provide close combat support, has raised this formation to the peak of its efficiency."
 medieval_military: "Medieval Military"
 medieval_military_desc: "Over the past centuries, land armies have become more professional and well-organized. Better systems are in place to support the mix of levies and professional soldiers that now dominate the battlefields, and the infantry is slowly but steadily gaining power, poised to overtake that of the cavalry arm."
 insurance_companies: "Insurance Companies"
 insurance_companies_desc: "A further reduction of risk came with the development of insurance. By paying a small fee to an insurance broker, merchants could protect themselves against catastrophic losses. This reduced risk of investment led to a subsequent flourishing of trade."
 the_gold_standard: "The Gold Standard"
 the_gold_standard_desc: "The ongoing trade deficit between $europe$ and $CHI$ has caused a shortage of silver bullion not only in $europe$, but all over the world. Switching from silver to gold coinage will allow new coins to enter circulation and encourage trade to flow in ever greater amounts."
 joint_stock_companies: "Joint Stock Companies"
 joint_stock_companies_desc: "As trade grew, so did the associated risk. New ways of accumulating capital and managing this risk needed to be developed. In joint stock companies, the burden of enterprise was shared among their many shareholders."
 public_punishments: "Public Punishments"
 public_punishments_desc: "Life at sea is full of dangers, and thus the punishments need to be harsh. If wrongdoing is not thoroughly deterred, we will quickly run into trouble. Over time, a system of highly public punishments has evolved, and now the time has come to formalize those proceedings. This will greatly enhance discipline at sea."
 merchants_and_trade: "Merchants and Trade"
 merchants_and_trade_desc: "The patterns of trade had been seriously disrupted, possibly due to plagues and pandemics. Now trade is slowly beginning to recover."
 naval_ambitions: "Naval Ambitions"
 naval_ambitions_desc: "With an extra boost to naval morale, our sailors will conquer the waves and rule the seas. Meanwhile, our colonists will be able to brave the darkest corners of the world, founding new settlements farther from home than ever before."
 chartered_companies: "Chartered Companies"
 chartered_companies_desc: "The world is a big place, and in order to develop our global trade, we must take some serious risks. Luckily there are merchant in our country willing to do so, using mostly their own capital. By sanctioning such companies with a government charter giving them special rights to exercise government powers as well as monopolies in certain areas, we can control and encourage commercial development of everything from foreign trade networks to our colonial possessions overseas."
 development_of_maritime_law: "Development of Maritime Law"
 development_of_maritime_law_desc: "With more and more countries sending their subjects or citizens abroad on various trading ventures and with so many living so close to each other for so long times it has become absolutely essential to have at least a basic concept of common laws of the seas. With publications such as 'Mare Liberum' or the later 'De Dominio Maris Dissertatio', the foundations to an international law of the seas have been laid."
 basic_financial_instruments: "Basic Financial Instruments"
 basic_financial_instruments_desc: "Overseas trade is very risky, but also highly profitable. The development of financial instruments like letters of credit will help reduce that risk and increase our profits."
 naval_professionalism: "Naval Professionalization"
 naval_professionalism_desc: "Until the beginning of the 17th century, permanent navies were quite small, and even notable martitime powers mostly maintained only enough of a naval force to meet their immediate needs. Over time, however, many states have started moving in the direction of establishing larger professional navies. Unless we want to see our rivals overtake us in naval matters, we must strive to create a larger permanent navy with the proper administrative structures to support it. We should also ensure that a naval career can be a lifelong occupation for our officers."
 superior_ship_design: "Superior Ship Design"
 superior_ship_design_desc: "Building ships that are slightly faster than those of our opponents, even if the amount of this extra speed is so negligible that it is of no military significance, can still fill our crews with confidence and make our enemy wary of taking us on in an even fight."
 patron_of_art: "Patron of the Arts"
 patron_of_art_desc: "Our quest towards cultivating a culturally sophisticated society begins here. Our artistic creations will go down in history as the most marvelous wonders of this era."
 pragmatism: "Pragmatism"
 pragmatism_desc: "Too many countries let how other states perceive them shape their policies. That is foolish — if mercenaries are more suitable for our needs, we will use them instead of investing in an expensive standing army."
 knowledge_transfer: "Knowledge Transfer"
 knowledge_transfer_desc: "Preserving the experience and knowledge of our combat veterans is vital to properly training new recruits. We need to ensure that those who have served in combat pass on this knowledge to trainees through a system of mentoring."
 organised_recruiting: "Organized Recruitment"
 organised_recruiting_desc: "In days of yore, when a captain sought to fill the ranks of a regiment, the recruitment process was time-consuming, as not many people wished to embrace certain death in our armies. However, by applying the principles of reason to this problem, we will be able to come up with a system that will get fighters into uniform much quicker."
 optimism: "Optimism"
 optimism_desc: "Victory is not just won on the battlefield, but also in the drawing rooms. Our advancement of reason helps our people shrug off the effects of temporary setbacks, and prepare instead for our inevitable victory."
 formalized_officer_corps: "Formalized Officer Corps"
 formalized_officer_corps_desc: "Traditionally, our military officers come from the nobility, but we do not have enough people in that estate to fill the necessary roles. However, there are many skilled members of the lower classes in our armies who would do nicely — we should consider promoting some of them as professional officers."
 deus_vult: "Deus Vult"
 deus_vult_desc: "Join the battle cry of the Crusades — 'God wills it' — and crush the heretics!"
 missionary_schools: "Missionary Schools"
 missionary_schools_desc: "Although there is no shortage of people willing to spread the word of the true faith, most of them ultimately do more harm than good. However, establishing specialist schools to properly train missionaries will ensure we have more people who cannot only spread the faith, but do so successfully."
 church_attendance_duty: "Church Attendance Duty"
 church_attendance_duty_desc: "Adopting a mandatory church attendance policy will emphasize the importance of our religious values and beliefs, and will minimize the costs of maintaining law and order."
 divine_supremacy: "Divine Supremacy"
 divine_supremacy_desc: "It is of the utmost importance that we rid our nation and its surrounding borders of the non-believers that plague our lands."
 devoutness: "Devotion"
 devoutness_desc: "Religion is one of the most important bulwarks of our rulership. By making grand displays of our religious devotion in public, we will inspire the people to follow suit, and this proliferation of piety amongst our people will strengthen our rule."
 religious_tradition: "Religious Tradition"
 religious_tradition_desc: "The strength of our faith, and the impressive public displays of piety and worship we stage, are admired by other countries both near and far. This is a clear reflection of the prestige and glory of our realm."
 ecumenism: "Ecumenism"
 ecumenism_desc: "Determining how to deal with the heretics in our realm is always tricky. Although the good, old-fashioned fire-and-sword approach will solve most problems eventually, diplomacy can also succeed. By encouraging dialogue between the various sects, we can reduce misunderstandings and promote peace in the realm."
 advanced_bureaucracy: "Advanced Bureaucracy"
 advanced_bureaucracy_desc: "Allows us to increase our tax revenues by adopting a more bureaucratic administrative system governed by state officials."
 organised_construction: "Organized Construction"
 organised_construction_desc: "Upgrading our government's infrastructure is a costly business. However, if we structure the process correctly, we can do it for less expense."
 smithian_economics: "Smithian Economics"
 smithian_economics_desc: "By opposing mercantilism and restricting the state's influence in economic matters, we shall support a free market that will increase our overall production efficiency."
 national_bank: "National Bank"
 national_bank_desc: "By establishing a central authority for financial matters, we will have better control over our nation's economy."
 debt_and_loans: "Debt and Loans"
 debt_and_loans_desc: "Debt is sometimes simply unavoidable. However, an organized debt market will allow us to float loans at a lower interest rate."
 centralized_government: "Centralized Government"
 centralized_government_desc: "If we centralize the state, then we will find it easier to advance the ideas and agenda of the center over the other regions."
 nationalistic_enthusiasm: "Nationalistic Enthusiasm"
 nationalistic_enthusiasm_desc: "Giving our troops adequate support is vital to national defense. With our excellent administration, we are able to secure generous discounts on our military supplies."
 additional_colonists: "Additional Colonists"
 additional_colonists_desc: "The New World is many things, but the most important thing of all is that it is empty. Well, no one important lives there, at any rate. By letting people know of the boundless opportunities that await them in the New World, we will encourage more people to go forth and settle there."
 additional_merchants: "Additional Merchants"
 additional_merchants_desc: "Colonies are no good to us unless we can bring their riches home to the mother country. We must expand our merchant class to ensure that this happens."
 faster_colonists: "Faster Colonists"
 faster_colonists_desc: "You cannot simply send colonists out to the New World and expect them to just build a colony. There is first a time-consuming process of preparing the expedition with everything they will need to survive in their new home. We can speed this process up, now that we have some prior experience."
 additional_diplomats: "Additional Diplomats"
 additional_diplomats_desc: "The drive to expand our country means we must also expand our diplomatic reach. We must ensure that our diplomatic service is properly staffed."
 improved_shipyards: "Improved Shipyards"
 improved_shipyards_desc: "To defend our interests around the globe, we will require a strong [navy|e]. We must ensure our shipyards can produce ships as quickly as possible to replace any losses we may suffer."
 experienced_diplomats: "Experienced Diplomats"
 experienced_diplomats_desc: "Sometimes it is simply enough for people to #italic believe#! that we are powerful. We have worked hard on our diplomatic service to ensure that our word carries extra weight."
 competetive_merchants: "Competitive Merchants"
 competetive_merchants_desc: "To bring the focus of our trade home, we must be able to beat competition from other countries. We need to ensure that our legal system gives our merchants every possible advantage."
 organised_mercenary_payment: "Organized Mercenary Payments"
 organised_mercenary_payment_desc: "Mercenary captains are a canny lot. They will try to coax two commanders in the same army into a bidding war over their services. We must streamline our mercenary recruitment process to prevent this sort of trickery, and to ensure we are always in the best position during negotiations."
 benefits_for_mercenaries: "Benefits for Mercenaries"
 benefits_for_mercenaries_desc: "Mercenaries will always look out for themselves first, so we need to ensure that any we hire remain with us. By properly looking after our mercenary companies, they will stay loyal for longer and require less direct monetary compensation."
 organised_mercenary_recruitment: "Mercenary Recruitment"
 organised_mercenary_recruitment_desc: "Money is not the only limiting factor when it comes to recruiting mercenaries. The other bottleneck is finding mercenary companies who actually wish to serve with us. Thus, we must ensure our system allows every company to join us."
 bookkeeping: "Bookkeeping"
 bookkeeping_desc: "Sometimes money is short, and we need to borrow. Lenders always worry that they will not be paid back. By maintaining meticulous records, we will be able to ensure that everyone gets reimbursed, which will allow us to negotiate lower rates of interest."
 legislative_efficiency_idea: "Efficiency in Administration"
 legislative_efficiency_idea_desc: "The most important factor in efficient government is getting the right advice. We must ensure that we are as inclusive as possible when it comes to advisors, so we can maximize the number of different viewpoints we are presented with."
 resilient_state: "Resilient State"
 resilient_state_desc: "Every state faces times of decline. These times of weakness are often when the discontented and excluded feel empowered to rebel. If we build a solid administration that can stand resilient in the face of these upsets, we will be able to recover much quicker from this sad state of affairs."
 war_cabinet: "War Cabinet"
 war_cabinet_desc: "War is when the country is at its most vulnerable, and the stresses of wars can seriously undermine the ability to rule. By ensuring that key players in our administration are involved during times of warfare, we can avoid these problems."
 aristocracy: "Aristocracy"
 aristocracy_desc: "Aristocracy is a key part of any monarchy, as the nobles surrounding the royal dynasty are precisely what gives justification to the monarch. In the end, the concept of royal blood cannot exist without the corresponding concept of noble blood. As such, the aristocracy supports the monarch, but they expect to have some privileges in exchange for their loyalty, as they must never be confused with the common rabble."
 noble_knights: "Noble Knights"
 noble_knights_desc: "Supporting cavalry requires an economic system that produces a large number of surplus horses. If we were to guarantee the privileges of our nobility, not only would they be much happier, but they would do much of the work to produce the much-needed horses. Our court fool described it as 'service guarantees serfs.'"
 serfdom: "Serfs"
 serfdom_desc: "Being a foot soldier in the army is exactly a dream career, what with the poor food, low pay, and virtually nonexistent medical services. Therefore, recruitment attempts are often a fruitless affair. If we were to tie our peasantry to the land, however, we would always know exactly where to find recruits."
 noble_officers: "Noble Officers"
 noble_officers_desc: "The choice of who leads our troops is a crucial one, and our nobles wish to ensure that preference is given to them when it comes to filling these roles. It will give them a chance to show their valor by giving the enemy cold steel, and we will allow them to do this."
 local_nobility: "Local Nobility"
 local_nobility_desc: "The nobles know they are simply better than other people, and will only give their loyalty to those they deem worthy. If we affirm their privileges, they will of course remember our generosity, and be more resistant to the temptations of foreign powers."
 international_nobility: "International Nobility"
 international_nobility_desc: "International relations is a tricky business. Some say that the merchant class, who are used to dealing with foreigners, are best suited for this. Those who say so, however, ignore the kindred ties that our noble families have established through the years. We should take advantage of these ties to help our cause diplomatically."
 noble_resilience: "Noble Connections"
 noble_resilience_desc: "The various mercenary groups on this continent are often headed by lesser nobles. By befriending the aristocracy, we can use their network of contacts to seek out more — and larger — groups of mercenary soldiers."
 military_traditions: "Military Traditions"
 military_traditions_desc: "The nature of war is constantly evolving, and we must ensure that perceptions of our military evolve with it. By encouraging a tradition of service amongst our nobility, we shall entrench the idea that high social status is earned through glory on the battlefield. While bravery and combat skill remain important, true military excellence now lies in professional expertise rather than nebulous things like personal valor."
 tradition_of_payment: "Tradition of Payment"
 tradition_of_payment_desc: "It is always tempting to be a little late paying soldiers of fortune — after all, you never know what sudden expenses might come along. But we will #italic not do that#!; we shall pay our mercenaries exactly on time, and mercenary captains will know this and remember this."
 abolished_serfdom: "Abolished Serfdom"
 abolished_serfdom_desc: "We know from reading ancient Roman accounts that a citizen army of free men is far more willing to fight than those who are forced. We should give our peasants a relative amount of freedom; they will then fight more fervently to defend their homeland — and those privileges."
 bill_of_rights: "Bill of Rights"
 bill_of_rights_desc: "By granting the citizens certain fundamental rights, we will reduce the likelihood of a peasant uprising."
 free_merchants: "Free Merchants"
 free_merchants_desc: "In more reactionary and hidebound societies, merchants are looked down upon as somehow being less than those who own land. Well, this foolish attitude is not for us; we know that wealth is power regardless of where it comes from."
 free_subjects: "Free Subjects"
 free_subjects_desc: "Although giving a servant a damn good thrashing might be satisfying, it is surprisingly not the best way to make them work harder. Some natural philosopher has stumbled upon the idea of making profit the prime motivation for working people. If we replace monetary rents with payment in kind, our peasant laborers will be incentivized to produce more."
 humanist_tolerance: "Humanist Tolerance"
 humanist_tolerance_desc: "By striving to create a more tolerant society, and attempting to solve our social and religious problems in more rational ways, the risk of civil disorder will be diminished."
 emancipation: "Emancipation"
 emancipation_desc: "For a long time, we have restricted land ownership to only those we felt were trustworthy enough. If we were to lift these restrictions, then land holdings could be consolidated. This in turn would create a pool of seasonal labor for whom the army life might be worth pursuing."
 dynamic_court: "Dynamic Court"
 dynamic_court_desc: "A truly innovative court is one where any person may rise to prominence. We must strive to make sure that old traditions, as well as prejudices around one's birth or level of wealth, do not hinder the development of our court or act as a barrier to talented people wishing to serve our state."
 innovativeness: "Thirst for Knowledge"
 innovativeness_desc: "Natural curiosity, and the desire to understand our world and how it functions, is what pushes us forward. Our people are eager to gain knowledge, and it is this spark in their minds that will ignite progress for our nation."
 economic_ideas: "Subservient Economy"
 economic_ideas_desc: "The economy and wealth of a country should serve the government, not the opposite way around. As such, it is in the state's best interests to accumulate the lion's share of resources, both as a show of our power and in order to better carry out our will. Only with this system can our nation truly prosper."
 expansionism: "A Seed Among Thorns"
 expansionism_desc: "The world is huge, and we should not grow complacent with our position in it, for our neighbors will not necessarily do the same. We shall set our sights on expanding our borders and making ourselves stronger, lest we risk being swallowed up by growing neighbor states."
 formal_administration: "Formal Administration"
 formal_administration_desc: "Correct procedures and a well-oiled administrative apparatus result in a prosperous country, for without a proper administration, anything that the state attempts to accomplish will just remain fruitless. We will formalize and standardize our administration, so that the will of the state flows through it naturally to all corners of the nation."
 plutocracy: "The Power of Coin"
 plutocracy_desc: "Wealth and power are not synonyms, but they are certainly related: Not only can power make someone wealthy, but wealth can also grant someone power. We understand that well, as our wealthiest members of the population are also the ones who occupy the seats of power in our country."
 rebellion_support: "Undercover Contacts"
 rebellion_support_desc: "These are turbulent times, and not everyone is happy with who rules over them. By contacting these dissatisfied groups abroad, we may be able to turn them to our cause and persuade them to incite a revolt, which would be a devastating tool for destabilizing our enemies."
 privateers: "Privateers"
 privateers_desc: "Waging war on enemy commerce is at the apex of naval warfare. We shall encourage the crustiest, saltiest seadogs we can hire to strike at the heart of the enemy's trade, which should help refill our own coffers quickly."
 vetting: "Vetting"
 vetting_desc: "Because so many of our government positions are held by those seeking to advance themselves, we sometimes find that those who run our administration are susceptible to bribes from foreign powers. Running some simple background checks will weed out the officials most prone to corruption."
 rumourmongering: "Rumor-Mongering"
 rumourmongering_desc: "Enemies are vulnerable on all fronts. Poison in the right ear can be just as deadly as ten thousand soldiers. We must be ready to practice all the shadowy arts we may need to win..."
 efficient_spies: "Efficient Spies"
 efficient_spies_desc: "Most peasants would happily sell their own mother for gold, but there are some with skills and talents that we in the government might find very useful for...ah, #italic statecraft#!. Although finding these worthy commoners is difficult, through experience we are learning to separate the wheat from the chaff."
 shady_recruitment: "Shady Recruitment"
 shady_recruitment_desc: "Our ability to identify and recruit excellent operatives from the very lowest classes has created an excellent smokescreen: It could in no way be #italic us#! compelling these miscreants to do our secret bidding! Which is exactly what we wanted them to think..."
 destabilising_efforts: "Destabilizing Efforts"
 destabilising_efforts_desc: "Our espionage skills allow us to target the very stability of the enemies. We have the power to turn their greatest friends into their enemies..."
 espionage: "Espionage"
 espionage_desc: "Allows us to train more spies and thereby increase our chances of obtaining political and military information about our enemies."
 foreign_embassies: "Foreign Embassies"
 foreign_embassies_desc: "Diplomacy is a delicate balancing act that requires us to balance the needs and desires of multiple entities at the same time. Maintaining embassies in other countries that report to us on a regular basis will give us the information needed to better weigh our diplomatic options."
 claim_fabrication: "Claim Fabrication"
 claim_fabrication_desc: "Claiming something as yours is easy; persuading everyone else that your claim is valid is much harder. By spreading our diplomatic net wide, we can ensure that the people who matter know that we have staked this claim."
 cabinet: "Cabinet"
 cabinet_desc: "By establishing an executive council, we are able to assemble our most skilled diplomats."
 adaptability: "Adaptability"
 adaptability_desc: "There is what is ours, and what is part of our ancestral domain that will never be surrendered. A bit of flexibility in defining these 'ancestral' borders will lead to more land being accepted as our rightful territory, and should the worst happen, the whole world will know our crusade to recover it will be just."
 revolution_and_counter: "Revolution and Counter-Revolution"
 revolution_and_counter_desc: "With the politics of the time becoming more polarized and more radical, we may have no choice but to wage war on governments that are not the same as our own."
 diplomatic_influence: "Diplomatic Influence"
 diplomatic_influence_desc: "By focusing on diplomacy, we can increase the power we wield on the world stage, and win many friends and potential allies."
 flexible_negotiation: "Flexible Negotiation"
 flexible_negotiation_desc: "You can never quite predict what could be gained during peace talks, so we should enter with all options open."
 agent_training: "Agent Training"
 agent_training_desc: "We have many covert operations planned, but lack sufficient agents to carry them out. Establishing a training method for our spies will help bolster the ranks of operatives available for dangerous missions."
 additional_loyalist_recruitment: "Additional Loyalist Recruitment"
 additional_loyalist_recruitment_desc: "Naturally, there are those within our subject nations who recognize our divine right to rule. By recruiting and aiding these enlightened individuals, we can strengthen our grasp on these territories."
 audit_checks: "Audit Checks"
 audit_checks_desc: "While we work to infiltrate other nations, we must be vigilant of poisonous ideas spreading around our own courts. Assembling an audit team to ensure our ministers are acting in the state's interest should help root out any rotten elements."
 grand_army: "Grand Army"
 grand_army_desc: "Allows us to create one of the largest and most powerful armies the world has ever seen."
 glorious_arms: "Glorious Arms"
 glorious_arms_desc: "The sight of our glorious and prestigious army will make all adversaries tremble in fear."
 bayonet_leaders: "Bayonet Leaders"
 bayonet_leaders_desc: "Men who are well-led will follow, so we must ensure that our officers lead from the front."
 battlefield_commisions: "Battlefield Commissions"
 battlefield_commisions_desc: "Allows us to focus heavily on military advancements and thereby increase our Army Tradition."
 improved_foraging: "Improved Foraging"
 improved_foraging_desc: "Traditionally, we were unable to fight effectively in lands that did not supply enough food. However, our troops have become better at acquiring food in the wild, making it possible for larger armies to fight."
 improved_manuever: "Improved Maneuver"
 improved_manuever_new: "Improved Flanking Range"
 improved_manuever_desc: "Tactical positioning is a vital skill for any commander. The ability to maneuver troops effectively around the battlefield will give us a significant edge."
 engineer_corps: "Engineer Corps"
 engineer_corps_desc: "Allows us to gather the greatest technological minds our nation has to offer, and make use of their unrivaled services."
 military_drill: "Military Drill"
 military_drill_desc: "Allows us to invest in military training and thereby improve battle formations, weapon handling, and our army's morale."
 regimental_system: "Regimental System"
 regimental_system_desc: "By organizing our armies into regiments tied to distinct geographical areas, we allow them to put down roots in local communities. Then, we need to raise additional battalions for these regiments, recruitment will be faster thanks to these regional ties."
 defensive_mentality: "Defensive Mentality"
 defensive_mentality_desc: "There are those who think that attack is the best form of defense, but that is foolish. Let our enemies come to us instead; we shall counter with incredible zeal. Our troops will defend their homes tenaciously, and our fortresses will withstand sieges for longer."
 superior_firepower: "Superior Firepower"
 superior_firepower_desc: "The use of massed firepower to disrupt the enemy before delivering a coup de grâce is one of our army's strengths, and we will make sure that our leaders know this."
 supply_trains: "Supply Trains"
 supply_trains_desc: "While on campaign, attrition is our most formidable foe, and the key to defending our men against it is a well-planned and efficiently run logistic network capable of providing ample support and supplies."
 national_conscripts: "National Conscripts"
 national_conscripts_desc: "Increases our military numbers by making military service compulsory for those eligible."
 shrewd_commerce_practice: "Shrewd Commerce"
 shrewd_commerce_practice_desc: "Allows us to make use of more refined trading practices, giving our merchants the upper hand over our competitors."
 free_trade: "Free Trade"
 free_trade_desc: "Our leading merchant families wish to secure trade privileges as their exclusive preserve, but we are unwilling to do so, and will therefore allow the growth of the merchant class."
 merchant_adventures: "Merchant Adventures"
 merchant_adventures_desc: "This allows us to make use of the numerous traders lusting for fame and fortune, eager to offer their services for a chance to search and explore new trade routes."
 national_trade_policy: "National Trade Policy"
 national_trade_policy_desc: "By adopting a national trade policy, we can strengthen our commercial presence and increase the effectiveness of our trade."
 overseas_merchants: "Overseas Merchants"
 overseas_merchants_desc: "To expand trade, we need to extend the rights of citizenship to people who live abroad, support our trade, and are of the right social class."
 trade_manipulation: "Trade Manipulation"
 trade_manipulation_desc: "At those key choke points where trade supremacy could go one way or another, edging out the regional competition is crucial to expanding our trade income."
 fast_negotiations: "Fast Negotiations"
 fast_negotiations_desc: "Sometimes the key to closing a trade deal is to be the quickest one. We must ensure that our merchants can always successfully close their deals."
 colonial_ventures: "Colonial Ventures"
 colonial_ventures_desc: "Enables us to send more colonists to uncharted lands."
 quest_for_the_new_world: "Quest for the New World"
 quest_for_the_new_world_desc: "Allows us to join the nations set to explore the world outside their borders, or strive to be the first nation to circumnavigate the globe, by commencing a quest for the New World."
 overseas_exploration: "Fortune-Seekers"
 overseas_exploration_desc: "Establishing colonies in distant lands is nearly always a one-way trip for those involved. Even if strange new diseases do not take you or unforgiving terrain does not starve you, the amount of time it takes to sail back means you will most likely never come home. While these realities are discouraging to some, if we remind people of the potential riches to be gained from colonial life, we can encourage them to settle lands further afield despite the dangers."
 land_of_opportunity: "Land of Opportunity"
 land_of_opportunity_desc: "By portraying our colonies and the surrounding unclaimed lands as places where anyone can make their fortune, we will rapidly increase emigration to our colonial holdings. This means the nation will spend less money encouraging people to go there."
 vice_roys: "Viceroys"
 vice_roys_desc: "Makes it possible for us to establish Viceroys, therby improving the administration of our colonies and increase the amount of money they generate."
 free_colonies: "Free Colonies"
 free_colonies_desc: "Only so many people are willing to move abroad to expand our great colonial empire. However, the promise of a plot of land to farm in freehold will encourage many more people to seek their fortunes abroad. The nice thing about this is that there is plenty of land for everyone!"
 global_empire: "Global Empire"
 global_empire_desc: "Our commitment to our colonial empire has transformed attitudes towards working in the colonial administration. No longer seen as a haven for fortune-seeking freebooters, it is now regarded as a prestigious career for the brightest and best. This shift is reflected in more efficient tax collection."
 formal_diplomacy: "Formal Diplomacy"
 formal_diplomacy_desc: "At a time where power is shifting from the hands of powerful individuals towards control by a centralized authority, it is wise to build bridges and open channels of communication between us and our neighbors. Diplomacy is key, and more so than ever in the face of these rising powers."
 explorer_commisions_advance: "Explorer Commissions"
 explorer_commisions_advance_desc: "Beyond our shores lie uncharted lands, ripe for the taking! We shall recruit brave explorers to set course for the unknown and bring back exotic goods. This is a vital — and possibly very lucrative — opportunity for us."
 offensive_army: "Offensive Army"
 offensive_army_desc: "The era of gunpowder and military innovations is upon us, and with it comes a renewed interest in and vitality to the conduct of warfare. To further our glory, we must diligently ensure high standards for our offensive armed forces."
 defensive_army: "Defensive Army"
 defensive_army_desc: "The rise of many powerful states around us has hastened our need for a robust defensive force, as we intend to maintain our territorial integrity. Knowledge of our homeland's native terrain, hidden paths, and regional tactics will see us through this turbulent period."
 national_trade: "National Trade"
 national_trade_desc: "Cloth, wool, and other sought-after commodities have made their way across the world. At an age where a nation's commerce reaches faraway shores, we must make sure our merchants always have the advantage!"
 exploration: "Exploration Ideas"
 exploration_desc: "Our naval superiority allows us to project power well past our own horizons, extending a natural claim to distant lands as our own by right of discovery."
 superior_seamanship: "Superior Seamanship"
 superior_seamanship_desc: "Enables us to transform our navy into a supreme naval force with top-class vessels and highly skilled captains and crew."
 naval_glory: "Naval Glory"
 naval_glory_desc: "The awesome sight of our glorious navy will make all adversaries tremble in fear!"
 grand_navy: "Grand Navy"
 grand_navy_desc: "Allows us to create one of the largest and most powerful navies the world has ever seen."
 sea_hawks: "Seahawks"
 sea_hawks_desc: "Allows us to focus heavily on military advancements, and thereby increase our Naval Tradition."
 excellent_shipwrights: "Excellent Shipwrights"
 excellent_shipwrights_desc: "By gathering the best shipbuilders our nation has to offer, we are able to build us a navy of modern vessels unmatched in craftsmanship and maneuverability."
 naval_fighting_instruction: "Naval Fighting Instruction"
 naval_fighting_instruction_desc: "Allows our naval veterans to devise new methods to improve our navy's efficiency in blockades."
 press_gangs: "Press Gangs"
 press_gangs_desc: "Life at sea is hard and unforgiving, and not everyone is keen on a naval career. By legalizing the impressment of sailors and other skilled seafarers, it will be easier to crew our ships, speeding up the process of commissioning ships as well."
 quality_education: "Well-Trained Forces"
 quality_education_desc: "The most crucial time for any army comes after battle. Win or lose, troops are most vulnerable when they are exhausted. We must ensure that our troops are highly trained and can recover easily from combat, lest our enemies take advantage of us in moments of weakness."
 finest_of_horses: "Finest of Horses"
 finest_of_horses_desc: "How steadily those troops take the ground! How beautifully those cavalry form! Fine horses with well-trained riders are a hallmark of any modern fighting force, and ours are particularly impressive."
 oak_forests_for_ships: "Oak Forests for Ships"
 oak_forests_for_ships_desc: "The more punishment our ships can take, the more they can dish out. Let us ensure that we have a ready supply of the finest seasoned oak for our warships."
 private_to_marshal: "Private to Marshal"
 private_to_marshal_desc: "Every private has a marshal's baton in his back. Well, perhaps not exactly, but for those who distinguish themselves in battle, promotion and rewards will follow. The troops know this and are inspired by it."
 naval_drill: "Naval Drill"
 naval_drill_desc: "The confusion of combat can leave a warship unfit for action for a long time. A well-drilled crew will recover much faster than an ordinary one."
 merchant_marine: "Merchant Marine"
 merchant_marine_desc: "Let every merchant ship fly our emblem with pride and know that our navy will always be there to protect them, if needed."
 massed_battery: "Massed Battery"
 massed_battery_desc: "Let us mass our artillery in a single grand battery. Its destructive power will blast a hole in the enemy lines!"
 benefits_for_horseowners: "Benefits for Horse Owners"
 benefits_for_horseowners_desc: "Life is cheap, but horses are expensive. If we set up a system of benefits for those who own horses, we will have more to choose from when the need arises."
 the_old_and_infirm: "The Old and Infirm"
 the_old_and_infirm_desc: "Our veteran sergeants are some of the most despicable and corrupt men imaginable, but that does not mean they are useless. Rather than leave them to be beggars on our streets when their service ends, we can put these old dogs to work. We shall make them into drill sergeants and quartermasters so that their unique skills can be put to use."
 the_young_can_serve: "The Young can Serve"
 the_young_can_serve_desc: "How old does a boy have to be before he is a man? How old must he be before he can die for his country? Some rulers are squeamish; We, on the other hand, are an equal opportunity butcher."
 enforced_service: "Enforced Service"
 enforced_service_desc: "The principle of volunteering underpins our whole army structure, but sometimes there are simply not enough willing conscripts. We should force — erm, #italic encourage#! people to volunteer."
 ships_penny: "Ship's Penny"
 ships_penny_desc: "Ships are expensive to build and maintain. By imposing a ship's penny — a small tax levied on trade or port activities — we can ensure our fleet remains strong without draining our treasury."
 standardized_artillery: "Standardized Artillery"
 standardized_artillery_desc: "Each iron founder jealously guards his secrets and techniques, treating every cannon as a bespoke work of art. While this may flatter their egos, it is far from ideal when we are trying to order munitions. From now on, we will insist that all cannons be made to our own exact specifications. This should reduce costs as well as improve production."
 mass_army: "Mass Army"
 mass_army_desc: "We have, up to now, been very selective about who can serve as an enlisted member of our military. We only took the poorest and most desperate — basically, the people no one else would miss. Now, though, we shall open up the ranks to everyone who wishes to serve and has no significant wealth to speak of."
 mercenary_contracts: "Mercenary Contracts"
 mercenary_contracts_desc: "By drawing up standing contracts with select mercenary captains, we can ensure that we will always have access to a large pool of mercenaries to draw upon, should they be needed."
 local_traditions: "Local Traditions"
 local_traditions_desc: "Governing a large nation means ruling over diverse peoples, each with their own customs and traditions. By incorporating these traditions into our official code of laws, we will create a happier and more loyal populace."
 indirect_rule: "Indirect Rule"
 indirect_rule_desc: "Sometimes the best way to get people to do what you want is to let them believe that they have had a choice in the matter. A system of indirect rule like that will reduce the unrest in newly acquired provinces, giving them the impression that they have more self-determination than they truly do."
 cultural_ties: "Cultural Ties"
 cultural_ties_desc: "Different cultures have different customs, and for some reason, they tend to resist attempts from their rulers to change said customs. We can turn this weakness into a strength by incorporating local leaders into our system of government and having them carry out our will in a way that will be palatable to their people."
 benevolence: "Benevolence"
 benevolence_desc: "Our nation is a bastion of tolerance and enlightenment. By ensuring that all other nations know this, we can foster better relations abroad."
 establish_cadet_branches: "Establish Cadet Branches"
 establish_cadet_branches_desc: "Inheritance can be a tricky business. By clearly defining roles and rights for our dynasty through cadet branches, we can ensure a more stable line of succession."
 tribute_system: "Tribute System"
 tribute_system_desc: "Strengthen our income by establishing a formalized system of yearly tribute from our vassals."
 integrated_elites: "Integrated Elites"
 integrated_elites_desc: "By bringing the ruling elite of our subject nations into our government, we can significantly streamline the process of integrating their provinces."
 state_propaganda: "State Propaganda"
 state_propaganda_desc: "As with a man, a nation's reputation is everything, and the establishment of an official propaganda service will ensure our good name is not smeared by the lies of our enemies."
 postal_service: "Postal Service"
 postal_service_desc: "With communications being what they are, it is difficult to ensure that our diplomatic dispatches arrive in a timely fashion. Creating a network of post offices and courier rest stops will make it easier for our voice to be heard in distant lands."
 marcher_lords: "Marcher Lords"
 marcher_lords_desc: "By granting considerable autonomy to vassals in border regions, these 'Marcher Lords' will be able to raise large military armies to support us in our wars."
 boarding_parties: "Boarding Parties"
 boarding_parties_desc: "By teaching our naval officers to lead boarding actions against enemy ships, we can gain an edge in naval combat even when fighting superior enemy [navies|e]."
 improved_rams: "Improved Rams"
 improved_rams_desc: "The concept of outfitting warships with rams goes back thousands of years, but great advancements in metallurgy have been made since then, and we should take advantage of these to create sturdier rams."
 naval_cadets: "Naval Cadets"
 naval_cadets_desc: "By promoting the navy as the ideal career choice for second and third sons of the aristocracy, we can create a professional corps of naval officers to oversee our gunnery crews."
 copper_bottoms: "Copper Bottoms"
 copper_bottoms_desc: "Wood may be the ideal material for shipbuilding, but it tends to deteriorate over time. By fitting our ships with copper sheathing below the waterline we can reduce this deterioration, allowing them to better withstand long journeys."
 escort_ships: "Corvettes"
 escort_ships_desc: "Corvettes are a class of small warships that are designed to escort friendly vessels and harass the enemy, relying on speed and maneuverability rather than massed firepower."
 national_arsenal: "National Arsenal"
 national_arsenal_desc: "By establishing a national arsenal where our warships can be built and maintained according to uniform standards, we can field a larger navy."
 garrison_conscription: "Conscripted Garrisons"
 garrison_conscription_desc: "By conscripting our able young citizens for our garrisons, we can ensure that we have enough guards to defend our borders."
 expanded_supply_trains: "Expanded Supply Trains"
 expanded_supply_trains_desc: "Investing more resources into our supply trains will allow our army to operate for longer periods of time in hostile territory."
 sheltered_ports: "Sheltered Ports"
 sheltered_ports_desc: "It is an unfortunate fact that ships tend to be damaged during battle, and equally unfortunate that the damage can rarely be repaired at sea. To alleviate this problem, we will create a system of sheltered ports along our coastline where our ships can patch themselves up."
 diplomatic_corps: "Diplomatic Corps"
 diplomatic_corps_desc: "Through the establishment of a professional diplomatic corps, we will ensure that the hard-earned knowledge of senior diplomats is passed on to the younger generation."
 civil_servants: "Civil Service"
 civil_servants_desc: "Establishing a civil service of eager young bureaucrats will ensure that we can quickly adapt to new advances in administration and governance."
 free_cities: "Free Cities"
 free_cities_desc: "Giving our cities self-governance in matters of trade will allow us to open new, profitable trade routes."
 preaching_missions: "Preaching Missions"
 preaching_missions_desc: "Establish missionary expeditions that will ensure that our population worships the one true faith."
 marine_regiments: "Marine Regiments"
 marine_regiments_desc: "Marines are military units that specialize in amphibious operations. They can be used in raiding shores and boarding enemy vessels, while still seeing action on land."
 discipline_drills: "Disciplined Drills"
 discipline_drills_desc: "During combat, only three things matter: firepower, manpower, and the discipline to combine the two. Regular military drills and exercises shall elevate our to a new standard."
 open_levy_standards: "Open Levy Standards"
 open_levy_standards_desc: "What makes a man willing to fight and die for his country? Is it his faith? Loyalty to his nation? Or is it simply a desire to protect his family? In the end, the answer does not matter, as everyone has the duty of serving under our banner."
 influence: "Pressuring Diplomacy"
 influence_desc: "Ending a war requires negotiations between the two opposing parties, and sometimes one party proves itself too stubborn to accept defeat. In such cases, the art of diplomatic pressure — and gently reminding them of their potential imminent annihilation — shall motivate them to accept our generous terms more easily."
 divine_passion: "Divine Passion"
 divine_passion_desc: "Times are changing. Faith was once the most important thing in our lives, but now, ideas once seen as blasphemous are spreading among the common folk. In the face of an evolving world, our clergy finds solace in their unshaken dedication to our cause."
 servants_of_god: "Servants of God"
 servants_of_god_desc: "Being a cog in this heavenly machine is a great honor; our people find deep purpose in serving God's will. This belief that we collectively serve divine purpose makes the heart of our people beat with thunderous acclaim."
 by_the_grace_of_god: "By the Grace of God"
 by_the_grace_of_god_desc: "The world was created with flames, and in flames shall we all end. Our god has gifted the fire of life to us humble mortals, burning our souls in the process and making us see the truth of its danger. Thou shall not be afraid."
 state_of_clerics: "State of Clerics"
 state_of_clerics_desc: "The nature of a theocracy is held in its proximity to the divine. To achieve this closeness, many actions of our government are carried out by the clergy, combining religious ritual with the bureaucratic duties of administrators."
 friends_in_high_places: "Friends in High Places"
 friends_in_high_places_desc: "There is only one path that will lead us to undying, everlasting happiness. To know the divine is to also know its sacred agents on this Earth, who will help us find that path."
 flesh_is_weak: "Flesh is Weak"
 flesh_is_weak_desc: "The flesh may be weak and corruptible, but the soul is not. Our armies have learned to fight as if they shared the same soul, and thus their morale can never be broken."
 alpha_and_omega: "Alpha and Omega"
 alpha_and_omega_desc: "Our faith is the beginning and end of all things. The voice of our god shall be the only sound that our enemies hear above the screams of the battle; the words of our faith shall lead them to the truth."
 conviction_of_sin: "Conviction of Sin"
 conviction_of_sin_desc: "Those who have done wrong will fall to their knees under the heavy weight of their own wickedness! Their evil deeds shall haunt them forevermore, and they will not sleep until they have atoned for the devious nightmares they themselves have caused."
 martyrs: "Martyrs"
 martyrs_desc: "A martyr is someone who understands that dying on behalf of their faith is the highest of honors. The people of our land keep their faith close to their hearts, and are always keen to join our cause. If they die as martyrs, it is an honor and not a tragedy."
 cultural_acceptance_advance: "Cultural Acceptance"
 cultural_acceptance_advance_desc: "It is apparent that as we absorb other peoples into our nation, the foreign traditions they bring with them may cause friction with our own. One way of resolving this is to simply tolerate such foreigners as if they were our own kinsmen, and not to attempt to subdue them to our culture."
 unlock_traditional_galley_advance: "$n_traditional_galley$"
 unlock_traditional_galley_advance_desc: "$n_traditional_galley_desc$"
 
 hollander_beater: "Hollander Beater"
 hollander_beater_desc: "For centuries, paper mills have relied on mechanical hammers to beat lumpen paper pulp, crushing the fiber to create the raw material needed to then create paper. Using local windmills for power, enterprising artisans have now devised a more efficient solution: the 'Hollander Beater', a vat containing a wind-powered horizontal roller with blades. These blades can shred as much pulp in hours as the old hammers did over days."
 faceting: "Faceting"
 faceting_desc: "Master gemcutters have made a breakthrough in diamond-cutting by experimenting with diamond dust suspended in oil on their scaifs. This allows the artisans to cut stones in entirely new shapes, and to a much higher brilliance. The resulting technique, known as faceting, produces a stone of a pleasing geometric shape and with better optical qualities. As the new stones, and the technique for cutting them, spreads across courts and workshops, the demand for jewelry and precious stones increases greatly."

 maritime_decay_advance_disc: "Established Routes"
 maritime_decay_advance_disc_desc: "The seas are constantly crossed by eager merchants searching for the best profit. This naturally evolves into certain routes becoming more established and frequented than others, with the most popular ones seeing a steady steam of ships sailing back and forth."
 rgo_logistics_discovery: "Local Storehouses"
 rgo_logistics_discovery_desc: "If merchants and artisans can access the products they need locally, that would not only ease the burden of their work, but keep prices from being excessively high. To that effect, storehouses will serve as local distribution hubs to supply everyone's needs."
 port_cost_distance_from_capital_advance: "Experienced Captains"
 port_cost_distance_from_capital_advance_desc: "Not every scallywag is worthy of being a captain; only the most experienced and skillful of them will lead our vessels. Such salty seadogs should be capable of safely finding their way back to port even in the fiercest of storms."
 land_morale_attrition_cost_advance: "March Training"
 land_morale_attrition_cost_advance_desc: "It is common for armies to have to march great distances in order to reach their enemy. As such, long marches are a staple of our military training regimen, accustomizing our fighters to walking long distances and still arriving fresh for the battle."
 land_morale_movement_cost_advance_disc: "Coordinated March"
 land_morale_movement_cost_advance_disc_desc: "An army on the move is vulnerable, and prone to disorganization. Training our troops to march in an organized and coordinated manner ensures that they will retain their battle formations, even if attacked while moving."
 trade_through_owned_disc_advance: "Merchant Trails"
 trade_through_owned_disc_advance_desc: "Merchants rarely stay still in one place, always trying to find the most profitable trades. Their constant coming and going is a common sight in our lands, and over time they have beaten their own paths to shorten the journey to their destinations."
 hire_artist_cost_modifier_advance_disc: "Land of Culture"
 hire_artist_cost_modifier_advance_disc_desc: "Culture and the arts define the identity of any country. By proudly promoting our cultural achievements, we will leave a lasting impression on the entire world."
 rural_rgo_disc_advance: "Developing Settlements"
 rural_rgo_disc_advance_desc: "Any settlement, no matter how small, will thrive as long as the land is rich and there are people willing to work it. Even the smallest village can become prosperous and bustling with activity over time."
 leader_recruit_cost_advance: "Officer Schools"
 leader_recruit_cost_advance_desc: "Leading troops is not an easy task. Strategy, tactics, mental insight — these are just some of the skills a successful leader must have. Founding officer training schools will ensure that more of our fighting men develop good leadership skills, and give us a bigger pool of expert commanders to draw from as well."
 morale_recovery_rev_dip_choice: "Established Rest"
 morale_recovery_rev_dip_choice_desc: "No army can exist in a permanent state of action; all soldiers need time for rest and recovery. By establishing guidelines and procedures for them to rest, without permitting any laziness, we can keep our troops in prime condition."
 merchant_power_from_maritime_rev_dip_choice: "Merchant Fleets"
 merchant_power_from_maritime_rev_dip_choice_desc: "Merchant ships have become a common sight in our waters. Our traders have so many vessels going back and forth that they have effectively formed their own fleet."
 administrative_leadership: "Administrative Leadership"
 administrative_leadership_desc: "A military leader must not only know about military matters. Logistics, supply administration and allocation, monetary expenses, and similar topics are all also critical concerns for any successful military campaign."
 cultures_capacity_mil_choice: "Multicultural Ambitions"
 cultures_capacity_mil_choice_desc: "A country's expansion will inevitably result in it bringing other cultures into its fold. Thus, if we want to further expand our borders, we need to be prepared to become more multicultural."
 rgo_logistics_mil_choice: "Improved Storehouses"
 rgo_logistics_mil_choice_desc: "Having proper storehouses to hold the products required by local businesses is a must if we want those enterprises — to say nothing of the entire economy — to function smoothly."
 land_morale_movement_cost_rev_choice_mil: "Unrelenting Advance"
 land_morale_movement_cost_rev_choice_mil_desc: "Our armies on the march is a sight to behold. Their training and discipline shines when they march in unison into battle, unfazed by any previous long march."
 port_cost_distance_from_capital_choice_mil: "Coastal Patrols"
 port_cost_distance_from_capital_choice_mil_desc: "Maintaining regular patrols along all our coasts will ensure that our administrative authority is felt everywhere, even in the farthest regions."
 protected_harbor_advance: "$protected_harbor$"
 protected_harbor_advance_desc: "$protected_harbor_desc$"
 a_bedouin_cavalry_advance: "$a_bedouin_cavalry$"
 a_bedouin_cavalry_advance_desc: "$a_bedouin_cavalry_desc$"
 repair_at_sea_aod: "Professional Crews" #Age of Discovery
 repair_at_sea_aod_desc: "While the latest advances in naval craftsmanship are pushing the boundaries of sailing as we know it, we need any crewmen on said ships to know how to fully exploit these new capabilities. Only training permanent professional sailors will allow them to correctly perform the necessary tasks to maintain these cutting-edge new ships."
 repair_at_sea: "Coastal Careening" #Age of Absolutism
 repair_at_sea_desc: "Ships are undertaking longer voyages than ever before, made possible by new technical advances. This means more complex repairs are needed, but ports with adequate equipment and skilled craftsmen are not always available. Our sailors must be trained in the art of careening — deliberately beaching vessels to expose the parts that need cleaning or repair. This is the only way our fleets can maintain seaworthiness far from their home ports."
 repair_at_sea_aorev: "Parliamentary Heel" #Age of Revolutions
 repair_at_sea_aorev_desc: "This advanced form of careening is performed in deep coastal waters. Heavy cargo is shifted to one side of the ship to make it heel, allowing the crew to access the opposite side of the hull for repairs without needing to beach the vessel and wait for low tide as with regular careening."
 blast_furnace: "Blast Furnace" #Age of Discovery
 blast_furnace_desc: "A more expensive method than traditional metallurgy, the use of blast furnaces allows us to further refine pig iron into cast iron by re-melting it with different quantities of iron, steel, limestone, and charcoal. Cast iron made into wrought iron this way creates an excellent material for making complex products such as cannon."
 saiger_process_discovery: "Refined Saiger Process"
 saiger_process_discovery_desc: "Improved processing and work methods will allow our $silver$ and $lead$ mines to prosper."
 slitting_mills: "Slitting Mills" #Age of Reformation
 slitting_mills_desc: "These are a new type of watermills developed for slitting bars of $iron$ into rods. This allows for more efficient development of $iron$ tools and machinery, as it allows casters to use rods that more appropriate for their needs compared to bigger bars, wasting less byproduct in the forging process."
 coke_blast_furnace: "Coke Blast Furnace" #Age of Absolutism
 coke_blast_furnace_desc: "This is a new type of blast furnace, which uses coke instead of charcoal as its fuel. It is cheaper and allows us to build larger furnaces, although coke has the disadvantage of being less pure than charcoal, which is a problem yet to be addressed."
 hot_blast_furnace: "Hot Blast Furnace" #Age of Revolutions
 hot_blast_furnace_desc: "The problems posed by the coke blast furnaces, especially the amount of impurities the coke creates in the final cast iron, has led to the development of the hot blast. It not only greatly reduces the use of coke, therefore improving the quality of the $iron$, but also allows the use of raw mineral coal as fuel if available, which is a great step forward in $iron$ metallurgy."
 new_currency_demands: "New Currency Demands"
 new_currency_demands_desc: "The discovery of new lands has also led to an increased flow of trade. This has in turn caused a rise in the demand for coins, and although the noble metal currencies made of $goods_gold$ and $silver$ remain the main values, other lesser metals like $copper$ and its alloys have seen their use and circulation increased."
 powerful_statues: "Impressive Statuary"
 powerful_statues_desc: "A prosperous country is the true sign of a strong ruler, but the people will only believe that a ruler is strong if they are depicted as such. To that effect, many rulers commission statues of themselves, often made out of stone or bronze, to project an image of strength and power to any who look upon their rendered visages. However, these displays of ego are not always effective, and sometimes only result in great amounts of materials being moved around."
 renaissance_sculptures: "$renaissance$ Sculptures"
 renaissance_sculptures_desc: "The $renaissance$ has brought with it greater interest in arts in all forms. It seems that nowadays no one is anybody if they do not have a piece of art adorning their homes! Sculptures are one of the most prolific forms of artistic expression, which has led to an increase in the number of quarries as demand for $stone$ has risen dramatically among the artistically inclined."
 green_vitriol: "Green Vitriol"
 green_vitriol_desc: "Although not technically the same substance as $alum$, $green_vitriol$ has been traditionally conflated with it in alchemical writings, and both have similar properties. As such, it is not uncommon to use one as a substitute for the other."
 shared_products_procedures: "Shared Products and Procedures"
 shared_products_procedures_desc: "The world has become smaller, and we have encountered a plethora of new peoples and undiscovered territory. Along with these discoveries, we have also come into contact with many new products and ways of utilizing them. Even the most specialized goods, like $alum$, can be used in other ways in other places."
 ostentatious_clothing: "Ostentatious Clothing"
 ostentatious_clothing_desc: "It is the right and duty of the ruling classes to display their power through their appearance. As such, they are wearing increasingly flamboyant attire, making use of the latest techniques to achieve vibrant and luxurious colors and patterns."
 riches_of_foreign_coasts: "Riches of Foreign Coasts"
 riches_of_foreign_coasts_desc: "Distant lands have brought to us many resources, but not only the lands themselves are rich. Coasts and seas are also plentiful, and the knowledge we have gained from foreign pearl divers allows ours to be more successful in their catches."
 foreign_mining_techniques: "Foreign Mining Techniques"
 foreign_mining_techniques_desc: "Precious stones have been appreciated by humanity for millennia. By coming into contact with foreign peoples from faraway lands, we can learn not only about the types of $gems$ they value most, but also about the techniques they use to obtain them."

 windmills_advance: "$windmill$"
 windmills_advance_desc: "$windmill_desc$"
 local_smelters_advance: "$local_smelters$"
 local_smelters_advance_desc: "$local_smelters_desc$"
 
 
 corps_organisation: "Esprit de Corps"
 corps_organisation_desc: "Traditional armies relied on furious discipline to maintain order in the ranks. By appealing to unit pride, however, we can reach even higher levels of discipline."
 open_sea_exploration: "Overseas Exploration"
 open_sea_exploration_desc: "The vast seas promise us great riches and new opportunities for trade on distant shores."
 napoleonic_warfare: "Napoleonic Warfare"
 napoleonic_warfare_desc: "Sieges are a costly and time-consuming occupation for our army. Instead of focusing on every fortification in our way, we need to dedicate our tactics entirely to landing the decisive blow that will win us the war."
 march_to_the_sound_of_the_guns_advance: "$march_to_sound_of_guns$"
 march_to_the_sound_of_the_guns_advance_desc: "With the steady growth of our army, our logistical needs have changed. Our generals will adopt 'march to the sound of guns' doctrine — ordering dispersed forces to move toward battle independently when they hear fighting. This enables rapid reinforcement without having to await orders."
 country_unification_advance: "Subject Supervision"
 country_unification_advance_desc: "The earlier we start integrating the administration of our subjects to follow the rules of our own, the easier the integration of other matters will be. Creating a permanent liaison with our subjects will make this process significantly smoother."
 renaissance_urbanisation: "$renaissance$ City Planning"
 renaissance_urbanisation_desc: "Accounting for dedicated areas for resource exploitation during the planning phase will allow our urban centers to produce more goods than before."
 renaissance_city_rights: "Formal City Rights"
 renaissance_city_rights_desc: "By establishing that only our ruler can grant city rights, we centralize control over urban development and give our administration a clear overview of the state of our country."

 absolutism_control_decline_advance: "Absolutist Administration"
 absolutism_control_decline_advance_desc: "Absolutist rulers not only demonstrate their power in court, but also through an administrative apparatus that may spread throughout the country."

 construction_speed_renaissance: "Mason Guilds"
 construction_speed_renaissance_desc: "Freemasons rely on broader associations, known as guilds, to share and preserve their knowledge and experience in a system where veteran masons teach younger apprentices."
 construction_speed_discovery: "Standardized Planks and Bricks"
 construction_speed_discovery_desc: "The standardization of plank and brick production using more modern techniques aims to enable easier construction."
 construction_speed_reformation: "Architectural Treatises"
 construction_speed_reformation_desc: "The writing of architectural treatises, which often compile centuries-old knowledge, allows for faster learning and dissemination of effective construction techniques."
 construction_speed_absolutism: "Architectural Engineering"
 construction_speed_absolutism_desc: "Building construction has become more sophisticated over time, incorporating methods and techniques from a wide range of disciplines, commonly considered a type of engineering."
 construction_speed_revolutions: "Cast Iron Structures"
 construction_speed_revolutions_desc: "The development of more advanced metallurgy of wrought and cast iron allows for more elaborate metallic structures, such as pillars and columns, which makes building construction much faster."

 apothecary_advance: "$apothecary$"
 apothecary_advance_desc: "$apothecary_desc$"
 unlock_handgonners_advance: "$a_handgonners$"
 unlock_handgonners_advance_desc: "$a_handgonners_desc$"
 manufactories_advance: "Manufactories"
 manufactories_advance_desc: "Recent technological advances in mechanization have facilitated the rise of concentrated production facilities in the form of manufactories. These businesses have helped us greatly improve the rate and quality of production."
 scientific_revolution_advance: "Scientific Revolution"
 scientific_revolution_advance_desc: "Recent developments in mathematics, physics, astronomy, biology and chemistry have not only challenged, but completely changed our view of the world around us. Society is progressing at a greater speed than ever before, and more scientific breakthroughs are made every day."
 military_revolution_advance: "Military Revolution"
 military_revolution_advance_desc: "War never changes, but the manner of waging it does. Recent arms developments have proved that the old ways of fighting are obsolete, and armies have experienced a full paradigm shift. Adapting to those changes is the only way to continue being a strong military power."
 power_projection_advance_5: "Absolutist Ambitions"
 power_projection_advance_5_desc: "As state power becomes increasingly centralized, rulers across the world have begun to envision themselves as absolute sovereigns over their respective territories. Like the sun that illuminates the entire world, they seek to be the sole source of authority, their will extending unchallenged across every corner of their domain."
 absolutist_court: "Absolutist Court"
 absolutist_court_desc: "Authority has become increasingly centralized in the person of the ruler. Courtiers and officials now serve as extensions of royal will rather than autonomous actors. This concentration of authority allows rulers to enact their wishes more quickly and efficiently."
 government_size_absolutism: "Loyal Subordinates"
 government_size_absolutism_desc: "Concentrating power in the hands of the rulers allows them to take direct action, but they still need people under them to help carry out those actions. Giving those subordinates no real power, while making them unfailingly loyal to the ruler, allows the $crown_estate$ to host more of them without fear of infighting or discontent."
 naval_doctrines_advance: "Naval Doctrines"
 naval_doctrines_advance_desc: "Naval warfare has seen many changes in recent years, with ships and fleets both becoming larger and more specialized. As a result of this, different countries are starting to use a variety of tactics and doctrines, tailored to their strong points or their particular way of using their fleets."
 global_supply_limit_modifier_advance_5: "Army Logistics Planning"
 global_supply_limit_modifier_advance_5_desc: "How far an army can march is a consequence of its logistics. With proper study and planning, armies can withstand longer and more distant campaigns."
 rgo_size_advance_absolutism: "Physiocracy"
 rgo_size_advance_absolutism_desc: "Recent developments in economic thought have shifted the focus from the mercantilist ideals of value lying in trade towards the notion that value lies in the production process itself. As a result, production has been steadily improving and increasing."
 food_advance_absolutism: "Closed Fields"
 food_advance_absolutism_desc: "Until recently, land ownership and use was relatively common and free. However, there is now an increasing tendency to start a process of specific land delimitation, clearly determining the borders and size of fields exclusively dedicated to agriculture. With this kind of specified use, their production and exploitation can be greatly increased."
 naval_morale_advance_5: "Permanent Fleets"
 naval_morale_advance_5_desc: "The global expansion of trade and commerce demands permanent naval forces to protect national interests. Maintaining an established, ever-present standing navy will allow ships to operate more effectively together as a fleet."
 new_world_advance: "New World"
 new_world_advance_desc: "As the $FLO_ADJ$ navigator Amerigo Vespucci says, the lands discovered by Columbus are not the Indies but, in fact, a whole New World unknown to our ancients and waiting to be mapped and claimed."
 colonial_charters: "Colonial Charters"
 colonial_charter_progress_tt_title: "Colonial Charter Progress"
 colonial_charters_desc: "These new documents will ensure the rights of our countrymen when they settle the untamed New World. They give our colonies the exclusive right of governing these new lands and regulate their relationship with the mother country."
 plantation_buildings_advance: "Plantations"
 plantation_buildings_advance_desc: "The mild climate and abundant fertile lands of the New World make the Colonies the ideal location for producing very profitable crops like $sugar$ and $tobacco$."
 diplomatic_range_age_1: "Foreign Envoys" 
 diplomatic_range_age_1_desc: "Diplomacy between countries has always been important. However, the art of diplomatic maneuvering is growing in intensity and complexity, and it has become common to send our envoys ever further afield than before to expand our foreign relations."
 diplomatic_range_age_2: "Diplomatic Network"
 diplomatic_range_age_2_desc: "Maintaining an established network of skilled diplomats around us allows us to send envoys to countries even further away."
 diplomatic_range_age_3: "Embassies"
 diplomatic_range_age_3_desc: "The current international situation requires that we set up permanent offices for our diplomats in neighboring countries. It is the only way to ensure that our interests are upheld in our region while we extend our reach beyond it."
 trade_envoys: "Trade Envoys" 
 trade_envoys_desc: "With the recent increase in trade to and from faraway lands, our envoys have started joining trade expeditions to establish diplomatic contacts with countries that were previously out of our reach."
 diplomatic_range_age_5: "Diplomatic Missions"
 diplomatic_range_age_5_desc: "The complexity of modern politics can no longer be handled by single envoys. To expand our influence even further and protect our interests in those faraway places, we will send skilled teams of expert diplomats to each country."
 diplomatic_range_age_6: "Global Embassies" 
 diplomatic_range_age_6_desc: "With every nation trying to expand its reach even farther, the world has become more interconnected than ever before. Only establishing permanent embassies all over the globe can allow this interconnectivity to sustain itself."
 new_world_crops: "New World Crops"
 new_world_crops_desc: "The bountiful lands of the New World have provided many treasures to our country. One of the most important discoveries is that of the strange, exotic plants cultivated as food and spices by the natives of those lands. Growing those crops in our fields will provide our population with the dietary variety and novelty they crave."
 rgo_size_advance_discovery: "Advanced Extraction Techniques"
 rgo_size_advance_discovery_desc: "The discovery of new minerals and the invention of new tools has resulted in more efficient resource gathering and production line acceleration."
 printing_press_advance: "Printing Press"
 printing_press_advance_desc: "The popularization of printing techniques this century has resulted in the wider spread of knowledge, as well as easier exchange of information, by speeding up the duplication of important manuscripts."
 gov_reform_discovery_a: "Early Administrative Reformation"
 gov_reform_discovery_a_desc: "Our people stand at the threshold of a new era. In order to harness our internal capabilities, we must adapt our government and refine our administrative domain."
 government_size_discovery: "Early Administrative Capacity"
 government_size_discovery_desc: "Our domain consists of many administrative sectors, and as we expand it, we must make the necessary adjustments to our government to account for this growth. "
 power_projection_advance_4: "Domineering External Influence"
 power_projection_advance_4_desc: "Our presence at the diplomatic tables always conveys an air of grandeur and prestige. Our voice and influence shall resonate with all those with whom we engage."
 regulate_court_procedures: "Regulate Court Procedures"
 regulate_court_procedures_desc: "By applying a strict regimen and routine to our operations, we will reduce any potential excess cost, and run a frugal and efficient court."
 pike_and_shot_advance: "Pike and Shot"
 pike_and_shot_advance_desc: "A new type of warfare has emerged on the battlefield: Pikemen form a defensive square, while arquebusiers fan out to the sides and front, retreating behind or inside the square in case the formation enters close combat."
 lazaretto_advance: "$lazaretto$"
 lazaretto_advance_desc: "$lazaretto_desc$"
 pest_house_advance: "$pest_house$"
 pest_house_advance_desc: "$pest_house_desc$"
 naval_morale_advance_2: "Navigation Techniques"
 naval_morale_advance_2_desc: "Our sailors are becoming accustomed to longer journeys, using a new set of techniques and instruments, such as dry compasses, to improve their mastery of navigation."
 confessionalism_advance: "Confessionalism"
 confessionalism_advance_desc: "There are a myriad of different interpretations of what the Faith should be, and as such, there has been an increased interest among religious and secular authorities alike to clearly define the methodology of their specific confessions, enforcing their particular rules and views on all aspects of faith and life."
 global_trade_advance: "Global Trade"
 global_trade_advance_desc: "Goods have been moved across continents since antiquity, but all trade is now increasingly becoming part of a greater world network. It may still be early to speak of a truly global economy, but surely the first seeds have been sown."
 artillery_institution_advance: "Siege Artillery"
 artillery_institution_advance_desc: "The invention of gunpowder in Sòng $CHI$ has led to the development of a new device that employs its firepower in warfare: the artillery. These weapons pose a serious threat to stone-built castles and other fortifications."
 gov_reform_reformation_a: "The Prince"
 gov_reform_reformation_a_desc: "Current events have determined that rulers need to approach the management of the state more systematically, taking into account both the different estates of the country, and the distinct diplomatic actors that surround them."
 power_projection_advance_3: "Regional Ambitions"
 power_projection_advance_3_desc: "The ability to project power beyond our borders is of vital importance to maintaining relevance on the regional stage. By studying the strategies of great powers past and present, we can elevate our nation's prestige everywhere and leverage that reputation to exert power."
 confessional_court: "Confessional Court"
 confessional_court_desc: "Court expenses can easily bankrupt even the richest nation. In order to achieve a good balance between luxury and sensible expenses, we can adopt small measures to reduce those costs without reducing the magnificence of our court."
 rgo_size_advance_reformation: "Spinning Wheels"
 rgo_size_advance_reformation_desc: "As we learn new and better methods of resource extraction, our production will skyrocket, making us richer in the process!"
 food_advance_reformation: "Market Agriculture"
 food_advance_reformation_desc: "New and improved crops can be introduced to increase agricultural productivity. Whether through selective breeding of existing varieties or importing superior foreign cultivars, we can significantly boost our food production."
 scientific_experimentation: "Scientific Experimentation"
 scientific_experimentation_desc: "Things happen for a reason. By understanding the explanation behind everything, we can learn what to expect when similar situations arise."
 banking_advance: "Banking"
 banking_advance_desc: "Moneylending is old as time, but it is not without risks. We can minimize said dangers if we institutionalize those practices and see that money is loaned under controlled and fair stipulations."
 trade_companies_advance: "Trade Companies"
 trade_companies_advance_desc: "It has always been plain that money makes the world go 'round. With desirable new products constantly being discovered in distant lands, trade companies that specialize in distributing them are sure to reap enormous profits."
 naval_morale_advance_3: "Overseas Expeditions"
 naval_morale_advance_3_desc: "The recent rise of long-range overseas commerce has accustomed our sailors to being at sea for long periods of time, making them resistant to the adverse effects of long journeys."
 road_advance_1: "Road Network"
 road_advance_1_desc: "The importance of trade and commerce is becoming more and more relevant, and so is the establishment of more complex road networks to facilitate and increase the movement of people and goods."
 power_projection_advance_2: "Supranational Ambitions"
 power_projection_advance_2_desc: "Although the old ideas about forging empires still linger in the minds of the rulers in this age, they have also begun to crystallize new ways of establishing their dominance over other countries and peoples."
 renaissance_advance: "Renaissance"
 renaissance_advance_desc: "The waves of innovative thought and discoveries that permeate our realm must be harnessed and utilized if we are to remain at the forefront of technological innovation."
 professional_armies_advance: "Professional Armies"
 professional_armies_advance_desc: "The modernization of our armies is largely dependent upon the maintenance of our recruitment and organization centers. We must strive towards preserving a clear and robust military organization, cutting waste and redundancy."
 gunpowder_advance: "Gunpowder"
 gunpowder_advance_desc: "The usage of gunpowder on the battlefield will certainly have a positive impact on our performance and allow us to excel in military engagements."
 drill_army_advance: "Drill Army"
 drill_army_advance_desc: "No longer shall we depend upon untrained levied men. If we are to defend our borders and smite our rivals, we must conduct regular and organized drills."
 renaissance_development: "Scholarly Treatises"
 renaissance_development_desc: "This era of thought, arts, and science will bring forth new waves of discoveries and inventions, allowing us to optimize our adoption of foreign institutions."
 art_school_advance: "Art Schools"
 art_school_advance_desc: "Dedication to the aesthetic crafts, and the refinement of our artists, must be properly cultivated by the establishment of art schools. Each shall be an incubator for gifted individuals to commence their artistic careers and bring glory and splendor to our nation!"
 pound_lock_canals_advance: "Pound Lock Canals"
 pound_lock_canals_advance_desc: "We have carved into the very face of Earth in order to gain access to food, affluence, and better circulation of goods. The invention of special gates, called 'Mitre Gates', will assist us in providing the necessities for our people to grow and prosper."
 a_renaissance_janissaries_advance: "$a_renaissance_janissaries$"
 a_renaissance_janissaries_advance_desc: "$a_renaissance_janissaries_desc$"
 a_discovery_janissaries_advance: "$a_discovery_janissaries$"
 a_discovery_janissaries_advance_desc: "$a_discovery_janissaries_desc$"
 a_reformation_janissaries_advance: "$a_reformation_janissaries$"
 a_reformation_janissaries_advance_desc: "$a_reformation_janissaries_desc$"
 a_absolutism_janissaries_advance: "$a_absolutism_janissaries$"
 a_absolutism_janissaries_advance_desc: "$a_absolutism_janissaries_desc$"
 a_revolutions_janissaries_advance: "$a_revolutions_janissaries$"
 a_revolutions_janissaries_advance_desc: "$a_revolutions_janissaries_desc$"
 nomadic_legacy: "Nomadic Legacy"
 nomadic_legacy_desc: "Our people are born in the saddle, free to roam the world without the need to put down roots."
 siberian_frontier: "Siberian Frontier"
 siberian_frontier_desc: "The distant wastes of Siberia call to us. We must clear a path to its frozen heart, and let our Cossacks go forth and claim land for the $RUS_ADJ$ people."
 ostrog_advance: "$ostrog$"
 ostrog_advance_desc: "$ostrog_desc$"
 janissaries_advance: "Janissaries"
 janissaries_advance_desc: "Janissaries are the elite units of our armies, trained since childhood and forged through discipline."
 slave_raiding_wars: "Slave Raiding Wars"
 slave_raiding_wars_desc: "Slaves are the cornerstone of our economy. Attacking and raiding our neighbors to capture their population and enslave them is therefore the lifeblood of our country."
 trade_caravans: "Trade Caravans"
 trade_caravans_desc: "Lucrative trade routes have crossed our territories since ancient times. Our people are used to interacting with long caravan trains of merchants trading in goods from lands far away."
 the_sahel_trade: "The $sahel_region$ Trade"
 the_sahel_trade_desc: "Caravans have been trading between the $sahel_region$ and the Mediterranean for ages, the benefits from this trade greatly outweighing the perils of crossing the burning sands of the Sahara."
 rudimentary_coastal_ship_repair: "Makeshift Reapirs"
 rudimentary_coastal_ship_repair_desc: "It is unavoidable that ships deteriorate while sailing. The beating of the waves and the bite of saltwater accumulate over time, damaging both the hull and ropes no matter how well-constructed the vessel. To alleviate this, sailors are used to performing regular maintenance on their ships to keep them in prime condition, and when more significant damage is received, even being able to keep it afloat until they reach a safe harbor."
 religious_icon_power_advance: "Religious Icons"
 religious_icon_power_advance_desc: "Icons are the physical representation of our faith, sacred depictions of holy figures designed to inspire awe and devotion to those that contemplate them."
 scientific_mapping_advance: "Cartographic Mapping"
 scientific_mapping_advance_desc: "Recent improvements in the sciences of geography and cartography have allowed for more accurate depictions of land masses and natural features, both in terms of their relative sizes and their exact positions."
 integrate_area_advance: "Better Integration"
 integrate_area_advance_desc: "Our administration is improving, and as such, we can afford the manpower to integrate larger sections of land into our country at once."
 maritime_advance_age_2: "Trade Fleets"
 maritime_advance_age_2_desc: "As commerce grows, so does the need to more quickly and efficiently transport greater quantities of goods. As such, those invested in maritime trade will spare no expense in building the bigger fleets they can afford."
 maritime_advance_age_3: "Exploration Fleets"
 maritime_advance_age_3_desc: "As our knowledge of the world grows, so does the need to learn even more about it. From the far seas to the east to the new coasts in the west, the length at which we must sail has increased, and thus so has the need for a bigger fleet."
 maritime_advance_age_4: "Global Fleets"
 maritime_advance_age_4_desc: "Given the advances of the last century, it seems like the world has become smaller rather than bigger. Countries that had no contact until now are instead engaging in constant diplomatic and commercial relations. As a result, bigger and better fleets are needed to be able to maintain all those overseas connections."
 maritime_advance_age_5: "Convoys"
 maritime_advance_age_5_desc: "As maritime trade expands, with our ships ferrying goods back and forth in greater quantities and to more distant shores than ever before, the need to maintain a consistent flow of commerce also increases. Organizing convoy trade fleets will allow a more stable circulation of trade ships."
 maritime_advance_age_6: "Armed Convoys"
 maritime_advance_age_6_desc: "Trade convoys are obviously a very juicy target for any pirate. Ships full to the brim with goods and coins are a booty that few will let pass through. Thus, providing those trade convoys with defense armament to deter those attacks is vital. Having the trade fleets be accompanied by frigates or any other armed vessel ensures their safety."
 coastal_trade_routes_advance: "Coastal Expansion" 
 coastal_trade_routes_advance_desc: "The safest way for any ship to sail is to do it close to the coast. Unless they actually have to cross the sea, there is no real need for our ships to sail away from the protective coastline, and it is still quicker traveling by ship than by land. As such, maintaining a constant flow of ships along our coasts will allow for easier circulation of goods and people."
 exploration_maintenance_advance: "Sturdy Construction"
 exploration_maintenance_advance_desc: "The key factor when building a ship is its capacity for resisting inclement weather and the relentless pounding of waves. By developing sturdier methods of ship construction, we can ensure that our vessels can sail for longer periods of time."
 global_trade_routes_advance: "Overseas Trade Routes"
 global_trade_routes_advance_desc: "The world has become larger, thanks to so many new discoveries, but it has also grown smaller with the proliferation of international trade routes. With ships constantly carrying goods and people to and from far away lands, those distant shores actually seem closer than before."
 safe_exploration_techniques_advance: "Lessons of Exploration"
 safe_exploration_techniques_advance_desc: "Heading into the unknown is always scary, but nowadays, there are few places that are truly undiscovered. While many places around the world have still not been fully explored, they are nonetheless known to us, and we have the knowledge and experience to reach them. With the wealth of knowledge our explorers have collected over their many journeys, we can confidently venture into uncharted territory."
 imperial_ambitions: "Imperial Ambitions"
 imperial_ambitions_desc: "The great empires of the past are a source of inspiration for artists and poets alike, always spoken of with awe and admiration. If we want to generate the same reaction towards our own country, we should aspire to the same grandeur."
 letters_of_marque: "Letters of Marque"
 letters_of_marque_desc: "Piracy is an appalling act. They are naught but worthless thieves looking to profit from the suffering of others! Formally authorizing ships to raid our enemies, however, is another matter entirely, and could be extremely profitable for us."
 sturdy_privateers: "Sturdy Privateers"
 sturdy_privateers_desc: "Privateers are always in the line of fire. If we wish to utilize their full potential, we must ensure they are not sunk after the first round of cannon fire! Making sure they only sail on the sturdiest vessels will be beneficial to us in the long run — and to the privateers themselves, of course, as they will live longer."
 rgo_build_time_advance: "$renaissance$ Building Methods"
 rgo_build_time_advance_desc: "The great edifices and grand statues erected in the past still stand proudly. It is undeniable that the construction techniques used to design and erect them were sophisticated and well-developed. There is still much we can learn from studying them."
 arts_academy_advance: "$arts_academy$"
 arts_academy_advance_desc: "Art is the life-breath of humanity, and what turns the world from a bland existence into a vibrant canvas full of wonders and possibilities. We must foster greater artistic curiosity among our people."
 metallurgy: "Metallurgy"
 metallurgy_desc: "Metallurgy, the art of manipulating and working metal, stands as one of the defining capabilities of advanced civilization. Metal tools and weapons are far superior than their stone counterparts, enabling both workers and soldiers to operate with better efficiency."
 supply_depot_advance_age_2_renaissance: "Supply Depots"
 supply_depot_advance_age_2_renaissance_desc: "No army can survive without supplies. Establishing permanent supply depots dedicated to providing for our fighting forces allows for a continuous feeding of the supply lines, keeping our armies always in peak condition."
 supply_depot_advance_age_3_discovery: "Army Depots"
 supply_depot_advance_age_3_discovery_desc: "The development and deployment of standing armies have increased the demands for weaponry, uniforms, and other military supplies, which should be stored in close proximity to our soldiers."
 supply_depot_advance_age_4_reformation: "Ammunition Depots"
 supply_depot_advance_age_4_reformation_desc: "Generalized deployment of artillery for battlefields and sieges has created a high demand for the ammunition and gunpowder to fuel them, increasing the importance of storage depots."
 supply_depot_advance_age_5_absolutism: "Forward Depots"
 supply_depot_advance_age_5_absolutism_desc: "Armies can now penetrate deeper into enemy territory and sustain themselves there for longer periods, making it necessary to build and maintain forward depots closer to them while being linked to rear supply lines."
 supply_depot_advance_age_6_revolutions: "Campaign Depots"
 supply_depot_advance_age_6_revolutions_desc: "The operation of multiple armies on longer campaigns has put extra stress on our supply systems, making bigger, rapidly constructed depots even more important to sustain them."
 army_country_looting_advance: "Raider Troops"
 army_country_looting_advance_desc: "Raiding and looting is fundamentally how our army sustains itself. Everywhere our troops go, they pillage as much as they can."
 minting_income_factor_building: "Currency Ownership"
 minting_income_factor_building_desc: "There are many types of currency in circulation, but the one that bears our seal is the most widely accepted as trustworthy."
 artillery_vs_fort_age_5_absolutism: "Siege Cannons"
 artillery_vs_fort_age_5_absolutism_desc: "Gunpowder has made way for the creation of multiple different types of weapons. Cutting through lines of infantry does not require the same power as breaking down castle walls, and so a specialized type of cannon has to be deployed in sieges."
 artists_advance_absolutism: "Artistic Currents"
 artists_advance_absolutism_desc: "Art has always been created in a number of different ways, but recent advances have allowed it to develop even further into a myriad of manifestations, as artists explore new media and techniques."
 subject_loyalty_absolutism: "Absolute Loyalty"
 subject_loyalty_absolutism_desc: "We tolerate no dissent or revolt. Absolute loyalty is demanded from all subjects, whether they are part of the core citizenry or a conquered group."
 improve_relation_impact_absolutism: "Permanent Foreign Affairs Ministry"
 improve_relation_impact_absolutism_desc: "Our ever-growing diplomatic corps necessitates our creating a permanent Foreign Affairs Ministry to manage and coordinate our many envoys and coordinate their efforts."
 hand_cannon_guild_advance: "$hand_cannon_guild$"
 hand_cannon_guild_advance_desc: "Primitive metal tubes which were a lesser form of later, more advanced guns. First developed in $CHI$, the early hand cannon spread to $KOR$ and $JAP$ in 1270."
 subjects_advance: "Subject Nations"
 subjects_advance_desc: "Granting our subject nations some autonomy over local governance keeps them from revolting while ensuring they continue to provide tribute to the realm."
 slave_center_advance: "$slave_center$"
 slave_center_advance_desc: "Properly managing bonded labor within our realm is imperative to the continued affluence of our people."
 war_score_absolutism_advance: "Aggressive Demands"
 war_score_absolutism_advance_desc: "The power of the state is directly tied to its military capacity. The more populous a country is, the grander its army can become. We must take an aggressive approach toward annexing as much land as possible in peace treaties to seize the advantage over our neighbors."
 spy_construction_absolutism: "Expand Global Spy Networks"
 spy_construction_absolutism_desc: "As the various empires and institutions that make up our world continue to expand, we shall need to maintain and perhaps increase espionage if we wish to stay one step ahead of our rivals."
 absolutism_agressive_advance: "State Above All"
 absolutism_agressive_advance_desc: "As various regions of the world are formally consolidated and resources become more limited, it is the right of the state to exercise an aggressive policy to satisfy the material needs of its people and expand its power. And while war should be seen as the last act of diplomacy, it is still a diplomatic play, as the state is above human restrictions such as morality and law."
 relations_absolutism_advance: "Threaded Politics"
 relations_absolutism_advance_desc: "As the world around us shifts to accommodate the wider scope of a truly global theater, so too must our diplomatic efforts keep up with this ever-growing need for security against foreign threats."
 correct_box_advance_absolutism: "Flexible Battle Formations"
 correct_box_advance_absolutism_desc: "New tactics have developed, making for more flexible and coordinated infantry, cavalry, and artillery units on the battlefield, usually grouped as brigades."
 anti_piracy_warfare: "Merchant Convoys"
 anti_piracy_warfare_desc: "The rise of cutthroat, lawless buccaneers in the New World — and along the maritime routes leading to it — had made a great impact on our merchants and our trade. From now on, our merchant ships will form convoys with an accompanying warship to protect them, and will have on board a small military contingent to further ensure their survival on the high seas."
 trade_range_advance_age_3: "Improved Trade Ships"
 trade_range_advance_age_3_desc: "We have developed larger ships that require a smaller crew to sail, and which can travel farther without needing to stop. This should greatly increase the range of our trade efforts as a result."
 trade_range_advance_age_2: "Distant Markets"
 trade_range_advance_age_2_desc: "As our economy grows, new opportunities arise. Whereas before short-distance trade routes were very profitable, longer-distance routes have recently started to bring in more money. Our merchant vessels are now sailing farther away for the best offers."
 overseas_trade: "Overseas Trade"
 overseas_trade_desc: "News of the discovery of distant lands has reached our nation, and our merchants are already preparing to expand their trading operations. These unexplored territories are filled with prosperous markets dripping with wealth, like so much ripe fruit waiting to be collected."
 ship_building_techniques_absolutism: "Wet Dock"
 ship_building_techniques_absolutism_desc: "The development of the wet dock, or floating dock, will allow our shipwrights to construct ships much faster than before."
 ship_building_techniques_discovery: "Improved Shipbuilding"
 ship_building_techniques_discovery_desc: "New building techniques for our ships will help us produce them faster."
 spy_construction_discovery: "Improved Spy Organization"
 spy_construction_discovery_desc: "By hiring trustworthy individuals as informants and strategically positioning them in situations where clandestine information is shared, we can improve our capability to gather information about our enemies and their activities."
 diplomatic_training: "Diplomatic Training"
 diplomatic_training_desc: "Our diplomatic playbook has been refined, and as a result, we have added excellent diplomats to our entourage in an attempt to bolster our foreign efforts."
 formalized_relations: "Formalized Relations"
 formalized_relations_desc: "Establishing formal relations with neighboring countries of interest is crucial if we are to maintain a balance of power and promote our interests."
 artists_advance_discovery: "Artistic Prints"
 artists_advance_discovery_desc: "Widespread usage of the printing press has created new opportunities for our people to share their artistic skills, and to distribute this art faster and more widely than ever before."
 improved_book_binding: "Improved Bookbinding"
 improved_book_binding_desc: "The blossoms of thought and knowledge must be watered by a steady supply of books if we are to prosper and cultivate as a people."
 lumber_improvements_discovery: "Dedicated Forestry"
 lumber_improvements_discovery_desc: "By dedicating a portion of land to the cultivation and harvesting of strong trees, we can increase the quality and quantity of our lumber production."
 lumber_improvements_reformation: "Improved Sawblades"
 lumber_improvements_reformation_desc: "Thanks to recent advances in toolmaking, our sawblades are sturdier than ever before and require less maintenance. This will make supplying adequate lumber for economic activities far easier than before."
 lumber_improvements_absolutism: "Wind-Powered Sawmills"
 lumber_improvements_absolutism_desc: "With the introduction of wind power to our sawmills, we are able to process timber into planks at a much faster rate than we could previously."
 coal_improvements_absolutism: "Improved Coking"
 coal_improvements_absolutism_desc: "By streamlining the coal refining process, we can use it more effectively as fuel while eliminating side effects that would negatively impact other industrial products."
 coal_improvements_revolutions: "Improved Beehive Ovens"
 coal_improvements_revolutions_desc: "For the production of coke, a vital part of iron processing, we need many beehive ovens. With improved construction techniques and better usage of bricks, we will be able to accordingly raise the quality of the produced coke."
 correct_box_advance_discovery: "Lieutenants"
 correct_box_advance_discovery_desc: "As our professional armies grow, the commissioned officers that lead them are commanding increasingly bigger formations. To assist them, we will create the rank of lieutenant. These officers take charge of transmitting orders from command, and also lead smaller units on the battlefield."
 artists_advance_reformations: "Development of Secular Art"
 artists_advance_reformations_desc: "In the wake of the Reformation, new forms of art flourish like blossoms on a vine. It has become easier for artists to gain recognition in their field, and also to find employment in the courts of the world."
 war_score_reformations_advance: "Divine Right to Conquer"
 war_score_reformations_advance_desc: "Victory on the battlefield is the result of more than just good execution of battle plans and war strategies — it is a divine intervention in our favor. Therefore, our right to conquer and annex new territories for which we have spilled blood is an extension of the divine will that champions our supremacy."
 reformation_subject_opinions_advance: "Economic Overlords"
 reformation_subject_opinions_advance_desc: "Contracts that define suzerainty over another state cover many different aspects. One such is the domestic trade obligations of the subject to their overlord. As global trade becomes more and more prominent, the expansion of these obligations becomes increasingly important."
 spy_construction_reformation: "Advanced Cryptography"
 spy_construction_reformation_desc: "If we want to gather intelligence on our enemies, we must improve our skill in cracking and devising secret codes. We shall lull our enemies into a false sense of security by sending what appear to be only ordinary communications, which shall actually contain hidden, encoded information. A pity our enemies will not be clever enough to understand it!"
 subject_income_reformation_advance: "Firmer Financial Control"
 subject_income_reformation_advance_desc: "The financial responsibilities our subjects have towards us are clearly defined. However, tightening these contracts will ensure timely payments and lead to a healthier treasury."
 correct_box_advance_reformation: "Regimental Organization"
 correct_box_advance_reformation_desc: "Professional armies have made it possible to create a new type of unit, the regiment, which not only is a permanent position for soldiers, but also a useful battle formation."
 recruitment_improvements_reformation: "Recruitment Offices"
 recruitment_improvements_reformation_desc: "For our country to create a formidable army, we must improve our recruitment efforts. With increased time and money spent on recruitment centers and activities, we will attract able soldiers with haste."
 mercenaries_reformation_advance: "Ensure Mercenary Payments"
 mercenaries_reformation_advance_desc: "It is well understood that mercenaries do not work for free. By promising fair compensation and a share of the plunder, we can assure their loyalty more easily, and ensure the most skilled companies will be willing to work for us"
 renaissance_subject_opinions_advance: "Cultural Overlords"
 renaissance_subject_opinions_advance_desc: "In recent years, matters of culture, humanism, and natural philosophy have risen in prominence. This cultural influence extends not only to our own people, but also to states who have sworn allegiance to us, making our position as cultural overlords a valuable diplomatic tool."
 spy_construction_renaissance: "Spy Networks"
 spy_construction_renaissance_desc: "Espionage has been a valuable tool for empires since ancient times. Spycraft allows us to become better informed about both internal and external threats, and to monitor the activities of potentially dangerous states and actors. The Mongols were masters of this art, using espionage to prepare for and secure the success of their military campaigns."
 recruitment_improvements_renaissance: "Organized Recruitment"
 recruitment_improvements_renaissance_desc: "The development of professional armies has increased our military capabilities. To sustain this, the state will need to improve its capacity for recruiting soldiers as well."
 correct_box_advance_renaissance: "Commissioned Officers"
 correct_box_advance_renaissance_desc: "The development of professional armies has led to the appointment of permanent command positions, offices granted by direct commission from the ruler."
 improve_relation_impact_renaissance: "Lavish Diplomatic Gifts"
 improve_relation_impact_renaissance_desc: "Diplomatic gifts have been exchanged since ancient times, as a measure of impressing or persuading foreign rulers by emphasizing the high status and enviable wealth of the giver. Gifts could range from fine cloth, to splendid jewelry, to astonishing animals such as giraffes or elephants."
 late_feudal_relations: "Late Feudal Relations"
 late_feudal_relations_desc: "Feudalism is built upon the concepts of #italic auxilium#! and #italic consilium#!, or military aid and counsel, owed by vassals to their lords. Over this, this has created an intricate hierarchy of rank, privilege, and reciprocal duties."
 artists_advance_revolutions: "Enlightened Art"
 artists_advance_revolutions_desc: "With the rise of the Enlightenment, the arts are flourishing in all forms and at all levels of society. New publications of music and literature are in particular leading to a broad developing interest in these arts."
 revolutions_subject_opinions_advance: "Benign Overlords"
 revolutions_subject_opinions_advance_desc: "The fires of revolution are no trifling threat. If we wish to guarantee the loyalty of our subjects, we must suffocate any notion of uprising in its cradle by appointing trustworthy governors and removing any cause for unrest."
 war_score_revolutions_advance: "Arguments of Reason"
 war_score_revolutions_advance_desc: "Wars are always ugly affairs that bring suffering to both sides. Emphasizing this fact, and appealing to our opposition's reason and logic, will surely give us a significant advantage when negotiating the inevitable border changes."
 spy_construction_revolutions: "Contact with Dissidents"
 spy_construction_revolutions_desc: "As new ideas and political systems raise their heads around the world, there must logically also arise those who protest the status quo. We will need to allocate resources to support these dissenting voices in our rival nations in order to extract valuable information and contribute to their destabilizing effects."
 revolutions_agressive_advance: "Justified Conflicts"
 revolutions_agressive_advance_desc: "The international diplomatic theater thrives on a balance of power between the nations. Wars of aggression are frowned upon and, if won, might lead to coalitions forming and uniting against the winner.\nThrough clever usage of diplomacy and interpretation, however, we can make our enemies appear as the aggressors against us, justifying our warmongering and gains from it in the eyes of the public."
 subject_income_revolutions_advance: "Paid Sovereignty"
 subject_income_revolutions_advance_desc: "The world around us is undergoing tremendous change in all sectors. We can capitalize on this instability by formalizing tributary arrangements with subject nations in exchange for supporting them. Sovereign protection, it turns out, has a price."
 artillery_vs_fort_age_6_revolutions: "Advanced Howitzers"
 artillery_vs_fort_age_6_revolutions_desc: "The need for a weapon that fills the niche between the direct fire of siege cannon and the indirect one of the mortars has led our military to develop new howitzers."
 recruitment_improvements_revolutions: "Extensive Recruitment"
 recruitment_improvements_revolutions_desc: "With potential threats emerging from across a wider geographical expanse than ever before, we need to expand our military recruitment accordingly. By offering incentives to volunteers while also pressing criminals into service, we can rapidly mobilize forces to meet any danger."
 correct_box_advance_revolutions: "General Staff"
 correct_box_advance_revolutions_desc: "The growth of armies and their deployment in longer campaigns has created a need to assign designated officers to planning and logistics, focused on effectively coordinating the different corps on the battlefield."
 urbanization: "Urbanization"
 urbanization_desc: "The new opportunities and security offered by life in our emerging cities are drawing more and more people off of rural farms and into cities, where they are eager to take up industrial jobs created by the new, modern factories."
 advanced_anti_piracy_warfare: "Renunciation of Privateering"
 advanced_anti_piracy_warfare_desc: "In our age of discovery and humanism, there is no longer a place for the thievery and violence that pirates inflict on the high seas. More and more nations are banding together to face this common threat to the well-being and prosperity of all, and have sworn to put an end to this scourge."
 dip_choice_subject_opinions: "Subject Emissaries"
 dip_choice_subject_opinions_desc: "Continued communication with our subject nations through dedicated emissaries will positively impact our relations, strengthening the core of our domain and ensuring the loyalty of all countries that stand under our banner."
 early_anti_piracy_warfare: "Anti-Piracy Leagues"
 early_anti_piracy_warfare_desc: "The proliferation of pirates, brigands, and robbers in the waters along our trade routes has forced our merchants to band together and form Merchant Leagues, which facilitate the protection of their boats during long journeys."
 pop_promotion_speed_age_5: "Bureaucratic Promotions"
 pop_promotion_speed_age_5_desc: "The bureaucracy is expanding to meet the needs of the expanding bureaucracy, which correspondingly increases our need for educated officials to join the administrative ranks."
 army_movement_speed_absolutism: "Magazines"
 army_movement_speed_absolutism_desc: "Field magazines are not new technology, but their use has been greatly popularized by the unparalleled growth of modern armies. The steady supply of ammunition they provide facilitates ease of army movement, and extends their operational range."
 army_movement_speed_revolutions: "Supply Contracts"
 army_movement_speed_revolutions_desc: "Paying fair prices for the food and supplies our army needs while moving through a region instead of raiding accelerates our movement through the area, as the peasants themselves will bring their goods to the collection points we establish."
 regiment_reinforcement_speed_absolutism: "Marshal of Lodgings"
 regiment_reinforcement_speed_absolutism_desc: "Standing armies have become the new standard of warfare, which in itself brings its share of challenges. The Marshal of Lodging, a new position within our military, shall focus on overcoming these challenges by organizing the logistics of our ever-growing forces."
 pop_promotion_speed_age_3: "Nobility by Service"
 pop_promotion_speed_age_3_desc: "Traditionally, our artistocrats achieved their status through military service to their ruler. However, the demands of a growing state now necessitate members of the lower nobility being promoted to higher ranks, while people from other classes, such as merchants, are elevated as nobles."
 regiment_reinforcement_speed_discovery: "Early Military Logistics"
 regiment_reinforcement_speed_discovery_desc: "Logistics are half the battle. As soldiers fight, their weaponry and armor will lose their durability, and possibly even break under the enemy onslaught. Establishing local supply depots, as well as employing other logistic methods, allows us to re-equip our soldiers in record time."
 pop_promotion_speed_age_4: "Confessional Clerics"
 pop_promotion_speed_age_4_desc: "The Age of Reformation and Confessionalism have renewed interest in organized confessions, and there is demand for more clerics willing to guide their flocks through these troublesome times. These confessional clergy make religious offices much more appealing to those people seeking certainty and spiritual guidance."
 assault_ability_reformation: "Reformed Breach Sorties"
 assault_ability_reformation_desc: "By delegating the responsibility of assaulting breaches to our finest and most disciplined troops, we will penetrate even the most formidable fortifications that our foes may hide behind."
 regiment_reinforcement_speed_reformation: "Powder Flask"
 regiment_reinforcement_speed_reformation_desc: "Use of gunpowder weaponry has become increasingly prevalent among our fighting forces. However, gunpowder is a troublesome material to work with due to its vulnerability to weather and external impact. A specialized flask will protect our gunpowder from the elements, allowing us to supply our troops more easily."
 pop_promotion_speed_age_2: "Favorable Social Mobility"
 pop_promotion_speed_age_2_desc: "The dream of most peasants — to escape poverty and climb the social ladder — is a reality within our society. By rewarding hard work, meticulousness, and the proper embodiment of our ideals, we will never have a shortage of capable and influential people."
 regiment_reinforcement_speed_renaissance: "Permanent Field Training"
 regiment_reinforcement_speed_renaissance_desc: "Professional armies are shifting the way warfare is conducted, as now it is based on permanent units that serve for long periods of time. Maintaining a regular flow of trained soldiers into those units is a challenge, but very much needed for their optimal operation."
 pop_promotion_speed_age_6: "Capitalist Social Mobility"
 pop_promotion_speed_age_6_desc: "The expansion of capitalism has given birth to a new age of social mobility, in which wealth is replacing the traditional hierarchies as means of determining social status. Everyone, from business moguls to clerks to industrial laborers, is eager to buy their way into the upper strata."
 regiment_reinforcement_speed_revolutions: "Mass Training"
 regiment_reinforcement_speed_revolutions_desc: "Modern standing armies are grander than any military force of the past. Tactics are executed by the tens of thousands, and the casualties pile up in unprecedented numbers. Our new military training techniques should offset the high death toll of modern warfare by readying hundreds of soldiers for battle at the same time."
 siege_ability_revolutions: "Artillery Officers"
 siege_ability_revolutions_desc: "Artillery has become so central to modern warfare that specialized officers trained in gunnery techniques and tactical deployment are now essential on the battlefield."
 assault_ability_revolutions: "March Against Fire"
 assault_ability_revolutions_desc: "Our armies willingly march into the mayhem of cannon fire and dust, carving a path for our troops to take the enemy's forts. Despite advances in artillery and new fortification techniques, our skill in assaulting enemy walls remains unrivaled."
 army_country_movement_speed_advance: "Scouting Parties"
 army_country_movement_speed_advance_desc: "Through the use of mounted scouts, we can check the terrain lying ahead of armies, and plan how to maneuver around any difficulties. This allows us to travel at a faster rate than other armies could in that same location."
 army_country_casus_belli_advance: "Pretexts"
 army_country_casus_belli_advance_desc: "Our professional diplomats and spies excel at fabricating credible pretexts to justify almost any action we might take on the international stage."
 army_country_integration_speed_advance: "Respect Local Government"
 army_country_integration_speed_advance_desc: "Our people are fearsome warlords who wish to spread their legacy to every corner of the world. As a means of integrating and managing our ever-growing domain, we have decided to mostly respect the way conquered locals conduct themselves, and not to interfere excessively."
 army_country_diplo_range_advance: "Armed Envoys"
 army_country_diplo_range_advance_desc: "Our army is feared far and wide. Despite our reputation, we should still establish diplomatic relations with nations that have the same goal as ourselves: the destruction of our common enemies. By sending well-armed and escorted envoys to foreign courts, we can ensure our diplomatic reach will not suffer under outbreaks of violence."
 minting_trade_range_trad_building: "Planned Trade Expeditions"
 minting_trade_range_trad_building_desc: "Trade with foreign countries is the lifeblood of our nation. By meticulously planning out the trading routes and stockpiling supplies for each voyage, we can reach markets further from our bases."
 minting_trade_range_disc_building: "Expanded Trade Depots"
 minting_trade_range_disc_building_desc: "The growing demands of international trade will need to be accounted for in the planning of our trading endeavors. With this expansion of our trade depots, we can reach new shores without risking our valuable cargo."
 trade_center_building_country_advance: "Emporiums"
 trade_center_building_country_advance_desc: "With clever techniques, we can easily make our controlled markets more attractive to foreign merchants, increasing the amount of money we earn in the process."
 export_building_country_advance: "Agile Exportation"
 export_building_country_advance_desc: "Costs to export valuable goods from our controlled markets can be quite high, making our products less attractive. By performing these export actions quicker, we can make our trade more dynamic."
 counter_espionage_building_country_advance: "Secret Codes"
 counter_espionage_building_country_advance_desc: "It is well known that our activities attract unwelcome attention. If we wish to keep our plans hidden from these curious gazes, we should encrypt our communications."
 medical_school_advance: "Medical Schools"
 medical_school_advance_desc: "Specialized sites for medical training, these schools are where scholars go to learn about the human body, diseases, and how to treat and prevent them."
 slave_manned_galleys: "Slave-Manned Galleys"
 slave_manned_galleys_desc: "Massive galley fleets incur equally massive costs, as they must have enough oarsmen to function. By assigning slaves to this task, we can significantly lessen the cost of staffing our navies."


 jesuits_bark: "Jesuit's Bark"
 jesuits_bark_desc: "Some native population of South America have been observed to use the bark of a specific tree to treat shivers. Thanks to the experiments of a Jesuit apothecary, this bark has been proven also effective for the treatment of malaria, and it is already known as 'Jesuit's Bark'. Distributing it to the affected population will greatly decrease the effects of the disease."
 quinine: "Quinine"
 quinine_desc: "Although the 'Jesuit's Bark' has been effective in treating malaria in the past, its consumption as dried bark powder leaves much room for improvement. By isolating and extracting the actual healing component from the bark, we can substantially increase the effectiveness of the treatment."

 state_efficiency: "Local Infrastructure"
 state_efficiency_desc: "Despite our focus on country-wide affairs, we must not neglect our local state legislators and bailiffs."
 efficient_mining: "Efficient Mining"
 efficient_mining_desc: "We shall issue a decree to refine every aspect of metal mining within our domain, in an effort to regulate its presence in our markets. "
 efficient_construction_plans: "Efficient Construction Plans"
 efficient_construction_plans_desc: "Our efficient building strategy allows us to complete complex work orders without taking any half measures."
 expanded_infrastructure_network: "Expanded Infrastructure Network"
 expanded_infrastructure_network_desc: "Our national road network is a vital part of our commercial and administrative success. As such, we should care to maintain and improve it."
 fort_logistics: "Fortification Logistics"
 fort_logistics_desc: "By ordering our system of fortifications in an organized manner, both construction-wise and logistically, we may save some coin on maintaining it in the long term."
 regulation_bureau: "Regulation Bureau"
 regulation_bureau_desc: "A legislative body whose jurisdiction involves the maintenance and promotion of inflation-related laws as well as the local administration of our provinces."

 more_merchants_age_of_trad: "Merchant Guilds"
 more_merchants_age_of_trad_desc: "The formation of guilds has shaped our economy for a long time. While they are common organizations amongst our artisans, the same cannot be said for our merchants. We should encourage our traders to form similar guilds in order to streamline our mercantile ambitions."
 construction_speed_traditions: "Master Masons"
 construction_speed_traditions_desc: "Our construction efforts should never rest and leave our villages and towns idle. Employing a master mason, who will oversee and plan our construction work, we can make significant improvements in expanding our country."
 diplomatic_capacity_traditions: "Expanded Archives"
 diplomatic_capacity_traditions_desc: "Regular diplomatic endeavors require paperwork and detailed documentation of our contacts."
 rural_rgo_traditions: "Clearing Terrain"
 rural_rgo_traditions_desc: "We must tame the far reaches of our country in order to expand our economic capabilities. Not only will we provide more space for our people, but we can optimize their contributions to our country."
 matchlock_gun: "Early Hunting Guns"
 matchlock_gun_desc: "Improvements to the weapons produced by our gunsmiths will also provide our hunters with better tools to bring home ample furs and wild game."
 flintlock_gun: "Improved Hunting Guns"
 flintlock_gun_desc: "With the development of improved flintlock guns and special ammunition for hunting, our hunters will be even more capable of bagging their prey."
 long_rifle: "Long Rifle Hunting"
 long_rifle_desc: "With specific long rifles designed for hunting, our hunters will have a reliable tool for procuring food and furs."
 
